<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Pi</title>
<style>
  /* ── Reset ─────────────────────────────────────────── */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{
    height:100%;
    height:100dvh;            /* dynamic viewport, iOS 16+ */
    overflow:hidden;
    background:#0a0a0a;
    color-scheme:dark;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;
    color:#f5f5f5;
    -webkit-font-smoothing:antialiased;
    -webkit-text-size-adjust:100%;
    overscroll-behavior:none;
    user-select:none;
    -webkit-user-select:none;
  }
  /* App shell — trust CSS 100dvh + interactive-widget=resizes-content to handle keyboard.
     No JS layout override (was fighting with iOS 16+ native resize). */
  #app{
    height:100dvh;
    display:flex;
    flex-direction:column;
  }

  /* ── Header ────────────────────────────────────────── */
  header{
    flex:0 0 auto;
    display:flex;align-items:center;gap:12px;
    padding:calc(env(safe-area-inset-top) + 10px) 20px 10px 20px;
    background:rgba(10,10,10,.85);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:.5px solid #1f1f1f;
    position:relative;z-index:5;
  }
  header .glyph{
    font-size:24px;line-height:1;color:#fff;
    text-shadow:0 0 14px rgba(255,255,255,.35);
    flex:0 0 auto;
  }
  header .title{display:flex;flex-direction:column;line-height:1.1}
  header h1{font-size:16px;font-weight:600;letter-spacing:.2px}
  header .sub{font-size:11px;color:#666;margin-top:2px;font-weight:400}
  header .actions{margin-left:auto;display:flex;gap:8px}
  header .icon-btn{
    width:32px;height:32px;border-radius:16px;border:none;
    background:transparent;color:#888;font-size:18px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:background .15s;
  }
  header .icon-btn:active{background:#1c1c1e}

  /* ── Messages ──────────────────────────────────────── */
  #messages{
    flex:1 1 auto;
    overflow-y:auto;overflow-x:hidden;
    overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch;
    scroll-behavior:smooth;
    padding:18px 16px 8px 16px;
    display:flex;flex-direction:column;gap:12px;
    user-select:text;-webkit-user-select:text;
  }
  #messages::-webkit-scrollbar{width:0;display:none}

  .empty{
    margin:auto;color:#3a3a3a;font-size:14px;
    text-align:center;line-height:1.6;padding:20px;
  }
  .empty .big{font-size:48px;margin-bottom:12px;color:#fff;
              text-shadow:0 0 24px rgba(255,255,255,.3)}

  .msg{
    max-width:78%;
    padding:9px 14px;
    border-radius:20px;
    font-size:16px;line-height:1.45;
    word-wrap:break-word;overflow-wrap:break-word;
    white-space:pre-wrap;
    animation:msg-in .18s ease-out;
  }
  @keyframes msg-in{
    from{opacity:0;transform:translateY(6px)}
    to{opacity:1;transform:translateY(0)}
  }
  .msg.user{
    align-self:flex-end;
    background:linear-gradient(180deg,#0a84ff 0%,#0973e0 100%);
    color:#fff;
    border-bottom-right-radius:6px;
  }
  .msg.pi{
    align-self:flex-start;
    background:#1c1c1e;
    color:#f0f0f0;
    border-bottom-left-radius:6px;
  }
  /* voice bubble — 灰色斜体小字，不抢视觉 */
  .msg.voice{
    align-self:flex-start;
    background:transparent;
    color:#7a7a7a;
    font-style:italic;
    font-size:13.5px;
    padding:2px 14px;
    max-width:88%;
    line-height:1.5;
    animation:none;
  }
  .msg.voice::before{content:"🗣  ";font-style:normal}
  /* tool call — 极淡，monospace */
  .msg.tool{
    align-self:flex-start;
    background:transparent;
    color:#555;
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    font-size:11px;
    padding:0 14px;
    max-width:88%;
    animation:none;
  }
  .msg.error{
    align-self:center;
    background:#3a0a0a;color:#ff8a80;
    font-size:13px;border-radius:10px;
    padding:8px 12px;
  }
  /* streaming caret */
  .msg.streaming::after{
    content:"▍";
    color:#888;
    margin-left:1px;
    animation:caret 1.1s step-end infinite;
  }
  @keyframes caret{50%{opacity:0}}

  .typing{
    align-self:flex-start;
    color:#666;font-size:13px;
    padding:6px 14px;
    display:flex;align-items:center;gap:6px;
  }
  .typing .dot{
    width:5px;height:5px;border-radius:50%;background:#666;
    animation:bounce 1.2s infinite;
  }
  .typing .dot:nth-child(2){animation-delay:.15s}
  .typing .dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{
    0%,60%,100%{transform:translateY(0);opacity:.4}
    30%{transform:translateY(-4px);opacity:1}
  }

  /* ── Composer (footer) ─────────────────────────────── */
  footer{
    flex:0 0 auto;
    display:flex;align-items:flex-end;gap:8px;
    padding:8px 12px max(8px,env(safe-area-inset-bottom)) 12px;
    background:rgba(10,10,10,.92);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-top:.5px solid #1f1f1f;
    position:relative;z-index:5;
  }
  #input{
    flex:1 1 auto;
    background:#1c1c1e;color:#f5f5f5;
    border:1px solid #2a2a2a;
    border-radius:22px;
    padding:9px 16px;
    font-size:16px;          /* ≥16px 防 iOS 自动 zoom */
    font-family:inherit;
    line-height:1.4;
    outline:none;
    resize:none;
    max-height:120px;
    min-height:40px;
    transition:border-color .15s,background .15s;
    -webkit-user-select:text;user-select:text;
  }
  #input::placeholder{color:#5a5a5a}
  #input:focus{border-color:#0a84ff;background:#1f1f23}
  #send{
    flex:0 0 auto;
    width:40px;height:40px;
    border-radius:50%;
    border:none;
    background:#0a84ff;color:#fff;
    font-size:17px;font-weight:600;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s,background .15s,opacity .15s;
    user-select:none;-webkit-user-select:none;
  }
  #send:active{transform:scale(.92)}
  #send:disabled{background:#2a2a2a;color:#555;cursor:not-allowed}
  #send svg{width:20px;height:20px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="glyph">✦</div>
    <div class="title">
      <h1>Pi</h1>
      <div class="sub" id="status-sub">PiOS Mobile · M2</div>
    </div>
    <div class="actions">
      <button class="icon-btn" id="reset-btn" title="新对话" aria-label="新对话">＋</button>
    </div>
  </header>

  <div id="messages" role="log" aria-live="polite">
    <div class="empty" id="empty">
      <div class="big">✦</div>
      <div>跟 Pi 说点什么</div>
    </div>
  </div>

  <footer>
    <textarea id="input"
              placeholder="说点什么…"
              rows="1"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="none"
              spellcheck="false"
              enterkeyhint="send"
              inputmode="text"></textarea>
    <button id="send" type="button" aria-label="发送" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
  </footer>
</div>

<script>
(function(){
  'use strict';

  // ── Element refs ─────────────────────────────────────
  const app      = document.getElementById('app');
  const messages = document.getElementById('messages');
  const input    = document.getElementById('input');
  const sendBtn  = document.getElementById('send');
  const resetBtn = document.getElementById('reset-btn');
  const empty    = document.getElementById('empty');

  // Keyboard handling: trust CSS 100dvh + meta interactive-widget=resizes-content.
  // No JS layout override (was double-resizing on iOS 16+ and causing drift).

  // ── Auto-resize textarea ─────────────────────────────
  function autoSize(){
    input.style.height = 'auto';
    const next = Math.min(input.scrollHeight, 120);
    input.style.height = next + 'px';
  }
  function updateSendEnabled(){
    sendBtn.disabled = busy || input.value.trim().length === 0;
  }
  input.addEventListener('input', () => { autoSize(); updateSendEnabled(); });

  // ── Scroll anchor (smart bottom-lock) ────────────────
  let stickToBottom = true;
  let lastScrollTop = 0;
  messages.addEventListener('scroll', () => {
    const dist = messages.scrollHeight - messages.scrollTop - messages.clientHeight;
    // user is "at bottom" if within 60px slack
    stickToBottom = dist < 60;
    lastScrollTop = messages.scrollTop;
  }, { passive:true });
  function scrollToBottom(force){
    if (!force && !stickToBottom) return;
    requestAnimationFrame(() => {
      messages.scrollTop = messages.scrollHeight;
    });
  }

  // ── Tap messages → dismiss keyboard ──────────────────
  messages.addEventListener('touchstart', () => {
    if (document.activeElement === input) input.blur();
  }, { passive:true });

  // ── Message DOM ──────────────────────────────────────
  function clearEmpty(){ if (empty && empty.parentNode) empty.remove(); }

  function addMsg(role, text, extraClass){
    clearEmpty();
    const el = document.createElement('div');
    el.className = 'msg ' + role + (extraClass ? ' ' + extraClass : '');
    el.textContent = text || '';
    messages.appendChild(el);
    scrollToBottom();
    return el;
  }

  // ── Typing indicator ─────────────────────────────────
  let typingEl = null;
  function showTyping(){
    if (typingEl) return;
    clearEmpty();
    typingEl = document.createElement('div');
    typingEl.className = 'typing';
    typingEl.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    messages.appendChild(typingEl);
    scrollToBottom();
  }
  function hideTyping(){
    if (typingEl && typingEl.parentNode) typingEl.parentNode.removeChild(typingEl);
    typingEl = null;
  }

  // ── Send flow ────────────────────────────────────────
  let busy = false;
  let currentTextEl = null;

  async function send(){
    if (busy) return;
    const text = input.value.trim();
    if (!text) return;

    busy = true;
    updateSendEnabled();
    input.value = '';
    autoSize();

    addMsg('user', text);
    showTyping();
    currentTextEl = null;
    stickToBottom = true; // sending always pulls to bottom

    let aborted = false;
    try {
      const resp = await fetch('/m/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ message:text }),
      });
      if (!resp.ok || !resp.body) {
        hideTyping();
        addMsg('pi', 'HTTP ' + resp.status, 'error');
        return;
      }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let firstChunk = true;
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        if (firstChunk) { hideTyping(); firstChunk = false; }
        buf += decoder.decode(value, { stream:true });
        let idx;
        while ((idx = buf.indexOf('\n\n')) !== -1) {
          const frame = buf.slice(0, idx);
          buf = buf.slice(idx + 2);
          if (!frame.trim() || frame.startsWith(':')) continue;
          let evType = 'message', dataStr = '';
          for (const line of frame.split('\n')) {
            if (line.startsWith('event:')) evType = line.slice(6).trim();
            else if (line.startsWith('data:')) dataStr += line.slice(5).trim();
          }
          let data = {};
          try { data = JSON.parse(dataStr); } catch {}
          handleEvent(evType, data);
        }
      }
    } catch (err) {
      hideTyping();
      if (!aborted) addMsg('pi', String(err && err.message || err), 'error');
    } finally {
      hideTyping();
      // finalize streaming bubble
      if (currentTextEl) {
        currentTextEl.classList.remove('streaming');
      }
      busy = false;
      updateSendEnabled();
      currentTextEl = null;
    }
  }

  function handleEvent(type, data){
    const content = data.content || '';
    if (type === 'voice') {
      addMsg('voice', content);
    } else if (type === 'text') {
      if (!currentTextEl) {
        currentTextEl = addMsg('pi', '', 'streaming');
      }
      currentTextEl.textContent += content;
      scrollToBottom();
    } else if (type === 'tool') {
      addMsg('tool', content);
    } else if (type === 'done') {
      // strip <say>...</say> — voice already rendered separately
      const stripped = (content || '').replace(/<say>[\s\S]*?<\/say>/g, '').trim();
      if (currentTextEl) {
        currentTextEl.classList.remove('streaming');
        if (stripped) currentTextEl.textContent = stripped;
        else if (!currentTextEl.textContent) currentTextEl.remove();
      } else if (stripped) {
        addMsg('pi', stripped);
      }
      currentTextEl = null;
    } else if (type === 'error') {
      addMsg('pi', content || 'unknown error', 'error');
    }
    // ignore: usage, system, etc.
  }

  // ── Send triggers ────────────────────────────────────
  sendBtn.addEventListener('click', e => { e.preventDefault(); send(); });
  input.addEventListener('keydown', e => {
    // IME composing: never intercept
    if (e.isComposing || e.keyCode === 229) return;
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // ── Reset (new conversation) ─────────────────────────
  resetBtn.addEventListener('click', async () => {
    if (busy) return;
    if (!confirm('开始新对话？当前会话历史会清空。')) return;
    try {
      await fetch('/m/reset', { method:'POST' });
    } catch {}
    messages.innerHTML = '';
    const e = document.createElement('div');
    e.className = 'empty';
    e.id = 'empty';
    e.innerHTML = '<div class="big">✦</div><div>跟 Pi 说点什么</div>';
    messages.appendChild(e);
  });

  // ── Init ─────────────────────────────────────────────
  updateSendEnabled();
  // Focus is intentionally NOT auto on load (user taps when ready,
  // avoids surprise keyboard popup).
})();
</script>
</body>
</html>
