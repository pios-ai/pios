      <div style="font-size:10px;color:#666;margin-bottom:8px">将在 primary 本机登录，完成后自动同步到其他远程机器</div>
      <div id="login-progress-state" style="font-size:11px;color:#888;margin-bottom:14px">启动中…</div>
      <div id="login-progress-url" style="font-size:11px;color:#4a9eff;word-break:break-all;margin-bottom:10px"></div>
      <pre id="login-progress-log" style="background:#020409;border:1px solid #21262d;border-radius:6px;padding:10px;font-size:10px;color:#8b949e;max-height:200px;overflow:auto;white-space:pre-wrap;margin:0"></pre>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
        <button id="login-progress-cancel" onclick="cancelLoginFlow()"
          style="padding:6px 12px;font-size:11px;border:1px solid #ff8c42;background:transparent;color:#ff8c42;border-radius:4px;cursor:pointer">取消</button>
        <button id="login-progress-close" onclick="document.getElementById('login-progress-modal').remove();loadResourcesTab()"
          style="padding:6px 12px;font-size:11px;border:1px solid #30363d;background:transparent;color:#888;border-radius:4px;cursor:pointer;display:none">关闭</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  const stateEl = document.getElementById('login-progress-state');
  const urlEl = document.getElementById('login-progress-url');
  const logEl = document.getElementById('login-progress-log');
  const cancelBtn = document.getElementById('login-progress-cancel');
  const closeBtn = document.getElementById('login-progress-close');

  let sessionId = null;
  try {
    const r = await api('POST', '/pios/auth/login', { engine, host });
    if (!r || !r.ok) throw new Error(r && r.error || 'failed to start login');
    sessionId = r.sessionId;
    window._currentLoginSessionId = sessionId;
    stateEl.textContent = `启动成功，session=${sessionId.slice(0, 8)}...`;
  } catch (e) {
    stateEl.textContent = '❌ 启动失败：' + e.message;
    stateEl.style.color = '#ff8c42';
    cancelBtn.style.display = 'none';
    closeBtn.style.display = 'inline-block';
    return;
  }

  // Poll status
  let pollCount = 0;
  const poll = async () => {
    if (!document.getElementById('login-progress-modal')) return; // modal closed
    pollCount++;
    let data;
    try {
      data = await api('GET', '/pios/auth/login/status?id=' + encodeURIComponent(sessionId));
    } catch (e) {
      stateEl.textContent = '⚠ 轮询失败：' + e.message;
      setTimeout(poll, 1500);
      return;
    }
    if (data.error === 'not_found') {
      stateEl.textContent = '❌ session 丢失';
      stateEl.style.color = '#ff8c42';
      return;
    }
    // Update log
    if (data.lines && data.lines.length) {
      logEl.textContent = data.lines.join('\n');
      logEl.scrollTop = logEl.scrollHeight;
    }
    // Update URL area
    if (data.url) {
      urlEl.innerHTML = `<a href="#" onclick="event.preventDefault();api('POST','/pios/open-tab',{url:'${data.url.replace(/'/g, "\\'")}'})">${escHtml(data.url)}</a>
        <div style="font-size:10px;color:#666;margin-top:4px">浏览器已自动打开授权页面，如果没有请点上面的链接</div>`;
    }
    // Update state label
    const labels = {
      starting: '🟡 启动中…',
      await_auth: '🔵 请在浏览器中完成授权',
      syncing: '🔵 登录成功，正在同步到其他机器…',
      done: `✅ 登录完成${data.email ? ' ('+data.email+')' : ''}`,
      failed: '❌ 登录失败' + (data.error ? '：' + data.error : ''),
    };
    stateEl.textContent = labels[data.state] || data.state;
    stateEl.style.color = data.state === 'done' ? '#4a9eff' : data.state === 'failed' ? '#ff8c42' : '#8b949e';

    if (data.state === 'done' || data.state === 'failed') {
      cancelBtn.style.display = 'none';
      closeBtn.style.display = 'inline-block';
      return;
    }
    // Keep polling
    setTimeout(poll, 1000);
  };
  setTimeout(poll, 500);
}

async function cancelLoginFlow() {
  const sessionId = window._currentLoginSessionId;
  if (!sessionId) {
    const modal = document.getElementById('login-progress-modal');
    if (modal) modal.remove();
    return;
  }
  try {
    await api('POST', '/pios/auth/login/cancel', { sessionId });
  } catch {}
  const modal = document.getElementById('login-progress-modal');
  if (modal) modal.remove();
  loadResourcesTab();
}

async function toggleGlobalPlugin(pluginId, enabled) {
  const patch = { infra: { plugins: {} } };
  patch.infra.plugins[pluginId] = { enabled };
  await api('POST', '/pios/manifest', patch);
}

// 激活插件：开新会话让 Pi 在 PiBrowser 内带用户走（不再弹 Terminal）
async function activatePlugin(pluginId) {
  try {
    if (!window.piHome || !window.piHome.pluginActivate) {
      alert('pluginActivate IPC 不可用，升级 PiOS.app 后重试');
      return;
    }
    const res = await window.piHome.pluginActivate(pluginId);
    if (!res || !res.ok) alert('激活失败: ' + (res && res.error || 'unknown'));
    // 成功路径：main.js 已 switchToChatMode 切回 chat 面板，并发 plugin:start-activation 给 renderer
    // renderer 创建新 session 把 activate.md 当 user message 发给 Pi。用户看到的是 PiBrowser 主聊天里 Pi 在执行
  } catch (e) {
    alert('激活异常: ' + e.message);
  }
}

async function saveNotifSettings(voice, popup) {
  await api('POST', '/pios/manifest', { infra: { notifications: { voice, popup } } });
}

async function saveClaudeSettings(skipPermissions) {
  await api('POST', '/pios/manifest', { infra: { claude_settings: { skip_permissions: skipPermissions } } });
}

// ── Resources Tab ──

async function loadResourcesTab() {
  const container = document.getElementById('tab-resources');
  try {
    const [manifest, authStatus, servicesHealth] = await Promise.all([
      api('GET', '/pios/manifest'),
      api('GET', '/pios/auth-status').catch(() => null),
      api('GET', '/pios/services/health').catch(() => null),
    ]);
    // Token fetch via local proxy (Node.js can reach Tailscale, BrowserView can't)
    let tokenStatus = null;
    let tokenError = null;
    try {
      const ts = await api('GET', '/pios/token-status');
      if (ts.error) { tokenError = ts.error; } else { tokenStatus = ts; }
    } catch (e) { tokenError = e.message; }
    const infra = manifest.infra || {};

    let html = '';

    // Token Usage — only show when data is fresh
    const tokenFresh = tokenStatus && !tokenStatus.error && tokenStatus.updated && (Date.now() - new Date(tokenStatus.updated).getTime()) < 86400000;
    if (tokenFresh) {
      html += '<div class="section">';
      html += '<div class="section-title">Token Usage</div>';
      const fiveH = tokenStatus.five_hour_pct;
      const sevenD = tokenStatus.seven_day_pct;
      function resGauge(pct, label, meta) {
        const r = 45, stroke = 8, circ = 2 * Math.PI * r;
        const val = pct != null ? Math.min(pct, 100) : 0;
        const offset = circ - (val / 100) * circ;
        const color = pct == null ? '#444' : pct < 50 ? '#4a9eff' : pct < 80 ? '#ff8c42' : '#f85149';
        const display = pct != null ? pct + '%' : '—';
        return `<div class="gauge" style="text-align:center;flex:1">
          <div style="position:relative;width:100px;height:100px;margin:0 auto 6px">
            <svg width="100" height="100" viewBox="0 0 100 100" style="transform:rotate(-90deg)">
              <circle cx="50" cy="50" r="${r}" fill="none" stroke="#21262d" stroke-width="${stroke}"/>
              <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
            </svg>
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:${color}">${display}</div>
          </div>
          <div style="font-size:12px;color:#888">${label}</div>
          ${meta ? '<div style="font-size:10px;color:#555;margin-top:2px">' + meta + '</div>' : ''}
        </div>`;
      }
      const fiveReset = tokenStatus.five_hour_resets_at ? 'resets ' + new Date(tokenStatus.five_hour_resets_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
      const sevenReset = tokenStatus.seven_day_resets_at ? 'resets ' + new Date(tokenStatus.seven_day_resets_at).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) : '';
      html += '<div style="display:flex;gap:24px;justify-content:center;padding:12px 0">';
      html += resGauge(fiveH, '5-Hour Window', fiveReset);
      html += resGauge(sevenD, '7-Day Window', sevenReset);
      html += '</div>';
      if (tokenStatus.updated) html += `<div style="font-size:10px;color:#444;text-align:right">Updated: ${escHtml(tokenStatus.updated)}</div>`;
      html += '</div>';
    }

    // Auth / Credentials — per-host × per-engine
    html += '<div class="section">';
    html += '<div class="section-title">Credentials</div>';
    const runtimes = infra.runtimes || {};
    let hasAnyRow = false;
    if (authStatus && typeof authStatus === 'object' && authStatus.hosts) {
      // Sort hosts for stable display: local host first, then alphabetical
      const hostNames = Object.keys(authStatus.hosts).sort((a, b) => {
        const inst = infra.instances || {};
        const aLocal = !inst[a] || !inst[a].ssh;
        const bLocal = !inst[b] || !inst[b].ssh;
        if (aLocal && !bLocal) return -1;
        if (!aLocal && bLocal) return 1;
        return a.localeCompare(b);
      });
      for (const host of hostNames) {
        const hostData = authStatus.hosts[host] || {};
        const engines = hostData.engines || {};
        const probeMethod = hostData.probe_method || 'file';
        const engineNames = Object.keys(engines).sort();
        if (!engineNames.length) continue;
        // Host header — one line above the engine rows
        const hostUpdatedAt = hostData.updated_at ? new Date(hostData.updated_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) : '—';
        const probeBadge = probeMethod === 'run-records'
          ? `<span title="状态来自 Pi/State/runs 的任务记录" style="font-size:9px;color:#8b949e;border:1px solid #30363d;padding:0 4px;border-radius:3px;margin-left:6px">inferred</span>`
          : '';
        html += `<div style="display:flex;align-items:center;padding:10px 0 4px;font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;border-top:1px solid rgba(255,255,255,0.04);margin-top:4px">
          <span style="flex:1">${escHtml(host)}${probeBadge}</span>
          <span style="font-size:10px;color:#444;text-transform:none">updated ${escHtml(hostUpdatedAt)}</span>
        </div>`;
        for (const ename of engineNames) {
          const info = engines[ename] || {};
          hasAnyRow = true;
          // Tri-state: true = ok, false = failed, null = unknown (no recent runs)
          const isOk = info.ok === true;
          const isUnknown = info.ok === null || info.ok === undefined;
          const canLoginEngine = info.login_supported === true;
          const dotColor = isOk ? '#4a9eff' : isUnknown ? '#8b949e' : '#ff8c42';
          // Label:
          //   ok            → "ok"
          //   unknown       → "unknown"
          //   failed + auth → "not logged in" (suggests Login button is the fix)
          //   failed + other→ "failed" (generic)
          const statusLabel = isOk ? 'ok'
            : isUnknown ? 'unknown'
            : canLoginEngine ? 'not logged in'
            : 'failed';
          const statusColor = isOk ? '#4a9eff' : isUnknown ? '#8b949e' : '#ff8c42';
          // 探活 button: ONLY for remote hosts running claude-cli.
          // Primary host: hourly cron already runs auth-check.sh, manual probe
          // adds nothing — so no button. Remote hosts: real SSH probe via
          // /pios/auth-refresh {host:...} that runs `claude auth status` on the
          // remote and writes auth-status-<host>.json.
          const inst = (infra.instances || {})[host] || {};
          const _primary = window.PIOS_PRIMARY_HOST || '';
          const isRemoteHost = !!inst.ssh && host !== _primary;
          const canRefresh = isRemoteHost && (ename === 'claude-cli' || ename === 'codex-cli');
          const refreshBtnTitle = ename === 'codex-cli'
            ? `SSH 到 ${host} 检查 ~/.codex/auth.json 做真实探活`
            : `SSH 到 ${host} 跑 claude auth status 做真实探活`;
          const refreshBtn = canRefresh
            ? `<button onclick="refreshAuth('${ename}', this, '${host}')"
                style="padding:2px 8px;font-size:10px;border:1px solid #4a9eff;background:transparent;color:#4a9eff;border-radius:4px;cursor:pointer;flex-shrink:0"
                title="${refreshBtnTitle}">SSH 探活</button>`
            : '';
          // Login button: only show for login_supported engines, and highlight when not ok
          // claude-cli uses setup-token (1yr long-lived token), not claude auth login.
          const canLogin = info.login_supported === true;
          const loginBtnBorder = isOk ? '#30363d' : '#ff8c42';
          const loginBtnColor = isOk ? '#888' : '#ff8c42';
          const loginBtnBg = isOk ? 'transparent' : 'rgba(255,140,66,0.08)';
          const loginBtn = canLogin
            ? (ename === 'claude-cli'
                ? `<button onclick="showSetupTokenHelp()"
                    style="padding:2px 10px;font-size:10px;border:1px solid ${loginBtnBorder};background:${loginBtnBg};color:${loginBtnColor};border-radius:4px;cursor:pointer;flex-shrink:0"
                    title="cron token 续期说明（claude setup-token，非 auth login）">${isOk ? 'Token Help' : 'Setup Token'}</button>`
                : `<button onclick="startLoginFlow('${ename}', '${host}')"
                    style="padding:2px 10px;font-size:10px;border:1px solid ${loginBtnBorder};background:${loginBtnBg};color:${loginBtnColor};border-radius:4px;cursor:pointer;flex-shrink:0"
                    title="${isOk ? '重新登录（如果想换账号）' : '点击登录此机器上的 ' + ename}">${isOk ? 'Re-login' : 'Login'}</button>`)
            : '';
          const detailText = info.detail ? ` · ${escHtml(info.detail)}` : '';
          html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0 6px 8px;font-size:12px">
            <span style="width:6px;height:6px;border-radius:50%;background:${dotColor};display:inline-block;flex-shrink:0"></span>
            <span style="color:#ddd;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(ename)}<span style="color:#555;font-size:10px">${detailText}</span></span>
            <span style="color:${statusColor};font-size:11px;flex-shrink:0">${escHtml(statusLabel)}</span>
            ${refreshBtn}
            ${loginBtn}
          </div>`;
        }
      }
    }
    if (!hasAnyRow) {
      html += '<div style="padding:12px;background:rgba(255,140,66,0.06);border:1px solid rgba(255,140,66,0.15);border-radius:8px">';
      html += '<div style="color:#ff8c42;font-size:12px;font-weight:500;margin-bottom:6px">⚠ Auth status file 未生成</div>';
      html += '<div style="color:#888;font-size:11px;line-height:1.6">在 primary 终端跑 <code>bash Pi/Tools/auth-check.sh</code>，或重启 PiBrowser 再看。</div>';
      html += '</div>';
    }
    html += '</div>';

    // Infrastructure (collapsed by default — instances + services + channels)
    html += '<div class="section">';
    html += '<div class="section-title">Infrastructure</div>';
    html += '<div>';
    // Instances
    const instances = infra.instances || {};
    html += '<div style="font-size:11px;color:#555;font-weight:600;margin:8px 0 4px;text-transform:uppercase">Instances</div>';
    for (const [id, inst] of Object.entries(instances)) {
      const caps = (inst.capabilities || []).join(', ');
      html += `<div style="display:flex;align-items:center;gap:10px;padding:6px 12px;background:rgba(255,255,255,0.025);border-radius:6px;margin-bottom:4px;font-size:12px">
        <span style="color:#4a9eff;font-weight:500;min-width:80px">${escHtml(id)}</span>
        <span style="color:#888;flex:1">${escHtml(inst.role)}</span>
        <span style="color:#555;font-size:11px">${escHtml(caps)}</span>
      </div>`;
    }
    // Services — only show those with actual health data or problems
    const services = infra.services || {};
    const svcHealthMap = Array.isArray(servicesHealth) ? Object.fromEntries(servicesHealth.map(s => [s.id, s])) : (servicesHealth || {});
    const svcWithHealth = Object.entries(services).filter(([id]) => {
      const h = svcHealthMap[id];
      return h && h.detail !== 'no health check';
    });
    if (svcWithHealth.length > 0) {
      html += '<div style="font-size:11px;color:#555;font-weight:600;margin:12px 0 4px;text-transform:uppercase">Services</div>';
      html += '<div class="service-grid">';
      for (const [id, svc] of svcWithHealth) {
        const h = svcHealthMap[id];
        const statusCls = h?.status === 'ok' ? 'ok' : h?.status === 'down' ? 'down' : 'warn';
        html += `<div class="service-item">
          <span class="service-name">${escHtml(id)}</span>
          ${svc.host && svc.host !== 'all' ? '<span class="service-detail">' + escHtml(typeof svc.host === 'string' ? svc.host : '') + '</span>' : ''}
          <span class="service-badge ${statusCls}">${h?.detail || statusCls}</span>
        </div>`;
      }
      html += '</div>';
    }
    // Channels
    const channels = infra.channels || {};
    if (Object.keys(channels).length > 0) {
      html += '<div style="font-size:11px;color:#555;font-weight:600;margin:12px 0 4px;text-transform:uppercase">Channels</div>';
      for (const [id, ch] of Object.entries(channels)) {
        const dotColor = ch.status === 'active' ? '#4a9eff' : '#444';
        html += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px">
          <span style="width:6px;height:6px;border-radius:50%;background:${dotColor};display:inline-block"></span>
          <span style="color:#ddd">${escHtml(id)}</span>
          <span style="color:#555;font-size:11px">${escHtml(ch.type)}</span>
          <span style="color:#555;font-size:11px;margin-left:auto">${escHtml(ch.host)}</span>
        </div>`;
      }
    }
    html += '</div></div>';

    // Plugins — 可选插件（装了要激活的，如 wechat）+ core 标识
    let pluginDetail = { ok: false, plugins: [] };
    try { pluginDetail = await (window.piHome?.pluginList?.() || Promise.resolve({ ok: false, plugins: [] })); } catch {}
    html += '<div class="section">';
    html += '<div class="section-title">Plugins</div>';
    if (pluginDetail.ok && pluginDetail.plugins.length) {
      html += '<div style="display:flex;flex-direction:column;gap:8px">';
      for (const p of pluginDetail.plugins) {
        const stateLabel = p.activated ? '<span style="color:#4a9eff">● 已激活</span>' : '<span style="color:#ff8c42">○ 待激活</span>';
        const actBtn = p.has_activation && !p.activated
          ? `<button style="background:#4a9eff;color:#fff;padding:4px 12px;border-radius:4px;border:none;cursor:pointer;font-size:12px" onclick="activatePlugin('${p.id}')">激活</button>`
          : (p.activated ? `<button style="background:transparent;color:#6e7681;padding:4px 12px;border-radius:4px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:12px" onclick="activatePlugin('${p.id}')">重新激活</button>` : '');
        html += `<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:6px">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:#e6edf3">${escHtml(p.name)} <span style="font-size:11px;font-weight:400;color:#6e7681">(${escHtml(p.id)})</span></div>
            ${p.description ? `<div style="font-size:11px;color:#8b949e;margin-top:2px">${escHtml(p.description)}</div>` : ''}
            <div style="font-size:11px;color:#6e7681;margin-top:4px">${stateLabel}${p.last_activated_at ? ' · 上次激活 ' + escHtml(new Date(p.last_activated_at).toLocaleString('zh-CN')) : ''}</div>
          </div>
          ${actBtn}
        </div>`;
      }
      html += '</div>';
    } else {
      html += '<div style="font-size:12px;color:#6e7681;padding:8px 0">没有已安装的可选插件。</div>';
    }
    // 内置 core plugins 只读展示
    const plugins = infra.plugins || {};
    if (Object.keys(plugins).length) {
      html += '<div style="font-size:11px;color:#6e7681;margin:12px 0 6px">已启用（agent/task 引用中）</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
      for (const [id, p] of Object.entries(plugins)) {
        const on = p.enabled !== false;
        html += `<span style="font-size:11px;color:${on ? '#4a9eff' : '#555'};padding:3px 8px;border-radius:10px;border:1px solid ${on ? 'rgba(74,158,255,0.2)' : 'rgba(255,255,255,0.06)'}">${escHtml(id)}</span>`;
      }
      html += '</div>';
    }
    html += '</div>';

    // Claude Settings + Notifications 段已删（owner 4/24 清理：跟其他 tab 重复）
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`;
  }
}

// ── Decision helpers ──

function showDecision() {
  if (!decisions.length) return;
  const d = decisions[decIdx];
  const el = id => document.getElementById(id);
  if (el('dec-name')) { el('dec-name').textContent = d.title; el('dec-name').style.cursor = 'pointer'; el('dec-name').onclick = () => showDecisionDetail(d.filename); }
  if (el('dec-desc')) { el('dec-desc').textContent = d.brief || d.question || ''; el('dec-desc').style.cursor = 'pointer'; el('dec-desc').onclick = () => showDecisionDetail(d.filename); }
  if (el('dec-nav')) el('dec-nav').textContent = decisions.length > 1 ? `${decIdx + 1} / ${decisions.length}` : '';
  if (el('dec-nav-wrap')) el('dec-nav-wrap').style.display = decisions.length > 1 ? 'flex' : 'none';
  // Reason badge
  const reasonEl = el('dec-reason');
  if (reasonEl && d.reason) {
    const colors = { '需要决策': '#d29922', '需要操作': '#1f6feb', '需要澄清': '#8957e5', '等 Owner': '#ff8c42', '等 Owner': '#ff8c42', '需要验收': '#4a9eff', '跟进提醒': '#ff8c42', '需要回复': '#d29922', '需要确认': '#1f6feb', '需要检查': '#4a9eff', '系统告警': '#ff8c42' };
    const color = colors[d.reason] || '#888';
    reasonEl.innerHTML = `<span style="background:${color};color:#fff;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase">${d.reason}</span>` +
      (d.priority && d.priority <= 2 ? ` <span style="background:#f85149;color:#fff;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600">P${d.priority}</span>` : '');
  }
  // Dynamic action buttons based on queueType (needs_owner protocol)
  const actionsEl = el('dec-actions');
  if (actionsEl) {
    let btns = '';
    const qt = d.queueType || '';
    const fn = d.filename;
    const laterBtn = `<button class="action-btn action-later" onclick="todoAddOrReschedule('${fn}', {advanceDecision:true})">📋 转入待办</button>`;
    const dropBtn = `<button class="action-btn action-drop" onclick="promptDismissWithReason('${fn}')">不做了</button>`;
    if (qt === 'check' || qt === 'review') {
      btns += `<button class="action-btn action-do" onclick="handleOwnerAction('approve')">✓ 通过</button>`;
      btns += `<button class="action-btn action-warn" onclick="handleOwnerAction('rework')">↩ 要修</button>`;
      btns += `<button class="action-btn action-drop" onclick="handleOwnerAction('reject')">✕ 驳回</button>`;
      btns += laterBtn;
      btns += dropBtn;
    } else if (qt === 'act') {
      btns += `<button class="action-btn action-do" onclick="doCompleteAction('${fn}')">✓ 已完成</button>`;
      btns += laterBtn;
      btns += dropBtn;
    } else if (qt === 'respond') {
      const rt = d.response_type || 'text';
      const labelMap = { 'pick-one': '单选回复', 'pick-many': '多选回复', confirm: '确认', date: '选日期', text: '填写回复' };
      btns += `<button class="action-btn action-do" onclick="handleOwnerAction('respond')">💬 ${labelMap[rt] || '回复'}</button>`;
      btns += laterBtn;
      btns += dropBtn;
    } else if (qt === 'alert') {
      btns += `<button class="action-btn action-do" style="border-color:#ff8c42;color:#ff8c42" onclick="handleOwnerAction('respond')">⚡ 处理</button>`;
      btns += laterBtn;
      btns += dropBtn;
    } else {
      btns += `<button class="action-btn action-do" onclick="handleOwnerAction('respond')">✓ 回复</button>`;
      btns += laterBtn;
      btns += dropBtn;
    }
    btns += `<button class="action-btn action-later" onclick="deferTomorrow('${fn}')">⏸ 明天再说</button>`;
    actionsEl.innerHTML = btns;
  }
}

// ── Call Pi on a Things Need You card ──
// 让 Pi 读卡、驱动后续（权限/重启/填字段…），最后帮 owner 在 TNY 里按对按钮收尾。
// 走 /pios/call-pi：每次新起一条会话（不进 pi-main），title 用卡名，处理完这张卡归档。
// extraInstruction 可选——owner 在 Call Pi 输入框里补充的指令，附在标准 prompt 末尾。
async function callPiOnCard(filename, extraInstruction = '') {
  if (!filename) return;
  const d = (decisions || []).find(x => x.filename === filename)
    || (ownerQueueAll || []).find(x => x.filename === filename)
    || null;
  const title = d ? (d.title || filename) : filename;
  const brief = d ? (d.needs_owner_brief || d.brief || d.question || '') : '';
  const qt = d ? (d.queueType || '') : '';
  const path = `Cards/active/${filename}`;
  const parts = [
    `帮我跟进 Things Need You 这张卡：${title}（${path}）`,
    '',
  ];
  if (brief) parts.push('卡上写的是：', brief, '');
  if (qt) parts.push(`queueType = ${qt}`, '');
  parts.push(
    '请你：',
    '1. 完整读一遍这张卡，搞清楚要我做什么（权限/重启/填字段/调接口/等等）',
    '2. 能你直接做的（看日志、改代码、调后端、写配置）就做，不能的一步一步告诉我怎么做',
    '3. 做完后帮我在 Things Need You 里按正确按钮收尾（回复 / 已完成 / 通过），把 owner_response 写清楚',
  );
  // 追加 owner queue 里其他 TNY 卡（最多 10 张），让 Pi 有整体节奏感
  const otherTny = (ownerQueueAll || []).filter(x => x.filename !== filename);
  if (otherTny.length) {
    parts.push('');
    parts.push('其他待你处理的 TNY（共 ' + (otherTny.length <= 10 ? otherTny.length : '10+') + ' 张）：');
    const shown = otherTny.slice(0, 10);
    shown.forEach(x => parts.push(`- ${x.title || x.filename}（${x.filename}）— ${x.queueType || ''}`));
    if (otherTny.length > 10) parts.push(`（还有 ${otherTny.length - 10} 张）`);
  }
  const extra = String(extraInstruction || '').trim();
  if (extra) {
    parts.push('');
    parts.push('owner 的补充指令：', extra);
  }
  const prompt = parts.join('\n');
  const sessionTitle = `TNY:${title}`;
  try {
    await api('POST', '/pios/call-pi', { text: prompt, title: sessionTitle, engine: 'claude' });
  } catch (e) {
    console.error('[call-pi]', e);
  }
}

function callPiOnCurrentDecision() {
  if (!decisions || !decisions.length) return;
  const d = decisions[decIdx];
  if (!d || !d.filename) return;
  const inputEl = document.getElementById('dec-call-input');
  const extra = inputEl ? inputEl.value : '';
  callPiOnCard(d.filename, extra);
  if (inputEl) inputEl.value = '';
}

// ── Unified Owner Action Handler ──
// Reads card data (queueType, response_type, response_options, acceptance criteria)
// and renders the correct interactive control in the editor overlay.
async function handleOwnerAction(action) {
  const d = decisions[decIdx];
  if (!d) return;
  const fn = d.filename;
  const qt = d.queueType || '';

  // Fetch full card data
  let card;
  try { card = await api('GET', '/pios/card?name=' + encodeURIComponent(fn)); } catch(e) { piAlert('加载卡片失败'); return; }
  const body = card.content || card.body || card._content || '';
  const fm = card; // frontmatter fields are on card object
  const outputRefs = collectOutputRefs({ ...card, filename: fn }, body);

  // ── CHECK / REVIEW: render based on response_type. 不再枚举验收标准 checkbox ──
  // 验收标准 是 worker 自查 owner 抽查（见 card-spec.md），不是 owner 的勾选清单。
  // owner 看到什么控件取决于 needs_owner 的 response_type：
  //   pick-one / pick-many / date → 对应控件
  //   text / 空 → 只显示 brief + 可选备注
  if (action === 'approve' && (qt === 'check' || qt === 'review')) {
    const rt = fm.response_type || d.response_type || '';
    const opts = fm.response_options || d.response_options || [];
    const briefText = d.brief || fm.needs_owner_brief || fm.decision_brief || '';

    openEditor(d.title + ' — 通过验收', '', null, null);
    const textarea = document.getElementById('editor-textarea');
    textarea.style.display = 'none';
    const container = document.createElement('div');
    container.id = 'owner-action-container';

    let controlHtml = '';
    let getChoice = () => '';

    if (rt === 'pick-one' && opts.length >= 2) {
      controlHtml = opts.map((o, i) =>
        `<label style="display:flex;gap:12px;align-items:center;padding:14px 16px;margin-bottom:8px;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));border:1px solid rgba(88,166,255,0.14);border-radius:12px;cursor:pointer;font-size:14px;color:#c9d1d9">
          <input type="radio" name="approve-pick-one" value="${i}" style="min-width:18px;min-height:18px">
          <span>${escHtml(o)}</span>
        </label>`
      ).join('');
      getChoice = () => {
        const sel = container.querySelector('input[name="approve-pick-one"]:checked');
        return sel ? opts[parseInt(sel.value)] : null;
      };
    } else if (rt === 'pick-many' && opts.length >= 2) {
      controlHtml = opts.map((o, i) =>
        `<label style="display:flex;gap:12px;align-items:center;padding:14px 16px;margin-bottom:8px;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));border:1px solid rgba(88,166,255,0.14);border-radius:12px;cursor:pointer;font-size:14px;color:#c9d1d9">
          <input type="checkbox" id="ap-pm-${i}" style="min-width:18px;min-height:18px">
          <span>${escHtml(o)}</span>
        </label>`
      ).join('');
      getChoice = () => {
        const chosen = opts.filter((_, i) => document.getElementById('ap-pm-' + i).checked);
        return chosen.length ? chosen.join(', ') : null;
      };
    } else if (rt === 'date') {
      controlHtml = `<input type="date" id="ap-date" style="background:#161b22;border:1px solid #30363d;border-radius:10px;color:#c9d1d9;padding:12px;font-size:16px;width:100%;margin-bottom:10px">`;
      getChoice = () => {
        const val = document.getElementById('ap-date').value;
        return val || null;
      };
    }

    container.innerHTML = `<div style="margin-bottom:14px;padding:4px 0 2px">
      <div style="font-size:18px;color:#f0f6fc;font-weight:600;margin-bottom:6px">通过验收</div>
      <div style="font-size:13px;color:#9fb3c8;line-height:1.6">${escHtml(briefText || '（卡片未写 needs_owner_brief）')}</div>
      ${renderOutputShortcutHTML(outputRefs)}
    </div>${controlHtml}<textarea id="ap-comment" rows="2" placeholder="备注（可选）" style="width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:8px;margin-top:4px;font-size:13px"></textarea>`;

    textarea.parentNode.insertBefore(container, textarea);

    const saveBtn = document.getElementById('editor-save-btn');
    saveBtn.textContent = '✓ 通过验收';
    saveBtn.onclick = async () => {
      await runDecisionAction(async () => {
        const commentParts = [];
        if (rt === 'pick-one' || rt === 'pick-many' || rt === 'date') {
          const choice = getChoice();
          if (choice === null) { piAlert('请完成选择/填写'); return; }
          commentParts.push(choice);
        }
        const extra = (document.getElementById('ap-comment') || {}).value || '';
        if (extra) commentParts.push(extra);
        const finalComment = commentParts.join('\n\n') || '';
        if (qt === 'check') {
          await doRespondToOwner(fn, 'accept', { comment: finalComment, __skipBusy: true });
        } else {
          await api('POST', '/pios/approve-review', { filename: fn, comment: finalComment || 'Approved' });
        }
        container.remove(); textarea.style.display = ''; closeEditor(); advanceDecision(); loadOverview();
      }, container);
    };
    return;
  }

  // ── CHECK / REVIEW: rework ──
  if (action === 'rework') {
    openEditor(d.title + ' — 返工', '需要改什么：', null, null);
    const saveBtn = document.getElementById('editor-save-btn');
    saveBtn.textContent = '↩ 提交返工意见';
    saveBtn.onclick = async () => {
      await runDecisionAction(async () => {
        const comment = document.getElementById('editor-textarea').value.trim();
        if (!comment || comment === '需要改什么：') { piAlert('请写明返工原因'); return; }
        if (qt === 'check') {
          await doRespondToOwner(fn, 'fix: ' + comment, { __skipBusy: true });
        } else {
          await api('POST', '/pios/rework-review', { filename: fn, comment });
        }
        closeEditor(); advanceDecision(); loadOverview();
      });
    };
    return;
  }

  // ── CHECK: reject ──
  if (action === 'reject') {
    openEditor(d.title + ' — 驳回', '驳回原因（可选）：', null, null);
    const saveBtn = document.getElementById('editor-save-btn');
    saveBtn.textContent = '✕ 确认驳回';
    saveBtn.onclick = async () => {
      await runDecisionAction(async () => {
        const comment = document.getElementById('editor-textarea').value.trim();
        await doRespondToOwner(fn, 'reject', { comment, __skipBusy: true });
        closeEditor(); advanceDecision(); loadOverview();
      });
    };
    return;
  }

  // ── RESPOND: render based on response_type ──
  if (action === 'respond') {
    const rt = fm.response_type || d.response_type || 'text';
    const opts = fm.response_options || d.response_options || [];

    // pick-one: radio buttons
    if (rt === 'pick-one' && opts.length >= 2) {
      openEditor(d.title, '', null, null);
      const textarea = document.getElementById('editor-textarea');
      textarea.style.display = 'none';
      const container = document.createElement('div');
      container.id = 'owner-action-container';
      container.innerHTML = `<div style="margin-bottom:14px;padding:4px 0 2px">
        <div style="font-size:18px;color:#f0f6fc;font-weight:600;margin-bottom:6px">选一个</div>
        <div style="font-size:13px;color:#9fb3c8;line-height:1.6">${escHtml(d.brief || fm.needs_owner_brief || '')}</div>
        ${renderOutputShortcutHTML(outputRefs)}
      </div>` +
        opts.map((o, i) =>
          `<label style="display:flex;gap:12px;align-items:center;padding:14px 16px;margin-bottom:8px;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));border:1px solid rgba(88,166,255,0.14);border-radius:12px;cursor:pointer;font-size:14px;color:#c9d1d9">
            <input type="radio" name="pick-one" value="${i}" style="min-width:18px;min-height:18px">
            <span>${escHtml(o)}</span>
          </label>`
        ).join('');
      textarea.parentNode.insertBefore(container, textarea);
      const saveBtn = document.getElementById('editor-save-btn');
      saveBtn.textContent = '提交';
      saveBtn.onclick = async () => {
        await runDecisionAction(async () => {
          const sel = container.querySelector('input[name="pick-one"]:checked');
          if (!sel) { piAlert('请选择一项'); return; }
          await doRespondToOwner(fn, opts[parseInt(sel.value)], { response_type: 'pick-one', __skipBusy: true });
          container.remove(); textarea.style.display = ''; closeEditor(); advanceDecision(); loadOverview();
        }, container);
      };
      return;
    }

    // pick-many: checkboxes
    if (rt === 'pick-many' && opts.length >= 2) {
      openEditor(d.title, '', null, null);
      const textarea = document.getElementById('editor-textarea');
      textarea.style.display = 'none';
      const container = document.createElement('div');
      container.id = 'owner-action-container';
      container.innerHTML = `<div style="margin-bottom:14px;padding:4px 0 2px">
        <div style="font-size:18px;color:#f0f6fc;font-weight:600;margin-bottom:6px">可多选</div>
        <div style="font-size:13px;color:#9fb3c8;line-height:1.6">${escHtml(d.brief || fm.needs_owner_brief || '')}</div>
        ${renderOutputShortcutHTML(outputRefs)}
      </div>` +
        opts.map((o, i) =>
          `<label style="display:flex;gap:12px;align-items:center;padding:14px 16px;margin-bottom:8px;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));border:1px solid rgba(88,166,255,0.14);border-radius:12px;cursor:pointer;font-size:14px;color:#c9d1d9">
            <input type="checkbox" id="pm-${i}" style="min-width:18px;min-height:18px">
            <span>${escHtml(o)}</span>
          </label>`
        ).join('');
      textarea.parentNode.insertBefore(container, textarea);
      const saveBtn = document.getElementById('editor-save-btn');
      saveBtn.textContent = '提交';
      saveBtn.onclick = async () => {
        await runDecisionAction(async () => {
          const chosen = opts.filter((_, i) => document.getElementById('pm-' + i).checked);
          if (!chosen.length) { piAlert('请至少选择一项'); return; }
          await doRespondToOwner(fn, chosen.join(','), { response_type: 'pick-many', __skipBusy: true });
          container.remove(); textarea.style.display = ''; closeEditor(); advanceDecision(); loadOverview();
        }, container);
      };
      return;
    }

    // confirm: yes/no buttons
    if (rt === 'confirm') {
      openEditor(d.title, '', null, null);
      const textarea = document.getElementById('editor-textarea');
      textarea.style.display = 'none';
      const container = document.createElement('div');
      container.id = 'owner-action-container';
      container.innerHTML = `<div style="margin-bottom:18px">
        <div style="font-size:18px;color:#f0f6fc;font-weight:600;margin-bottom:8px">确认一下</div>
        <div style="font-size:14px;color:#c9d1d9;line-height:1.7">${escHtml(d.brief || fm.needs_owner_brief || '')}</div>
        ${renderOutputShortcutHTML(outputRefs)}
      </div>
        <div style="display:flex;gap:12px">
          <button class="action-btn action-do" data-confirm-value="yes" style="padding:12px 24px;font-size:14px">✓ 确认</button>
          <button class="action-btn action-drop" data-confirm-value="no" style="padding:12px 24px;font-size:14px">✗ 拒绝</button>
        </div>
        <input type="hidden" id="confirm-result" value="">`;
      textarea.parentNode.insertBefore(container, textarea);
      document.getElementById('editor-save-btn').style.display = 'none';
      // Direct click handlers
      container.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', async () => {
          await runDecisionAction(async () => {
            const val = btn.dataset.confirmValue;
            await doRespondToOwner(fn, val === 'yes' ? 'confirmed' : 'rejected', { response_type: 'confirm', __skipBusy: true });
            container.remove(); textarea.style.display = ''; document.getElementById('editor-save-btn').style.display = ''; closeEditor(); advanceDecision(); loadOverview();
          }, container);
        });
      });
      return;
    }

    // date: date picker
    if (rt === 'date') {
      openEditor(d.title, '', null, null);
      const textarea = document.getElementById('editor-textarea');
      textarea.style.display = 'none';
      const container = document.createElement('div');
      container.id = 'owner-action-container';
      container.innerHTML = `<div style="margin-bottom:14px;padding:4px 0 2px">
        <div style="font-size:18px;color:#f0f6fc;font-weight:600;margin-bottom:6px">选日期</div>
        <div style="font-size:13px;color:#9fb3c8;line-height:1.6">${escHtml(d.brief || fm.needs_owner_brief || '')}</div>
        ${renderOutputShortcutHTML(outputRefs)}
      </div>
        <input type="date" id="owner-date-input" style="background:#161b22;border:1px solid #30363d;border-radius:10px;color:#c9d1d9;padding:12px;font-size:16px;width:100%">`;
      textarea.parentNode.insertBefore(container, textarea);
      const saveBtn = document.getElementById('editor-save-btn');
      saveBtn.textContent = '提交';
      saveBtn.onclick = async () => {
        await runDecisionAction(async () => {
          const val = document.getElementById('owner-date-input').value;
          if (!val) { piAlert('请选择日期'); return; }
          await doRespondToOwner(fn, val, { response_type: 'date', __skipBusy: true });
          container.remove(); textarea.style.display = ''; closeEditor(); advanceDecision(); loadOverview();
        }, container);
      };
      return;
    }

    // text (default): text input with brief as context
    openEditor(d.title, '', null, null);
    const textarea = document.getElementById('editor-textarea');
    textarea.placeholder = '把你的补充、决定或背景写在这里';
    if (outputRefs.length) {
      const container = document.createElement('div');
      container.id = 'owner-action-container';
      container.innerHTML = `<div style="margin-bottom:14px;padding:4px 0 2px">
        <div style="font-size:18px;color:#f0f6fc;font-weight:600;margin-bottom:6px">填写回复</div>
        <div style="font-size:13px;color:#9fb3c8;line-height:1.6">${escHtml(d.brief || fm.needs_owner_brief || fm.decision_brief || '')}</div>
        ${renderOutputShortcutHTML(outputRefs)}
      </div>`;
      textarea.parentNode.insertBefore(container, textarea);
    } else if (d.brief || fm.needs_owner_brief || fm.decision_brief) {
      const container = document.createElement('div');
      container.id = 'owner-action-container';
      container.innerHTML = `<div style="margin-bottom:14px;padding:12px 14px;border-radius:10px;background:rgba(88,166,255,0.08);border:1px solid rgba(88,166,255,0.18);font-size:13px;color:#c9d1d9;line-height:1.6">${escHtml(d.brief || fm.needs_owner_brief || fm.decision_brief || '')}</div>`;
      textarea.parentNode.insertBefore(container, textarea);
    }
    const saveBtn = document.getElementById('editor-save-btn');
    saveBtn.textContent = '提交';
    saveBtn.onclick = async () => {
      await runDecisionAction(async () => {
        const text = document.getElementById('editor-textarea').value.trim();
        if (!text) { piAlert('请输入回复'); return; }
        await doRespondToOwner(fn, text, { response_type: 'text', __skipBusy: true });
        closeEditor(); advanceDecision(); loadOverview();
      });
    };
    return;
  }
}

async function showDecisionDetail(filename) {
  // Route to openCardDetail so Things Need You 点卡片看到的是和其他地方一致的
  // 排版 markdown（headings / tables / 可点击的 Pi/ 路径引用 / [[wiki-link]] 等），
  // 而不是塞进一个 readonly textarea 的纯文本。
  // fromOwnerQueue flag → 详情顶部加 needs_owner_brief 横幅，让 owner 一眼看懂"要干啥"。
  // 这个 flag 只跟着从 Things Need You 点进去的路径；从 Board / 搜索 / parent 链
  // 打开同一张卡不显示 brief 横幅——brief 是 "Pi → Owner" 语境，换 context 就冗余。
  return openCardDetail(filename, { fromOwnerQueue: true });
}

function resolveDecisionWithComment() {
  const d = decisions[decIdx];
  if (!d) return;
  const hint = d.reason === '需要澄清' ? '你的回复/澄清：' : '你的决定/意见：';
  openEditor(d.title, hint, null, async (comment) => {
    if (!comment || comment === hint) return;
    await api('POST', '/pios/approve-decision', { filename: d.filename, comment });
    advanceDecision();
  });
  // Override save behavior for inline comment
  const textarea = document.getElementById('editor-textarea');
  const saveBtn = document.getElementById('editor-save-btn');
  if (saveBtn) {
    saveBtn.textContent = '提交';
    saveBtn.onclick = async () => {
      const comment = textarea.value.trim();
      if (!comment || comment === hint) { closeEditor(); return; }
      await api('POST', '/pios/approve-decision', { filename: d.filename, comment });
      closeEditor();
      advanceDecision();
    };
  }
}

// 明天再说 — one-click 24h defer. Keeps assignee on Pi so the card resurfaces
// in Queue/ThingsNeedYou tomorrow. For "take it over" semantics use 转入待办
// (todoAddOrReschedule) instead.
async function deferTomorrow(filename) {
  const t = new Date(); t.setDate(t.getDate() + 1);
  const until = t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
  try {
    await runDecisionAction(async () => {
      const r = await api('POST', '/pios/defer-card', { filename, until });
      if (!r || !r.ok) { piAlert('失败: ' + ((r && r.error) || 'unknown')); return; }
      piToast(`明天再提醒 · ${until}`, 'success');
      await refreshOwnerQueue();
      if (boardReviewIdx > 0) boardReviewIdx--;
      renderBoardReview();
      advanceDecision();
      loadOverview();
    });
  } catch (e) { piAlert('失败: ' + e.message); }
}

function archiveWithNote() {
  const d = decisions[decIdx];
  if (!d) return;
  openEditor(d.title + ' — 归档批注', '归档原因：', null, async (note) => {
    if (!note) return;
    // Write note to card then archive
    await api('POST', '/pios/approve-decision', { filename: d.filename, comment: `[归档] ${note}` });
    await api('POST', '/pios/move-card', { filename: d.filename, status: 'archive' });
    advanceDecision();
  });
  const saveBtn = document.getElementById('editor-save-btn');
  if (saveBtn) {
    saveBtn.textContent = '归档';
    saveBtn.onclick = async () => {
      const note = document.getElementById('editor-textarea').value.trim();
      if (!note || note === '归档原因：') { closeEditor(); return; }
      await api('POST', '/pios/approve-decision', { filename: d.filename, comment: `[归档] ${note}` });
      await api('POST', '/pios/move-card', { filename: d.filename, status: 'archive' });
      closeEditor();
      advanceDecision();
    };
  }
}

// Interactive review — shows acceptance criteria as checkboxes
async function oneClickApprove() {
  const d = decisions[decIdx];
  if (!d) return;
  try {
    const card = await api('GET', '/pios/card?name=' + encodeURIComponent(d.filename));
    const body = card.content || card.body || card._content || '';
    // Extract acceptance criteria (- [ ] lines)
    const criteria = [];
    const lines = body.split('\n');
    let inAC = false;
    for (const line of lines) {
      if (/^##\s*验收标准/.test(line)) { inAC = true; continue; }
      if (inAC && /^##\s/.test(line)) break; // next section
      if (inAC) {
        const m = line.match(/^-\s*\[[ x]\]\s*(.+)/);
        if (m) criteria.push({ text: m[1].trim(), checked: /\[x\]/i.test(line) });
      }
    }
    if (criteria.length === 0) {
      // No criteria found, fall back to simple approve
      await api('POST', '/pios/approve-review', { filename: d.filename, comment: 'Approved (no criteria found)' });
      advanceDecision(); loadOverview();
      return;
    }
    // Build checklist UI in editor overlay
    let html = criteria.map((c, i) =>
      `<label style="display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;font-size:13px;color:#c9d1d9">
        <input type="checkbox" id="ac-${i}" ${c.checked ? 'checked' : ''} style="margin-top:3px;min-width:16px">
        <span>${escHtml(c.text)}</span>
      </label>`
    ).join('');
    html += `<div style="margin-top:12px"><label style="font-size:12px;color:#8b949e">备注（可选）</label><textarea id="ac-comment" rows="2" style="width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:8px;margin-top:4px;font-size:13px" placeholder="验收意见..."></textarea></div>`;
    openEditor(d.title + ' — 验收', '', null, null);
    const textarea = document.getElementById('editor-textarea');
    textarea.style.display = 'none';
    const container = document.createElement('div');
    container.innerHTML = html;
    container.style.padding = '8px 0';
    textarea.parentNode.insertBefore(container, textarea);
    const saveBtn = document.getElementById('editor-save-btn');
    if (saveBtn) {
      saveBtn.textContent = '✓ 全部通过';
      saveBtn.onclick = async () => {
        const allChecked = criteria.every((_, i) => document.getElementById('ac-' + i).checked);
        if (!allChecked) {
          const unchecked = criteria.filter((_, i) => !document.getElementById('ac-' + i).checked).length;
          if (!(await piConfirm(`还有 ${unchecked} 条未勾选，确认通过？`))) return;
        }
        const comment = (document.getElementById('ac-comment') || {}).value || '';
        const checkedItems = criteria.map((c, i) => (document.getElementById('ac-' + i).checked ? '✓' : '✗') + ' ' + c.text);
        const fullComment = checkedItems.join('\n') + (comment ? '\n\n' + comment : '');
        await api('POST', '/pios/approve-review', { filename: d.filename, comment: fullComment });
        container.remove();
        textarea.style.display = '';
        closeEditor();
        advanceDecision(); loadOverview();
      };
    }
  } catch (e) { piAlert('失败: ' + e.message); }
}

// Legacy approve (kept for Board panel)
async function approveReviewItem() {
  oneClickApprove();
}

async function reworkReviewItem() {
  const d = decisions[decIdx];
  if (!d) return;
  openEditor(d.title + ' — 返工', '需要改什么：', null, async (comment) => {
    if (!comment || comment === '需要改什么：') return;
    await api('POST', '/pios/rework-review', { filename: d.filename, comment });
    advanceDecision();
  });
  const saveBtn = document.getElementById('editor-save-btn');
  if (saveBtn) {
    saveBtn.textContent = '提交反馈';
    saveBtn.onclick = async () => {
      const comment = document.getElementById('editor-textarea').value.trim();
      if (!comment || comment === '需要改什么：') { closeEditor(); return; }
      await api('POST', '/pios/rework-review', { filename: d.filename, comment });
      closeEditor();
      advanceDecision();
    };
  }
}

async function resolveDecision(action) {
  const d = decisions[decIdx];
  if (!d) return;
  if (action === 'drop') await api('POST', '/pios/move-card', { filename: d.filename, status: 'archive' });
  if (action === 'done') await api('POST', '/pios/approve-decision', { filename: d.filename, comment: 'Owner completed' });
  if (action === 'skip') { decIdx = (decIdx + 1) % decisions.length; showDecision(); return; }
  advanceDecision();
}

function advanceDecision() {
  decisions.splice(decIdx, 1);
  if (decIdx >= decisions.length) decIdx = Math.max(0, decisions.length - 1);
  if (decisions.length > 0) { showDecision(); document.getElementById('dec-count').innerHTML = `${decisions.length} things need you <span class="ov-jump-arrow">›</span>`; }
  else { document.getElementById('dec-section').innerHTML = '<div class="no-decisions">Nothing needs you right now.</div>'; }
}

// ── Host Tab ──
// 按 task.host 聚合所有 task，每 host 列出主 + 备选 fallback，一眼看清物业

async function loadHostsTab() {
  const container = document.getElementById('team-sub-hosts');
  try {
    const manifest = await api('GET', '/pios/manifest');
    const agents = manifest.agents || {};
    const instances = manifest.infra?.instances || {};

    // 聚合：hostId → { primary: [...], fallback: [...] }
    // task 的 host 决定归属；多 host task（task.hosts[]）第一个是主、其余是备
    const hostMap = {};
    const ensure = (h) => (hostMap[h] = hostMap[h] || { primary: [], fallback: [] });

    for (const [aid, a] of Object.entries(agents)) {
      const declaredHosts = Array.isArray(a.hosts) ? a.hosts : (a.host ? [a.host] : []);
      const defaultHost = declaredHosts[0] || 'any';
      const agentRuntimes = Array.isArray(a.runtimes) ? a.runtimes : (a.runtime ? [a.runtime] : []);
      for (const [tid, t] of Object.entries(a.tasks || {})) {
        if (t.enabled === false) continue;
        const tRts = Array.isArray(t.runtimes) ? t.runtimes : (Array.isArray(t.engines) ? t.engines : (t.runtime ? [t.runtime] : []));
        const effRts = tRts.length ? tRts : agentRuntimes;
        const primaryEng = effRts[0] || '';
        const cron = t.trigger?.cron || '';
        // task 没显式 host 视为"继承"——用于 UI 标记
        const inherited = !t.host && !(Array.isArray(t.hosts) && t.hosts.length);
        const base = { agentId: aid, agentName: a.name || aid, taskId: tid, cron, engine: primaryEng, inherited };
        if (Array.isArray(t.hosts) && t.hosts.length) {
          t.hosts.forEach((h, idx) => {
            if (idx === 0) ensure(h).primary.push(base);
            else ensure(h).fallback.push({ ...base, primaryHost: t.hosts[0] });
          });
        } else {
          const h = t.host || defaultHost;
          if (h === 'any') continue;
          ensure(h).primary.push(base);
        }
      }
    }

    // 合并 infra.instances 里声明但可能没 task 的 host（空闲候补机器）
    for (const h of Object.keys(instances)) if (!hostMap[h]) hostMap[h] = { primary: [], fallback: [] };

    // 订单：primary > secondary > 其他（infra.instances.{id}.role 有可能）
    const hostIds = Object.keys(hostMap).sort((a, b) => {
      const ra = instances[a]?.role || '';
      const rb = instances[b]?.role || '';
      const rank = r => r === 'primary' ? 0 : r === 'secondary' ? 1 : r === 'storage' ? 2 : r === 'relay' ? 3 : 4;
      return rank(ra) - rank(rb);
    });

    let html = '';
    for (const hid of hostIds) {
      const info = instances[hid] || {};
      const bucket = hostMap[hid];
      const primaryCount = bucket.primary.length;
      const fallbackCount = bucket.fallback.length;
      const caps = Array.isArray(info.capabilities) ? info.capabilities : [];

      const renderRow = (r, role) => {
        const agentObj = agents[r.agentId] || {};
        const taskObj = agentObj.tasks?.[r.taskId] || {};
        const risk = runtimeRiskInfo(r.engine, agentObj, taskObj);
        const engChip = r.engine
          ? `<span class="engine-chip${risk.risky ? ' bypass' : ''}" title="${escHtml(risk.risky ? risk.title : r.engine)}">${escHtml(r.engine)}</span>`
          : '';
        const roleLabel = role === 'primary' ? '主' : '备·fallback';
        const roleTitle = role === 'primary' ? '主 host' : `备选（primary=${escHtml(r.primaryHost)} 不可用时切）`;
        // Inherited: task 没显式声明 host → 继承 agent.hosts[0]，用"继承"标签区分
        const inheritTag = r.inherited ? `<span class="ht-inherit" title="task 未显式声明 host，继承自 agent.hosts[0]">继承</span>` : '';
        return `<div class="host-task-row${role === 'fallback' ? ' fallback-slot' : ''}${r.inherited ? ' inherited' : ''}" onclick="event.stopPropagation();switchTab('team','agents');setTimeout(()=>toggleTeamAgent('${escHtml(r.agentId)}'),50)" style="cursor:pointer">
          <span class="ht-role ${role}" title="${roleTitle}">${roleLabel}</span>
          <div class="ht-task">
            <span class="ht-taskid">${escHtml(r.taskId)}</span>
            <span class="ht-agent">${escHtml(r.agentName)}</span>
            ${inheritTag}
          </div>
          <span class="ht-cron">${escHtml(r.cron)}</span>
          ${engChip}
        </div>`;
      };

      const offline = primaryCount === 0 && fallbackCount === 0;
      html += `<div class="host-block${offline ? ' offline' : ''}">
        <div class="host-block-header">
          <span class="host-block-name">${escHtml(hid)}</span>
          ${info.role ? `<span class="host-block-role">${escHtml(info.role)}</span>` : ''}
          ${caps.length ? `<span class="host-block-caps">${caps.map(c => `<span class="host-block-cap">${escHtml(c)}</span>`).join('')}</span>` : ''}
          <span class="host-block-stats">
            <span><strong style="color:#7fb6ff">${primaryCount}</strong> primary</span>
            ${fallbackCount ? `<span><strong style="color:#6f7685">${fallbackCount}</strong> fallback</span>` : ''}
          </span>
        </div>`;
      if (offline) {
        html += `<div class="host-empty">这台机器没有 task 派驻——空闲候补</div>`;
      } else {
        for (const r of bucket.primary) html += renderRow(r, 'primary');
        for (const r of bucket.fallback) html += renderRow(r, 'fallback');
      }
      html += `</div>`;
    }

    if (!html) html = `<div class="empty-state">暂无 host 数据</div>`;
    container.innerHTML = `<div style="margin-top:12px">${html}</div>`;
  } catch (e) {
    container.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`;
  }
}

// ── Tasks Tab ──

let allTasks = [];
let expandedTask = null;
let taskFilter = { status: 'all', agent: '', host: '', runtime: '' };
let showCreateForm = false;

async function loadTasksTab(expandId) {
  const container = document.getElementById('team-sub-tasks');
  // 同时拉 manifest + tasks，供 row 显示 host/runtime 主备 + 继承判断
  let _taskManifest = null;
  try {
    const [tasksR, manifestR] = await Promise.all([
      api('GET', '/pios/tasks').catch(() => []),
      api('GET', '/pios/manifest').catch(() => ({ agents: {} })),
    ]);
    allTasks = Array.isArray(tasksR) ? tasksR : [];
    _taskManifest = manifestR;
  } catch { allTasks = []; }
  window._taskManifest = _taskManifest;

  // Collect unique agents
  const agents = [...new Set(allTasks.map(t => t.agent).filter(a => a && a !== 'null'))].sort();

  // Effective host/runtime resolvers (task explicit > agent declared)
  const _agentsMap = _taskManifest?.agents || {};
  const taskEffHosts = (t) => {
    if (t.kind === 'infra') return Array.isArray(t.hosts) ? t.hosts : [];
    const a = _agentsMap[t.agent] || {};
    const decl = Array.isArray(a.hosts) ? a.hosts : (a.host ? [a.host] : []);
    const rt = a.tasks?.[t.taskId] || {};
    if (Array.isArray(rt.hosts) && rt.hosts.length) return rt.hosts;
    if (rt.host) return [rt.host];
    return decl;
  };
  const taskEffRuntimes = (t) => {
    if (t.kind === 'infra') return Array.isArray(t.engines) ? t.engines : ['local'];
    const a = _agentsMap[t.agent] || {};
    const decl = Array.isArray(a.runtimes) ? a.runtimes : (a.runtime ? [a.runtime] : []);
    const rt = a.tasks?.[t.taskId] || {};
    if (Array.isArray(rt.runtimes) && rt.runtimes.length) return rt.runtimes;
    if (Array.isArray(rt.engines) && rt.engines.length) return rt.engines;
    if (rt.runtime) return [rt.runtime];
    return decl;
  };

  // Filter
  //  Tasks 是全局任务视图，显示所有 task（包括 kernel / sense-runner / execution）
  //  不在这里过滤 category / hidden_from_team_ui——那些只影响 Agents sub-tab
  let filtered = allTasks.filter(t => {
    if (taskFilter.status === 'enabled' && !t.enabled) return false;
    if (taskFilter.status === 'disabled' && t.enabled) return false;
    if (taskFilter.agent && t.agent !== taskFilter.agent) return false;
    if (taskFilter.host && !taskEffHosts(t).includes(taskFilter.host)) return false;
    if (taskFilter.runtime && !taskEffRuntimes(t).includes(taskFilter.runtime)) return false;
    return true;
  });

  // Sort: enabled first, then by last run
  filtered.sort((a, b) => {
    if (a.enabled !== b.enabled) return a.enabled ? -1 : 1;
    const aTime = a.lastRunRecord?.started_at || '';
    const bTime = b.lastRunRecord?.started_at || '';
    return bTime.localeCompare(aTime);
  });

  // Top bar
  const infraHosts = Object.keys(_taskManifest?.infra?.instances || {}).sort();
  const infraRts = Object.keys(_taskManifest?.infra?.runtimes || {}).sort();
  const selStyle = `background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:4px 8px;color:#888;font-size:11px;font-family:inherit;cursor:pointer;`;
  let html = '<div class="bulk-bar" style="flex-wrap:wrap">';
  html += `<button class="run-btn" onclick="toggleCreateTask()">+ New Task</button>`;
  const failedTasks = filtered.filter(t => t.enabled && t.lastRunRecord?.status === 'failed');
  if (failedTasks.length > 0) {
    html += `<button class="run-btn" onclick="runAllFailedTasks()">Run All Failed (${failedTasks.length})</button>`;
  }
  html += '<span class="filter-sep" style="margin-left:auto"></span>';
  for (const s of ['all', 'enabled', 'disabled']) {
    html += `<button class="filter-pill ${taskFilter.status === s ? 'active' : ''}" onclick="taskFilter.status='${s}';loadTasksTab()">${s}</button>`;
  }
  html += `<select style="${selStyle}" onchange="taskFilter.agent=this.value;loadTasksTab()">`;
  html += `<option value="">All agents</option>`;
  for (const a of agents) html += `<option value="${a}" ${taskFilter.agent === a ? 'selected' : ''}>${a}</option>`;
  html += '</select>';
  html += `<select style="${selStyle}" onchange="taskFilter.host=this.value;loadTasksTab()">`;
  html += `<option value="">All hosts</option>`;
  for (const h of infraHosts) html += `<option value="${h}" ${taskFilter.host === h ? 'selected' : ''}>${h}</option>`;
  html += '</select>';
  html += `<select style="${selStyle}" onchange="taskFilter.runtime=this.value;loadTasksTab()">`;
  html += `<option value="">All runtimes</option>`;
  for (const r of infraRts) html += `<option value="${r}" ${taskFilter.runtime === r ? 'selected' : ''}>${r}</option>`;
  html += '</select>';
  if (taskFilter.status !== 'all' || taskFilter.agent || taskFilter.host || taskFilter.runtime) {
    html += `<button class="filter-pill" onclick="taskFilter={status:'all',agent:'',host:'',runtime:''};loadTasksTab()" title="清空所有筛选">Clear</button>`;
  }
  html += '</div>';

  // Create form
  html += `<div id="create-task-form" style="display:${showCreateForm ? 'block' : 'none'}"></div>`;

  // Task rows — running 置顶，然后 enabled 在前，按下次运行时间排序
  filtered.sort((a, b) => {
    const aRunning = a.lastRunRecord && a.lastRunRecord.status === 'running' ? 1 : 0;
    const bRunning = b.lastRunRecord && b.lastRunRecord.status === 'running' ? 1 : 0;
    if (aRunning !== bRunning) return bRunning - aRunning;
    if (a.enabled && !b.enabled) return -1;
    if (!a.enabled && b.enabled) return 1;
    if (a.nextRun && b.nextRun) return new Date(a.nextRun) - new Date(b.nextRun);
    if (a.nextRun) return -1;
    if (b.nextRun) return 1;
    return 0;
  });

  // helper: render host + runtime badges for a task (复用 Team Tab task 行的 badge 语言)
  const _manifest = window._taskManifest || { agents: {} };
  const renderTaskBadges = (t) => {
    if (t.kind === 'infra') {
      const hostsBadges = (t.hosts || []).map((h, idx) => {
        const cls = idx === 0 ? 'primary' : 'fallback';
        const prefix = idx === 0 ? '' : '▸';
        return `<span class="task-host-badge ${cls}" title="infra task host · 点击跳到 Hosts" style="cursor:pointer" onclick="event.stopPropagation();switchTab('team','hosts')">${prefix}${escHtml(h)}</span>`;
      }).join(' ');
      const rtBadges = (t.engines || ['local']).map((r, idx) => {
        const prefix = idx === 0 ? '' : '▸';
        return `<span class="task-host-badge ${idx === 0 ? 'primary' : 'fallback'}" title="infra task runtime">${prefix}${escHtml(r)}</span>`;
      }).join(' ');
      return `${hostsBadges} ${rtBadges}`;
    }
    const agent = _manifest.agents?.[t.agent] || {};
    const declaredHosts = Array.isArray(agent.hosts) ? agent.hosts : (agent.host ? [agent.host] : []);
    const declaredRts = Array.isArray(agent.runtimes) ? agent.runtimes : (agent.runtime ? [agent.runtime] : []);
    const rawTask = agent.tasks?.[t.taskId] || {};
    const hasExplicitHost = !!rawTask.host || (Array.isArray(rawTask.hosts) && rawTask.hosts.length);
    const hasExplicitRt = !!(Array.isArray(rawTask.runtimes) && rawTask.runtimes.length) ||
                         (Array.isArray(rawTask.engines) && rawTask.engines.length) || !!rawTask.runtime;

    // Host badges
    const effHosts = t.hosts || (hasExplicitHost ? (rawTask.hosts || [rawTask.host]) : declaredHosts.slice(0,1));
    const hostsBadges = (effHosts || []).map((h, idx) => {
      const illegal = declaredHosts.length && !declaredHosts.includes(h);
      const cls = illegal ? 'illegal' : (!hasExplicitHost ? 'fallback' : (idx === 0 ? 'primary' : 'fallback'));
      const prefix = idx === 0 ? '' : '▸';
      const tip = illegal ? `${h} 未在 agent.hosts 声明`
        : !hasExplicitHost ? '继承 agent.hosts[0]'
        : idx === 0 ? '主 host' : 'fallback 备选';
      return `<span class="task-host-badge ${cls}" title="${tip} · 点击跳到 Hosts" style="cursor:pointer" onclick="event.stopPropagation();switchTab('team','hosts')">${prefix}${escHtml(h)}</span>`;
    }).join(' ');

    // Runtime badges
    const effRts = (Array.isArray(t.engines) && t.engines.length) ? t.engines : declaredRts;
    const rtBadges = effRts.map((r, idx) => {
      const illegal = declaredRts.length && !declaredRts.includes(r);
      const risk = runtimeRiskInfo(r, agent, rawTask);
      let cls;
      if (illegal) cls = 'illegal';
      else if (!hasExplicitRt) cls = 'fallback';
      else cls = idx === 0 ? (risk.risky ? 'primary bypass' : 'primary') : (risk.risky ? 'fallback bypass' : 'fallback');
      const prefix = idx === 0 ? '' : '▸';
      const tip = illegal ? `${r} 未在 agent.runtimes 声明`
        : !hasExplicitRt ? '继承 agent.runtimes'
        : idx === 0 ? (risk.risky ? `${risk.title} · 主` : '主 runtime')
        : (risk.risky ? `${risk.title} · fallback` : 'fallback 备选');
      return `<span class="task-host-badge ${cls}" title="${tip}">${prefix}${escHtml(r)}</span>`;
    }).join(' ');

    return `${hostsBadges} ${rtBadges}`;
  };

  const renderTaskRows = (rows, title) => {
    html += '<div class="section">';
    html += `<div class="section-title">${title}</div>`;
    for (const t of rows) {
    const lr = t.lastRunRecord;
    const failed = lr && lr.status === 'failed';
    const dotCls = !t.enabled ? 'inactive' : failed ? 'paused' : 'active';
    const expanded = expandId === t.taskId;

    const agentTag = t.agent && t.agent !== 'null' ? t.agent : '';
    const badges = renderTaskBadges(t);
    const statusCls = lr ? (lr.status === 'running' ? 'status-running' : lr.status === 'failed' ? 'status-failed' : 'status-ok') : '';
    const statusText = lr ? lr.status : '';
    const isInfra = t.kind === 'infra';

    html += `<div class="task-row ${failed ? 'failed' : ''} ${!t.enabled ? 'disabled' : ''}" id="task-row-${t.taskId}">
      <div class="task-row-header" onclick="toggleTaskDetail('${t.taskId}')">
        <span class="agent-dot ${dotCls}"></span>
        <div style="flex:1;min-width:0;text-align:left">
          <div class="task-row-name">${t.taskId}${agentTag ? ` <span class="task-agent-chip" onclick="event.stopPropagation();switchTab('team','agents');setTimeout(()=>toggleTeamAgent('${escHtml(agentTag)}'),50)" title="跳到 Agents › ${escHtml(agentTag)}">${agentTag}</span>` : ''}</div>
          <div class="task-row-sub">${t.description || ''}</div>
        </div>
        <span class="task-row-schedule" style="min-width:auto">${badges}</span>
        <span class="task-row-schedule">${formatSchedule(t.cron) || '—'}</span>
        <span class="task-row-lastrun" title="${lr?.started_at ? new Date(lr.started_at).toLocaleString() : ''}">${lr ? timeAgo(lr.started_at) : '—'}</span>
        <span class="task-row-next" title="${t.nextRun ? new Date(t.nextRun).toLocaleString() : ''}">${t.enabled && t.nextRun ? timeUntil(t.nextRun) : '—'}</span>
        <span class="task-row-status ${statusCls}">${statusText}</span>
        ${isInfra ? `<span class="task-row-schedule">${t.enabled ? 'enabled' : 'disabled'}</span>` : `<button class="toggle ${t.enabled ? 'on' : ''}" onclick="event.stopPropagation();toggleTask('${t.taskId}',${t.enabled})" title="${t.enabled ? 'Disable' : 'Enable'}"></button>
        <button class="run-btn" id="trun-${t.taskId}" onclick="event.stopPropagation();runTask('${t.taskId}')">▶</button>`}
      </div>
      <div class="task-detail ${expanded ? 'open' : ''}" id="tdetail-${t.taskId}">
        <div id="tdetail-inner-${t.taskId}"></div>
      </div>
    </div>`;
    }
    html += '</div>';
  };
  const infraTasks = filtered.filter(t => t.kind === 'infra');
  const agentTasks = filtered.filter(t => t.kind !== 'infra');
  renderTaskRows(agentTasks, `${agentTasks.length} tasks`);
  renderTaskRows(infraTasks, `INFRA TASKS (${infraTasks.length})`);

  container.innerHTML = html;
  if (showCreateForm) renderCreateForm();
  if (expandId) {
    loadTaskDetail(expandId);
    // ⚠⚠⚠ owner 2026-04-28：禁止删这段 scrollIntoView ⚠⚠⚠
    // Kernel / Pipeline / Radar 卡片点击都走 piGoToTasks → switchTab('tasks', taskId)
    // → loadTasksTab(expandId)。展开后必须滚到那张 task-row，否则用户看到的是
    // 列表顶部，要自己往下找——多次反馈"没跳过去"的体验根因就在这里。
    // 之前已经搞过被回退（session 间互相覆盖），这次留显眼注释 + verify 卡兜底。
    // verify: Cards/active/verify-pi-pipeline-radar-click-routes.md
    requestAnimationFrame(() => {
      const row = document.getElementById('task-row-' + expandId);
      if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }
}

async function toggleTask(taskId, isEnabled) {
  await api('POST', '/pios/task/update', { taskId, updates: { enabled: !isEnabled } });
  loadTasksTab();
}

async function runTask(taskId) {
  const btn = document.getElementById('trun-' + taskId);
  try {
    if (btn) { btn.textContent = '...'; btn.classList.add('triggered'); }
    const r = await api('POST', '/pios/task/run', { taskId });
    if (!r.ok) {
      if (btn) btn.textContent = 'Failed';
      setTimeout(() => { if (btn) { btn.textContent = 'Run'; btn.classList.remove('triggered'); } }, 2000);
      return;
    }
    if (btn) btn.textContent = 'Triggered!';
    // Poll for early SSH failure run record (up to 12s)
    const pollStart = Date.now();
    const pollInterval = setInterval(async () => {
      if (Date.now() - pollStart > 12000) { clearInterval(pollInterval); if (btn) { btn.textContent = 'Run'; btn.classList.remove('triggered'); } return; }
      try {
        const runs = await api('GET', `/pios/task-runs?id=${taskId}&limit=1`);
        if (runs && runs.length && runs[0].status === 'failed' && new Date(runs[0].started_at) >= new Date(pollStart - 5000)) {
          clearInterval(pollInterval);
          if (btn) { btn.textContent = 'Failed'; btn.classList.add('failed'); }
          setTimeout(() => { if (btn) { btn.textContent = 'Run'; btn.classList.remove('triggered', 'failed'); } loadTasksTab(); }, 3000);
        }
      } catch {}
    }, 2000);
  } catch (e) {
    if (btn) btn.textContent = 'Error';
    setTimeout(() => { if (btn) { btn.textContent = 'Run'; btn.classList.remove('triggered'); } }, 2000);
  }
}

async function runAllFailedTasks() {
  for (const t of allTasks) {
    if (t.enabled && t.lastRunRecord?.status === 'failed') {
      await api('POST', '/pios/task/run', { taskId: t.taskId });
    }
  }
  setTimeout(() => loadTasksTab(), 1000);
}

function renderSelectOptions(selectEl, options, selectedValue) {
  if (!selectEl) return selectedValue;
  const selected = options.some(opt => opt.value === selectedValue)
    ? selectedValue
    : (options[0]?.value || '');
  selectEl.innerHTML = options.map(opt => `<option value="${opt.value}" ${opt.value === selected ? 'selected' : ''}>${opt.label}</option>`).join('');
  selectEl.value = selected;
  return selected;
}

function syncTaskConfigCapabilitiesFor(prefix) {
  const engineEl = document.getElementById(`${prefix}-engine`);
  const fallbackEl = document.getElementById(`${prefix}-fallback`);
  const permEl = document.getElementById(`${prefix}-perm`);
  const toolsEl = document.getElementById(`${prefix}-tools`);
  const noteEl = document.getElementById(`${prefix}-cap-note`);
  const permHintEl = document.getElementById(`${prefix}-perm-hint`);
  const toolsHintEl = document.getElementById(`${prefix}-tools-hint`);
  const toolsStoredEl = document.getElementById(`${prefix}-tools-stored`);
  const toolsWrapEl = document.getElementById(`${prefix}-tools-wrap`);
  const hostsEl = document.getElementById(`${prefix}-hosts`);
  if (!engineEl || !fallbackEl || !permEl || !toolsEl || !noteEl) return;

  const primary = engineEl.value || 'claude-cli';
  const caps = getTaskEngineCaps(primary);
  const fallbackOptions = [
    { value: '', label: caps.fallback ? '无' : '不支持' },
    { value: 'claude-cli', label: 'Claude CLI' },
    { value: 'openclaw', label: 'OpenClaw' },
    { value: 'codex-cli', label: 'Codex CLI' },
  ].filter(opt => !opt.value || (caps.fallback && opt.value !== primary));
  const selectedFallback = caps.fallback ? renderSelectOptions(fallbackEl, fallbackOptions, fallbackEl.value || '') : renderSelectOptions(fallbackEl, fallbackOptions.slice(0, 1), '');
  fallbackEl.disabled = !caps.fallback;

  const selectedPerm = renderSelectOptions(permEl, caps.permissionModes, permEl.value || 'default');
  permEl.disabled = caps.permissionModes.length === 1;

  const permMeta = caps.permissionModes.find(opt => opt.value === selectedPerm) || caps.permissionModes[0];
  if (permHintEl) permHintEl.textContent = permMeta?.desc || '';

  const storedTools = (toolsEl.value || '').trim();
  toolsEl.disabled = !caps.tools;
  toolsEl.title = caps.tools ? '' : `${caps.label} 当前不会读取 allowed_tools；这里仅保留值，切回 Claude 时复用。`;
  toolsEl.placeholder = '留空 = 使用默认工具集；也可写 Read,Edit,Bash...';
  if (toolsWrapEl) toolsWrapEl.style.display = caps.tools ? '' : 'none';
  if (toolsHintEl) {
    toolsHintEl.textContent = '只有 Claude 会真正读取 allowed_tools。留空即可；只有当你想强约束工具范围时才需要填。';
  }
  if (toolsStoredEl) {
    const toolsForDisplay = storedTools ? escHtml(storedTools) : '未设置';
    const showStored = !caps.tools;
    toolsStoredEl.classList.toggle('visible', showStored);
    toolsStoredEl.innerHTML = showStored
      ? `Tools 只对 Claude 生效。当前会忽略这项；已保留的值是 <code>${toolsForDisplay}</code>。`
      : '';
  }

  const hostSummary = formatHostFallbackSummary(hostsEl?.value || '');
  noteEl.innerHTML = [
    `<strong>${caps.label}</strong>`,
    `Hosts 会按顺序尝试 <strong>${escHtml(hostSummary)}</strong>。`,
    caps.fallbackNote,
    caps.budgetNote,
    primary === 'codex-cli' ? 'Codex 只有 `default` / `bypassPermissions` 两档权限差异。' : '',
    (primary === 'openclaw' || primary === 'local') ? '当前 Permission 会被后端自动收敛为 `default`。' : '',
  ].filter(Boolean).join(' ');
}
