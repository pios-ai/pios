// ── Direction drag-drop (project → goal) ─────────────────────

let _dirDragProj = null; // { filename, fromGoal }

function _dirProjDragStart(ev, filename, fromGoal) {
  _dirDragProj = { filename, fromGoal: fromGoal || '' };
  try { ev.dataTransfer.effectAllowed = 'move'; ev.dataTransfer.setData('text/plain', filename); } catch {}
  ev.stopPropagation();
}

function _dirProjDragEnd(ev) {
  _dirDragProj = null;
  document.querySelectorAll('[data-goal-dropzone]').forEach(el => {
    el.style.background = '';
    el.style.borderColor = '';
  });
}

function _dirDragOver(ev) {
  if (!_dirDragProj) return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  const zone = ev.currentTarget;
  const targetGoal = zone.getAttribute('data-goal-dropzone');
  if (targetGoal !== (_dirDragProj.fromGoal || '_unaligned')) {
    zone.style.background = 'rgba(74,158,255,0.08)';
    zone.style.borderColor = 'rgba(74,158,255,0.5)';
  }
}

function _dirDragLeave(ev) {
  const zone = ev.currentTarget;
  zone.style.background = '';
  zone.style.borderColor = '';
}

async function _dirProjDrop(ev, targetGoal) {
  ev.preventDefault();
  const zone = ev.currentTarget;
  zone.style.background = '';
  zone.style.borderColor = '';
  if (!_dirDragProj) return;
  const { filename, fromGoal } = _dirDragProj;
  _dirDragProj = null;

  const fromLabel = fromGoal || '_unaligned';
  if (fromLabel === targetGoal) return; // no-op

  const toLabel = targetGoal === '_unaligned' ? '移出所有 goal（变为未对齐）' : `goal "${targetGoal}"`;
  const ok = await piConfirm(`将 project "${filename}" 从 ${fromLabel === '_unaligned' ? '未对齐' : '"' + fromLabel + '"'} 移到 ${toLabel}？`);
  if (!ok) return;

  try {
    // goal: null = 删除 key（见 backend updateCardFrontmatter）
    const updates = { goal: targetGoal === '_unaligned' ? null : targetGoal };
    const r = await api('POST', '/pios/update-card', { filename, updates });
    if (!r || !r.ok) { piAlert('移动失败：' + (r?.error || 'unknown')); return; }
    piToast(`✓ ${filename} → ${targetGoal === '_unaligned' ? '未对齐' : targetGoal}`, 'success', 2500);
    loadDirectionTab();
  } catch (e) { piAlert('移动失败：' + e.message); }
}

// ── Goal CRUD ────────────────────────────────────────────────
// Goals live in pios.yaml direction.goals. Projects declare their goal via
// frontmatter `goal:` (reverse declaration). sense-maker 第四层 aggregates
// progress into Pi/Log/goal-progress.md; UI recomputes live from active cards.

function _slugify(s) {
  return String(s || '').toLowerCase().trim()
    .replace(/[^\w\u4e00-\u9fa5-]+/g, '-')
    .replace(/^-+|-+$/g, '') || ('item-' + Date.now());
}

async function addGoal() {
  const id = await piPrompt('Goal ID（英文短标识，如 survival-2026）', '');
  if (!id) return;
  const description = await piPrompt('目标描述（一句话说清这个 goal 要达到什么）', '', { multiline: true });
  if (!description) return;
  const timeframe = (await piPrompt('时间框架（如 2026-Q4，留空也行）', '')) || '';
  const criteria = (await piPrompt('验收标准（怎么知道达成了？留空也行）', '')) || '';
  try {
    const manifest = await api('GET', '/pios/manifest');
    const goals = (manifest.direction && manifest.direction.goals) || {};
    if (goals[id]) { piAlert('已有同 id 的 goal：' + id); return; }
    goals[id] = { description, ...(timeframe ? { timeframe } : {}), ...(criteria ? { criteria } : {}) };
    await api('POST', '/pios/manifest', { direction: { goals } });
    piToast('✓ goal 已添加：' + id, 'success', 2000);
    loadDirectionTab();
  } catch (e) { piAlert('添加失败：' + e.message); }
}

async function editGoal(goalId) {
  try {
    const manifest = await api('GET', '/pios/manifest');
    const goals = (manifest.direction && manifest.direction.goals) || {};
    const g = goals[goalId];
    if (!g) { piAlert('找不到 goal：' + goalId); return; }
    const description = await piPrompt('目标描述', g.description || '', { multiline: true });
    if (description === null) return;
    const timeframe = await piPrompt('时间框架', g.timeframe || '');
    if (timeframe === null) return;
    const criteria = await piPrompt('验收标准', g.criteria || '');
    if (criteria === null) return;
    goals[goalId] = {
      description: description || g.description,
      ...(timeframe ? { timeframe } : {}),
      ...(criteria ? { criteria } : {}),
    };
    await api('POST', '/pios/manifest', { direction: { goals } });
    piToast('✓ goal 已更新：' + goalId, 'success', 2000);
    loadDirectionTab();
  } catch (e) { piAlert('更新失败：' + e.message); }
}

async function deleteGoal(goalId) {
  try {
    // 先检查是否有 project 挂在此 goal 上
    const cards = await api('GET', '/pios/cards?status=active').catch(() => []);
    const attached = (cards || []).filter(c => (c.type === 'project') && c.goal === goalId);
    const warn = attached.length > 0
      ? `删除 goal "${goalId}"？\n\n仍有 ${attached.length} 个 project 挂在此 goal 上：\n` +
        attached.slice(0, 5).map(p => ' • ' + (p.title || p.filename)).join('\n') +
        (attached.length > 5 ? `\n ...+${attached.length - 5}` : '') +
        '\n\n删除后它们会变成「未对齐」（卡片本身不会动）。'
      : `删除 goal "${goalId}"？`;
    if (!(await piConfirm(warn))) return;
    const manifest = await api('GET', '/pios/manifest');
    if (manifest.direction && manifest.direction.goals) {
      delete manifest.direction.goals[goalId];
      await api('POST', '/pios/manifest', { direction: manifest.direction });
    }
    piToast('✓ goal 已删除', 'success', 2000);
    loadDirectionTab();
  } catch (e) { piAlert('删除失败：' + e.message); }
}

// ── Team Tab ──

let teamExpandedAgent = null;

// 全局 host × runtime 矩阵缓存（loadTeamTab / loadHostsTab / loadTasksTab 共用）
let _hostRuntimeMap = null;     // { host: [runtime, ...] }
async function getHostRuntimeMap(force = false) {
  if (!force && _hostRuntimeMap) return _hostRuntimeMap;
  try { _hostRuntimeMap = await api('GET', '/pios/host-runtimes'); }
  catch { _hostRuntimeMap = {}; }
  return _hostRuntimeMap;
}

async function loadTeamTab() {
  const container = document.getElementById('team-sub-agents');
  try {
    const [manifest, hostRt] = await Promise.all([
      api('GET', '/pios/manifest'),
      getHostRuntimeMap(true),
    ]);
    window._hostRuntimeMap = hostRt;   // 共享给 loadTeamAgentDetail / Task 行
    const agents = manifest.agents || {};

    // 每个 agent 单独查最近 8 次运行（/pios/runs 只返回全局最近 30 个，
    // 高频 task 如 pi.work/triage 会把窗口撑满，低频 task 进不来——
    // 按 agent 分别查才能保证每个 agent 都看到自己的最近记录）
    const agentIds = Object.keys(agents);
    const runsPerAgent = await Promise.all(
      agentIds.map(id => api('GET', '/pios/agent-runs?id=' + encodeURIComponent(id) + '&limit=8').catch(() => []))
    );
    const lastRun = {};
    const recentDots = {};
    agentIds.forEach((id, i) => {
      const arr = Array.isArray(runsPerAgent[i]) ? runsPerAgent[i] : [];
      recentDots[id] = arr;
      if (arr.length) lastRun[id] = arr[0];
    });

    let html = '';

    // Agents 显示全部 agent（kernel + execution + sense-runner），工程视图
    const visibleAgents = Object.entries(agents);

    for (const [id, agent] of visibleAgents) {
      const lr = lastRun[id];
      const isPaused = agent.status === 'paused';
      const dotCls = isPaused ? 'paused' : (lr && lr.status === 'failed' ? 'paused' : 'active');
      const taskCount = Object.keys(agent.tasks || {}).length;
      const lastRunTime = lr && lr.started_at ? timeAgo(lr.started_at) : '—';
      const expanded = teamExpandedAgent === id;

      // 引擎推断：优先 task.runtimes[0]，然后 agent.runtimes[0]
      const tasksArr = Object.values(agent.tasks || {});
      const firstTask = tasksArr.find(t =>
        (Array.isArray(t.runtimes) && t.runtimes.length) ||
        (Array.isArray(t.engines) && t.engines.length) ||
        t.runtime
      );
      const firstTaskEngine = Array.isArray(firstTask?.runtimes) && firstTask.runtimes.length ? firstTask.runtimes[0]
        : Array.isArray(firstTask?.engines) && firstTask.engines.length ? firstTask.engines[0]
        : firstTask?.runtime;
      const primaryEngine = firstTaskEngine || (Array.isArray(agent.runtimes) ? agent.runtimes[0] : agent.runtime) || '';
      const primaryRisk = runtimeRiskInfo(primaryEngine, agent, firstTask);
      const engineChipTop = primaryEngine
        ? (primaryRisk.risky
            ? `<span class="engine-chip bypass" title="${escHtml(primaryRisk.title)}">${escHtml(primaryEngine)}</span>`
            : `<span class="engine-chip">${escHtml(primaryEngine)}</span>`)
        : '';
      // 特许写标记：如果 capabilities 有任何特许写，agent 名后显示 ⚠
      const capWrites = (agent.capabilities?.public_write || []);
      const hasSpecialWrite = capWrites.some(s => {
        s = String(s);
        return s.startsWith('{owner}/Personal/') || s.includes('/Personal/')
          || (s === 'Cards/**' && id === 'pi')
          || (s.startsWith('Pi/Agents/') && !s.startsWith('Pi/Agents/' + id + '/'));
      });
      const warnBadge = hasSpecialWrite
        ? `<span title="capabilities 里声明了特许写，展开看详情" style="color:#ff8c42;font-size:11px;margin-left:4px">⚠</span>`
        : '';

      // 外层健康点阵：最近 8 次 runs
      const agentDots = (recentDots[id] || []);
      const dotsHtml = agentDots.length
        ? `<span class="agent-row-runs" title="最近 ${agentDots.length} 次运行">` +
            agentDots.map(r => {
              const rcls = r.status === 'success' ? 'ok'
                : r.status === 'running' ? 'running'
                : (r.status === 'gate_skipped' || r.status === 'skipped') ? 'skipped'
                : 'failed';
              const t = r.started_at ? new Date(r.started_at).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
              return `<span class="rstat ${rcls}" title="${t} — ${r.status}"></span>`;
            }).join('') +
          `</span>`
        : '';

      // 一句话描述（agent.description），外层 subtitle 显示
      const desc = agent.description ? `<div class="agent-row-sub">${escHtml(agent.description)}</div>` : '';

      html += `<div class="agent-row ${lr && lr.status === 'failed' ? 'failed' : ''}">
        <div class="agent-row-header" onclick="toggleTeamAgent('${id}')">
          <span class="agent-dot ${dotCls}"></span>
          <div style="flex:1;min-width:0">
            <div class="agent-row-name">${escHtml(agent.name || id)} <span style="font-weight:400;color:#555;font-size:11px">${id}</span>${warnBadge}</div>
            ${desc}
          </div>
          ${engineChipTop}
          <span class="agent-row-schedule" style="cursor:pointer;border-bottom:1px dotted #444" onclick="event.stopPropagation();switchTab('team','tasks');setTimeout(()=>{taskFilter.agent='${id}';loadTasksTab();},80)" title="跳到 Tasks 列表（按 ${id} 过滤）">${taskCount} task${taskCount !== 1 ? 's' : ''}</span>
          ${dotsHtml}
          <span class="agent-row-last">${lastRunTime}</span>
          <button class="toggle ${!isPaused ? 'on' : ''}" onclick="event.stopPropagation();toggleAgentStatus('${id}','${agent.status || 'active'}')" title="${isPaused ? 'Enable' : 'Pause'} agent"></button>
          <span style="font-size:11px;min-width:48px;color:${isPaused ? '#ff8c42' : '#6f7685'}">${isPaused ? 'paused' : 'enabled'}</span>
          <span style="font-size:11px;color:#6f7685;cursor:pointer;padding:2px 6px" onclick="event.stopPropagation();deleteAgentConfirm('${id}')" title="让他退休">⊗</span>
        </div>
        <div class="task-detail ${expanded ? 'open' : ''}" id="team-detail-${id}">
          <div id="team-inner-${id}"></div>
        </div>
      </div>`;
    }

    container.innerHTML = `<div class="section">
      <div class="bulk-bar">
        <button class="run-btn" onclick="showAddAgentDialog()">+ New Agent</button>
        <span style="flex:1"></span>
        <span style="font-size:11px;color:#555;align-self:center">${agentIds.length} agents</span>
      </div>
      ${html}
    </div>`;

    if (teamExpandedAgent) loadTeamAgentDetail(teamExpandedAgent);
  } catch (e) {
    container.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`;
  }
}

function _hirePickTemplate(key) {
  _hireState.template = key;
  _hireState.cron = HIRE_TEMPLATES[key].cron_options[0].value;
  _hireState.agentId = key === 'custom' ? '' : `my-${key}`;
  _hireStep(2);
}
function _hireStep(step) {
  // 保存表单值
  if (_hireState.step === 2) {
    const d = document.getElementById('hire-desc');
    if (d) _hireState.description = d.value;
    const a = document.getElementById('hire-agent-id');
    if (a) _hireState.agentId = a.value.trim();
    const c = document.getElementById('hire-cron');
    if (c) _hireState.cron = c.value;
  }
  // 进入步骤 3 前校验
  if (step === 3) {
    if (!/^[a-z][a-z0-9-]{1,30}$/.test(_hireState.agentId)) {
      piAlert('Agent ID 必须是英文小写 + 数字 + 连字符，2-31 字（例：ai-funding-scan）');
      return;
    }
    if (!_hireState.description.trim()) {
      piAlert('请描述他要做什么');
      return;
    }
  }
  _hireState.step = step;
  _renderHireWizard();
}
async function _hireSubmit() {
  const s = _hireState;
  const t = HIRE_TEMPLATES[s.template];
  const r = await api('POST', '/pios/agent/create', {
    agentId: s.agentId,
    name: t.label,
    description: s.description,
    avatar_emoji: t.avatar,
    host: 'any',
    runtime: 'claude-cli',
  });
  if (!r.ok) { piAlert('雇佣失败：' + (r.error || 'unknown')); return; }
  closeHireWizard();
  loadOverview();  // Overview 立刻刷新
}

async function _doRetire(agentId, mode) {
  const r = await api('POST', '/pios/agent/retire', { agentId, mode });
  document.getElementById('retire-overlay')?.remove();
  if (!r.ok) { piAlert('退休失败：' + (r.error || 'unknown')); return; }
  teamExpandedAgent = null;
  if (typeof loadTeamTab === 'function') loadTeamTab();
  if (typeof loadOverview === 'function') loadOverview();
}

function toggleTeamAgent(agentId) {
  if (teamExpandedAgent === agentId) {
    teamExpandedAgent = null;
    const el = document.getElementById('team-detail-' + agentId);
    if (el) el.classList.remove('open');
  } else {
    if (teamExpandedAgent) {
      const prev = document.getElementById('team-detail-' + teamExpandedAgent);
      if (prev) prev.classList.remove('open');
    }
    teamExpandedAgent = agentId;
    const el = document.getElementById('team-detail-' + agentId);
    if (el) el.classList.add('open');
    loadTeamAgentDetail(agentId);
  }
}

async function loadTeamAgentDetail(agentId) {
  const inner = document.getElementById('team-inner-' + agentId);
  if (!inner) return;

  try {
    const [manifest, agentRuns] = await Promise.all([
      api('GET', '/pios/manifest'),
      api('GET', '/pios/agent-runs?id=' + agentId),
    ]);
    const agent = manifest.agents[agentId];
    if (!agent) { inner.innerHTML = '<div style="color:#555">Agent not found in manifest</div>'; return; }

    // 准备数据源
    const allPlugins = manifest.infra?.plugins ? Object.keys(manifest.infra.plugins) : [];
    const agentPlugins = agent.plugins || [];
    const runtimes = manifest.infra?.runtimes ? Object.keys(manifest.infra.runtimes) : ['claude-cli'];
    const instances = manifest.infra?.instances ? Object.keys(manifest.infra.instances) : [];
    if (!instances.includes('any')) instances.push('any');
    const caps = agent.capabilities || {};
    const tasks = agent.tasks || {};
    const taskCount = Object.keys(tasks).length;
    const recentAgentRuns = (agentRuns || []).slice(0, 12);
    const latestRun = recentAgentRuns[0];
    const latestAgo = latestRun?.started_at ? timeAgo(latestRun.started_at) : null;

    // 推断主引擎（顶部条显示）
    const firstTaskEngine = Object.values(tasks).find(t => Array.isArray(t.engines) && t.engines.length)?.engines?.[0];
    const primaryEngine = firstTaskEngine || agent.runtime || '';
    const codexBypass = primaryEngine === 'codex-cli';

    let html = '<div class="agent-detail-inner">';

    // Host × Runtime 矩阵（共享缓存）
    const hostRtMap = window._hostRuntimeMap || {};
    const hostHasAnyRuntime = (h, wantedRuntimes) => {
      const hostRts = hostRtMap[h] || [];
      if (!wantedRuntimes.length) return hostRts.length > 0;
      return wantedRuntimes.some(r => hostRts.includes(r));
    };
    const runtimeHasAnyHost = (r, wantedHosts) => {
      if (!wantedHosts.length) return Object.values(hostRtMap).some(rts => rts.includes(r));
      return wantedHosts.some(h => (hostRtMap[h] || []).includes(r));
    };

    // Hosts 多选 chip（agent.hosts 数组）
    const declaredHosts = Array.isArray(agent.hosts) ? agent.hosts : (agent.host ? [agent.host] : []);
    // Runtimes 多选 chip（agent.runtimes 数组）
    const declaredRuntimes = Array.isArray(agent.runtimes) ? agent.runtimes : (agent.runtime ? [agent.runtime] : []);

    // 添加 host 下拉：fail-gracefully（未知状态不 disable）
    const hostCandidates = instances.filter(h => h !== 'any' && !declaredHosts.includes(h));
    const hostChipsHtml = declaredHosts.map(h => {
      const hostRts = hostRtMap[h];
      const supported = hostRts === undefined ? [] : declaredRuntimes.filter(r => hostRts.includes(r));
      const illegal = declaredRuntimes.length > 0 && hostRts !== undefined && supported.length === 0;
      const chipCls = illegal ? 'host-chip illegal' : 'host-chip';
      const title = illegal ? `${h} 没装 agent.runtimes (${declaredRuntimes.join(',')}) 任何一个`
        : hostRts === undefined ? `${h} runtime 状态未知`
        : `${h} · 支持 ${supported.length ? supported.join(',') : (hostRts || []).join(',')}`;
      return `<span class="${chipCls}" title="${title}"
        draggable="true"
        ondragstart="onChipDragStart(event,'agent-hosts','${agentId}','',( '${h}'))"
        ondragend="onChipDragEnd(event)"
        ondragover="onChipDragOver(event,'agent-hosts','${agentId}','')"
        ondrop="onChipDrop(event,'agent-hosts','${agentId}','','${h}')">
        <span>${escHtml(h)}</span>
        <button class="host-chip-x" onclick="event.stopPropagation();toggleAgentHost('${agentId}','${h}',false)" title="从 agent.hosts 中移除">×</button>
      </span>`;
    }).join('');
    const addHostHtml = hostCandidates.length
      ? `<select class="host-add" onchange="if(this.value)toggleAgentHost('${agentId}',this.value,true)"><option value="">+ 添加 host</option>${hostCandidates.map(h => {
          const hostRts = hostRtMap[h];
          if (hostRts === undefined) return `<option value="${h}">${h} (runtime 状态未知)</option>`;
          const compat = declaredRuntimes.length ? declaredRuntimes.filter(r => hostRts.includes(r)) : hostRts;
          const disabled = declaredRuntimes.length > 0 && compat.length === 0;
          const label = hostRts.length ? `${h} (${hostRts.join(',')})` : `${h} (无 runtime 装过)`;
          return `<option value="${h}" ${disabled ? 'disabled' : ''}>${label}${disabled ? ' ⚠' : ''}</option>`;
        }).join('')}</select>`
      : '';
    const hostsMultiSelect = `<div class="host-chip-row">${hostChipsHtml}${addHostHtml}</div>`;

    // 添加 runtime 下拉（fail-gracefully 同上）
    const rtCandidates = runtimes.filter(r => !declaredRuntimes.includes(r));
    const rtChipsHtml = declaredRuntimes.map((r, idx) => {
      const supportingHosts = declaredHosts.filter(h => {
        const hrts = hostRtMap[h];
        return hrts === undefined || hrts.includes(r);
      });
      const knownHosts = declaredHosts.filter(h => hostRtMap[h] !== undefined);
      const illegal = knownHosts.length > 0 && knownHosts.every(h => !hostRtMap[h].includes(r));
      const risk = runtimeRiskInfo(r, agent, null);
      const chipCls = illegal ? 'host-chip illegal' : (risk.risky && idx === 0 ? 'host-chip bypass' : 'host-chip');
      const title = illegal ? `agent.hosts 已知装过的 host 全都没装 ${r}` : `${risk.risky ? risk.title + ' · ' : ''}${r} · 可用于 ${supportingHosts.length ? supportingHosts.join(',') : 'any'}`;
      return `<span class="${chipCls}" title="${title}"
        draggable="true"
        ondragstart="onChipDragStart(event,'agent-runtimes','${agentId}','','${r}')"
        ondragend="onChipDragEnd(event)"
        ondragover="onChipDragOver(event,'agent-runtimes','${agentId}','')"
        ondrop="onChipDrop(event,'agent-runtimes','${agentId}','','${r}')">
        <span>${escHtml(r)}</span>
        <button class="host-chip-x" onclick="event.stopPropagation();toggleAgentRuntime('${agentId}','${r}',false)" title="从 agent.runtimes 中移除">×</button>
      </span>`;
    }).join('');
    const addRtHtml = rtCandidates.length
      ? `<select class="host-add" onchange="if(this.value)toggleAgentRuntime('${agentId}',this.value,true)"><option value="">+ 添加 runtime</option>${rtCandidates.map(r => {
          const supportingHosts = declaredHosts.filter(h => {
            const hrts = hostRtMap[h]; return hrts === undefined || hrts.includes(r);
          });
          const knownHosts = declaredHosts.filter(h => hostRtMap[h] !== undefined);
          const disabled = knownHosts.length > 0 && knownHosts.every(h => !hostRtMap[h].includes(r));
          const label = supportingHosts.length ? `${r} (${supportingHosts.join(',')})` : `${r}`;
          return `<option value="${r}" ${disabled ? 'disabled' : ''}>${label}${disabled ? ' ⚠ 已知 hosts 都没装' : ''}</option>`;
        }).join('')}</select>`
      : '';
    const runtimesMultiSelect = `<div class="host-chip-row">${rtChipsHtml}${addRtHtml}</div>`;

    // ── SOUL（inline textarea + Save，与 Task Prompt 镜像）──
    html += '<div class="detail-section">';
    html += `<div class="detail-section-header" onclick="toggleDetailSection(this)"><span class="chevron">▶</span><span>SOUL</span><button class="save-btn secondary" style="margin-left:auto" onclick="event.stopPropagation();saveAgentSoul('${agentId}','${escHtml(agent.soul)}')">Save SOUL</button></div>`;
    html += '<div class="detail-section-body collapsed">';
    try {
      const soulFile = await api('GET', '/pios/manifest/file?path=' + encodeURIComponent(agent.soul));
      html += `<textarea class="task-prompt-area" id="ts-soul-${agentId}">${escHtml(soulFile.content)}</textarea>`;
      html += `<div id="ts-msg-${agentId}"></div>`;
    } catch { html += '<div style="color:#555;font-size:12px">SOUL.md not found</div>'; }
    html += '</div></div>';

    // ── Capabilities（三分组 + 空字段不渲染） ──
    // 特许写识别
    const specialWrites = (caps.public_write || []).map(p => {
      const s = String(p);
      if (s.startsWith('{owner}/Personal/') || s.includes('/Personal/')) return { s, label: 'owner 私人区特许' };
      if (s === 'Cards/**' && agentId === 'pi') return { s, label: '隐性"派活权限"（改 ready_for_work 就是给 worker 派任务）' };
      if (s.startsWith('Pi/Agents/') && !s.startsWith('Pi/Agents/' + agentId + '/')) return { s, label: '协作写他人工作台' };
      return null;
    }).filter(Boolean);

    // 单字段渲染器（空则返回空字符串）
    const capField = (label, v, opts = {}) => {
      const { isPath } = opts;
      const isEmpty = Array.isArray(v) ? v.length === 0 : !v;
      if (isEmpty) return '';
      const body = Array.isArray(v)
        ? v.map(x => `<span class="cap-chip">${escHtml(String(x))}</span>`).join('')
        : (isPath
            ? `<span class="cap-path" onclick="copyPathToClipboard('${escHtml(v)}')" title="点击复制路径">${escHtml(v)}</span>`
            : `<span class="cap-chip">${escHtml(v)}</span>`);
      return `<div class="cap-field"><span class="cap-field-label">${label}</span><div class="cap-field-val">${body}</div></div>`;
    };

    // 三个分组，每组只在有非空字段时渲染
    const groupRender = (title, fields, footer = '') => {
      const body = fields.filter(Boolean).join('');
      if (!body) return '';
      return `<div class="cap-group"><div class="cap-group-title">${title}</div>${body}${footer}</div>`;
    };


    html += '<div class="detail-section">';
    html += `<div class="detail-section-header" onclick="toggleDetailSection(this)"><span class="chevron">▶</span><span>Configuration</span></div>`;
    html += '<div class="detail-section-body collapsed">';

    // Placement 组：runtimes + hosts（不依赖 capabilities，总是显示）
    html += `<div class="cap-block">`;
    html += `<div class="cap-group"><div class="cap-group-title">Placement</div>
      <div class="cap-field"><span class="cap-field-label">Runtimes</span><div class="cap-field-val">${runtimesMultiSelect}</div></div>
      <div class="cap-field"><span class="cap-field-label">Hosts</span><div class="cap-field-val">${hostsMultiSelect}</div></div>
    </div>`;

    // Territory 组：岗位级 meta（workspace + projects），与 runtime 无关
    html += groupRender('Territory', [
      capField('Workspace', caps.workspace, { isPath: true }),
      capField('Projects', caps.projects),
    ]);

    // Per-runtime 权限配置（新 schema，declaredRuntimes 前文已定义）
    const agentConfigs = agent.configs || {};
    html += `<div class="cap-group">
      <div class="cap-group-title">Runtime Configs <span style="font-weight:400;color:#555;letter-spacing:0;text-transform:none;font-size:10px">· 每 runtime 独立，原生 schema</span></div>
      ${renderRuntimeTabsContent(agentId, declaredRuntimes, agentConfigs)}
    </div>`;

    // 特许写独立警示块（仅当有时；这是 legacy capabilities 的识别结果，作 audit 参考）
    if (specialWrites.length) {
      html += `<div class="cap-warn-block">
        <div class="warn-title">⚠ 特许写声明（${specialWrites.length}）· legacy capabilities 识别</div>
        ${specialWrites.map(x => `<div class="warn-item"><span class="what">${escHtml(x.s)}</span> — ${escHtml(x.label)}</div>`).join('')}
      </div>`;
    }
    html += '</div>';  // /cap-block
    html += '</div></div>';  // /body /section

    // ── Tasks ──
    html += '<div class="detail-section">';
    html += `<div class="detail-section-header" onclick="toggleDetailSection(this)"><span class="chevron open">▶</span><span>Tasks (${taskCount})</span><button class="run-btn" style="margin-left:auto" onclick="event.stopPropagation();addAgentTask('${agentId}')">+ New Task</button></div>`;
    html += '<div class="detail-section-body">';
    for (const [tid, task] of Object.entries(tasks)) {
      const isEnabled = task.enabled !== false;
      const cron = task.trigger?.cron || '—';
      const promptPath = task.prompt || '';
      const taskDesc = task.description || '';

      // Task host badge
      let hostsHtml = '';
      if (Array.isArray(task.hosts) && task.hosts.length) {
        hostsHtml = task.hosts.map((h, idx) => {
          const illegal = !declaredHosts.includes(h);
          const cls = illegal ? 'illegal' : (idx === 0 ? 'primary' : 'fallback');
          const prefix = idx === 0 ? '' : '▸';
          const tip = illegal ? `${h} 未在 agent.hosts 声明` : (idx === 0 ? `主 host` : `备选 fallback·primary 不可用时切`);
          return `<span class="task-host-badge ${cls}" title="${tip}">${prefix}${escHtml(h)}</span>`;
        }).join(' ');
      } else if (task.host) {
        const illegal = !declaredHosts.includes(task.host);
        const cls = illegal ? 'illegal' : 'primary';
        const tip = illegal ? `${task.host} 未在 agent.hosts 声明` : '';
        hostsHtml = `<span class="task-host-badge ${cls}" ${tip ? `title="${tip}"` : ''}>${escHtml(task.host)}</span>`;
      } else {
        const fallbackHost = declaredHosts[0] || 'any';
        hostsHtml = `<span class="task-host-badge fallback" title="未声明 host，继承 agent.hosts[0]">${escHtml(fallbackHost)}</span>`;
      }

      // Task runtimes badge（对称 host：主蓝 + 备灰 fallback chain）
      const tRuntimes = Array.isArray(task.runtimes) ? task.runtimes : (Array.isArray(task.engines) ? task.engines : (task.runtime ? [task.runtime] : []));
      const effRuntimes = tRuntimes.length ? tRuntimes : declaredRuntimes; // task 没声明 → 继承 agent.runtimes
      const isInheritedRt = tRuntimes.length === 0;
      let runtimesHtml = '';
      if (effRuntimes.length === 0) {
        runtimesHtml = `<span class="task-host-badge illegal" title="task 无 runtimes，agent 也未声明">⚠ no-runtime</span>`;
      } else {
        runtimesHtml = effRuntimes.map((r, idx) => {
          const illegal = !declaredRuntimes.includes(r);
          const risk = runtimeRiskInfo(r, agent, task);
          let cls;
          if (illegal) cls = 'illegal';
          else if (isInheritedRt) cls = 'fallback';   // 继承时整体灰
          else cls = idx === 0 ? (risk.risky ? 'primary bypass' : 'primary') : (risk.risky ? 'fallback bypass' : 'fallback');
          const prefix = idx === 0 ? '' : '▸';
          const tip = illegal ? `${r} 未在 agent.runtimes 声明`
            : isInheritedRt ? `继承自 agent.runtimes`
            : idx === 0 ? (risk.risky ? `${risk.title} · 主` : '主 runtime')
            : (risk.risky ? `${risk.title} · fallback` : 'fallback·主挂了切这个');
          return `<span class="task-host-badge ${cls}" title="${tip}">${prefix}${escHtml(r)}</span>`;
        }).join(' ');
      }

      html += `<div style="padding:6px 10px;background:rgba(0,0,0,0.15);border-radius:5px;margin-bottom:4px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="switchTab('team','tasks','${escHtml(tid)}')" title="去 Tasks › ${escHtml(tid)}">
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;color:#ddd">${escHtml(tid)}</div>
          ${taskDesc ? `<div style="font-size:10px;color:#6f7685;margin-top:1px">${escHtml(taskDesc)}</div>` : ''}
        </div>
        <span style="font-size:10px;color:#555;font-family:'SF Mono',Menlo,monospace">${escHtml(cron)}</span>
        ${hostsHtml}
        ${runtimesHtml}
        <button class="run-btn" style="font-size:10px" onclick="event.stopPropagation();editAgentTaskPrompt('${agentId}','${promptPath}')">prompt</button>

// Parse claude-cli permissions.allow 数组 →
//   { paths: { '<glob>': {Read,Write,Edit,NotebookEdit} }, tools: [非 path 规则] }
// 只对 Read/Write/Edit/NotebookEdit（文件工具）按 path 聚合；Bash(spec)/Glob/WebFetch 等保持 chip 形式
const _PATH_TOOLS = ['Read', 'Write', 'Edit', 'NotebookEdit'];
function parseAllowRules(allow) {
  const paths = {};
  const tools = [];
  const rx = /^(Read|Write|Edit|NotebookEdit)\((.+)\)$/;
  for (const rule of (allow || [])) {
    const m = typeof rule === 'string' ? rule.match(rx) : null;
    if (m) {
      const [, tool, glob] = m;
      if (!paths[glob]) paths[glob] = {};
      paths[glob][tool] = true;
    } else {
      tools.push(rule);
    }
  }
  return { paths, tools };
}

// 渲染 path rules 表格（按 path 行 + R/W/E checkbox）
// opts.taskId 非空时，toggle/remove/add 写到 task.configs（task override），空写 agent.configs
function renderPathRulesTable(agentId, rt, fieldPath, paths, opts) {
  opts = opts || {};
  const ro = !!opts.readonly;
  const taskId = opts.taskId || '';
  const enc = _encArg;
  const pathKeys = Object.keys(paths).sort();
  const roClass = ro ? ' ro' : '';
  const tidArg = taskId ? `,'${taskId}'` : '';
  const rows = pathKeys.map(p => {
    const has = paths[p];
    const checkbox = (tool, short) => {
      const checked = has[tool] ? 'checked' : '';
      const dis = ro ? 'disabled' : '';
      const onChange = ro ? '' : `onchange="togglePathRuleForTool('${agentId}','${rt}','${fieldPath}','${enc(p)}','${tool}',this.checked${tidArg})"`;
      return `<label class="${roClass.trim()}" title="${tool}(${escHtml(p)})">
        <input type="checkbox" ${checked} ${dis} ${onChange}>
        <span class="rwe-tag">${short}</span>
      </label>`;
    };
    const delBtn = ro ? '' : `<button class="path-rule-del" title="删除此路径所有规则" onclick="removePathRuleAll('${agentId}','${rt}','${fieldPath}','${enc(p)}'${tidArg})">×</button>`;
    return `<div class="path-rule-row">
      <span class="path-rule-glob">${escHtml(p)}</span>
      <span class="path-rule-ops">${checkbox('Read','R')}${checkbox('Write','W')}${checkbox('Edit','E')}</span>
      ${delBtn}
    </div>`;
  }).join('');
  const addBtn = ro ? '' : `<button class="path-rule-addbtn" onclick="promptAddPathRule('${agentId}','${rt}','${fieldPath}'${tidArg})">+ 添加路径</button>`;
  const emptyHint = ro && !rows ? '<div style="color:#555;font-size:11px;padding:2px 0">（空）</div>' : '';
  return `<div class="cap-field" style="align-items:flex-start">
    <span class="cap-field-label" style="margin-top:4px">Paths</span>
    <div class="cap-field-val" style="flex-direction:column;align-items:stretch;width:100%">
      <div class="path-rules-wrap">${rows}${emptyHint}</div>
      ${addBtn}
    </div>
  </div>`;
}

// Toggle 某 path 的 R/W/E 规则（勾上 = 加，取消 = 删）
// taskId 非空时写 task.configs（task override），空时写 agent.configs
async function togglePathRuleForTool(agentId, rt, fieldPath, encodedPath, tool, checked, taskId) {
  const targetPath = decodeURIComponent(encodedPath);
  const rule = `${tool}(${targetPath})`;
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  if (!agent) return;
  const scope = taskId
    ? ((agent.tasks || {})[taskId] || {})
    : agent;
  const cfg = (scope.configs || {})[rt] || {};
  const parts = fieldPath.split('.');
  let cursor = cfg;
  for (let i = 0; i < parts.length - 1; i++) cursor = cursor[parts[i]] || {};
  const current = cursor[parts[parts.length - 1]] || [];
  let next;
  if (checked) {
    if (current.includes(rule)) return;  // 已在
    next = [...current, rule];
  } else {
    next = current.filter(x => x !== rule);
  }

  // checked + claude-cli.permissions.allow：联动 allowed_tools（agent 级；task-level 不改 agent caps）
  if (checked && rt === 'claude-cli' && fieldPath === 'permissions.allow' && !taskId) {
    const caps = agent.capabilities || {};
    const tools = caps.allowed_tools;
    const toolList = Array.isArray(tools) ? tools.slice()
                  : (typeof tools === 'string' ? tools.split(',').map(x=>x.trim()).filter(Boolean) : []);
    if (!toolList.includes(tool)) {
      toolList.push(tool);
      const capPatch = { agents: {} };
      capPatch.agents[agentId] = { capabilities: { ...caps, allowed_tools: toolList } };
      await api('POST', '/pios/manifest', capPatch);
      piToast(`allowed_tools += ${tool}`, 'info', 1400);
    }
  }

  if (taskId) await saveTaskConfigField(agentId, taskId, rt, fieldPath, next);
  else await saveAgentConfigField(agentId, rt, fieldPath, next);
}

async function removePathRuleAll(agentId, rt, fieldPath, encodedPath, taskId) {
  const targetPath = decodeURIComponent(encodedPath);
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  if (!agent) return;
  const scope = taskId ? ((agent.tasks || {})[taskId] || {}) : agent;
  const cfg = (scope.configs || {})[rt] || {};
  const parts = fieldPath.split('.');
  let cursor = cfg;
  for (let i = 0; i < parts.length - 1; i++) cursor = cursor[parts[i]] || {};
  const current = cursor[parts[parts.length - 1]] || [];
  const suffix = `(${targetPath})`;
  const next = current.filter(r => {
    if (typeof r !== 'string' || !r.endsWith(suffix)) return true;
    const tool = r.slice(0, r.length - suffix.length);
    return !_PATH_TOOLS.includes(tool);
  });
  if (taskId) await saveTaskConfigField(agentId, taskId, rt, fieldPath, next);
  else await saveAgentConfigField(agentId, rt, fieldPath, next);
}

async function promptAddPathRule(agentId, rt, fieldPath, taskId) {
  const scope = taskId ? `task override (${taskId})` : 'agent';
  const glob = await piPrompt(`添加路径 glob (${scope}；自动加 Read/Write/Edit 三条；之后可单独勾选)：`, 'Pi/Log/example*.md');
  if (!glob || !glob.trim()) return;
  const g = glob.trim();
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  if (!agent) return;
  const s = taskId ? ((agent.tasks || {})[taskId] || {}) : agent;
  const cfg = (s.configs || {})[rt] || {};
  const parts = fieldPath.split('.');
  let cursor = cfg;
  for (let i = 0; i < parts.length - 1; i++) cursor = cursor[parts[i]] || {};
  const current = [...(cursor[parts[parts.length - 1]] || [])];
  let added = 0;
  for (const tool of ['Read', 'Write', 'Edit']) {
    const rule = `${tool}(${g})`;
    if (!current.includes(rule)) { current.push(rule); added++; }
  }
  if (!added) { piToast('3 条规则都已存在', 'warn', 1500); return; }
  if (taskId) await saveTaskConfigField(agentId, taskId, rt, fieldPath, current);
  else await saveAgentConfigField(agentId, rt, fieldPath, current);
  piToast(`已加 ${added} 条 Read/Write/Edit(${g}) → ${scope}`, 'info', 1800);
}

function renderClaudeCliFields(agentId, cfg, opts) {
  const allow = (cfg.permissions || {}).allow || [];
  const deny = (cfg.permissions || {}).deny || [];
  const mode = cfg.permission_mode || 'default';
  const modes = ['default', 'acceptEdits', 'plan', 'bypassPermissions'];
  const modeHint = mode === 'acceptEdits'
    ? `<code>--permission-mode acceptEdits</code> · ⚠ <b>-p 非交互模式下等同 default</b>（acceptEdits 只影响 TUI 交互）`
    : mode === 'plan'
      ? `<code>--permission-mode plan</code> · 所有写操作被拦（-p 下模型看到工具失败）`
      : mode === 'bypassPermissions'
        ? `<code>--permission-mode bypassPermissions</code> · 跳过 claude 内部审批（允许 Write/Bash 无 prompt）· <b>但 hook 仍生效</b>，越界路径照样被拦`
        : `<code>--permission-mode default</code> · auto-approve 命中 allow，其他由 hook 兜底`;
  const { paths, tools: nonPathAllow } = parseAllowRules(allow);
  return `
    <div class="cap-group">
      <div class="cap-group-title">Permissions <span class="group-subtitle">· <code>settings.json.permissions</code> + hook 硬拦（真安全边界）</span></div>
      ${renderPathRulesTable(agentId, 'claude-cli', 'permissions.allow', paths, opts)}
      ${fieldFlag(`按 path 聚合显示 <code>Read/Write/Edit(glob)</code>，勾选即写入 <code>settings.permissions.allow</code>；adapter 同 export <code>PIOS_CLAUDE_ALLOW</code> env 供 pios-pretool-hook 硬拦。`)}
      ${chipListField('Tools (non-path)', nonPathAllow, agentId, 'claude-cli', 'permissions.allow', 'Bash / Bash(git:*) / Glob / Grep / WebFetch(domain:*)', opts)}
      ${fieldFlag(`非文件路径规则（Bash / Glob / Grep / WebFetch 等）· 写入同一 <code>permissions.allow</code>，渲染时与 path 分开展示`)}
      ${chipListField('Deny',  deny,  agentId, 'claude-cli', 'permissions.deny',  'Write(**/.env*)', opts)}
      ${fieldFlag(`<code>settings.permissions.deny</code> · 命中直接拦（即使 allow 也允许）`)}
      ${selectField('Mode', mode, modes, agentId, 'claude-cli', 'permission_mode', opts)}
      ${fieldFlag(modeHint)}
    </div>
    <div class="cap-group-sub-note">
      ⚠ 路径硬拦靠 <b>hook</b>（pios-pretool-hook.sh）· <code>permissions.allow</code> 仅是 auto-approve · 工具是否可用由 Task Tab 的 <b>Allowed Tools</b> 决定
    </div>`;
}

// Tab 切换
function switchRuntimeTab(tabEl, runtime) {
  const tabsEl = tabEl.parentElement;
  tabsEl.querySelectorAll('.rt-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  // Siblings after .rt-tabs 里的 .rt-tab-body
  let sib = tabsEl.nextElementSibling;
  while (sib && sib.classList.contains('rt-tab-body')) {
    if (sib.dataset.runtime === runtime) sib.classList.remove('hidden');
    else sib.classList.add('hidden');
    sib = sib.nextElementSibling;
  }
}

// 按 dot-path 写入 tasks[taskId].configs.{runtime}.field（task-level override）
async function saveTaskConfigField(agentId, taskId, runtime, fieldPath, value) {
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  if (!agent) return;
  const task = (agent.tasks || {})[taskId];
  if (!task) return;
  const configs = JSON.parse(JSON.stringify(task.configs || {}));
  configs[runtime] = typeof configs[runtime] === 'object' && configs[runtime] ? configs[runtime] : {};
  const parts = fieldPath.split('.');
  let cursor = configs[runtime];
  for (let i = 0; i < parts.length - 1; i++) {
    if (!cursor[parts[i]] || typeof cursor[parts[i]] !== 'object') cursor[parts[i]] = {};
    cursor = cursor[parts[i]];
  }
  cursor[parts[parts.length - 1]] = value;
  const patch = { agents: { [agentId]: { tasks: { [taskId]: { configs } } } } };
  await api('POST', '/pios/manifest', patch);
  loadTaskDetail(taskId);
}

// 数组条目删除（fieldPath 指向数组）
async function removeConfigArrayItem(agentId, runtime, fieldPath, encodedItem) {

// 数组条目新增（弹 prompt）
async function promptAddConfigItem(agentId, runtime, fieldPath, encodedPlaceholder) {
  const placeholder = decodeURIComponent(encodedPlaceholder);
  // Electron BrowserView 拦 window.prompt() → 用 piPrompt 自定义 dialog
  const v = await piPrompt(`新增条目 (${runtime}.${fieldPath})：`, placeholder);
  if (!v || !v.trim()) return;
  const val = v.trim();
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  if (!agent) return;
  const cfg = (agent.configs || {})[runtime] || {};
  const parts = fieldPath.split('.');
  let cursor = cfg;
  for (let i = 0; i < parts.length - 1; i++) cursor = cursor[parts[i]] || {};
  const arr = [...(cursor[parts[parts.length - 1]] || [])];
  if (arr.includes(val)) {
    piToast(`已存在：${val}`, 'warn', 1600);
    return;
  }
  arr.push(val);

  // 联动：claude-cli.permissions.allow 加 Write(xxx) / Bash(git:*) / WebFetch(...) 时，
  // 自动把工具名同步到 agent.capabilities.allowed_tools。
  // 否则 --allowedTools 没列该工具，-p 下 claude 会直接 deny 该调用。
  if (runtime === 'claude-cli' && fieldPath === 'permissions.allow') {
    const m = val.match(/^([A-Za-z][A-Za-z_]*)/);
    if (m) {
      const toolName = m[1];
      const caps = agent.capabilities || {};
      const tools = caps.allowed_tools;
      const toolList = Array.isArray(tools) ? tools.slice()
                    : (typeof tools === 'string' ? tools.split(',').map(x=>x.trim()).filter(Boolean) : []);
      if (!toolList.includes(toolName)) {
        // 同理：window.confirm() 被 Electron 拦，用 piConfirm
        const okSync = await piConfirm(`配合 ${val} 生效，需要把工具 "${toolName}" 加到 agent.capabilities.allowed_tools。\n否则 --allowedTools 没列 ${toolName}，claude -p 会 deny 该调用。\n是否自动加？`);
        if (okSync) {
          toolList.push(toolName);
          const patch = { agents: {} };
          patch.agents[agentId] = { capabilities: { ...caps, allowed_tools: toolList } };
          await api('POST', '/pios/manifest', patch);
          piToast(`已同步 allowed_tools += ${toolName}`, 'info', 1800);
        }
      }
    }
  }

  await saveAgentConfigField(agentId, runtime, fieldPath, arr);
}

// agent.capabilities.<field> 实时保存（带 confirm）
async function saveAgentCap(agentId, field, value) {
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  if (!agent) return;
  const caps = { ...(agent.capabilities || {}) };
  const oldValue = caps[field];
  if (oldValue === value) return;
  const rules = [
    `agent.capabilities.${field}: ${oldValue} → ${value}`,
    `所有继承这个字段的 task 会跟着变`,
  ];
  if (field === 'permission' && value === 'bypassPermissions') rules.push('⚠ bypassPermissions: AI 跳过所有工具审批，直接执行 bash/write/edit 无确认');
  if (!confirmChange(`Agent capability: ${field} → ${value}`, ...rules)) {
    loadTeamAgentDetail(agentId); return;
  }
  caps[field] = value;
  const patch = { agents: {} };
  patch.agents[agentId] = { capabilities: caps };
  await api('POST', '/pios/manifest', patch);
  loadTeamAgentDetail(agentId);
}

// Task 级 host 修改（单值 host，必须 ∈ agent.hosts）
async function setTaskHost(agentId, taskId, newHost) {
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  if (!agent) return;
  const declaredHosts = Array.isArray(agent.hosts) ? agent.hosts : (agent.host ? [agent.host] : []);
  if (!declaredHosts.includes(newHost)) {
    piToast(`${newHost} 未在 agent.hosts 声明`, 'error', 2200);
    return;
  }
  const patch = { agents: {} };
  patch.agents[agentId] = { tasks: {} };
  patch.agents[agentId].tasks[taskId] = { host: newHost };
  // 如果当前 task 有 hosts[] 数组，清掉它（二选一）
  const curTask = agent.tasks?.[taskId];
  if (Array.isArray(curTask?.hosts)) patch.agents[agentId].tasks[taskId].hosts = null;
  await api('POST', '/pios/manifest', patch);
  loadTeamAgentDetail(agentId);
}

// Task 级 hosts 多选编辑
async function toggleTaskHost(agentId, taskId, host, add, opts = {}) {
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  if (!agent) return;
  const declaredHosts = Array.isArray(agent.hosts) ? agent.hosts : (agent.host ? [agent.host] : []);
  const task = agent.tasks?.[taskId];
  if (!task) return;

  if (add && !declaredHosts.includes(host)) {
    piToast(`${host} 未在 agent.hosts 声明（先去 Team 里 agent 声明）`, 'error', 2500);
    return;
  }
  let current = Array.isArray(task.hosts) ? task.hosts.slice() : (task.host ? [task.host] : []);
  const wasInherited = current.length === 0;
  if (add && !current.includes(host)) current.push(host);
  if (!add) current = current.filter(h => h !== host);

  // Confirm（删路径已经在 removeTaskChip 里 confirm 过了，传 skipConfirm 跳过；加路径这里 confirm）
  if (!opts.skipConfirm && add) {
    const rules = [];
    const hostRts = (_hostRuntimeMap && _hostRuntimeMap[host]);
    const agentRts = Array.isArray(agent.runtimes) ? agent.runtimes : (agent.runtime ? [agent.runtime] : []);
    if (wasInherited) {
      rules.push(`task.host 从"继承 agent.hosts[0]"固化为显式值 ${host}`);
    } else {
      rules.push(`task 新 host 列表: ${current.join(' → ')}`);
      if (current.length > 1) rules.push(`第一位 (${current[0]}) = 主，后面是 fallback 备选`);
    }
    if (hostRts !== undefined) {
      const compat = agentRts.filter(r => hostRts.includes(r));
      if (compat.length === 0) rules.push(`⚠ ${host} 没装 agent.runtimes (${agentRts.join(',')}) 任何一个 —— task 到这里会 skip`);
      else rules.push(`${host} 装了 ${compat.join(',')}（与 agent.runtimes 的交集）`);
    }
    if (!confirmChange(`添加 ${host} 到 task.hosts`, ...rules)) return;
  }

  const patch = { agents: {} };
  patch.agents[agentId] = { tasks: {} };
  if (current.length === 0) {
    patch.agents[agentId].tasks[taskId] = { host: null, hosts: null };
  } else if (current.length === 1) {
    patch.agents[agentId].tasks[taskId] = { host: current[0], hosts: null };
  } else {
    patch.agents[agentId].tasks[taskId] = { hosts: current, host: null };
  }
  await api('POST', '/pios/manifest', patch);
  loadTaskDetail(taskId);
}

// ── 统一 confirm helper：标题 + 规则说明（复杂操作要讲清楚副作用） ──
// usage: confirmChange('移除 laptop-host', '清空后 task.host 继承 agent.hosts[0]=worker-host', '备选规则 2', ...)
function confirmChange(title, ...ruleLines) {
  const rules = ruleLines.filter(Boolean).length
    ? '\n\n这会：\n' + ruleLines.filter(Boolean).map(l => '• ' + l).join('\n')
    : '';
  return confirm(`${title}${rules}\n\n继续？`);
}

// 小规则提示：runtime 是 codex-cli 时的 bypass 警告文案
function _runtimeCfg(agent, task, runtime) {
  const taskCfg = ((task || {}).configs || {})[runtime];
  const agentCfg = ((agent || {}).configs || {})[runtime];
  return taskCfg || agentCfg || {};
}

function runtimeRiskInfo(runtime, agent, task) {
  if (runtime === 'claude-cli') {
    const cfg = _runtimeCfg(agent, task, runtime);
    const mode = (task && task.permission_mode) ||
      cfg.permission_mode ||
      ((agent || {}).capabilities || {}).permission ||
      'default';
    if (mode === 'bypassPermissions') {
      return { risky: true, title: 'claude-cli bypassPermissions：跳过 Claude 内部审批；PiOS hook 仍会按 allow 规则硬拦路径' };
    }
  }
  if (runtime === 'codex-cli') {
    const cfg = _runtimeCfg(agent, task, runtime);
    const hasCfg = cfg && Object.keys(cfg).length > 0;
    if (!hasCfg) {
      return { risky: true, title: 'codex-cli 未配置 sandbox，adapter 会回退到 --dangerously-bypass-approvals-and-sandbox' };
    }
    if ((cfg.sandbox_mode || 'workspace-write') === 'danger-full-access') {
      return { risky: true, title: 'codex-cli sandbox_mode=danger-full-access：无 OS sandbox' };
    }
  }
  return { risky: false, title: runtime ? `${runtime} runtime` : '' };
}

function runtimeBypassWarning(runtime, agent, task) {
  const info = runtimeRiskInfo(runtime, agent, task);
  return info.risky ? info.title : null;
}

// ── Chip 统一删除 handler（带 confirm 讲清规则）──
async function removeTaskChip(agentId, taskId, kind, value) {
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  const t = agent?.tasks?.[taskId];
  if (!agent || !t) return;

  let explicit;
  if (kind === 'task-hosts') {
    explicit = Array.isArray(t.hosts) && t.hosts.length ? t.hosts : (t.host ? [t.host] : []);
  } else if (kind === 'task-runtimes') {
    explicit = Array.isArray(t.runtimes) && t.runtimes.length ? t.runtimes
      : Array.isArray(t.engines) && t.engines.length ? t.engines
      : (t.runtime ? [t.runtime] : []);
  } else return;

  const kindLabel = kind === 'task-hosts' ? 'host' : 'runtime';
  const rules = [];
  if (explicit.length === 1) {
    const agentDefault = kind === 'task-hosts'
      ? (Array.isArray(agent.hosts) ? agent.hosts[0] : agent.host)
      : (Array.isArray(agent.runtimes) ? agent.runtimes.join(' → ') : agent.runtime);
    rules.push(`清空 task.${kindLabel} 字段，回到继承态`);
    rules.push(`运行时将继承 agent 默认值：${agentDefault}`);
  } else {
    const after = explicit.filter(x => x !== value);
    rules.push(`剩下：${after.join(', ')}`);
    if (kind === 'task-runtimes' && after[0] !== explicit[0]) rules.push(`新的主 runtime = ${after[0]}`);
  }
  if (!confirmChange(`从 task.${kindLabel} 移除 ${value}`, ...rules)) return;

  // skip confirm inside toggleTaskHost/Runtime（已经确认过了）
  if (kind === 'task-hosts') return toggleTaskHost(agentId, taskId, value, false, { skipConfirm: true });
  if (kind === 'task-runtimes') return toggleTaskRuntime(agentId, taskId, value, false, { skipConfirm: true });
}

// 点击"继承·<值>" chip → 固化为显式 override（弹 confirm 讲规则）
async function confirmInheritExplicit(agentId, taskId, kind, value) {
  const kindLabel = kind === 'task-hosts' ? 'host' : 'runtimes';
  const rules = [
    `task.${kindLabel} 从"继承 agent"固化为显式值`,
    kind === 'task-hosts' ? `之后修改 agent.hosts 不再影响这个 task` : `之后修改 agent.runtimes 不再影响这个 task`,
    `想回到继承态 → 点 × 删除`,
  ];
  if (!confirmChange(`固化 task.${kindLabel} 为显式`, ...rules)) return;
  if (kind === 'task-hosts') {
    await api('POST', '/pios/manifest', { agents: { [agentId]: { tasks: { [taskId]: { host: value } } } } });
  } else if (kind === 'task-runtimes') {
    const m = await api('GET', '/pios/manifest');
    const arr = m.agents?.[agentId]?.runtimes || [];
    await api('POST', '/pios/task/update', { taskId, updates: { runtimes: arr } });
  }
  loadTaskDetail(taskId);
}

// 固化继承字段为显式值（allowed_tools / permission_mode）— 带 confirm
async function fixInheritedToExplicit(agentId, taskId, field, value) {
  const rules = [
    `task.${field} 从"继承 agent"固化为显式值`,
    `之后修改 agent.capabilities.${field === 'permission_mode' ? 'permission' : field} 不再影响这个 task`,
    `想回到继承态 → 点 ↩ 按钮`,

}

// ── Cron preset helpers (human-readable schedule) ──
// 识别常见 cron → preset kind；其他归 custom
function cronToPreset(cron) {
  if (!cron) return { kind: 'custom', cron: '' };
  const c = String(cron).trim();
  const m = c.match(/^(\S+)\s+(\S+)\s+(\S+)\s+(\S+)\s+(\S+)$/);
  if (!m) return { kind: 'custom', cron: c };
  const [, M, H, D, Mo, W] = m;
  if (M === '*' && H === '*' && D === '*' && Mo === '*' && W === '*') return { kind: 'everyMinute' };
  let mm;
  if ((mm = M.match(/^\*\/(\d+)$/)) && H === '*' && D === '*' && Mo === '*' && W === '*') return { kind: 'everyMinutes', n: +mm[1] };
  if (/^\d+$/.test(M) && H === '*' && D === '*' && Mo === '*' && W === '*') return { kind: 'hourly', minute: +M };
  if (/^\d+$/.test(M) && (mm = H.match(/^\*\/(\d+)$/)) && D === '*' && Mo === '*' && W === '*') return { kind: 'everyHours', minute: +M, n: +mm[1] };
  if (/^\d+$/.test(M) && /^\d+$/.test(H) && D === '*' && Mo === '*' && W === '*') return { kind: 'daily', hour: +H, minute: +M };
  if (/^\d+$/.test(M) && /^\d+$/.test(H) && D === '*' && Mo === '*' && /^[0-6](,[0-6])*$/.test(W)) return { kind: 'weekly', hour: +H, minute: +M, days: W };
  return { kind: 'custom', cron: c };
}

// Preset 选中时生成 cron 字符串（从 UI 里的输入组件读参数）
function buildCronFromUI(taskId) {
  const kind = document.getElementById(`tc-${taskId}-sched-kind`)?.value;
  const p2 = (id) => document.getElementById(`tc-${taskId}-${id}`)?.value;
  switch (kind) {
    case 'everyMinute': return '* * * * *';
    case 'everyMinutes': return `*/${p2('sched-n') || 5} * * * *`;
    case 'hourly': return `${p2('sched-min') || 0} * * * *`;
    case 'everyHours': return `${p2('sched-min') || 0} */${p2('sched-n') || 2} * * *`;
    case 'daily': return `${p2('sched-min') || 0} ${p2('sched-hour') || 9} * * *`;
    case 'weekly': return `${p2('sched-min') || 0} ${p2('sched-hour') || 9} * * ${p2('sched-days') || '1'}`;
    case 'custom': return p2('sched-cron') || '';
    default: return '';
  }
}

// Render schedule editor with preset dropdown + kind-specific inputs
function renderScheduleEditor(taskId, currentCron) {
  const p = cronToPreset(currentCron);
  const kinds = [
    ['everyMinute', '每分钟'],
    ['everyMinutes', '每 N 分钟'],
    ['hourly', '每小时的 M 分'],
    ['everyHours', '每 N 小时'],
    ['daily', '每天 HH:MM'],
    ['weekly', '每周 HH:MM'],
    ['custom', '自定义 cron'],
  ];
  const selectHtml = `<select id="tc-${taskId}-sched-kind" class="host-add" style="border-style:solid" onchange="updateScheduleInputs('${taskId}')">${kinds.map(([k, l]) => `<option value="${k}" ${p.kind === k ? 'selected' : ''}>${l}</option>`).join('')}</select>`;

  // kind-specific input area
  let inputsHtml = '';
  const baseInput = 'background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:3px 8px;color:#ccc;font-size:11px;outline:none;width:60px;font-family:\'SF Mono\',Menlo,monospace';
  const dayNames = [['0','周日'],['1','周一'],['2','周二'],['3','周三'],['4','周四'],['5','周五'],['6','周六']];
  if (p.kind === 'everyMinutes') {
    inputsHtml = `每 <input id="tc-${taskId}-sched-n" type="number" value="${p.n || 5}" min="1" max="59" style="${baseInput}" onchange="onScheduleChange('${taskId}')"/> 分钟`;
  } else if (p.kind === 'hourly') {
    inputsHtml = `每小时的 <input id="tc-${taskId}-sched-min" type="number" value="${p.minute || 0}" min="0" max="59" style="${baseInput}" onchange="onScheduleChange('${taskId}')"/> 分`;
  } else if (p.kind === 'everyHours') {
    inputsHtml = `每 <input id="tc-${taskId}-sched-n" type="number" value="${p.n || 2}" min="1" max="23" style="${baseInput}" onchange="onScheduleChange('${taskId}')"/> 小时，整点 <input id="tc-${taskId}-sched-min" type="number" value="${p.minute || 0}" min="0" max="59" style="${baseInput}" onchange="onScheduleChange('${taskId}')"/> 分`;
  } else if (p.kind === 'daily') {

async function onScheduleChange(taskId) {
  const newCron = buildCronFromUI(taskId);
  const meta = document.getElementById(`tc-${taskId}-cron-meta`);
  if (meta) meta.textContent = formatSchedule(newCron) || '';
  // Create form 用 prefix '__create__'，task 还不存在不调 api
  if (taskId === '__create__') return;
  // 读当前 cron 作对比
  const manifest = await api('GET', '/pios/manifest');
  let currentCron = null;
  for (const a of Object.values(manifest.agents || {})) {
    if (a.tasks?.[taskId]) { currentCron = a.tasks[taskId].trigger?.cron; break; }
  }
  if (currentCron === newCron) return;
  const rules = [
    `新 cron: ${newCron}`,
    `触发节奏: ${formatSchedule(newCron) || '未知'}`,
    `修改后下次 tick (1 分钟内) 生效`,
  ];
  if (!confirmChange(`Schedule: ${currentCron || '(无)'} → ${newCron}`, ...rules)) {
    loadTaskDetail(taskId); return;
  }
  await api('POST', '/pios/task/update', { taskId, updates: { cron: newCron } });
}

// ── Chip drag & drop (Hosts/Runtimes 顺序调整) ──
let _dragPayload = null;
function onChipDragStart(e, kind, agentId, taskId, value) {
  _dragPayload = { kind, agentId, taskId, value };
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.5';
}
function onChipDragEnd(e) {
  e.currentTarget.style.opacity = '1';
  _dragPayload = null;
}
function onChipDragOver(e, kind, agentId, taskId) {
  if (!_dragPayload) return;
  if (_dragPayload.kind !== kind || _dragPayload.agentId !== agentId || _dragPayload.taskId !== taskId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}
async function onChipDrop(e, kind, agentId, taskId, targetValue) {
  if (!_dragPayload) return;
  if (_dragPayload.kind !== kind || _dragPayload.agentId !== agentId || _dragPayload.taskId !== taskId) return;
  e.preventDefault();
  const src = _dragPayload.value;
  if (src === targetValue) return;
  await reorderChips(kind, agentId, taskId, src, targetValue);
}

// reorderChips: 把 src 移到 target 前面（顺序 = fallback 链优先级），带 confirm
async function reorderChips(kind, agentId, taskId, src, target) {
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  if (!agent) return;
  let arr;
  if (kind === 'agent-hosts') arr = (agent.hosts || []).slice();
  else if (kind === 'agent-runtimes') arr = (agent.runtimes || []).slice();
  else if (kind === 'task-hosts') {
    const t = agent.tasks?.[taskId];
    arr = Array.isArray(t?.hosts) && t.hosts.length ? t.hosts.slice() : (t?.host ? [t.host] : []);
  } else if (kind === 'task-runtimes') {
    const t = agent.tasks?.[taskId];
    arr = Array.isArray(t?.runtimes) && t.runtimes.length ? t.runtimes.slice()
      : Array.isArray(t?.engines) && t.engines.length ? t.engines.slice()
      : (t?.runtime ? [t.runtime] : []);
  } else return;

  const si = arr.indexOf(src);
  const ti = arr.indexOf(target);
  if (si < 0 || ti < 0) return;
  const oldOrder = arr.join(' → ');
  arr.splice(si, 1);
  const newTi = arr.indexOf(target);
  arr.splice(newTi, 0, src);
  const newOrder = arr.join(' → ');
  if (oldOrder === newOrder) return;

  // confirm 讲规则
  const isHost = kind.endsWith('hosts');
  const scopeLabel = kind.startsWith('agent-') ? `agent.${isHost ? 'hosts' : 'runtimes'}` : `task.${isHost ? 'hosts' : 'runtimes'}`;
  const rules = [
    `新顺序: ${newOrder}`,
    `第一位 (${arr[0]}) = 主，后面按顺序作为 fallback`,
    isHost ? 'tick.sh 会按这个顺序探测 host 可用性' : 'adapter.sh 会按这个顺序试 runtime，前者挂了切下一个',
  ];
  if (!confirmChange(`调整 ${scopeLabel} 顺序`, ...rules)) {
    // 取消 → UI 需要 reload 恢复（拖拽已经在 DOM 上动过了）
    if (taskId) loadTaskDetail(taskId); else loadTeamAgentDetail(agentId);
    return;
  }

  const patch = { agents: {} };
  patch.agents[agentId] = {};
  if (kind === 'agent-hosts') patch.agents[agentId].hosts = arr;
  else if (kind === 'agent-runtimes') patch.agents[agentId].runtimes = arr;
  else if (kind === 'task-hosts') {
    await api('POST', '/pios/task/update', {
      taskId,
      updates: arr.length === 1 ? { host: arr[0], hosts: null } : { hosts: arr, host: null },
    });
    loadTaskDetail(taskId);
    return;
  } else if (kind === 'task-runtimes') {
    await api('POST', '/pios/task/update', { taskId, updates: { runtimes: arr } });
    loadTaskDetail(taskId);
    return;
  }
  await api('POST', '/pios/manifest', patch);
  if (taskId) loadTaskDetail(taskId);
  else loadTeamAgentDetail(agentId);
}

// Task 级 runtimes 多选编辑
async function toggleTaskRuntime(agentId, taskId, runtime, add, opts = {}) {
  const manifest = await api('GET', '/pios/manifest');
  const agent = manifest.agents[agentId];
  if (!agent) return;
  const declaredRt = Array.isArray(agent.runtimes) ? agent.runtimes : (agent.runtime ? [agent.runtime] : []);
  const task = agent.tasks?.[taskId];
  if (!task) return;

  if (add && !declaredRt.includes(runtime)) {
    piToast(`${runtime} 未在 agent.runtimes 声明（先去 Team 里 agent 声明）`, 'error', 2500);
    return;
  }
  let current = Array.isArray(task.runtimes) ? task.runtimes.slice()
    : Array.isArray(task.engines) ? task.engines.slice()
    : (task.runtime ? [task.runtime] : []);
  const wasInherited = current.length === 0;
  if (add && !current.includes(runtime)) current.push(runtime);
  if (!add) current = current.filter(r => r !== runtime);

  if (!opts.skipConfirm && add) {
    const rules = [];
    if (wasInherited) {
      rules.push(`task.runtimes 从"继承 agent.runtimes 全链"固化为显式 [${current.join(', ')}]`);
    } else {
      rules.push(`task 新 runtime 列表: ${current.join(' → ')}`);
      if (current.length > 1) rules.push(`第一位 (${current[0]}) = 主，挂了按顺序切 fallback`);
    }
    const bw = runtimeBypassWarning(runtime, agent, task);
    if (bw) rules.push(`⚠ ${bw}`);
    if (!confirmChange(`添加 ${runtime} 到 task.runtimes`, ...rules)) return;
  }

  if (current.length === 0) {
    await api('POST', '/pios/task/update', { taskId, updates: { runtimes: null, engines: null, runtime: null } });
  } else {
    await api('POST', '/pios/task/update', { taskId, updates: { runtimes: current } });
  }
  loadTaskDetail(taskId);
}

function runAuthCommand(cmd) {

// 真实 SSH 探活 —— 对指定远程 host 跑 `claude auth status`，把结果写回
// Pi/Log/auth-status-<host>.json。调用链：
//   UI 按钮 → POST /pios/auth-refresh {engine, host}
//   → main.js 发现 host 有 ssh 且不是本机 → spawn ssh → parse loggedIn → 写文件
//   → UI 重载 Resources tab 读新文件
// 注意：host 缺省 = 本机 auth-manager.sh check（保留给 codex-cli 之类的）
async function refreshAuth(engine, btn, host) {
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = '探活中…';
  try {
    const payload = { engine };
    if (host) payload.host = host;
    const res = await api('POST', '/pios/auth-refresh', payload);
    if (res && res.ok) {
      btn.textContent = '✓ logged in';
      btn.style.borderColor = '#4a9eff';
      btn.style.color = '#4a9eff';
    } else {
      btn.textContent = '✗ ' + (res && res.detail ? res.detail.slice(0, 20) : 'down');
      btn.style.borderColor = '#ff8c42';
      btn.style.color = '#ff8c42';
    }
  } catch (e) {
    btn.textContent = '✗ 错误';
    btn.style.borderColor = '#ff8c42';
    btn.style.color = '#ff8c42';
  }
  // 1.5s 后重载 Resources tab 拿新状态
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = orig;
    btn.style.borderColor = '#4a9eff';
    btn.style.color = '#4a9eff';
    if (typeof loadResourcesTab === 'function') loadResourcesTab();
  }, 1500);
}

        status.textContent = msg;
        status.style.color = (resp.scp_ok || resp.remote == null) ? '#3fb950' : '#d29922';
        applyBtn.textContent = '完成';
        applyBtn.style.background = '#238636';
        applyBtn.style.borderColor = '#238636';
        setTimeout(() => modal.remove(), (resp.scp_ok || resp.remote == null) ? 1800 : 4000);
      } else {

        status.style.color = '#f85149';
        applyBtn.disabled = false;
        applyBtn.style.opacity = '1';
        applyBtn.style.cursor = 'pointer';
      }
    } catch (err) {
      status.textContent = '请求失败：' + (err && err.message ? err.message : String(err));
      status.style.color = '#f85149';
      applyBtn.disabled = false;
      applyBtn.style.opacity = '1';
      applyBtn.style.cursor = 'pointer';
    }
  });
}
