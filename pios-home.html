async function loadTaskDetail(taskId) {
  const inner = document.getElementById('tdetail-inner-' + taskId);
  if (!inner) return;
  inner.innerHTML = '<div style="color:#555;font-size:11px;">Loading...</div>';

  let task, runs, log;
  try {
    [task, runs, log] = await Promise.all([
      api('GET', `/pios/task?id=${taskId}`),
      api('GET', `/pios/task-runs?id=${taskId}&limit=5`),
      api('GET', `/pios/agent-log?id=${taskId}&lines=30`),
    ]);
  } catch (e) {
    inner.innerHTML = `<div style="color:#ff8c42;font-size:11px;">加载失败: ${e.message}</div>`;
    return;
  }

  if (!task) { inner.innerHTML = '<div style="color:#555">Task not found</div>'; return; }

  // Agents list for dropdown
  const agents = [...new Set(allTasks.map(t => t.agent).filter(a => a && a !== 'null'))].sort();

  // Parse engines array: [0]=primary, [1]=fallback
  const enginesArr = Array.isArray(task.engines) ? task.engines : [];
  const engines0 = enginesArr[0] || 'claude-cli';
  const engines1 = enginesArr[1] || '';

  let html = '';

  // ── Identity banner: 明确这个 task 属于哪个 agent ──
  const _primaryRt = (Array.isArray(task.runtimes) && task.runtimes[0])
    || (Array.isArray(task.engines) && task.engines[0])
    || task.runtime || task.engine || '?';
  html += `<div class="task-identity">
    <span class="id-label">Task</span><span class="id-value">${escHtml(taskId)}</span>
    <span class="id-sep">·</span>
    <span class="id-label">Agent</span><span class="id-value">${escHtml(task.agent || '?')}</span>
    <span class="id-sep">·</span>
    <span class="id-label">Primary Runtime</span><span class="id-value">${escHtml(_primaryRt)}</span>
  </div>`;

  // ── Runs section (most important, show first) ──
  html += `<div class="detail-section">
    <div class="detail-section-header">Recent Runs</div>`;
  if (runs.length === 0) {
    html += '<div style="color:#555;font-size:12px;padding:4px 0">No runs yet</div>';
  } else {
    // Zombie 检测：UI 端再兜一层——如果后端还没加 heartbeat 字段也能识别
    // 后端 _annotateRunIfZombie 已经把 status 改成 'zombie'，这里直接按 status 分类
    for (const r of runs) {
      const t = r.started_at ? new Date(r.started_at).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '—';
      const dur = r.started_at && r.finished_at ? Math.round((new Date(r.finished_at) - new Date(r.started_at)) / 1000) + 's' : r.status === 'running' ? '...' : '';
      const statusCls2 = r.status === 'success' ? 'status-ok'
        : r.status === 'degraded' ? 'status-degraded'
        : r.status === 'running' ? 'status-running'
        : r.status === 'zombie' ? 'status-zombie'
        : r.status === 'timeout' ? 'status-timeout'
        : (r.status === 'gate_skipped' || r.status === 'skipped') ? 'status-skipped'
        : 'status-failed';
      const isRunning = r.status === 'running';
      // 2026-04-23: "进入会话"永远可点（通过 runId 打开，不再依赖 session_id）
      // session_id 可能没提取到（adapter 还没跑完就卡住了），这种情况也让用户能进详情看 log
      const openBtn = r.run_id
        ? `<button class="card-action-btn" onclick="enterSession('${r.session_id || ''}','${taskId}','${r.runtime || 'claude-cli'}','${r.run_id}',${isRunning})">进入会话</button>`
        : '';
      const stopBtn = isRunning ? `<button class="card-action-btn" style="color:#ff8c42;border-color:#ff8c42" onclick="stopTask('${taskId}')">停止</button>` : '';
      // fallback chain tooltip
      const fallbackTip = r.fallback_from ? ` title="降级: ${r.fallback_from}→${r.runtime || '?'} · ${r.fallback_reason || '?'}"` : '';
      // trigger source 小字
      const triggerLabel = r.trigger_source && r.trigger_source !== 'cron' ? ` · ${r.trigger_source}` : '';
      // ⚠ 2026-04-29: zombie 不等于该 kill。看到 zombie 先看 PID 是否还活、最终是否自愈成 success/failed。
      // 用 data-pi-tooltip 替代 title 避免 macOS 原生 tooltip 1.5s 延迟（CSS 见本文件 .status-zombie 附近）。
      const statusTip = r.status === 'zombie' ? ' data-pi-tooltip="心跳停滞 90s+；多数会自动 finalize，不要手动 kill"' : '';
      html += `<div class="run-card"${fallbackTip}>
        <span class="run-time">${t}</span>
        <span class="run-status ${statusCls2}"${statusTip}>${r.status}</span>
        <span class="run-host">${escHtml(r.host || '—')}</span>
        <span class="run-meta">exit ${r.exit_code ?? '—'} · ${r.runtime || '—'}${dur ? ' · ' + dur : ''}${triggerLabel}</span>
        <span class="run-actions">${stopBtn}${openBtn}</span>
      </div>`;
    }
  }
  html += '</div>';

  if (task.kind === 'infra') {
    const hostText = Array.isArray(task.hosts) && task.hosts.length ? task.hosts.join(' → ') : 'any';
    html += `<div class="detail-section">
      <div class="detail-section-header">Infra Task</div>
      <div style="display:grid;grid-template-columns:120px 1fr;gap:6px 12px;font-size:12px;color:#8b949e;padding-top:4px">
        <div>Script</div><div><code>${escHtml(task.script || '—')}</code></div>
        <div>Cron</div><div>${escHtml(task.cron || '—')} <span style="color:#555">${escHtml(formatSchedule(task.cron) || '')}</span></div>
        <div>Host</div><div>${escHtml(hostText)}</div>
        <div>Runtime</div><div>local</div>
        <div>Enabled</div><div>${task.enabled ? 'true' : 'false'}</div>
      </div>
    </div>`;
    inner.innerHTML = html;
    return;
  }

  // ── Prompt section（移到最上面——owner 要求 2026-04-18）──
  const promptRaw = task.prompt || '';
  html += `<div class="detail-section">
    <div class="detail-section-header" onclick="toggleDetailSection(this)">
      <span class="chevron">▶</span><span>Prompt</span>
      <button class="save-btn secondary" style="margin-left:auto" onclick="event.stopPropagation();saveTaskPrompt('${taskId}')">Save Prompt</button>
    </div>
    <div class="detail-section-body collapsed">
      <textarea class="task-prompt-area" id="tc-prompt-${taskId}">${escHtml(promptRaw)}</textarea>
      <div id="tp-msg-${taskId}"></div>
    </div>
  </div>`;

  // ── Configuration（全实时写入，无 Save 按钮、无 Summary chip、无 Agent）──
  const hostRtMap = await getHostRuntimeMap();

  // 从 manifest 拿对应 agent 的 hosts/runtimes/capabilities 声明
  const _manifestForTask = await api('GET', '/pios/manifest').catch(() => ({ agents: {} }));
  const agentObj = _manifestForTask.agents?.[task.agent] || {};
  const agentHosts = Array.isArray(agentObj.hosts) ? agentObj.hosts : (agentObj.host ? [agentObj.host] : []);
  const agentRts = Array.isArray(agentObj.runtimes) ? agentObj.runtimes : (agentObj.runtime ? [agentObj.runtime] : []);
  const agentCaps = agentObj.capabilities || {};
  const agentAllowedTools = Array.isArray(agentCaps.allowed_tools) ? agentCaps.allowed_tools : [];
  const agentPermission = agentCaps.permission || 'default';

  // Task 显式字段 vs 继承
  const rawTaskForDetail = agentObj.tasks?.[taskId] || {};
  const taskHostsExplicit = Array.isArray(rawTaskForDetail.hosts) && rawTaskForDetail.hosts.length
    ? rawTaskForDetail.hosts
    : (rawTaskForDetail.host ? [rawTaskForDetail.host] : []);
  const taskHostsEff = taskHostsExplicit.length ? taskHostsExplicit : agentHosts.slice(0, 1);
  const taskHostInherited = taskHostsExplicit.length === 0;

  const taskRtExplicit = Array.isArray(rawTaskForDetail.runtimes) && rawTaskForDetail.runtimes.length
    ? rawTaskForDetail.runtimes
    : (Array.isArray(rawTaskForDetail.engines) && rawTaskForDetail.engines.length
      ? rawTaskForDetail.engines
      : (rawTaskForDetail.runtime ? [rawTaskForDetail.runtime] : []));
  const taskRtEff = taskRtExplicit.length ? taskRtExplicit : agentRts;
  const taskRtInherited = taskRtExplicit.length === 0;

  const taskToolsExplicit = rawTaskForDetail.allowed_tools || '';
  const taskToolsEff = taskToolsExplicit || agentAllowedTools.join(',');
  const taskToolsInherited = !taskToolsExplicit;

  const taskPermExplicit = rawTaskForDetail.permission_mode || '';
  const taskPermEff = taskPermExplicit || agentPermission;
  const taskPermInherited = !taskPermExplicit;

  // ── Chip 渲染 helper（继承 vs 显式的视觉语言）──
  // 继承态：虚线 + "继承·<值>" 中文；点击 chip 固化为显式（弹 confirm 讲规则）
  // 显式态：实线 + draggable 拖拽排序；× 删；codex-cli 永远橙框（不在文本前加告警符号）
  const renderChip = (value, opts) => {
    const { kind, agentId, taskId, idx, inherited, illegal } = opts;
    const risk = kind.endsWith('runtimes') ? runtimeRiskInfo(value, agentObj, rawTaskForDetail) : { risky: false, title: '' };
    let chipCls = 'host-chip';
    if (inherited) chipCls += ' inherited';
    else if (illegal) chipCls += ' illegal';
    else if (risk.risky) chipCls += ' bypass';

    // 文字前缀：继承 "继承·" / 非主位 "▸"
    let displayText;
    if (inherited) {
      displayText = `继承·${value}`;
    } else {
      const prefix = [];
      if (idx > 0) prefix.push('▸');
      displayText = (prefix.length ? prefix.join(' ') + ' ' : '') + value;
    }

    const title = illegal ? `${value} 未在 agent 声明`
      : inherited ? `继承自 agent（点击可固化为显式，之后可拖排序/删除）`
      : risk.risky ? `${risk.title}${idx === 0 ? '·主' : '·备'}`
      : (idx === 0 ? '主·优先尝试' : `备选 ${idx}·前者挂了切这个`);

    // 继承 chip 的 onclick（固化为显式，带 confirm 说明规则）
    const inheritedOnclick = inherited
      ? `onclick="event.stopPropagation();confirmInheritExplicit('${agentId}','${taskId}','${kind}','${value}')" style="cursor:pointer"`
      : '';
    const dragAttrs = inherited ? '' : `draggable="true"
      ondragstart="onChipDragStart(event,'${kind}','${agentId}','${taskId}','${value}')"
      ondragend="onChipDragEnd(event)"
      ondragover="onChipDragOver(event,'${kind}','${agentId}','${taskId}')"
      ondrop="onChipDrop(event,'${kind}','${agentId}','${taskId}','${value}')"`;
    const xBtn = inherited ? '' : `<button class="host-chip-x" onclick="event.stopPropagation();removeTaskChip('${agentId}','${taskId}','${kind}','${value}')" title="从 task.${kind.replace('task-','')} 移除">×</button>`;
    return `<span class="${chipCls}" title="${title}" ${inheritedOnclick} ${dragAttrs}>${escHtml(displayText)}${xBtn}</span>`;
  };

  // Hosts 渲染
  const hostChipsHtml = taskHostsEff.map((h, idx) => renderChip(h, {
    kind: 'task-hosts', agentId: task.agent, taskId, idx,
    inherited: taskHostInherited,
    illegal: agentHosts.length && !agentHosts.includes(h),
  })).join('');
  // "+ 添加 host" 下拉始终显示：候选 = agent.hosts - taskHostsEff 里的显式
  // 继承态时 taskHostsEff=[agent.hosts[0]]，候选 = agent.hosts 去掉 [0]
  // —— 但用户可能想把继承的 [0] 显式固化，应点继承 chip 做；这里只列"新增"候选
  const hostCandsForTask = agentHosts.filter(h => !taskHostsEff.includes(h));
  const addTaskHostHtml = agentHosts.length
    ? `<select class="host-add" onchange="if(this.value){toggleTaskHost('${task.agent}','${taskId}',this.value,true);this.value=''}">

        ${hostCandsForTask.map(h => {
          const hostRts = hostRtMap[h];
          if (hostRts === undefined) return `<option value="${h}">${h} (runtime 状态未知)</option>`;
          const compat = agentRts.length ? agentRts.filter(r => hostRts.includes(r)) : hostRts;
          const disabled = agentRts.length > 0 && compat.length === 0;
          const lbl = hostRts.length ? `${h} (${hostRts.join(',')})` : `${h} (无 runtime 装过)`;
          return `<option value="${h}" ${disabled ? 'disabled' : ''}>${lbl}${disabled ? ' ⚠' : ''}</option>`;

  const rtChipsHtml = taskRtEff.map((r, idx) => renderChip(r, {
    kind: 'task-runtimes', agentId: task.agent, taskId, idx,
    inherited: taskRtInherited,
    illegal: agentRts.length && !agentRts.includes(r),

    ? `<select class="host-add" onchange="if(this.value){toggleTaskRuntime('${task.agent}','${taskId}',this.value,true);this.value=''}">

          const supportingHosts = taskHostsEff.filter(h => {
            const hrts = hostRtMap[h]; return hrts === undefined || hrts.includes(r);

          const knownHosts = taskHostsEff.filter(h => hostRtMap[h] !== undefined);
          const disabled = knownHosts.length > 0 && knownHosts.every(h => !hostRtMap[h].includes(r));
          const lbl = supportingHosts.length ? `${r} (${supportingHosts.join(',')})` : r;

    onfocus="this.dataset.original=this.value"

  const toolsTagHtml = taskToolsInherited
    ? `<span style="font-size:10px;color:#6f7685">继承·agent.capabilities.allowed_tools（改值自动固化为 task override）</span>`

  html += `<div class="detail-section">
    <div class="detail-section-header" onclick="toggleDetailSection(this)">
      <span class="chevron">▶</span><span>Configuration</span>
    </div>
    <div class="detail-section-body collapsed">

        </div>
        <div class="cap-group">

            <span class="cap-field-label">Hosts</span>

          </div>
          <div class="cap-field">
            <span class="cap-field-label">Runtimes</span>
            <div class="cap-field-val">
              <div class="host-chip-row">${rtChipsHtml}${addTaskRtHtml}</div>
            </div>
          </div>
        </div>
        <div class="cap-group">
          <div class="cap-group-title">Path Permissions <span class="group-subtitle">· 路径/规则级 · 继承自 <code>agent.configs</code>（只读预览；到 Team Tab 编辑 agent 层面）</span></div>
          ${renderRuntimeTabsContent(task.agent, taskRtEff, agentObj.configs || {}, {readonly: true})}
        </div>
        ${taskRtEff.includes('claude-cli') ? (() => {
          const tCfg = (rawTaskForDetail.configs || {})['claude-cli'] || {};

          const empty = tAllow.length === 0;
          return `<div class="cap-group">
            <div class="cap-group-title">Task Path Override <span class="group-subtitle">· 仅此 task 生效 · <code>task.configs.claude-cli.permissions.allow</code> · adapter 运行时合并到 agent 规则</span></div>
            ${renderPathRulesTable(task.agent, 'claude-cli', 'permissions.allow', tPaths, {taskId, readonly: false})}
            ${tTools.length ? `<div class="field-flag-hint">非路径规则：${tTools.map(t => `<code>${escHtml(t)}</code>`).join(' · ')}（task override 下 tool-only 规则请手写 YAML）</div>` : ''}
            ${empty ? '<div class="field-flag-hint">此 task 尚无 override。加路径会写到 <code>task.configs.claude-cli.permissions.allow</code>；adapter 运行时自动 deep_merge 到 agent 规则（list concat + 去重）。</div>' : ''}
          </div>`;
        })() : ''}
        <div class="cap-group rt-conditional-block ${taskRtEff[0] !== 'claude-cli' ? 'disabled' : ''}">

          ${taskRtEff[0] !== 'claude-cli'
            ? `<div class="rt-conditional-warn">⚠ 主 runtime = <b>${escHtml(taskRtEff[0] || '未声明')}</b> · 此 block 仅影响 claude-cli 的 <code>--allowedTools</code>/<code>--permission-mode</code>，对 codex-cli/openclaw 无效</div>`
            : ''}
          <div class="cap-field">
            <span class="cap-field-label">Allowed</span>
            <div class="cap-field-val" style="flex-direction:column;align-items:stretch;gap:3px">
              <div style="display:flex;gap:6px;align-items:center">${toolsInputHtml}${!taskToolsInherited ? toolsTagHtml : ''}</div>
              ${taskToolsInherited ? toolsTagHtml : ''}
            </div>
          </div>
          <div class="field-flag-hint"><code>--allowedTools "Read,Write,Edit,Bash,..."</code> · <b>-p 非交互下是硬白名单</b>，没列进来的工具 claude 直接 deny</div>
          <div class="cap-field">
            <span class="cap-field-label">Permission</span>
            <div class="cap-field-val" style="flex-direction:column;align-items:stretch;gap:3px">
              <div style="display:flex;gap:6px;align-items:center">${permSelectHtml}${!taskPermInherited ? permTagHtml : ''}</div>

        </div>
        <div class="cap-group">
          <div class="cap-group-title">Budget <span class="group-subtitle">· <code>task.budget</code> · 两个作用：模型选择 + 日花费墙</span></div>
          <div class="cap-field">

          </div>
          <div class="field-flag-hint">

            <b>(B)</b> 日花费墙：超限 <b>暂停执行</b> + 通知 owner（所有 runtime 都算）
          </div>
        </div>
      </div>
    </div>

  // ── Today's Log → 跳到 Operation/Activity 按 task 过滤（替代内嵌 log viewer）──
  const logLines = log.lines || [];
  if (logLines.length > 0) {
    html += `<div class="detail-section" style="padding-bottom:8px">

  inner.innerHTML = html;

async function saveTaskConfig(taskId) {
  // 2026-04-18: hosts / runtimes 改成 chip 实时写入（toggleTaskHost/toggleTaskRuntime），
  // 这里只保存 cron / agent / permission / budget / tools 这几个文本/下拉字段。
  syncTaskConfigCapabilities(taskId);
  const updates = {
    cron: document.getElementById(`tc-${taskId}-cron`)?.value,
    agent: document.getElementById(`tc-${taskId}-agent`)?.value,
    permission_mode: document.getElementById(`tc-${taskId}-perm`)?.value,
    allowed_tools: document.getElementById(`tc-${taskId}-tools`)?.value,
    budget: document.getElementById(`tc-${taskId}-budget`)?.value,
  };
  const r = await api('POST', '/pios/task/update', { taskId, updates });
  const msg = document.getElementById('tc-msg-' + taskId);
  if (msg) { msg.innerHTML = `<span class="save-msg">${r.ok ? 'Saved!' : 'Error: ' + r.error}</span>`; setTimeout(() => msg.innerHTML = '', 2000); }
}

async function saveTaskPrompt(taskId) {
  const prompt = document.getElementById('tc-prompt-' + taskId)?.value || '';
  const r = await api('POST', '/pios/task/update-prompt', { taskId, prompt });
  const msg = document.getElementById('tp-msg-' + taskId);
  if (msg) { msg.innerHTML = `<span class="save-msg">${r.ok ? 'Saved!' : 'Error: ' + r.error}</span>`; setTimeout(() => msg.innerHTML = '', 2000); }
}

async function deleteTask(taskId) {
  if (!(await piConfirm('Disable and archive task: ' + taskId + '?'))) return;
  await api('POST', '/pios/task/delete', { taskId });
  loadTasksTab();
}

// Team Tab 里 agent 详情的 task 行 × 按钮用：删完刷新 agent 详情（而非切到 task tab）
async function deleteTaskInline(agentId, taskId) {
  if (!(await piConfirm(`删除 task "${taskId}"？\n\n会从 pios.yaml 移除声明 + 归档 prompt 文件。\n不可撤销（需 git restore）。`))) return;
  const r = await api('POST', '/pios/task/delete', { taskId });
  if (r && r.ok === false) {
    piToast(`删除失败: ${r.error || 'unknown'}`, 'error', 2000);
    return;
  }
  piToast(`已删除 ${taskId}`, 'info', 1500);
  loadTeamAgentDetail(agentId);
}

async function stopTask(taskId) {
  if (!(await piConfirm('停止正在运行的 ' + taskId + '？'))) return;
  const r = await api('POST', '/pios/task/stop', { taskId });
  if (r.ok) {
    setTimeout(() => loadTaskDetail(taskId), 1500); // 等 trap 处理完再刷新
  } else {
    piAlert('停止失败: ' + (r.error || ''));
  }
}

let liveSessionTimer = null;

async function enterSession(sessionId, taskId, runtime, runId, isRunning) {
  // 停掉之前的 live timer
  if (liveSessionTimer) { clearInterval(liveSessionTimer); liveSessionTimer = null; }

  // 加载到 sidebar（Electron 路径，pios-home 在 PiBrowser 内打开时拉右栏）
  const r = await api('POST', '/pios/open-session', { sessionId, taskId, runtime, runId });
  if (!r.ok) { piAlert('打开会话失败: ' + (r.error || '')); return; }

  // sidebar 的 live refresh 由 app.js 自行处理，这里不再轮询
  // 避免反复调 /pios/open-session 导致 mainWindow.focus() 抢焦点

  // Chrome 扩展路径：通知 pi-local-server 同步 activeId + materialize（若尚未）。
  // 失败静默 —— 扩展 server 没跑就等于今天的体验，不影响 PiBrowser。
  // side panel 已开则通过 /sessions/stream SSE 立刻切过去；未开时 owner 按
  // Cmd+Shift+P 打开后，读当前 activeId 进入这个会话。
  fetch('http://127.0.0.1:7787/task/open-session', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ sessionId, taskId, runtime, runId }),
  }).catch(() => {});
}

async function createTask() {
  const taskId = document.getElementById('new-taskId')?.value?.trim();
  if (!taskId) { piAlert('Task ID required'); return; }
  syncCreateTaskCapabilities();
  const newHostsRaw = (document.getElementById('new-hosts')?.value || '').trim();
  const newPrimary = document.getElementById('new-engine')?.value || 'claude-cli';
  const newFallback = document.getElementById('new-fallback')?.value || '';
  const newEngines = newFallback ? [newPrimary, newFallback] : [newPrimary];
  const r = await api('POST', '/pios/task/create', {
    taskId,
    description: document.getElementById('new-desc')?.value || '',
    cron: buildCronFromUI('__create__') || '0 9 * * *',
    agent: document.getElementById('new-agent')?.value || 'pi',
    permission_mode: document.getElementById('new-perm')?.value || 'default',
    allowed_tools: document.getElementById('new-tools')?.value || '',
    budget: document.getElementById('new-budget')?.value || 'medium',
    hosts: newHostsRaw ? newHostsRaw.split(',').map(h => h.trim()).filter(Boolean) : [],
    engines: newEngines,
    prompt: document.getElementById('new-prompt')?.value || '',
  });
  const msg = document.getElementById('create-msg');
  if (r.ok) {
    showCreateForm = false;
    loadTasksTab(taskId);
  } else {
    if (msg) msg.innerHTML = `<span style="color:#ff8c42;font-size:11px;">${r.error}</span>`;
  }
}

function normalizeBoardFolder(card, fallbackFolder) {
  const status = String(card?.status || '').toLowerCase();
  const folder = card?.folder || fallbackFolder;
  // Only hide zombie inbox rows that are already terminal in frontmatter.
  // Do not re-bucket active/archive cards into inbox based on stale status fields.
  if (folder === 'inbox' && ['archive', 'done', 'dismissed'].includes(status)) return 'archive';
  return folder;
}

// The queue sidebar collapse and the cards/outputs sidebar collapse share one

  reviewListCollapsed = !!v;

  try { localStorage.setItem('pios-review-list-collapsed', reviewListCollapsed ? '1' : '0'); } catch {}
  try { localStorage.setItem('pios-outputs-list-collapsed', reviewListCollapsed ? '1' : '0'); } catch {}
  renderBoardReview();
}

  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  const onMove = (ev) => {
    const dx = ev.clientX - startX;
    const w = Math.max(180, Math.min(640, startW + dx));
    reviewListWidth = w;
    if (listEl) listEl.style.width = w + 'px';
  };
  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    try { localStorage.setItem('pios-review-list-w', String(reviewListWidth)); } catch {}
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// refreshBoard — shared card-data reloader.
// The old Cards tab UI (Timeline/Stats/Graph) was removed 2026-04-17; cardsAll /
// outputsAll / ownerQueueAll remain the canonical in-memory stores consumed by
// Direction, Review, action handlers, and SSE. This function is still called
// from dozens of sites — keep it as a pure data loader (no DOM writes).
async function _loadCardsData() {
  if (cardsAll.length || cardsLoading) return;
  cardsLoading = true;
  try {
    const [inbox, active, archive, outs, ownerQueue] = await Promise.all([
      api('GET', '/pios/cards?status=inbox'),
      api('GET', '/pios/cards?status=active'),
      api('GET', '/pios/cards?status=archive'),
      api('GET', '/pios/outputs').catch(() => []),
      api('GET', '/pios/owner-queue?include=outputs,inbox').catch(() => []),
    ]);
    const tag = (list, folder) => (list || []).map(c => ({
      ...c,
      folder: normalizeBoardFolder(c, folder),
      mtime: c.mtime || (c.created ? Math.floor(new Date(c.created).getTime() / 1000) : 0),
    }));
    cardsAll = [...tag(inbox, 'inbox'), ...tag(active, 'active'), ...tag(archive, 'archive')];
    outputsAll = outs || [];
    ownerQueueAll = Array.isArray(ownerQueue) ? ownerQueue : [];
  } catch (e) {
    console.error('[cards] load error', e);
  } finally {
    cardsLoading = false;
  }
}

async function refreshBoard() {
  cardsAll = [];
  outputsAll = [];
  ownerQueueAll = [];
  for (const k of Object.keys(_cardContentCache)) delete _cardContentCache[k];
  await _loadCardsData();
}

function boardMatchesSearch(c) {
  if (!boardSearch.trim()) return true;
  const q = boardSearch.trim().toLowerCase();
  return (c.title || '').toLowerCase().includes(q) ||
         (c.filename || '').toLowerCase().includes(q) ||
         (c.parent || '').toLowerCase().includes(q) ||
         String(c.blocked_on || '').toLowerCase().includes(q);
}

function cardPriorityInt(c) { return parseInt(c.priority) || 9; }

function cardBadge(c) {
  const p = cardPriorityInt(c);
  const colors = { 1: '#f85149', 2: '#ff8c42', 3: '#d29922', 4: '#4a9eff', 5: '#888' };
  const bg = colors[p] || '#555';
  return `<span style="background:${bg};color:#fff;padding:0 5px;border-radius:3px;font-size:10px;font-weight:600">P${p}</span>`;
}

// Lightweight relative-time formatter for card mtime (unix seconds).
function cardRelativeTime(c) {
  const m = c.mtime || 0;
  if (!m) return '';
  const now = Math.floor(Date.now() / 1000);
  const d = now - m;
  if (d < 3600) return Math.max(1, Math.round(d / 60)) + 'm';
  if (d < 86400) return Math.round(d / 3600) + 'h';
  if (d < 86400 * 7) return Math.round(d / 86400) + 'd';
  if (d < 86400 * 30) return Math.round(d / (86400 * 7)) + 'w';
  return Math.round(d / (86400 * 30)) + 'mo';
}

// Count child tasks + their completion, for project cards. Returns {total, done} or null.
function cardSubtaskStats(c) {
  if (c.type !== 'project') return null;
  const kids = (cardsAll || []).filter(k => k.parent === c.filename);
  if (!kids.length) return null;
  const done = kids.filter(k => k.folder === 'archive' || k.status === 'done').length;
  return { total: kids.length, done };
}

// Count related outputs for a card (unread first).
function cardOutputStats(c) {
  const related = (outputsAll || []).filter(o =>
    o.relatedCard === c.filename || o.project === c.filename || o.track === c.filename
  );
  if (!related.length) return null;
  const unread = related.filter(o => !o.read).length;
  return { total: related.length, unread };
}

// ── Card Context Menu ────────────────────────────────
function showCardContextMenu(e, filename) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.pi-ctx-menu').forEach(m => m.remove());
  const card = (cardsAll || []).find(c => c.filename === filename);

  const menu = document.createElement('div');
  menu.className = 'pi-ctx-menu';

  const item = (icon, label, fn, danger) => {
    const el = document.createElement('div');
    el.className = 'pi-ctx-item';
    if (danger) el.style.color = 'var(--p1)';
    el.innerHTML = `<span style="width:16px;text-align:center">${icon}</span><span>${escHtml(label)}</span>`;
    el.onmousedown = (ev) => { ev.preventDefault(); };
    el.onclick = () => { menu.remove(); fn(); };
    return el;
  };
  const sep = () => { const s = document.createElement('div'); s.className = 'pi-ctx-sep'; return s; };
  const ctxLabel = (text) => { const l = document.createElement('div'); l.className = 'pi-ctx-label'; l.textContent = text; return l; };

  menu.appendChild(ctxLabel(filename));
  menu.appendChild(item('👁', '打开详情', () => openCardDetail(filename)));
  if (card && card.status === 'in_review') {
    menu.appendChild(item('✓', '通过验收', () => boardApproveReview(filename)));
  }
  menu.appendChild(sep());
  menu.appendChild(ctxLabel('优先级'));
  for (const p of [1, 2, 3, 4, 5]) {
    const isCurrent = card && String(card.priority) === String(p);
    menu.appendChild(item(isCurrent ? '●' : '○', `P${p}`, () => cardChangePriority(filename, p)));
  }
  menu.appendChild(sep());
  menu.appendChild(item('⏸', '等待 3 天', async () => {
    const t = new Date(); t.setDate(t.getDate() + 3);
    const until = t.toISOString().slice(0, 10);
    await api('POST', '/pios/defer-card', { filename, until });
    await refreshBoard();
    piToast(`已推迟到 ${until}`, 'info', 2500);
  }));
  menu.appendChild(item('⏸', '等待 7 天', async () => {
    const t = new Date(); t.setDate(t.getDate() + 7);
    const until = t.toISOString().slice(0, 10);
    await api('POST', '/pios/defer-card', { filename, until });
    await refreshBoard();
    piToast(`已推迟到 ${until}`, 'info', 2500);
  }));
  menu.appendChild(sep());
  menu.appendChild(item('📦', '归档', () => boardArchive(filename), true));
  menu.appendChild(sep());
  menu.appendChild(item('📋', '复制文件名', () => {
    navigator.clipboard.writeText(filename).then(() => piToast('已复制: ' + filename, 'info', 2000));
  }));

  document.body.appendChild(menu);
  const mx = Math.min(e.clientX, window.innerWidth - menu.offsetWidth - 8);
  const my = Math.min(e.clientY, window.innerHeight - menu.offsetHeight - 8);
  menu.style.left = mx + 'px';
  menu.style.top = my + 'px';

  const close = (ev) => { if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('mousedown', close); } };
  setTimeout(() => document.addEventListener('mousedown', close), 0);
}

function renderCardRow(c, opts = {}) {
  const blockedChip = c.blocked_on ? `<span style="color:#d29922;font-size:10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(String(c.blocked_on))}">${escHtml(c.blocked_on)}</span>` : '';
  const typeChip = c.type === 'project' ? '<span style="font-size:9px;color:#8957e5;border:1px solid #8957e5;padding:0 4px;border-radius:3px">proj</span>' : '';
  const staleChip = opts.stale ? `<span style="color:#484f58;font-size:10px">${opts.stale}</span>` : '';

  // Subtask progress (projects only)
  const sub = cardSubtaskStats(c);
  const subChip = sub ? `<span style="font-size:10px;color:${sub.done === sub.total ? '#3fb950' : '#8b949e'};background:rgba(255,255,255,0.04);padding:1px 5px;border-radius:3px" title="${sub.done}/${sub.total} 子任务完成">${sub.done}/${sub.total}</span>` : '';

  // Related outputs (unread highlighted)
  const outs = cardOutputStats(c);
  const outChip = outs ? `<span style="font-size:10px;color:${outs.unread ? '#4a9eff' : '#484f58'}" title="${outs.total} 产出${outs.unread ? '，' + outs.unread + ' 未读' : ''}">📄${outs.unread ? ' <b>' + outs.unread + '</b>/' + outs.total : ' ' + outs.total}</span>` : '';

  // Energy indicator (if > 0)
  const energy = parseFloat(c.energy) || 0;
  const energyChip = energy > 0 ? `<span style="display:inline-block;width:24px;height:3px;background:#21262d;border-radius:2px;overflow:hidden" title="energy ${energy.toFixed(1)}"><span style="display:block;width:${Math.min(100, energy * 100)}%;height:100%;background:${energy < 0.3 ? '#d29922' : energy < 0.7 ? '#3fb950' : '#58a6ff'}"></span></span>` : '';

  // Relative mtime (only show if opts.stale wasn't provided)
  const mtimeChip = (!opts.stale && c.mtime) ? `<span style="font-size:10px;color:#484f58" title="last update">${cardRelativeTime(c)}</span>` : '';

  return `<div class="board-card-row" onclick="openCardDetail('${escHtml(c.filename)}')"
    oncontextmenu="showCardContextMenu(event,'${escHtml(c.filename)}')"
    style="display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:4px;margin-bottom:1px;background:rgba(255,255,255,0.02)"
    onmouseover="this.style.background='rgba(255,255,255,0.05)'"
    onmouseout="this.style.background='rgba(255,255,255,0.02)'">
    ${cardBadge(c)}
    ${typeChip}
    <span style="font-size:12px;color:#c9d1d9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(c.title || c.filename)}</span>
    ${subChip}
    ${outChip}
    ${energyChip}
    ${c.parent ? `<span style="font-size:10px;color:#484f58;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(c.parent)}</span>` : ''}
    ${blockedChip}
    ${staleChip}
    ${mtimeChip}
  </div>`;
}

// ── Review view (sidebar + detail + action bar) ──
// Lazy-load caches: cardsAll only has _content preview (500 chars); outputs need full body too.
const _cardContentCache = {};
const _outputContentCache = {};   // output id → { content, frontmatter }

async function renderBoardReview() {
  const el = document.getElementById('review-body');
  if (!el) return;
  const queue = buildBoardReviewQueue();
  if (boardReviewIdx >= queue.length) boardReviewIdx = Math.max(0, queue.length - 1);

  // Filter pill counts (new protocol: alert/respond/act/check + legacy + reports)
  const alertCount = buildBoardReviewQueueByFilter('alert').length;
  const respondCount = buildBoardReviewQueueByFilter('respond').length;
  const actCount = buildBoardReviewQueueByFilter('act').length;
  const checkCount = buildBoardReviewQueueByFilter('check').length;
  const reportsCount = buildBoardReviewQueueByFilter('reports').length;
  const allCount = buildBoardReviewQueueByFilter('all').length;

  let pills = '<div style="display:flex;gap:4px;margin-bottom:10px;align-items:center;flex-wrap:wrap">';
  // Sidebar collapse toggle on the far left
  pills += `<button class="board-filter-btn" onclick="toggleReviewListCollapsed()" title="${reviewListCollapsed ? '展开列表' : '折叠列表'}">${reviewListCollapsed ? '▸' : '◂'}</button>`;
  if (alertCount) pills += `<button class="board-filter-btn${boardReviewFilter==='alert'?' active':''}" onclick="setBoardReviewFilter('alert')" style="${boardReviewFilter!=='alert'?'border-color:rgba(255,140,66,0.4);color:#ff8c42':''}">⚠ 紧急 (${alertCount})</button>`;
  pills += `<button class="board-filter-btn${boardReviewFilter==='respond'?' active':''}" onclick="setBoardReviewFilter('respond')">💬 回复 (${respondCount})</button>`;
  pills += `<button class="board-filter-btn${boardReviewFilter==='act'?' active':''}" onclick="setBoardReviewFilter('act')">✋ 操作 (${actCount})</button>`;
  pills += `<button class="board-filter-btn${boardReviewFilter==='check'?' active':''}" onclick="setBoardReviewFilter('check')">✓ 验收 (${checkCount})</button>`;
  if (reportsCount) pills += `<button class="board-filter-btn${boardReviewFilter==='reports'?' active':''}" onclick="setBoardReviewFilter('reports')">📄 待读 (${reportsCount})</button>`;
  pills += `<button class="board-filter-btn${boardReviewFilter==='all'?' active':''}" onclick="setBoardReviewFilter('all')">全部 (${allCount})</button>`;
  pills += `<span style="margin-left:auto;font-size:11px;color:#484f58">${queue.length ? (boardReviewIdx + 1) + ' / ' + queue.length : '0'}</span>`;
  pills += '</div>';

  if (!queue.length) {
    el.innerHTML = pills + '<div class="no-decisions" style="padding:40px;text-align:center;color:#484f58">Nothing to review.</div>';
    return;
  }

  const current = queue[boardReviewIdx];

  // Lazy-load full content for the current item
  if (current.kind === 'card' && current.filename && !_cardContentCache[current.filename]) {
    try {
      const full = await api('GET', '/pios/card?name=' + encodeURIComponent(current.filename));
      _cardContentCache[current.filename] = (full && full.content) || current._content || '';
    } catch { _cardContentCache[current.filename] = current._content || ''; }
  }
  if (current.kind === 'output' && current.id && !_outputContentCache[current.id]) {
    try {
      const doc = await api('GET', '/pios/output?id=' + encodeURIComponent(current.id));
      _outputContentCache[current.id] = doc || { content: '', frontmatter: {} };
    } catch { _outputContentCache[current.id] = { content: '', frontmatter: {} }; }
  }

  // ── Sidebar ──
  let sidebar = '';
  if (reviewListCollapsed) {
    // Collapsed rail
    sidebar = `<div id="review-list-pane" style="width:32px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:10px;background:rgba(255,255,255,0.015);max-height:calc(100vh - 240px)">
      <button onclick="toggleReviewListCollapsed()" title="展开列表" style="background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.3);color:#58a6ff;width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:13px;padding:0;line-height:1">▸</button>
      <div style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;color:#484f58;letter-spacing:1px">${queue.length} items</div>
    </div>`;
  } else {
    // Group by parent (project) — hierarchy
    const groups = {};
    queue.forEach((q, idx) => {
      const proj = q.parent || '(独立)';
      if (!groups[proj]) groups[proj] = [];
      groups[proj].push({ ...q, _idx: idx });
    });

    sidebar = `<div id="review-list-pane" style="width:${reviewListWidth}px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.08);padding-right:8px;max-height:calc(100vh - 240px);overflow-y:auto">`;

    for (const [proj, itemsInGroup] of Object.entries(groups)) {
      // Look up parent project metadata if it exists in cardsAll — lets us show
      // the project title in the sidebar header rather than just the filename slug.
      const parentCard = (cardsAll || []).find(c => c.filename === proj);
      const projLabel = parentCard ? (parentCard.title || proj) : proj;
      const cardCount = itemsInGroup.filter(x => x.kind === 'card').length;
      const outCount = itemsInGroup.filter(x => x.kind === 'output').length;
      const countHint = [cardCount ? cardCount + ' cards' : '', outCount ? outCount + ' reports' : ''].filter(Boolean).join(' · ');

      sidebar += `<div style="font-size:10px;text-transform:uppercase;color:#484f58;font-weight:600;padding:10px 4px 3px;display:flex;align-items:center;gap:6px">`;
      if (parentCard) {
        sidebar += `<span onclick="event.stopPropagation();openCardDetail('${escHtml(proj)}')" style="cursor:pointer;color:#8b949e;border-bottom:1px dotted #484f58" title="${escHtml(proj)}">📁 ${escHtml((projLabel||'').slice(0,28))}</span>`;
      } else {
        sidebar += `<span>📂 ${escHtml((projLabel||'').slice(0,28))}</span>`;
      }
      if (countHint) sidebar += `<span style="font-size:9px;color:#3a4150;font-weight:400;margin-left:auto">${countHint}</span>`;
      sidebar += `</div>`;

      itemsInGroup.forEach(q => {
        const active = q._idx === boardReviewIdx;
        let icon = '🟡';
        if (q.kind === 'output') icon = '📄';
        else if (q.queueType === 'alert') icon = '🔴';
        else if (q.queueType === 'respond') icon = '💬';
        else if (q.queueType === 'act') icon = '✋';
        else if (q.queueType === 'check') icon = '✅';
        else if (q.queueType === 'review') icon = '🔵';
        else if (q.queueType === 'followup') icon = '🟠';
        else if (q.queueType === 'action') icon = '⚡';
        const titleText = (q.title || q.filename || '').slice(0, 40);
        const meta = q.kind === 'output'
          ? (q.category || '')
          : (q.priority ? 'P' + q.priority : '');
        const metaChip = meta ? `<span style="font-size:9px;color:#484f58;margin-left:auto">${escHtml(meta)}</span>` : '';
        sidebar += `<div onclick="boardReviewIdx=${q._idx};renderBoardReview()" style="padding:5px 8px 5px 14px;cursor:pointer;font-size:11px;color:${active?'#58a6ff':'#c9d1d9'};background:${active?'rgba(74,158,255,0.1)':'transparent'};border-left:${active?'2px solid #58a6ff':'2px solid transparent'};border-radius:0 4px 4px 0;display:flex;align-items:center;gap:5px;margin-bottom:1px">
          <span style="font-size:10px;flex-shrink:0">${icon}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(titleText)}</span>
          ${metaChip}
        </div>`;
      });
    }
    sidebar += '</div>';
  }

  // Resize handle (hidden when collapsed)
  const dragHandle = reviewListCollapsed ? '' : `<div id="review-resize-handle"
    onmousedown="_startReviewListResize(event)"
    ondblclick="toggleReviewListCollapsed()"
    title="拖动调整宽度 · 双击折叠"
    style="width:5px;flex-shrink:0;cursor:col-resize;background:transparent;margin:0 2px;border-radius:3px;transition:background 0.15s"
    onmouseover="this.style.background='rgba(74,158,255,0.3)'"
    onmouseout="this.style.background='transparent'"></div>`;

  // ── Detail pane (polymorphic: card or output) ──
  const queueTypeColors = {
    alert: '#ff8c42', respond: '#4a9eff', act: '#ff8c42', check: '#4a9eff',
    decision: '#d29922', action: '#1f6feb', review: '#4a9eff', followup: '#ff8c42',
  };
  const reasonColors = { '需要决策': '#d29922', '需要操作': '#1f6feb', '需要澄清': '#8957e5', '等 Owner': '#ff8c42', '等 Owner': '#ff8c42', '需要验收': '#4a9eff', '跟进提醒': '#ff8c42', '待阅读': '#4a9eff' };
  const rc = queueTypeColors[current.queueType] || reasonColors[current.reason] || '#888';
  const isAlert = current.queueType === 'alert';
  const alertBg = isAlert ? 'background:rgba(255,140,66,0.06);border:1px solid rgba(255,140,66,0.3);border-radius:8px;' : '';
  let detail = `<div style="flex:1;min-width:0;padding:0 16px;max-height:calc(100vh - 240px);overflow-y:auto;${alertBg}">`;

  // Reason banner (applies to both kinds)
  detail += `<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;padding-top:${isAlert?'10px':'0'}">
    <span style="background:${rc};color:#fff;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase">${escHtml(current.reason || current.queueType || '')}</span>
    ${current.interaction_round > 1 ? `<span style="background:rgba(74,158,255,0.15);color:#58a6ff;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600">第 ${current.interaction_round} 轮</span>` : ''}

  const fullContent = current.kind === 'card'
    ? (_cardContentCache[current.filename] || current._content || '')
    : ((_outputContentCache[current.id] || {}).content || '');
  // Brief + related-output shortcuts only apply to cards. Outputs have their
  // own body below; rendering brief="intel" (leaked category) and a self-
  // referencing "附带报告" chip for outputs was just noise.
  if (current.kind === 'card') {
    const briefText = current.needs_owner_brief || current.brief;
    if (briefText) detail += `<div style="color:#e6edf3;font-size:14px;font-weight:500;margin-bottom:12px;padding:12px 14px;background:rgba(${isAlert?'255,140,66':'74,158,255'},0.08);border-left:3px solid ${rc};border-radius:4px;line-height:1.5">${escHtml(briefText)}</div>`;
    const quickOutputs = collectOutputRefs(current, fullContent);
    if (quickOutputs.length) detail += renderOutputShortcutHTML(quickOutputs, isAlert ? 'amber' : 'blue');

  // For respond type: render response controls above card detail

    detail += `<div style="font-size:11px;color:#58a6ff;margin-bottom:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase">Pi 在等你的回复</div>`;
    if (rt === 'pick-one') {
      detail += `<div style="display:flex;flex-direction:column;gap:6px">`;
      opts.forEach((o, i) => {
        detail += `<button onclick="doRespondToOwner('${fn}','${escHtml(String(o))}',{response_type:'pick-one'})" style="padding:10px 14px;border-radius:8px;border:1px solid rgba(74,158,255,0.3);background:rgba(74,158,255,0.06);color:#c9d1d9;cursor:pointer;font-size:13px;text-align:left;font-family:inherit" onmouseover="this.style.background='rgba(74,158,255,0.15)'" onmouseout="this.style.background='rgba(74,158,255,0.06)'">${escHtml(String(o))}</button>`;
      });
      detail += `</div>`;
    } else if (rt === 'pick-many') {
      detail += `<div style="display:flex;flex-direction:column;gap:6px">`;
      opts.forEach((o, i) => {
        detail += `<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:4px;cursor:pointer;color:#c9d1d9;font-size:13px" onmouseover="this.style.background='rgba(255,255,255,0.04)'" onmouseout="this.style.background='transparent'"><input type="checkbox" id="pick-many-${i}" value="${escHtml(String(o))}" style="width:14px;height:14px;cursor:pointer">${escHtml(String(o))}</label>`;

    } else if (rt === 'confirm') {

      detail += `<button onclick="doRespondToOwner('${fn}','confirmed',{response_type:'confirm'})" style="padding:8px 20px;border-radius:6px;border:1px solid rgba(74,158,255,0.4);background:rgba(74,158,255,0.12);color:#4a9eff;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600">✓ 确认</button>`;
      detail += `<button onclick="doRespondToOwner('${fn}','rejected',{response_type:'confirm'})" style="padding:8px 20px;border-radius:6px;border:1px solid rgba(248,81,73,0.3);background:rgba(248,81,73,0.08);color:#ff7b72;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600">✗ 拒绝</button>`;
      detail += `</div>`;
    } else if (rt === 'date') {
      detail += `<div style="display:flex;gap:8px;align-items:center"><input type="date" id="respond-date-input" style="padding:8px 10px;border-radius:6px;border:1px solid rgba(74,158,255,0.3);background:#0d1117;color:#c9d1d9;font-size:13px;font-family:inherit"><button onclick="submitRespondDate('${fn}')" style="padding:8px 14px;border-radius:6px;border:1px solid rgba(74,158,255,0.4);background:rgba(74,158,255,0.12);color:#4a9eff;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600">提交</button></div>`;
    } else {
      // text (default)
      detail += `<textarea id="respond-text-input" placeholder="输入你的回复..." style="width:100%;min-height:72px;box-sizing:border-box;padding:8px 10px;border-radius:5px;border:1px solid rgba(74,158,255,0.3);background:#0d1117;color:#c9d1d9;font-size:13px;font-family:inherit;resize:vertical;outline:none"></textarea>`;
      detail += `<button onclick="submitRespondText('${fn}')" style="margin-top:6px;padding:6px 16px;border-radius:5px;border:1px solid rgba(74,158,255,0.4);background:rgba(74,158,255,0.12);color:#4a9eff;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600">提交回复</button>`;
    }
    detail += `</div>`;
  }

  // Action bar — placed above the detail body so the primary operations
  // (✓ 已完成 / 知道了 / 通过 / 标已读 / …) are visible without scrolling.
  const actionBarStyle = 'position:sticky;top:0;z-index:3;margin-bottom:10px;padding:8px 0;background:#0d1117;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;gap:6px;flex-wrap:wrap;align-items:center';

  if (current.kind === 'output') {
    const meta = (outputsAll || []).find(o => o.id === current.id) || { id: current.id };
    const doc = _outputContentCache[current.id] || { content: '', frontmatter: {} };

    let actions = `<div style="${actionBarStyle}">`;
    actions += `<button class="action-btn action-do" onclick="boardOutputReadAndNext('${escHtml(current.id)}')">✓ 标已读 + 下一个</button>`;
    actions += `<button class="action-btn action-later" onclick="commentOutput('${escHtml(current.id)}')">💬 跟进</button>`;
    actions += `<button class="action-btn" onclick="toggleOutputBookmark('${escHtml(current.id)}')">${meta.bookmarked ? '★ 取消收藏' : '☆ 收藏'}</button>`;
    actions += `<button class="action-btn" onclick="downloadOutputPdf('${escHtml(current.id)}')">⇩ PDF</button>`;
    actions += `<button class="action-btn" style="background:none;color:#555;border:1px solid rgba(255,255,255,0.06)" onclick="boardReviewNext()">跳过 →</button>`;
    actions += '</div>';
    detail += actions;

    detail += `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:6px 0;margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.04)">${renderOutputMetaHTML(meta)}${meta.modified ? `<span style="margin-left:auto;font-size:10px;color:#484f58">${escHtml(meta.modified)}</span>` : ''}</div>`;
    detail += renderOutputDetailHTML(meta, doc, { showClose: false });
  } else {
    let actions = `<div style="${actionBarStyle}">`;
    const laterBtn = `<button class="action-btn action-later" onclick="todoAddOrReschedule('${fn}', {advanceDecision:true})">📋 转入待办</button>`;
    const dropBtn = `<button class="action-btn action-drop" onclick="promptDismissWithReason('${fn}')">不做了</button>`;
    if (current.queueType === 'alert') {
      actions += `<button class="action-btn action-do" onclick="doDismissCard('${fn}')">✓ 处理完毕</button>`;
      actions += laterBtn;
      actions += dropBtn;
      actions += `<button class="action-btn" onclick="doSkipCard('${fn}')" style="background:rgba(255,140,66,0.1);border-color:rgba(255,140,66,0.3);color:#ff8c42">忽略 →</button>`;
    } else if (current.queueType === 'respond') {
      actions += laterBtn;
      actions += dropBtn;
      actions += `<button class="action-btn" style="background:none;color:#555;border:1px solid rgba(255,255,255,0.06)" onclick="doSkipCard('${fn}')">跳过 →</button>`;
    } else if (current.queueType === 'act') {
      actions += `<button class="action-btn action-do" onclick="doCompleteAction('${fn}')">✓ 已完成</button>`;
      actions += laterBtn;
      actions += dropBtn;
    } else if (current.queueType === 'check') {
      actions += `<button class="action-btn action-do" onclick="boardApproveReview('${fn}')">✓ 通过</button>`;
      actions += `<button class="action-btn action-drop" onclick="boardReworkReview('${fn}')">↩ 返工</button>`;
      actions += laterBtn;
      actions += dropBtn;
      const checkTotal = buildBoardReviewQueueByFilter('check').filter(q => q.kind === 'card').length;
      if (checkTotal > 1) actions += `<button class="action-btn" onclick="boardBatchApproveCheck()" style="background:rgba(74,158,255,0.08);border-color:rgba(74,158,255,0.2);color:#4a9eff;font-size:10px">全选通过 (${checkTotal})</button>`;
    } else if (current.queueType === 'review') {
      actions += `<button class="action-btn action-do" onclick="boardApproveReview('${fn}')">✓ 通过验收</button>`;
      actions += `<button class="action-btn action-drop" onclick="boardReworkReview('${fn}')">↩ 返工</button>`;
      actions += laterBtn;
      actions += dropBtn;
    } else if (current.reason === '需要澄清') {
      actions += `<button class="action-btn action-do" onclick="boardApproveDecision('${fn}')">回复</button>`;
      actions += laterBtn;
      actions += dropBtn;
    } else {
      actions += `<button class="action-btn action-do" onclick="boardApproveDecision('${fn}')">✓ 通过</button>`;
      actions += laterBtn;
      actions += dropBtn;
    }
    if (!['alert','respond','act','check'].includes(current.queueType)) {
      actions += `<button class="action-btn action-later" onclick="boardDefer('${fn}')">⏸ 等待</button>`;
      actions += `<button class="action-btn action-drop" onclick="boardArchive('${fn}')">归档</button>`;
    }
    actions += `<button class="action-btn" style="background:none;color:#555;border:1px solid rgba(255,255,255,0.06)" onclick="boardReviewNext()">跳过 →</button>`;
    actions += '</div>';
    detail += actions;

    const currentFull = { ...current, content: fullContent };
    detail += `<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:6px 0;margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.04)">${renderCardMetaHTML(currentFull)}</div>`;
    detail += renderCardDetailHTML(currentFull, { showClose: false, compact: true });
  }
  detail += '</div>';

  el.innerHTML = pills + '<div style="display:flex;gap:0;align-items:stretch">' + sidebar + dragHandle + detail + '</div>';
}

// Review-context helper: mark output read and advance.
async function boardOutputReadAndNext(id) {
  try {
    await api('POST', '/pios/output/read', { id, read: true });
    const o = (outputsAll || []).find(x => x.id === id);
    if (o) o.read = true;
    // Remove the item from the server-built owner queue so it disappears
    // immediately from 待读 filter without a page refresh. ownerQueueAll is
    // the source of truth for the Review pane; outputsAll alone is not.
    if (Array.isArray(ownerQueueAll)) {
      ownerQueueAll = ownerQueueAll.filter(e => !(e.kind === 'output' && e.id === id));
    }
    piToast('已读', 'success', 1200);
    // Re-render: boardReviewIdx is clamped inside renderBoardReview, so the
    // next unread item naturally slides into the current slot.
    renderBoardReview();
  } catch (e) { piAlert('失败: ' + e.message); }
}

// Filter + sort the server-built owner queue for the Review pane.
// The heavy lifting (decision/action/review/followup classification + stale
// filtering) lives in pios-engine.getOwnerQueue() so Overview and Review are
// guaranteed to see the same set of items. This function is just a display
// filter: kind/queueType + client-side search + project grouping.
function buildBoardReviewQueueByFilter(filter) {
  const items = [];
  for (const entry of (ownerQueueAll || [])) {
    // Search filter (client-side)
    if (boardSearch.trim()) {
      const q = boardSearch.trim().toLowerCase();
      const hay = ((entry.title || '') + ' ' + (entry.filename || '') + ' ' + (entry.parent || '') + ' ' + (entry.blocked_on || '') + ' ' + (entry.category || '')).toLowerCase();
      if (!hay.includes(q)) continue;
    }
    // Type filter (new protocol: alert/respond/act/check; legacy: decide/review/followup/reports)
    if (filter === 'alert') {
      if (entry.queueType !== 'alert') continue;
    } else if (filter === 'respond') {
      if (entry.queueType !== 'respond') continue;
    } else if (filter === 'act') {
      if (entry.queueType !== 'act' && entry.queueType !== 'action') continue;
    } else if (filter === 'check') {
      if (entry.queueType !== 'check' && entry.queueType !== 'review') continue;
    } else if (filter === 'decide') {
      if (entry.queueType !== 'decision' && entry.queueType !== 'action') continue;
    } else if (filter === 'review') {
      if (entry.queueType !== 'check' && entry.queueType !== 'review') continue;
    } else if (filter === 'followup') {
      if (entry.queueType !== 'followup') continue;
    } else if (filter === 'reports') {
      if (entry.kind !== 'output' && entry.queueType !== 'report') continue;
    }
    // 'all' matches everything
    items.push(entry);
  }

  // Primary sort: priority ASC, then staleDays DESC
  items.sort((a, b) => {
    const pa = cardPriorityInt(a), pb = cardPriorityInt(b);
    if (pa !== pb) return pa - pb;
    return (b.staleDays || 0) - (a.staleDays || 0);
  });
  // Secondary grouping: preserve encounter order of projects, then within each
  // project keep the priority-sorted order. This gives a nice "project A items,
  // project B items, ..." layout in the sidebar.
  const projectOrder = [];
  const projectSet = new Set();
  items.forEach(q => {
    const proj = q.parent || '(独立)';
    if (!projectSet.has(proj)) { projectSet.add(proj); projectOrder.push(proj); }
  });
  items.sort((a, b) => {
    const pa = a.parent || '(独立)', pb = b.parent || '(独立)';
    if (pa !== pb) return projectOrder.indexOf(pa) - projectOrder.indexOf(pb);
    const ppa = cardPriorityInt(a), ppb = cardPriorityInt(b);
    if (ppa !== ppb) return ppa - ppb;
    return (b.staleDays || 0) - (a.staleDays || 0);
  });
  return items;
}

function buildBoardReviewQueue() { return buildBoardReviewQueueByFilter(boardReviewFilter); }

// Re-fetch the owner queue from server. Used after local mutations where
// markLocalMutation() suppresses the SSE echo — we need a way to get the
// updated queue without a full refreshBoard().
async function refreshOwnerQueue() {
  try {
    const q = await api('GET', '/pios/owner-queue?include=outputs,inbox');
    ownerQueueAll = Array.isArray(q) ? q : [];
  } catch {}
}

function setBoardReviewFilter(f) {
  boardReviewFilter = f;
  boardReviewIdx = 0;
  renderBoardReview();
}

function boardReviewNext() {
  const queue = buildBoardReviewQueue();
  boardReviewIdx = (boardReviewIdx + 1) % Math.max(1, queue.length);
  renderBoardReview();
}

async function boardApproveReview(filename) {
  const comment = await piPrompt('验收意见（可留空直接通过）：', '', { multiline: true, placeholder: '空则按 Approved 通过' });
  if (comment === null) return;
  const snap = await snapshotCard(filename);
  try {
    await api('POST', '/pios/approve-review', { filename, comment: comment || 'Approved' });
    await refreshBoard();
    if (snap) registerUndo(`通过验收: ${snap.frontmatter?.title || filename}`, async () => {
      await api('POST', '/pios/restore-card', { filename, snapshot: snap });
      await refreshBoard();
    });
    else piToast('已通过验收', 'success');
  } catch (e) { piAlert('失败: ' + e.message); }
}

async function boardDefer(filename) {
  const days = await piPrompt('等待几天后再看？', '3', { placeholder: '1=明天  3=三天后  7=下周  30=一个月后' });
  if (!days) return;
  const n = parseInt(days) || 3;
  const t = new Date(); t.setDate(t.getDate() + n);
  const until = t.toISOString().slice(0, 10);
  const snap = await snapshotCard(filename);
  try {
    await api('POST', '/pios/defer-card', { filename, until });
    await refreshBoard();
    if (snap) registerUndo(`推迟到 ${until}`, async () => {
      await api('POST', '/pios/restore-card', { filename, snapshot: snap });
      await refreshBoard();
    });
    else piToast(`已推迟到 ${until}`, 'success');
  } catch (e) { piAlert('失败: ' + e.message); }
}

async function boardArchive(filename) {
  if (!(await piConfirm('归档这张卡片？'))) return;
  const snap = await snapshotCard(filename);
  try {
    await api('POST', '/pios/move-card', { filename, status: 'archive' });
    await refreshBoard();
    if (snap) registerUndo(`归档: ${snap.frontmatter?.title || filename}`, async () => {
      await api('POST', '/pios/restore-card', { filename, snapshot: snap });
      await refreshBoard();
    });
    else piToast('已归档', 'success');

}

// ── Batch approve all check-type items ──
async function boardBatchApproveCheck() {
  const checkItems = buildBoardReviewQueueByFilter('check').filter(q => q.kind === 'card');
  if (!checkItems.length) return;
  if (!(await piConfirm(`批量通过全部 ${checkItems.length} 个验收项？`))) return;
  let ok = 0, fail = 0;
  for (const item of checkItems) {
    try {
      await api('POST', '/pios/approve-review', { filename: item.filename, comment: '批量通过' });
      delete _cardContentCache[item.filename];
      ok++;
    } catch { fail++; }
  }
  piToast(`批量通过 ${ok} 项${fail ? `，失败 ${fail}` : ''}`, 'success');
  boardReviewIdx = 0;
  await refreshBoard();
}

// ── New Owner Protocol Action Functions ──

async function doRespondToOwner(filename, response, opts = {}) {
  const { __skipBusy, ...payload } = opts || {};
  const submit = async () => {
    const r = await api('POST', '/pios/respond-to-owner', { filename, response, ...payload });
    if (r && r.ok) {
      piToast('Pi 会处理你的回复', 'success', 8000, {
        action: {
          label: '撤销',
          fn: () => {
            api('POST', '/pios/undo-owner-response', { filename }).then(ur => {
              if (ur && ur.ok) {
                piToast('已撤销，卡片重回队列', 'info', 3000);
                refreshOwnerQueue(); renderBoardReview();
              } else if (ur && ur.error === 'already_consumed') {
                piToast(`Pi 已处理（${ur.consumed_at}），改口请新发一条回复`, 'warn', 5000);
              } else {
                piToast('撤销失败: ' + ((ur && ur.error) || 'unknown'), 'error', 4000);
              }
            });
          },
        },
      });
      await refreshOwnerQueue();
      delete _cardContentCache[filename];
      boardReviewNext();
      renderBoardReview();
    } else { piAlert('失败: ' + ((r && r.error) || 'unknown')); }
  };
  try {
    if (__skipBusy) await submit();
    else await runDecisionAction(submit);
  } catch (e) { piAlert('失败: ' + e.message); }
}

async function submitRespondText(filename) {
  const el = document.getElementById('respond-text-input');
  const text = el ? el.value.trim() : '';
  if (!text) { piAlert('请先输入回复内容'); return; }

async function submitRespondDate(filename) {
  const el = document.getElementById('respond-date-input');
  const val = el ? el.value : '';

async function submitRespondPickMany(filename) {
  const boxes = document.querySelectorAll('[id^="pick-many-"]:checked');

async function doDismissCard(filename) {
  try {
    await runDecisionAction(async () => {
      const r = await api('POST', '/pios/dismiss-card', { filename, reason: 'dismissed by owner' });
      if (r && r.ok) {
        piToast('已取消', 'success');
        await refreshOwnerQueue();
        delete _cardContentCache[filename];
        if (boardReviewIdx > 0) boardReviewIdx--;
        renderBoardReview();
        advanceDecision(); loadOverview();
      } else { piAlert('失败: ' + ((r && r.error) || 'unknown')); }
    });
  } catch (e) { piAlert('失败: ' + e.message); }
}

// Unified entry point: add to MyToDos or reschedule an existing todo.
// Every "转入待办 / 改期" button in the UI routes here so there's ONE flow.
//   - If the card isn't yet in MyToDos: calls /pios/acknowledge-action to set
//     assignee=user, then writes deferred_until.
//   - If it's already there: just updates deferred_until.
// opts.advanceDecision=true — for ThingsNeedYou/decision-carousel callers that
// need to advance past the current decision card after the action.
async function todoAddOrReschedule(filename, opts = {}) {
  const card = (cardsAll || []).find(c => c.filename === filename)
    || (MYTODOS_DATA || []).find(c => c.filename === filename) || {};
  const inTodos = _myTodosSet.has(filename) || card.assignee === 'user';
  const closed = (card.status === 'done' || card.status === 'dismissed' || card.folder === 'archive');
  if (closed) {
    const label = card.status === 'done' ? '已完成' : card.status === 'dismissed' ? '已弃置' : '已归档';
    const ok = await piConfirm(`这张卡是 ${label} 状态，重新激活并转入待办？`, { okLabel: '重新激活' });
    if (!ok) return;
  }
  const current = card.deferred_until || card.due || '';
  const initial = /^\d{4}-\d{2}-\d{2}/.test(String(current)) ? String(current).slice(0, 10) : '';
  const pick = await piDatePicker(inTodos ? '改到哪一天？' : '什么时候做？', { initial });
  if (pick === null) return;

  const run = async () => {
    if (closed) {
      try { await api('POST', '/pios/move-card', { filename, status: 'active' }); }
      catch (e) { piAlert('重新激活失败: ' + e.message); return; }
    }
    if (!inTodos) {
      const r = await api('POST', '/pios/acknowledge-action', { filename });
      if (!r || !r.ok) { piAlert('失败: ' + ((r && r.error) || 'unknown')); return; }
    }
    const updates = { deferred_until: pick.date || null };
    if (opts.unblock) updates.blocked_on = null;
    try {
      await api('POST', '/pios/update-card', { filename, updates });
    } catch (e) { piAlert('日期保存失败: ' + e.message); return; }
    // Mirror the server-side mutation onto cardsAll so Review filters (blocked,
    // MyToDo, etc.) reflect the change immediately without a full refetch.
    const idx = (cardsAll || []).findIndex(c => c.filename === filename);
    if (idx >= 0) {
      cardsAll[idx].assignee = 'user';
      cardsAll[idx].deferred_until = pick.date || null;
      if (opts.unblock) cardsAll[idx].blocked_on = null;
      if (closed) { cardsAll[idx].status = 'active'; cardsAll[idx].folder = 'active'; }
    }
    piToast(inTodos
      ? (pick.date ? `已改到 ${pick.date}` : '已移到未安排')
      : (pick.date ? `已加入待办 · ${pick.date}` : '已加入待办'), 'success');
    delete _cardContentCache[filename];
    myTodosLoaded = false;
    await refreshOwnerQueue();
    if (opts.advanceDecision) {
      if (boardReviewIdx > 0) boardReviewIdx--;
      renderBoardReview();
      advanceDecision();
    }
    await _refreshTodoUI(filename, {});
    if (activeTab === 'review') {
      if (reviewMode === 'mytodos') { await loadReviewMyTodos(true); }
      renderReviewTab();
    }
  };

  try {
    if (opts.advanceDecision) await runDecisionAction(run);
    else await run();
  } catch (e) { piAlert('失败: ' + e.message); }
}

// Complete a todo from the MyToDo row — same flow as doCompleteAction but
// scoped to the MyToDo pane (refreshes mytodos cache, re-renders that mode).
async function completeTodoFromRow(filename) {
  const card = (MYTODOS_DATA || []).find(c => c.filename === filename) || { filename };
  const title = card.title || filename;
  const hint = '补一句完成说明：你做了什么，结果怎样？';
  openEditor(title + ' — 完成说明', hint, null, null);
  const textarea = document.getElementById('editor-textarea');
  if (!textarea) return;
  textarea.value = '';
  textarea.placeholder = hint;
  textarea.focus();
  const saveBtn = document.getElementById('editor-save-btn');
  if (!saveBtn) return;
  saveBtn.textContent = '提交完成';
  saveBtn.onclick = async () => {
    const comment = textarea.value.trim();
    if (comment.length < 4) { piAlert('完成说明至少写 4 个字'); return; }
    try {
      const r = await api('POST', '/pios/respond-to-owner', {
        filename, response: 'completed', response_type: 'act-complete', comment,
      });
      if (!r || !r.ok) { piAlert('失败: ' + ((r && r.error) || 'unknown')); return; }
      closeEditor();
      piToast('Pi 会按你的完成说明验证', 'success');
      delete _cardContentCache[filename];
      myTodosLoaded = false;
      await loadReviewMyTodos(true);
      renderReviewTab();
      loadOverview();
    } catch (e) { piAlert('失败: ' + e.message); }
  };
}

// Dismiss a todo from the MyToDo row.
async function dismissTodoFromRow(filename) {
  const ok = await piConfirm('不做了？', { okLabel: '不做了' });
  if (!ok) return;
  try {
    const r = await api('POST', '/pios/dismiss-card', { filename, reason: 'dismissed by owner' });
    if (!r || !r.ok) { piAlert('失败: ' + ((r && r.error) || 'unknown')); return; }
    piToast('已取消', 'success');
    delete _cardContentCache[filename];
    myTodosLoaded = false;
    await loadReviewMyTodos(true);
    renderReviewTab();
    loadOverview();
  } catch (e) { piAlert('失败: ' + e.message); }
}

async function doCompleteAction(filename) {
  const item = (ownerQueueAll || []).find(q => q.filename === filename) || decisions.find(q => q.filename === filename) || null;
  const title = item && item.title ? item.title : filename;
  const hint = '补一句完成说明：你做了什么，结果怎样？';
  const minCompleteCommentLength = 4;
  openEditor(title + ' — 完成说明', hint, null, null);
  const textarea = document.getElementById('editor-textarea');
  if (!textarea) return;
  textarea.value = '';
  textarea.placeholder = hint;
  textarea.focus();
  const saveBtn = document.getElementById('editor-save-btn');
  if (saveBtn) {
    saveBtn.textContent = '提交完成';
    saveBtn.onclick = async () => {
      const comment = textarea.value.trim();
      if (!comment) { piAlert('完成前先写一句说明'); return; }
      if (comment.length < minCompleteCommentLength) {
        piAlert(`完成说明至少写 ${minCompleteCommentLength} 个字，说明你做了什么和结果`);
        return;
      }
      try {
        await runDecisionAction(async () => {
          const r = await api('POST', '/pios/respond-to-owner', {
            filename,
            response: 'completed',
            response_type: 'act-complete',
            comment,
          });
          if (r && r.ok) {
            closeEditor();
            piToast('Pi 会按你的完成说明验证结果', 'success');
            await refreshOwnerQueue();
            delete _cardContentCache[filename];
            if (boardReviewIdx > 0) boardReviewIdx--;
            renderBoardReview();
            advanceDecision(); loadOverview();
          } else { piAlert('失败: ' + ((r && r.error) || 'unknown')); }
        }, document.getElementById('editor-overlay') || document);
      } catch (e) { piAlert('失败: ' + e.message); }
    };
  }
}

async function doSkipCard(filename) {
  try {
    await runDecisionAction(async () => {
      const r = await api('POST', '/pios/skip-card', { filename });
      if (r && r.ok) {
        piToast('明天再看', 'success');
        await refreshOwnerQueue();
        delete _cardContentCache[filename];
        renderBoardReview();
        advanceDecision(); loadOverview();
      }
    });
  } catch (e) { piAlert('失败: ' + e.message); }
}

function _syncTodoCardRemoved(filename) {
  const normalized = normalizeCardFilename(filename);
  cardsAll = (cardsAll || []).filter(c => c.filename !== normalized);
  delete _cardContentCache[normalized];
}

async function _refreshTodoUI(filename, { closeModal = false } = {}) {
  _syncTodoCardRemoved(filename);
  if (closeModal) closeCardDetailModal();
  if (activeTab === 'review') {
    // Review pane reads from cardsAll (blocked filter / browse tree / subtask
    // counts). Clearing cardsAll here used to make the list snap to 0 until a
    // manual refresh. Keep cardsAll in memory — callers update it in place for
    // the mutated card — and refresh just ownerQueueAll.
    await refreshOwnerQueue();
    loadOverview();
  } else {
    if (cardsAll.length) {
      cardsAll = [];
      ownerQueueAll = [];
    }
    loadOverview();
  }
}

async function todoComplete(filename, opts = {}) {
  await api('POST', '/pios/move-card', { filename, status: 'archive' });
  piToast('已完成并归档', 'success');
  await _refreshTodoUI(filename, opts);
}

async function todoDismiss(filename, opts = {}) {
  const confirmed = opts.skipConfirm || (await piConfirm('确认将这张待办标记为"不做了"并归档？'));
  if (!confirmed) return;
  await api('POST', '/pios/dismiss-card', { filename, reason: 'dismissed from My TODOs' });
  piToast('已标记为不做了', 'info');
  await _refreshTodoUI(filename, opts);
