let _profileData = null;

async function loadProfileTab(force = false) {

  } catch (e) {
    container.innerHTML = `<div class="empty-state" style="color:#ff8c42;padding:20px">加载失败: ${escHtml(e.message)}</div>`;

function renderProfileTab(data) {
  const container = document.getElementById('team-sub-profile');
  if (!container) return;
  const pending = data.pending || [];
  const files = data.files || [];
  const updatedAt = data.pendingUpdatedAt ? new Date(data.pendingUpdatedAt).toLocaleString('zh-CN') : '—';

  // Header bar
  let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <span style="font-size:13px;color:#c9d1d9;font-weight:600">👤 Profile 认知层</span>
    ${pending.length > 0 ? `<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(240,180,41,.2);color:#f0b429;font-weight:600">${pending.length} 待审批</span>` : '<span style="font-size:10px;color:#56d364">✓ 无待审批</span>'}
    <span style="flex:1"></span>
    <span style="font-size:10px;color:#6e7681">上次刷新 ${updatedAt}</span>
    <button onclick="profileRefreshNow(this)" style="font-size:11px;padding:3px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#8b949e;cursor:pointer;font-family:inherit;transition:all .15s" onmouseover="this.style.borderColor='#4a9eff';this.style.color='#4a9eff'" onmouseout="this.style.borderColor='rgba(255,255,255,.12)';this.style.color='#8b949e'">🔄 立即刷新</button>
  </div>`;

  // Pending diffs section
  html += `<div class="profile-tab-section">
    <div class="profile-tab-section-title">
      <span>待审批 Diff</span>
      ${pending.length > 0 ? `<button onclick="profileApproveAll()" class="profile-diff-btn" style="font-size:10px;padding:2px 10px;background:rgba(255,255,255,0.06);color:#8b949e">全部批准 (${pending.length})</button>` : ''}
    </div>`;
  if (pending.length === 0) {
    html += '<div style="font-size:12px;color:#6e7681;padding:6px 2px">暂无待审批条目 — 下次 profile-refresh 运行后会自动生成</div>';
  } else {
    html += '<div class="profile-diff-list">';
    for (const item of pending) {
      const typeClass = item.type || 'update';
      const typeLabel = { update: '改', add: '增', remove: '删' }[typeClass] || typeClass;
      const detailId = `pdiff-detail-${escHtml(item.id)}`;
      html += `<div class="profile-diff-item" id="pdiff-${escHtml(item.id)}">
        <div class="profile-diff-meta" onclick="document.getElementById('${detailId}').style.display=document.getElementById('${detailId}').style.display==='none'?'block':'none'" style="cursor:pointer">
          <span class="profile-diff-file">${escHtml(item.file || '')}</span>
          ${item.section ? `<span class="profile-diff-section">${escHtml(item.section)}</span>` : ''}
          <span class="profile-diff-type ${escHtml(typeClass)}">${typeLabel}</span>
          ${item.field ? `<span style="font-size:10px;color:#8b949e">${escHtml(item.field)}</span>` : ''}
          <span style="font-size:10px;color:#6e7681;margin-left:auto">▸ 点击展开</span>
        </div>
        <div id="${detailId}" style="display:none">
          <div class="profile-diff-reason">${escHtml(item.reason || '')}</div>
          ${item.source ? `<div class="profile-diff-source">📎 ${escHtml(item.source)}</div>` : ''}
          ${item.old && item.new ? `<div class="profile-diff-change">
            <div class="profile-diff-old">${escHtml(item.old)}</div>
            <div class="profile-diff-new">${escHtml(item.new)}</div>
          </div>` : (item.new ? `<div class="profile-diff-add-only">${escHtml(item.new)}</div>` : '')}
          <div class="profile-diff-actions">
            <button class="profile-diff-btn approve" onclick="profileApprove('${escHtml(item.id)}', this)">✓ 批准</button>
            <button class="profile-diff-btn reject" onclick="profileReject('${escHtml(item.id)}', this)">✗ 拒绝</button>
          </div>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  html += '</div>';

  // Profile files section
  html += `<div class="profile-tab-section">
    <div class="profile-tab-section-title"><span>Profile 文件（${files.length} 个）</span></div>
    <div class="profile-file-list">`;
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    const displayName = f.name.replace(/\.md$/, '').replace(/_/g, ' ');
    const mtime = f.mtime ? new Date(f.mtime).toLocaleDateString('zh-CN') : '';
    html += `<div class="profile-file-item">
      <div class="profile-file-head" onclick="toggleProfileFile('pfbody-${i}', this)">
        <span class="profile-file-name">${escHtml(displayName)}</span>
        <span class="profile-file-meta">${mtime} · ${f.size ? Math.round(f.size/1024)+'KB' : ''}</span>
        <button class="profile-file-edit-btn" onclick="event.stopPropagation();profileEditFile('${escHtml(f.name)}')" title="在编辑器中打开">✎ 编辑</button>
        <span style="font-size:10px;color:#6e7681;margin-left:4px">▶</span>
      </div>
      <div class="profile-file-body md-wrap" id="pfbody-${i}"></div>
    </div>`;
  }
  html += '</div></div>';

  container.innerHTML = html;
}

function toggleProfileFile(bodyId, headEl) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  const arrow = headEl.querySelector('span:last-child');
  if (arrow) arrow.textContent = isOpen ? '▶' : '▼';
  // lazy load content on first open
  if (!isOpen && !body.dataset.loaded) {
    body.dataset.loaded = '1';
    const fname = headEl.querySelector('.profile-file-name')?.textContent;
    // find file name in data
    const f = (_profileData?.files || []).find(f => {
      const displayName = f.name.replace(/\.md$/, '').replace(/_/g, ' ');
      return displayName === fname;
    });
    if (f) {
      api('GET', `/pios/profile/file?name=${encodeURIComponent(f.name)}`).then(d => {
        body.innerHTML = renderMd(d.content || '');
      }).catch(e => { body.textContent = '加载失败: ' + e.message; });
    }
  }
}

async function profileApprove(id, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  try {
    await api('POST', '/pios/profile/approve', { id });
    _profileData = null;
    await loadProfileTab(true);
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = '✓ 批准'; }
    alert('批准失败: ' + e.message);
  }
}

async function profileReject(id, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  try {
    await api('POST', '/pios/profile/reject', { id });
    _profileData = null;
    await loadProfileTab(true);
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = '✗ 拒绝'; }
    alert('拒绝失败: ' + e.message);
  }
}

async function profileApproveAll() {
  const pending = (_profileData && _profileData.pending) || [];
  const n = pending.length;
  if (!confirm(`确认批量批准全部 ${n} 条更新？\n\n此操作将直接修改 Profile md 文件，无法撤销（但有备份）。`)) return;
  try {
    const r = await api('POST', '/pios/profile/approve-all', {});
    _profileData = null;
    await loadProfileTab(true);
    if (r.failed > 0) alert(`${r.applied} 条已批准，${r.failed} 条失败`);
  } catch (e) { alert('批量批准失败: ' + e.message); }
}

async function profileEditFile(name) {
  try {
    const d = await api('GET', `/pios/profile/file?name=${encodeURIComponent(name)}`);
    const owner = name; // display title
    openEditor(name.replace(/\.md$/, ''), d.content, null, async () => {
      // onSave callback: read textarea value and POST to profile save API
      const content = document.getElementById('editor-textarea').value;
      await api('POST', '/pios/profile/save', { name, content });
      _profileData = null;
      loadProfileTab(true);
    });
    // override saveEditor to use profile API instead of manifest API
    const origSave = window._profileEditorSaveOverride;
    const saveBtn = document.getElementById('editor-save-btn');
    if (saveBtn) {
      saveBtn.onclick = async function() {
        const content = document.getElementById('editor-textarea').value;
        const msgEl = document.getElementById('editor-save-msg');
        try {
          await api('POST', '/pios/profile/save', { name, content });
          msgEl.textContent = 'Saved';
          msgEl.style.color = '#4a9eff';
          _profileData = null;
          setTimeout(() => { closeEditor(); loadProfileTab(true); }, 600);
        } catch (e) {
          msgEl.textContent = 'Error: ' + e.message;
          msgEl.style.color = '#ff8c42';
        }
      };
    }
  } catch (e) { alert('打开失败: ' + e.message); }
}

async function profileRefreshNow(btn) {
  if (btn) { btn.disabled = true; btn.textContent = '触发中...'; }
  try {
    await api('POST', '/pios/profile/refresh-now', {});
    if (btn) { btn.disabled = false; btn.textContent = '🔄 立即刷新'; }
    alert('profile-refresh 已触发，下次 pios-tick 会执行（约 1-15 分钟）');
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = '🔄 立即刷新'; }
    alert('触发失败: ' + e.message);
  }
}

// ── Top Bar ──
document.getElementById('btn-sessions')?.addEventListener('click', () => {
  fetch(API + '/exec_js', { method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ code: 'sessionSidebarOpen=!sessionSidebarOpen;sessionSidebar.classList.toggle("collapsed",!sessionSidebarOpen);document.body.classList.toggle("sidebar-open",sessionSidebarOpen);if(sessionSidebarOpen)window.pi.sessionSidebarOpen();else window.pi.sessionSidebarClose();true', target: 'main' })
  }).catch(() => {});
});
