function _restoreDecisionCallDraft(draft) {
  if (!draft) return;
  const current = decisions && decisions[decIdx] ? decisions[decIdx] : null;
  if (draft.filename && current && current.filename !== draft.filename) return;
  const input = document.getElementById('dec-call-input');
  if (!input) return;
  input.value = draft.value || '';
  if (!draft.focused) return;
  requestAnimationFrame(() => {
    input.focus();
    const start = Math.min(draft.selectionStart ?? input.value.length, input.value.length);
    const end = Math.min(draft.selectionEnd ?? start, input.value.length);
    try { input.setSelectionRange(start, end); } catch {}
  });
}

// ── Helpers ──

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Review tab 的搜索框 `oninput` 会调用 renderReviewXxx() → innerHTML 重写 → input
// 节点销毁重建 → 焦点丢失。每次只能敲一个字，下一个字没地方输。
// 这个 helper 用 selector 找重建后的 input，把焦点和光标位置补回去。
// 也顺便吃掉 IME 组合中的 event（isComposing）免得拼音被打断。
function _searchInput(inputEl, stateSetter, renderFn, selector) {
  if (event && event.isComposing) return;
  stateSetter(inputEl.value);
  const cursor = inputEl.selectionStart;
  renderFn();
  requestAnimationFrame(() => {
    const el = document.querySelector(selector);
    if (el && el !== document.activeElement) {
      el.focus();
      const p = Math.min(cursor || el.value.length, el.value.length);
      try { el.setSelectionRange(p, p); } catch {}
    }
  });
}

// Block-based markdown renderer. Splits on blank lines into paragraphs/blocks
// so spacing is consistent and headings don't stack up vertically.
// Supports clickable cross-refs:
//   [[card-name]]                                       → opens card modal
//   Cards/(active|inbox|archive)/name.md                → opens card modal
//   Pi/Output/(intel|content|infra|health)/path.md      → opens output modal
function renderMd(text) {
  if (!text) return '';

  // 1. Protect fenced code blocks before any other processing.
  const codeBlocks = [];
  text = String(text).replace(/```(\w*)\n([\s\S]*?)```/g, (_m, lang, code) => {
    codeBlocks.push(code);
    return `\x00CODE${codeBlocks.length - 1}\x00`;
  });

  // 2. HTML-escape the whole thing (code block placeholders are safe).
  text = escHtml(text);

  // 2b. Ensure heading lines are separated into their own blocks.
  //     Insert blank lines before/after lines that start with # so they
  //     don't merge with adjacent content.
  text = text.replace(/^(#{1,5}\s+.+)$/gm, '\n$1\n');

  // 3. Split into blocks on blank lines.
  const blocks = text.split(/\n{2,}/);
  const out = [];

  for (let raw of blocks) {
    const block = raw.replace(/\s+$/, '');
    if (!block) continue;

    // Code block placeholder
    const codeMatch = block.match(/^\x00CODE(\d+)\x00$/);
    if (codeMatch) {
      const code = codeBlocks[parseInt(codeMatch[1])];
      out.push(`<pre class="md-code-block"><code>${escHtml(code)}</code></pre>`);
      continue;
    }

    // Heading (single-line block)
    const headingMatch = block.match(/^(#{1,5})\s+(.+)$/);
    if (headingMatch && !block.includes('\n')) {
      const level = headingMatch[1].length;
      out.push(`<div class="md-h${level}">${_mdInline(headingMatch[2])}</div>`);
      continue;
    }

    // Horizontal rule
    if (/^-{3,}$/.test(block)) { out.push('<hr class="md-hr">'); continue; }

    // Table — every non-empty line starts with |
    const tableLines = block.split('\n').filter(l => l.trim());
    if (tableLines.length > 1 && tableLines.every(l => l.trim().startsWith('|'))) {
      const rows = tableLines
        .filter(l => !/^\|[\s|:\-]+\|?$/.test(l.trim()))
        .map(l => {
          const cells = l.trim().replace(/^\||\|$/g, '').split('|')
            .map(c => `<td class="md-td">${_mdInline(c.trim())}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
      out.push(`<table class="md-table">${rows}</table>`);
      continue;
    }

    // Blockquote — every line starts with >
    const bqLines = block.split('\n');
    if (bqLines.every(l => /^&gt;/.test(l.trim()) || /^>/.test(l.trim()) || !l.trim())) {
      const inner = bqLines.map(l => l.replace(/^(&gt;|>)\s?/, '')).filter(Boolean).join('<br>');
      out.push(`<div class="md-blockquote">${_mdInline(inner)}</div>`);
      continue;
    }

    // List — every non-empty line starts with a bullet or numbered marker
    const listLines = block.split('\n');
    if (listLines.every(l => !l.trim() || /^\s*([-*+]|\d+\.)\s+/.test(l))) {
      const items = listLines.filter(l => l.trim()).map(l => {
        const stripped = l.replace(/^\s*([-*+]|\d+\.)\s+/, '');
        if (/^\[x\]/i.test(stripped)) return `<div class="md-li">☑ ${_mdInline(stripped.slice(3).trim())}</div>`;
        if (/^\[ \]/.test(stripped)) return `<div class="md-li">☐ ${_mdInline(stripped.slice(3).trim())}</div>`;
        const indent = (l.match(/^\s*/) || [''])[0].length;
        const pad = indent >= 2 ? `style="margin-left:${Math.min(indent * 4, 40)}px"` : '';
        return `<div class="md-li" ${pad}>• ${_mdInline(stripped)}</div>`;
      }).join('');
      out.push(items);
      continue;
    }

    // Default: paragraph — lines within join with <br>
    const lines = block.split('\n').map(l => _mdInline(l)).join('<br>');
    out.push(`<div class="md-p">${lines}</div>`);
  }

  return out.join('');
}

// Inline-level markdown + cross-ref link rules.
// Assumes input is already HTML-escaped.
function _mdInline(text) {
  return text
    // Inline code (protect from other inline rules)
    .replace(/`([^`]+)`/g, '<code class="md-inline-code">$1</code>')
    // Vault 任意 .md 路径（Obsidian 风格）：只要结构是 "dir/.../file.md"，就可点击。
    //   Cards/active|inbox|archive/xxx.md    → 卡片 modal（openCardDetail）
    //   Pi/Output/intel|content|infra|health/... → output modal（富功能 tag/comment/PDF）
    //   其他任何 foo/bar/.../xxx.md          → 通用 vault 文件浏览（openVaultFile）
    // lookbehind (?<![:\/\w]) 防 URL 误伤（http://example.com/foo.md 不会被匹配到）
    // lookahead (?![\/\w]) 防半路误伤（foo.md5 / foo.md/bar 不会被当作 foo.md）
    .replace(/(?<![:\/\w])`?((?:[\w.-]+\/)+[\w.-]+\.md)`?(?![\/\w])/g, (_m, full) => {
      const safeFull = full.replace(/'/g, "\\'");
      const cardMatch = full.match(/^Cards\/(?:active|inbox|archive)\/(.+)\.md$/);
      if (cardMatch) {
        return `<a href="#" class="md-link-card" onclick="event.preventDefault();openCardDetail('${cardMatch[1].replace(/'/g, "\\'")}')">${full}</a>`;
      }
      if (/^Pi\/Output\/(?:intel|content|infra|health)\//.test(full)) {
        const id = full.replace(/^Pi\/Output\//, '');
        return `<a href="#" class="md-link-card" onclick="event.preventDefault();openOutputInModal('${id.replace(/'/g, "\\'")}')">${full}</a>`;
      }
      return `<a href="#" class="md-link-card" onclick="event.preventDefault();openVaultFile('${safeFull}')">${full}</a>`;
    })
    // [[wiki-link]] → open card modal
    .replace(/\[\[([^\]]+)\]\]/g, (_m, name) => {
      const clean = name.trim();
      return `<a href="#" class="md-link-card" onclick="event.preventDefault();openCardDetail('${clean.replace(/'/g, "\\'")}')">${clean}</a>`;
    })
    // Bold + italic
    .replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>')
    // Markdown links [text](url)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:#4a9eff" target="_blank">$1</a>');
}

// ── In-page dialog + toast replacements ──
// Electron BrowserView blocks window.prompt() (and some alert variants). These
// helpers render real DOM dialogs/toasts that work reliably inside the Home tab.

// piToast(msg, kind, ms, opts?)
//   opts.action: { label, fn } — renders an inline action button (e.g. Undo)
function piToast(msg, kind = 'info', ms = 3000, opts = {}) {
  let wrap = document.getElementById('pi-toast-wrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'pi-toast-wrap';
    document.body.appendChild(wrap);
  }
  const toast = document.createElement('div');
  toast.className = 'pi-toast ' + (kind || 'info');
  // Build with a text span + optional action button (can't use textContent
  // because we need child elements)
  const span = document.createElement('span');
  span.textContent = String(msg);
  span.style.cssText = 'flex:1;min-width:0';
  toast.style.display = 'flex';
  toast.style.alignItems = 'center';
  toast.style.gap = '12px';
  toast.appendChild(span);
  if (opts && opts.action && typeof opts.action.fn === 'function') {
    const btn = document.createElement('button');
    btn.textContent = opts.action.label || 'Undo';
    btn.style.cssText = 'background:transparent;border:1px solid rgba(255,255,255,0.35);color:#fff;padding:3px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;flex-shrink:0';
    btn.onmouseover = () => { btn.style.background = 'rgba(255,255,255,0.12)'; };
    btn.onmouseout = () => { btn.style.background = 'transparent'; };
    btn.onclick = (e) => {
      e.stopPropagation();
      try { opts.action.fn(); } catch {}
      toast.remove();
    };
    toast.appendChild(btn);
  }
  // Cap at 3 toasts; remove oldest if over limit
  const existing = wrap.querySelectorAll('.pi-toast');
  if (existing.length >= 3) existing[0].remove();
  // Merge identical messages
  for (const t of existing) {
    const tspan = t.querySelector('span');
    if (tspan && tspan.textContent === String(msg)) {
      t.remove();
      break;
    }
  }
  wrap.appendChild(toast);
  setTimeout(() => {
    toast.style.transition = 'opacity 0.22s, transform 0.22s';
    toast.style.opacity = '0';
    toast.style.transform = 'translateY(-4px)';
    setTimeout(() => toast.remove(), 260);
  }, ms);
  return toast;
}

// ── Pi Stream Toast ──
// Structured toast for card sync events. Old piToast() stays for system notices.
const _streamToasts = new Map();
let _streamToastPaused = false;

function _escToast(s) {
  const el = document.createElement('span');
  el.textContent = String(s ?? '');
  return el.innerHTML;
}

function _pauseStreamToasts() {
  if (_streamToastPaused) return;
  _streamToastPaused = true;
  for (const entry of _streamToasts.values()) {
    if (!entry.timer) continue;
    clearTimeout(entry.timer);
    entry.timer = null;
    entry.remaining -= (Date.now() - entry.startedAt);
    if (entry.remaining < 300) entry.remaining = 300;
  }
}

function _resumeStreamToasts() {
  if (!_streamToastPaused) return;
  _streamToastPaused = false;
  for (const [id, entry] of _streamToasts) {
    if (entry.timer) continue;
    entry.startedAt = Date.now();
    entry.timer = setTimeout(() => _dismissStreamToast(id), entry.remaining);
  }
}

function _bindStreamToastHover(wrap) {
  if (!wrap || wrap.dataset.streamToastHoverBound === '1') return;
  wrap.dataset.streamToastHoverBound = '1';
  wrap.addEventListener('mouseover', (e) => {
    const toast = e.target && e.target.closest ? e.target.closest('.pi-stream-toast') : null;
    if (!toast) return;
    _pauseStreamToasts();
  });
  wrap.addEventListener('mouseout', (e) => {
    const next = e.relatedTarget;
    if (next && wrap.contains(next)) return;
    _resumeStreamToasts();
  });
}

function piStreamToast(ev) {
  if (_streamToasts.has(ev.id)) return;

  let wrap = document.getElementById('pi-toast-wrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'pi-toast-wrap';
    document.body.appendChild(wrap);
  }
  _bindStreamToastHover(wrap);

  if (_streamToasts.size >= 3) {
    const oldest = _streamToasts.keys().next().value;
    _dismissStreamToast(oldest, true);
  }

  const el = document.createElement('div');
  el.className = 'pi-stream-toast';
  el.dataset.hue = ev.hue || 'gray';
  el.dataset.id = ev.id;
  const agentLabel = ev.agent_label || ev.agent || 'Pi';
  const cardLabel = ev.card_title || ev.card || '?';
  el.innerHTML = [
    `<span class="pst-icon">${_escToast(ev.icon || '·')}</span>`,
    `<span class="pst-agent">${_escToast(agentLabel)}</span>`,
    `<span class="pst-sep">·</span>`,
    `<span class="pst-card">${_escToast(cardLabel)}</span>`,
    `<span class="pst-sep">·</span>`,
    `<span class="pst-verb">${_escToast(ev.verb || '已同步')}</span>`,
  ].join('');
  el.addEventListener('click', () => {
    try { openCardDetail(ev.card || ''); } catch {}
  });
  wrap.appendChild(el);

  const dwell = Math.max(ev.dwell || 0, 5200);
  const entry = {
    el,
    timer: null,
    remaining: dwell,
    startedAt: Date.now(),
  };
  if (!_streamToastPaused) {
    entry.timer = setTimeout(() => _dismissStreamToast(ev.id), dwell);
  }
  _streamToasts.set(ev.id, entry);
}

function _dismissStreamToast(id, immediate = false) {
  const entry = _streamToasts.get(id);
  if (!entry) return;
  if (entry.timer) clearTimeout(entry.timer);
  _streamToasts.delete(id);
  if (immediate) {
    entry.el.remove();
    return;
  }
  entry.el.classList.add('leaving');
  setTimeout(() => {
    try { entry.el.remove(); } catch {}
  }, 260);
}

// alert() replacement that works in BrowserView
function piAlert(msg) { piToast(String(msg), 'error', 5000); }

function piConfirm(msg, opts = {}) {
  return new Promise(resolve => {
    const ov = document.createElement('div');
    ov.className = 'pi-dialog-overlay';
    ov.innerHTML = `<div class="pi-dialog">
      <div class="pi-dialog-msg">${escHtml(String(msg))}</div>
      <div class="pi-dialog-btnrow">
        <button id="_pi-confirm-cancel" class="action-btn">${escHtml(opts.cancelLabel || '取消')}</button>
        <button id="_pi-confirm-ok" class="action-btn action-do">${escHtml(opts.okLabel || '确定')}</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    const done = (v) => { ov.remove(); resolve(v); };
    ov.querySelector('#_pi-confirm-ok').onclick = () => done(true);
    ov.querySelector('#_pi-confirm-cancel').onclick = () => done(false);
    ov.onclick = (e) => { if (e.target === ov) done(false); };
    const onKey = (e) => {
      if (e.key === 'Escape') { done(false); document.removeEventListener('keydown', onKey, true); }
      else if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { done(true); document.removeEventListener('keydown', onKey, true); }
    };
    document.addEventListener('keydown', onKey, true);
    setTimeout(() => ov.querySelector('#_pi-confirm-ok').focus(), 0);
  });
}

function piPrompt(msg, initial = '', opts = {}) {
  return new Promise(resolve => {
    const multiline = !!opts.multiline;
    const ov = document.createElement('div');
    ov.className = 'pi-dialog-overlay';
    const inputHtml = multiline
      ? `<textarea id="_pi-prompt-input" class="pi-dialog-textarea" placeholder="${escHtml(opts.placeholder || '')}"></textarea>`
      : `<input id="_pi-prompt-input" type="text" class="pi-dialog-input" placeholder="${escHtml(opts.placeholder || '')}">`;
    ov.innerHTML = `<div class="pi-dialog" style="max-width:${multiline ? 620 : 520}px">
      <div class="pi-dialog-msg">${escHtml(String(msg))}</div>
      ${inputHtml}
      <div class="pi-dialog-btnrow">
        <button id="_pi-prompt-cancel" class="action-btn">${escHtml(opts.cancelLabel || '取消')}</button>
        <button id="_pi-prompt-ok" class="action-btn action-do">${escHtml(opts.okLabel || '确定')}</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    const el = ov.querySelector('#_pi-prompt-input');
    el.value = initial == null ? '' : String(initial);
    const done = (v) => {
      document.removeEventListener('keydown', onKey, true);
      ov.remove();
      resolve(v);
    };
    ov.querySelector('#_pi-prompt-ok').onclick = () => done(el.value);
    ov.querySelector('#_pi-prompt-cancel').onclick = () => done(null);
    ov.onclick = (e) => { if (e.target === ov) done(null); };
    const onKey = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); done(null); }
      // IME 守卫：打中文拼音 Enter 是选候选词，别抢走关弹窗
      else if (e.key === 'Enter' && !multiline && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); done(el.value); }
      else if (e.key === 'Enter' && multiline && (e.metaKey || e.ctrlKey) && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); done(el.value); }
    };
    document.addEventListener('keydown', onKey, true);
    setTimeout(() => { try { el.focus(); el.select(); } catch {} }, 0);
  });
}

// Date picker dialog. Resolves with:
//   { date: 'YYYY-MM-DD' }  — picked a date
//   { date: null }          — chose "不安排" (unscheduled)
//   null                    — cancelled
// Preset quick-picks cover the common cases; <input type="date"> handles the rest.
function piDatePicker(title, opts = {}) {
  return new Promise(resolve => {
    const today = new Date();
    const fmt = (d) => d.toLocaleDateString('sv-SE');
    const addDays = (n) => { const d = new Date(today); d.setDate(today.getDate() + n); return d; };
    // 本周末 = 本周六；下周一 = 下个周一
    const dow = today.getDay(); // 0=Sun, 6=Sat
    const daysToSat = (6 - dow + 7) % 7 || 7;
    const saturday = addDays(daysToSat);
    const daysToMon = ((1 - dow) + 7) % 7 || 7;
    const nextMon = addDays(daysToMon);

    const presets = [
      ['今天', fmt(today)],
      ['明天', fmt(addDays(1))],
      ['本周末', fmt(saturday)],
      ['下周一', fmt(nextMon)],
    ];
    const initial = opts.initial || '';
    const allowUnscheduled = opts.allowUnscheduled !== false;

    const ov = document.createElement('div');
    ov.className = 'pi-dialog-overlay';
    const presetHtml = presets.map(([label, d]) =>
      `<button class="action-btn" data-date="${d}" style="flex:1;min-width:72px">${label}<br><span style="font-size:10px;color:#8b949e">${d.slice(5)}</span></button>`
    ).join('');
    ov.innerHTML = `<div class="pi-dialog" style="max-width:460px">
      <div class="pi-dialog-msg">${escHtml(String(title || '选择日期'))}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 10px">${presetHtml}</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#8b949e;margin-bottom:8px">
        自选：
        <input id="_pi-date-input" type="date" value="${escHtml(initial)}" style="background:rgba(255,255,255,0.04);color:#c9d1d9;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:4px 8px;font-size:12px;font-family:inherit;color-scheme:dark">
      </label>
      <div class="pi-dialog-btnrow">
        <button id="_pi-date-cancel" class="action-btn">取消</button>
        ${allowUnscheduled ? '<button id="_pi-date-none" class="action-btn">不安排</button>' : ''}
        <button id="_pi-date-ok" class="action-btn action-do">确定</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    const inp = ov.querySelector('#_pi-date-input');
    const done = (v) => { document.removeEventListener('keydown', onKey, true); ov.remove(); resolve(v); };
    ov.querySelectorAll('button[data-date]').forEach(b => {
      b.onclick = () => done({ date: b.getAttribute('data-date') });
    });
    ov.querySelector('#_pi-date-ok').onclick = () => {
      const v = (inp.value || '').trim();
      if (!v) { piAlert('请选择日期，或点"不安排"'); return; }
      done({ date: v });
    };
    ov.querySelector('#_pi-date-cancel').onclick = () => done(null);
    const noneBtn = ov.querySelector('#_pi-date-none');
    if (noneBtn) noneBtn.onclick = () => done({ date: null });
    ov.onclick = (e) => { if (e.target === ov) done(null); };
    const onKey = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); done(null); }
      else if (e.key === 'Enter' && document.activeElement === inp && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); ov.querySelector('#_pi-date-ok').click(); }
    };
    document.addEventListener('keydown', onKey, true);
    setTimeout(() => { try { inp.focus(); } catch {} }, 0);
  });
}

function greeting() {
  const h = new Date().getHours();
  if (h < 6) return 'Late night';
  if (h < 12) return 'Good morning';
  if (h < 18) return 'Good afternoon';
  return 'Good evening';
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function timeUntil(iso, ago) {
  if (!iso) return '';
  const diff = new Date(iso).getTime() - Date.now();
  if (ago) {
    const past = -diff;
    if (past < 0) return '刚刚';
    const m = Math.floor(past / 60000);
    if (m < 2) return '刚刚';
    if (m < 60) return m + 'm前';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h前';
    return Math.floor(h / 24) + 'd前';
  }
  if (diff < 0) return 'now';
  const m = Math.floor(diff / 60000);
  if (m < 1) return '<1m';
  if (m < 60) return m + 'm 后';
  const h = Math.floor(m / 60);
  const rm = m % 60;
  if (h < 24) return rm > 0 ? h + 'h' + rm + 'm 后' : h + 'h 后';
  return Math.floor(h / 24) + 'd 后';
}

function formatSchedule(cron) {
  if (!cron) return '';
  const parts = cron.trim().split(/\s+/);
  if (parts.length < 5) return cron;
  const [min, hour, dom, mon, dow] = parts;

  // */N minute intervals
  if (min.startsWith('*/') && hour === '*') return `每 ${min.slice(2)} 分钟`;
  // */N hour intervals
  if (min !== '*' && hour.startsWith('*/')) return `每 ${hour.slice(2)}h @ :${min.padStart(2,'0')}`;

  // Build time string
  const timeStr = (hour !== '*' && min !== '*') ? `${hour.padStart(2,'0')}:${min.padStart(2,'0')}` : null;

  // Day of week names
  const dayMap = { '0':'周日','1':'周一','2':'周二','3':'周三','4':'周四','5':'周五','6':'周六','7':'周日' };

  // Day of month
  if (dom !== '*' && dow === '*') {
    return `每月 ${dom} 日${timeStr ? ' ' + timeStr : ''}`;
  }

  // Specific weekdays
  if (dow !== '*' && dom === '*') {
    const dayNames = dow.split(',').map(d => dayMap[d] || d).join('/');
    if (dow === '1-5') return `工作日${timeStr ? ' ' + timeStr : ''}`;
    return `${dayNames}${timeStr ? ' ' + timeStr : ''}`;
  }

  // Every day at specific time
  if (dom === '*' && dow === '*' && timeStr) return `每天 ${timeStr}`;

  return cron;
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  // POSTs typically write vault files — mark a local mutation so the SSE echo
  // from fs.watch gets suppressed (see handleRealtimeChange 0.8s window).
  if (method === 'POST' && typeof markLocalMutation === 'function') markLocalMutation();
  const res = await fetch(API + path, opts);
  return res.json();
}

  else if (tab === 'hosts') { extra = subTabOrExtra; subTabOrExtra = 'hosts'; tab = 'team'; }

  try { localStorage.setItem('pios-active-tab', tab); } catch {}
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));

  else if (tab === 'resources') loadResourcesTab();

function renderReviewActivity() {
  const container = document.getElementById('review-body');
  if (!container) return;
  const isToday = actDate === new Date().toLocaleDateString('sv-SE');
  const dow = new Date(actDate + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short' });

  // Classify
  const classified = (ACTIVITY_DATA || []).map((e, srcIdx) => {
    const isDashboard = (e.header || '').includes('dashboard');
    const isSkip = (e.header || '').includes('skip');
    const isIdle = (e.lines || []).some(l => l.includes('无事退出'));
    const tickMatch = (e.header || '').match(/tick #(\d+)/);
    const tickId = tickMatch ? tickMatch[1] : '';
    const timeMatch = (e.header || '').match(/(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2})/);
    const time = timeMatch ? timeMatch[2] : '';
    const host = e.host || '';
    const engine = e.engine || '';
    const agent = e.agent || '';
    const task = e.task || '';
    const idle = isIdle || isSkip;
    const type = isDashboard ? 'dashboard' : isSkip ? 'skip' : 'tick';
    return { ...e, _srcIdx: srcIdx, isDashboard, idle, tickId, time, host, engine, agent, task, type };
  });
  _activityCache = classified;

  const allHosts = [...new Set(classified.map(e => e.host).filter(Boolean))].sort();
  const allEngines = [...new Set(classified.map(e => e.engine).filter(Boolean))].sort();
  const allAgents = [...new Set(classified.map(e => e.agent).filter(Boolean))].sort();
  const allTasks = [...new Set(classified.map(e => e.task).filter(Boolean))].sort();

  const totalCount = classified.length;
  const idleCount = classified.filter(c => c.idle).length;
  const activeCount = totalCount - idleCount;

  const searchQ = outputsSearch.trim().toLowerCase();
  let shown = actShowIdle ? classified : classified.filter(c => !c.idle);
  if (actFilterHost) shown = shown.filter(e => e.host === actFilterHost);
  if (actFilterEngine) shown = shown.filter(e => e.engine === actFilterEngine);
  if (actFilterAgent) shown = shown.filter(e => e.agent === actFilterAgent);
  if (actFilterTask) shown = shown.filter(e => e.task === actFilterTask);
  if (searchQ) {
    shown = shown.filter(e => {
      const hay = (e.host + ' ' + e.engine + ' ' + e.agent + ' ' + e.task + ' ' + e.type + ' ' + (e.lines || []).join(' ')).toLowerCase();
      return hay.includes(searchQ);
    });
  }
  shown.sort((a, b) => b.time.localeCompare(a.time));

  if (shown.length && (!outputsSelected || !shown.find(e => 'activity:' + e._srcIdx === outputsSelected))) {
    outputsSelected = 'activity:' + shown[0]._srcIdx;
  } else if (!shown.length) {
    outputsSelected = null;
  }

  // Toolbar
  let bar = '<div style="display:flex;gap:4px;margin-bottom:10px;align-items:center;flex-wrap:wrap;font-size:11px">';
  bar += `<button class="board-filter-btn" onclick="toggleOutputsListCollapsed()" title="${outputsListCollapsed ? '展开列表' : '折叠列表'}" style="padding:4px 8px">${outputsListCollapsed ? '▸' : '◂'}</button>`;
  bar += `<button class="board-filter-btn" onclick="actNav(-1)" title="前一天">←</button>`;
  bar += `<span style="font-size:11px;color:#c9d1d9;padding:0 6px">${dow} ${actDate}${isToday ? ' <span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(74,158,255,0.15);color:#4a9eff;margin-left:3px">TODAY</span>' : ''}</span>`;
  bar += `<button class="board-filter-btn" onclick="actNav(1)" title="后一天"${isToday ? ' disabled style="opacity:0.4;cursor:not-allowed"' : ''}>→</button>`;
  bar += `<span style="width:1px;height:16px;background:rgba(255,255,255,0.08);margin:0 4px"></span>`;
  bar += `<button class="board-filter-btn${!actShowIdle ? ' active' : ''}" onclick="actShowIdle=false;renderReviewTab()">Actions ${activeCount}</button>`;
  bar += `<button class="board-filter-btn${actShowIdle ? ' active' : ''}" onclick="actShowIdle=true;renderReviewTab()">All ${totalCount}</button>`;
  function actDropdown(id, label, options, current, setter) {
    const active = current ? 'color:#4a9eff;border-color:rgba(74,158,255,0.3);' : '';
    let s = `<select id="${id}" style="font-size:11px;background:rgba(255,255,255,0.04);color:#c9d1d9;border:1px solid rgba(255,255,255,0.08);${active}border-radius:6px;padding:4px 8px;font-family:inherit" onchange="${setter}=this.value;renderReviewTab()">`;
    s += `<option value="">${label}</option>`;
    options.forEach(o => { s += `<option value="${o}"${o === current ? ' selected' : ''}>${o}</option>`; });
    s += '</select>';
    return s;
  }
  bar += actDropdown('af-host', 'Host', allHosts, actFilterHost, 'actFilterHost');
  bar += actDropdown('af-engine', 'Engine', allEngines, actFilterEngine, 'actFilterEngine');
  bar += actDropdown('af-agent', 'Agent', allAgents, actFilterAgent, 'actFilterAgent');
  bar += actDropdown('af-task', 'Task', allTasks, actFilterTask, 'actFilterTask');
  const anyFilter = actFilterHost || actFilterEngine || actFilterAgent || actFilterTask;
  if (anyFilter) bar += `<button class="board-filter-btn" onclick="actFilterHost='';actFilterEngine='';actFilterAgent='';actFilterTask='';renderReviewTab()">Clear</button>`;
  bar += `<div style="flex:1"></div>`;
  bar += `<input type="text" placeholder="search…" value="${escHtml(outputsSearch)}" oninput="_searchInput(this, v=>outputsSearch=v, renderReviewActivity, 'input[placeholder=&quot;search…&quot;]')" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#c9d1d9;font-size:11px;width:160px;outline:none">`;
  bar += `<button class="board-filter-btn" onclick="loadReviewActivity(true).then(renderReviewTab)" title="刷新">↻</button>`;
  bar += '</div>';

  const typeColors = { dashboard: '#8957e5', skip: '#888', tick: '#4a9eff' };

  let body = '';
  if (!shown.length) {
    body = '<div class="empty-state" style="padding:20px">No activity this day</div>';
  } else {
    for (const e of shown) {
      const active = outputsSelected === 'activity:' + e._srcIdx;
      const tc = typeColors[e.type] || '#555';
      const activeBg = active ? 'rgba(74,158,255,0.1)' : 'rgba(255,255,255,0.02)';
      const hoverBg = active ? 'rgba(74,158,255,0.12)' : 'rgba(255,255,255,0.06)';
      const leftBorder = active ? '2px solid #58a6ff' : `2px solid ${tc}`;
      const titleText = e.task || e.agent || (e.type + (e.tickId ? ' #' + e.tickId : ''));
      const subMeta = [e.host, e.engine].filter(Boolean).join(' · ');
      body += `<div onclick="selectReviewItem('activity','${e._srcIdx}')" style="padding:6px 8px;cursor:pointer;border-radius:3px;margin-bottom:1px;background:${activeBg};border-left:${leftBorder};display:flex;flex-direction:column;gap:3px" onmouseover="this.style.background='${hoverBg}'" onmouseout="this.style.background='${activeBg}'">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;color:#6b7280;font-family:'SF Mono',Menlo,monospace;flex-shrink:0">${escHtml(e.time)}</span>
          <span style="font-size:9px;padding:1px 5px;border-radius:8px;background:${tc}22;color:${tc};font-weight:600;text-transform:uppercase;flex-shrink:0">${escHtml(e.type)}${e.tickId ? ' #' + e.tickId : ''}</span>
          ${e.idle ? '<span style="font-size:9px;color:#555;flex-shrink:0">idle</span>' : ''}
        </div>
        <div style="font-size:12px;color:${active?'#fff':'#c9d1d9'};line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(titleText)}</div>
        ${subMeta ? `<div style="font-size:10px;color:#484f58;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(subMeta)}</div>` : ''}
      </div>`;
    }
  }

  _renderReviewPane(container, bar, body, shown.length, '');
}

// ── Bento Widget: draggable / resizable overview cards ──
const _BENTO_KEY = 'pios-bento-layout-v1';
const _BENTO_CARDS = ['pi-team', 'pi-activity', 'notifications', 'my-todos', 'pi-queue', 'scheduled-tasks'];
const _BENTO_DEFAULTS = {
  'pi-team':         { size: 'A', order: 0, hidden: false },
  'pi-activity':     { size: 'M', order: 1, hidden: false },
  'notifications':   { size: 'M', order: 2, hidden: false },
  'my-todos':        { size: 'M', order: 3, hidden: false },
  'pi-queue':        { size: 'S', order: 4, hidden: false },
  'scheduled-tasks': { size: 'S', order: 5, hidden: false },
};

function _bentoRead() {
  try {
    const saved = JSON.parse(localStorage.getItem(_BENTO_KEY) || '{}');
    const out = {};
    for (const id of _BENTO_CARDS) {
      out[id] = Object.assign({}, _BENTO_DEFAULTS[id], saved[id] || {});
    }
    return out;
  } catch (e) { return JSON.parse(JSON.stringify(_BENTO_DEFAULTS)); }
}
function _bentoWrite(layout) {
  try { localStorage.setItem(_BENTO_KEY, JSON.stringify(layout)); }
  catch (e) { console.warn('[bento] write failed', e); }
}

function _bentoCard(id, innerHtml, _defaultSize) {
  const layout = _bentoRead();
  const cur = layout[id] || { size: _defaultSize || 'M', hidden: false };
  if (cur.hidden) return '';
  const sizeClass = 'bento-' + (cur.size || 'M').toLowerCase();
  return `<div class="bento-card ${sizeClass}" data-card-id="${id}" data-size="${cur.size}">
    <div class="bento-drag-handle" title="按住拖动换位">⋮⋮</div>

function _closeAllBentoMenus() {
  document.querySelectorAll('.bento-menu.open').forEach(m => m.classList.remove('open'));
}

function toggleBentoMenu(ev, id) {
  ev.stopPropagation();
  const target = document.getElementById('bento-menu-' + id);
  if (!target) return;
  const wasOpen = target.classList.contains('open');
  _closeAllBentoMenus();
  if (!wasOpen) {
    target.classList.add('open');
    const card = document.querySelector(`[data-card-id="${id}"]`);
    const cur = card?.dataset.size || 'M';
    target.querySelectorAll('.check').forEach(c => {
      c.textContent = (c.dataset.sz === cur) ? '✓' : '';
    });
  }
}

function setBentoSize(id, size) {
  const card = document.querySelector(`[data-card-id="${id}"]`);
  if (!card) return;
  card.classList.remove('bento-s', 'bento-m', 'bento-w', 'bento-l', 'bento-a');
  card.classList.add('bento-' + size.toLowerCase());
  card.dataset.size = size;
  card.style.gridRow = '';  // clear any inline span (set by _applyAutoHeights)
  const layout = _bentoRead();
  layout[id] = Object.assign({}, layout[id] || _BENTO_DEFAULTS[id], { size });
  _bentoWrite(layout);
  _closeAllBentoMenus();
  if (size === 'A') _applyAutoHeights();
}

function hideBentoCard(id) {
  const layout = _bentoRead();
  layout[id] = Object.assign({}, layout[id] || _BENTO_DEFAULTS[id], { hidden: true });
  _bentoWrite(layout);
  _closeAllBentoMenus();
  if (typeof loadOverview === 'function') loadOverview();
}

function resetBentoLayout() {
  try { localStorage.removeItem(_BENTO_KEY); } catch (e) {}
  _closeAllBentoMenus();
  if (typeof loadOverview === 'function') loadOverview();
}

// For A (auto) cards, measure content → set grid-row span dynamically.
// grid-auto-rows = 40px, gap = 10px → step = 50px.
function _applyAutoHeights() {
  const autoCards = document.querySelectorAll('.bento-card.bento-a');
  if (!autoCards.length) return;
  const DECOR = new Set(['bento-drag-handle', 'bento-menu-btn', 'bento-menu']);
  // Phase 1: generous span so content fully renders uncropped
  autoCards.forEach(c => c.style.gridRow = 'span 30');
  // Phase 2: next frame, measure real content and collapse
  requestAnimationFrame(() => {
    autoCards.forEach(card => {
      const kids = [...card.children].filter(c => ![...c.classList].some(cl => DECOR.has(cl)));
      if (!kids.length) { card.style.gridRow = 'span 3'; return; }
      const cardTop = card.getBoundingClientRect().top;
      const bottoms = kids.map(k => k.getBoundingClientRect().bottom);
      const lastBottom = Math.max.apply(null, bottoms);
      const h = lastBottom - cardTop + 14;  // + bottom padding
      const rows = Math.max(3, Math.ceil((h + 10) / 50));  // row 40 + gap 10
      card.style.gridRow = `span ${rows}`;
    });
  });
}

let _bentoSortableInstance = null;
function initBento() {
  const container = document.getElementById('ov-bento');
  if (!container) return;
  // Apply saved order
  const layout = _bentoRead();
  const cards = Array.from(container.children);
  cards.sort((a, b) => {
    const oa = (layout[a.dataset.cardId] || {}).order ?? 99;
    const ob = (layout[b.dataset.cardId] || {}).order ?? 99;
    return oa - ob;
  });
  cards.forEach(c => container.appendChild(c));
  // Init Sortable
  if (typeof Sortable !== 'undefined') {
    if (_bentoSortableInstance) { try { _bentoSortableInstance.destroy(); } catch(e){} }
    _bentoSortableInstance = Sortable.create(container, {
      handle: '.bento-drag-handle',
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      dragClass: 'sortable-drag',
      onEnd: () => {
        const l = _bentoRead();
        Array.from(container.children).forEach((c, idx) => {
          const id = c.dataset.cardId;
          if (!id) return;
          l[id] = Object.assign({}, l[id] || _BENTO_DEFAULTS[id], { order: idx });
        });
        _bentoWrite(l);
        _applyAutoHeights();
      }
    });
  }
  _applyAutoHeights();
}

// Close menus on outside click
document.addEventListener('click', (e) => {

});

async function toggleUserDropdown(event) {
  event.stopPropagation();
  const dd = document.getElementById('user-dropdown');
  if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }

  try {
    const data = await api('GET', '/pios/users');
    const vaults = data.vaults || [];
    let html = '';
    for (const v of vaults) {
      const isCurrent = v.path === data.current;
      html += `<div class="ud-item ${isCurrent ? 'active' : ''}" onclick="${isCurrent ? '' : "switchUser('" + v.path.replace(/'/g, "\\'") + "')"}">
        <span>${isCurrent ? '● ' : ''}${escHtml(v.name)}</span>
        <span class="ud-path">${escHtml(v.path.split('/').pop())}</span>
      </div>`;
    }
    html += '<div class="ud-sep"></div>';
    html += '<div class="ud-item" onclick="createNewUser()">+ New User</div>';
    dd.innerHTML = html;
    dd.classList.add('open');
  } catch (e) {
    dd.innerHTML = `<div class="ud-item" style="color:#f85149">Error: ${e.message}</div>`;
    dd.classList.add('open');
  }

  // Close on click outside
  setTimeout(() => {
    const close = (e) => { dd.classList.remove('open'); document.removeEventListener('click', close); };
    document.addEventListener('click', close);
  }, 0);
}

async function switchUser(vaultPath) {
  const result = await api('POST', '/pios/users/switch', { vault_path: vaultPath });
  if (!result.ok) {
    document.getElementById('editor-save-msg').textContent = 'Error: ' + (result.error || 'unknown');
    return;
  }
  // App will relaunch automatically
}

// Persistent UI state across re-renders
const _dirExpandedProjects = new Set();
// Heat-view state: window size in days (7 or 30). Persisted to localStorage so
// the choice survives tab switches and reloads.
let _dirHeatWindow = (() => {
  try { return parseInt(localStorage.getItem('pios-dir-heat-window') || '7', 10) || 7; }
  catch { return 7; }
})();
function _dirSetHeatWindow(d) {
  _dirHeatWindow = d;
  try { localStorage.setItem('pios-dir-heat-window', String(d)); } catch {}
  loadDirectionTab();
}

async function loadDirectionTab() {
  const container = document.getElementById('tab-direction');
  try {
    // Load manifest + cards in all 3 buckets (needed for task-status counts + timeline expansion)
    // Heat is fetched in parallel — archived projects/tasks are included in the
    // scoring because completion is the peak investment signal (see backend docs).
    const [manifest, inboxCards, activeCards, archiveCards, heatResp] = await Promise.all([
      api('GET', '/pios/manifest'),
      api('GET', '/pios/cards?status=inbox').catch(() => []),
      api('GET', '/pios/cards?status=active').catch(() => []),
      api('GET', '/pios/cards?status=archive').catch(() => []),
      api('GET', '/pios/direction/heat?window=' + _dirHeatWindow).catch(() => ({ cards: {} })),
    ]);
    const heatCards = (heatResp && heatResp.cards) || {};
    const tag = (list, folder) => (list || []).map(c => ({ ...c, _folder: folder }));
    const allCards = [
      ...tag(inboxCards, 'inbox'),
      ...tag(activeCards, 'active'),
      ...tag(archiveCards, 'archive'),
    ];

    const dir = manifest.direction || {};
    const goals = dir.goals || {};
    // Filter out terminal statuses. Cards can sit in Cards/active/ with frontmatter
    // status in {done, dismissed, archive(d)} during the window between a "mark done"
    // action and triage's next sweep — the Direction view must not show those.
    const TERMINAL_STATUS = new Set(['done', 'dismissed', 'archive', 'archived']);
    const projectCards = (activeCards || []).filter(c => c.type === 'project' && !TERMINAL_STATUS.has(c.status));
    const projectByFilename = Object.fromEntries(projectCards.map(p => [p.filename, p]));

    // Effective-goal walker: child project inherits nearest ancestor's goal unless it sets its own.
    function effectiveGoal(p) {
      let cur = p;
      const seen = new Set();
      while (cur && !seen.has(cur.filename)) {
        if (cur.goal) return cur.goal;
        seen.add(cur.filename);
        cur = (cur.parent && projectByFilename[cur.parent]) || null;
      }
      return null;
    }

    // Children-of-project map (only project→project edges count; tasks handled separately)
    const childProjectsOf = {};
    for (const p of projectCards) {
      if (p.parent && projectByFilename[p.parent]) {
        (childProjectsOf[p.parent] = childProjectsOf[p.parent] || []).push(p);
      }
    }
    // Sort children by created asc for stable render
    for (const k of Object.keys(childProjectsOf)) {
      childProjectsOf[k].sort((a, b) => String(a.created || '').localeCompare(String(b.created || '')));
    }

    // Direct tasks map (task → parent project)
    const directTasksOf = {};
    for (const c of allCards) {
      if (c.type !== 'task' || !c.parent) continue;
      (directTasksOf[c.parent] = directTasksOf[c.parent] || []).push(c);
    }

    // Rollup task stats: count all tasks across the whole subtree under a project
    function collectDescendantTasks(filename, acc = []) {
      acc.push(...(directTasksOf[filename] || []));
      for (const child of (childProjectsOf[filename] || [])) collectDescendantTasks(child.filename, acc);
      return acc;
    }
    const taskStats = {};
    for (const p of projectCards) {
      const s = { inbox: 0, active: 0, blocked: 0, done: 0 };
      for (const c of collectDescendantTasks(p.filename)) {
        if (c._folder === 'archive' || TERMINAL_STATUS.has(c.status)) s.done++;
        else if (c._folder === 'inbox') s.inbox++;
        else if (c.blocked_on) s.blocked++;
        else s.active++;
      }
      taskStats[p.filename] = s;
    }

    // Root projects = project cards whose parent is not a resolvable project
    const rootProjects = projectCards.filter(p => !(p.parent && projectByFilename[p.parent]));

    // ── Heat rollup ─────────────────────────────────────────────
    // Walk each scored card up its parent chain, accumulating score into every
    // project ancestor. This gives each project node (root or sub) its subtree
    // total, which drives both the heat bar (roots only) and row 🔥 chips.
    //
    // allCardsIndex spans inbox + active + archive so the walk resolves even
    // when a child is archived but the parent is still active.
    const allCardsIndex = {};
    for (const c of allCards) allCardsIndex[c.filename] = c;
    const heatByProject = {}; // projectFilename → cumulative score
    for (const [fn, ev] of Object.entries(heatCards)) {
      let cur = allCardsIndex[fn];
      const seen = new Set();
      while (cur && !seen.has(cur.filename)) {
        seen.add(cur.filename);
        if (cur.type === 'project') {
          heatByProject[cur.filename] = (heatByProject[cur.filename] || 0) + ev.score;
        }
        cur = (cur.parent && allCardsIndex[cur.parent]) || null;
      }
    }
    // Heat bar entries: one per root project that has a subtree score. Uses
    // allCardsIndex (not just active projectCards) so archived root projects
    // surface when they finished within the window — completing IS the signal.
    const heatRootEntries = [];
    for (const [fn, score] of Object.entries(heatByProject)) {
      const card = allCardsIndex[fn];
      if (!card || card.type !== 'project') continue;
      // Is root? No parent, or parent isn't a project we know about
      const parentCard = card.parent && allCardsIndex[card.parent];
      const isRoot = !parentCard || parentCard.type !== 'project';
      if (!isRoot) continue;
      heatRootEntries.push({
        filename: fn,
        title: card.title || fn,
        score,
        closed: card._folder === 'archive' || TERMINAL_STATUS.has(card.status),
      });
    }
    heatRootEntries.sort((a, b) => b.score - a.score);
    window._dirHeatByProject = heatByProject;

    // Stash for timeline expansion
    window._dirAllCards = allCards;
    window._dirTaskStats = taskStats;
    window._dirChildProjectsOf = childProjectsOf;
    window._dirDirectTasksOf = directTasksOf;
    window._dirProjectByFilename = projectByFilename;

    let html = '';

    // ── Alignment ───────────────────────────────────────────────
    html += '<div class="section">';
    html += '<div class="section-title">Alignment <button class="refresh-btn" onclick="editAlignment()">edit</button></div>';
    try {
      const alignFile = await api('GET', '/pios/manifest/file?path=' + encodeURIComponent(dir.alignment || 'alignment.md'));
      const content = alignFile.content || '';
      const missionMatch = content.match(/##+ 使命[^\n]*\n+([\s\S]*?)(?=\n##|\n---|$)/);
      const phaseMatch = content.match(/##+ 当前阶段[^\n]*\n+([\s\S]*?)(?=\n##|\n---|$)/);
      const fourForces = content.match(/##+ 四种力量[^\n]*\n+([^\n]+)/);
      html += '<div style="font-size:13px;color:#c9d1d9;line-height:1.6;padding:10px 14px;background:rgba(255,255,255,0.02);border-radius:8px">';
      if (fourForces) html += '<div style="color:#4a9eff;font-size:11px;margin-bottom:8px">' + escHtml(fourForces[1].trim()) + '</div>';
      if (missionMatch && missionMatch[1].trim()) html += '<div style="margin-bottom:8px">' + escHtml(missionMatch[1].trim()) + '</div>';
      if (phaseMatch && phaseMatch[1].trim()) html += '<div style="color:#bbb">' + escHtml(phaseMatch[1].trim()) + '</div>';
      if (!missionMatch && !phaseMatch && !fourForces) {
        const firstPara = content.replace(/---[\s\S]*?---/, '').replace(/#[^\n]*\n/g, '').trim().split('\n\n')[0];
        html += escHtml(firstPara || content.substring(0, 200));
      }
      html += '</div>';
    } catch { html += '<div style="color:#555;font-size:12px">alignment.md not found</div>'; }
    html += '</div>';

    // ── Goals (each goal groups its ROOT project cards; sub-projects render recursively) ──
    // Effective goal = card's own goal, else nearest ancestor's goal.
    const bucket = {};
    const unaligned = [];
    for (const p of rootProjects) {
      const gid = effectiveGoal(p);
      if (gid && goals[gid]) (bucket[gid] = bucket[gid] || []).push(p);
      else unaligned.push(p);
    }

    // Recursive: renders a project + (collapsible if any) sub-project descendants.
    // `depth=0` root, +1 per level. Only root is draggable to other goals.
    const renderProjectRow = (p, depth = 0) => {
      const st = p.status || 'active';
      const blocked = !!p.blocked_on;
      const needsOwner = p.needs_owner;
      const dot = st === 'done' ? '#3fb950'
                : blocked ? '#d29922'
                : needsOwner ? '#ff8c42'
                : '#4a9eff';
      const tag = st === 'done' ? 'done'
                : blocked ? 'blocked'
                : needsOwner ? ('need:' + needsOwner)
                : 'active';

      const subs = childProjectsOf[p.filename] || [];
      const hasSubs = subs.length > 0;
      const subBadge = hasSubs ? `<span title="sub-projects" style="color:#a371f7;font-size:9px;font-family:monospace;flex-shrink:0">▸${subs.length}</span>` : '';

      // Rollup task-status chips (whole subtree; matches intuition of "how much is happening here")
      const s = taskStats[p.filename];
      let chips = '';
      if (s) {
        const chip = (n, bg, fg, title) => n > 0
          ? `<span title="${title}" style="background:${bg};color:${fg};font-size:9px;padding:1px 5px;border-radius:3px;font-family:monospace">${n}</span>`
          : '';
        const suffix = hasSubs ? '（含子 project）' : '';
        chips = `<span style="display:inline-flex;gap:3px;flex-shrink:0">
          ${chip(s.inbox,  'rgba(138,148,158,0.18)', '#8b949e', 'inbox tasks' + suffix)}
          ${chip(s.active, 'rgba(74,158,255,0.20)',  '#4a9eff', 'active tasks' + suffix)}
          ${chip(s.blocked,'rgba(210,153,34,0.22)',  '#d29922', 'blocked tasks' + suffix)}
          ${chip(s.done,   'rgba(63,185,80,0.18)',   '#3fb950', 'done / archived tasks' + suffix)}
        </span>`;
      }

      // Heat chip: subtree "recent investment" score for this project node.
      // Intensity scales alpha from 0.15 (cold) to 0.55 (hot). Threshold ≥10 = hot.
      const heatScore = heatByProject[p.filename] || 0;
      let heatChip = '';
      if (heatScore > 0) {
        const intensity = Math.min(1, heatScore / 15);
        const alpha = 0.15 + intensity * 0.40;
        heatChip = `<span title="近 ${_dirHeatWindow}d 投入分（subtree）：${heatScore}" style="background:rgba(255,140,66,${alpha.toFixed(2)});color:#ffb86b;font-size:9px;padding:1px 5px;border-radius:3px;font-family:monospace;flex-shrink:0">🔥${heatScore}</span>`;
      }

      const indentPx = depth * 18;
      const draggable = depth === 0;
      const bullet = depth === 0 ? '' : '<span style="color:#555;font-size:10px;margin-right:2px">↳</span>';

      let html = `<div ${draggable ? 'draggable="true"' : ''}
        ${draggable ? `ondragstart="_dirProjDragStart(event,'${escHtml(p.filename)}','${escHtml(p.goal || '')}')"` : ''}
        ${draggable ? 'ondragend="_dirProjDragEnd(event)"' : ''}
        style="display:flex;align-items:center;gap:8px;padding:6px 10px 6px ${10 + indentPx}px;border-radius:6px;cursor:${draggable ? 'grab' : 'pointer'};font-size:12px;user-select:none"
        onmouseover="this.style.background='rgba(255,255,255,0.04)'"
        onmouseout="this.style.background=''"
        onclick="openDashboardCard('${escHtml(p.filename)}')"
        title="${draggable ? '拖动到其他 goal 改变归属' : 'sub-project（归属跟随 parent）'}">
        <span style="width:6px;height:6px;border-radius:50%;background:${dot};flex-shrink:0"></span>
        ${bullet}
        <span style="color:#c9d1d9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(p.title || p.filename)}</span>
        ${subBadge}
        ${heatChip}
        ${chips}
        <button title="为本 project 添加 task" onclick="event.stopPropagation();addTaskToProject('${escHtml(p.filename)}')" style="background:rgba(74,158,255,0.10);color:#4a9eff;border:1px solid rgba(74,158,255,0.30);border-radius:3px;font-size:9px;padding:1px 5px;cursor:pointer;font-family:monospace">+T</button>
        <button title="为本 project 添加 sub-project" onclick="event.stopPropagation();addSubprojectToProject('${escHtml(p.filename)}')" style="background:rgba(163,113,247,0.10);color:#a371f7;border:1px solid rgba(163,113,247,0.30);border-radius:3px;font-size:9px;padding:1px 5px;cursor:pointer;font-family:monospace">+P</button>
        <span style="color:#555;font-size:10px">${escHtml(tag)}</span>
      </div>`;

      // Recurse children
      for (const sub of subs) html += renderProjectRow(sub, depth + 1);

      return html;
    };

    // ── Heat bar (recent investment leaderboard) ────────────────
    // One-line horizontal pills above Goals. Clicking a pill opens the project
    // card (not scroll — archived projects don't have rows in Direction below).
    html += '<div class="section">';
    {
      const btn = (d) => `<button onclick="_dirSetHeatWindow(${d})" style="background:${_dirHeatWindow === d ? 'rgba(255,140,66,0.25)' : 'transparent'};border:1px solid ${_dirHeatWindow === d ? 'rgba(255,140,66,0.6)' : 'rgba(255,255,255,0.1)'};color:${_dirHeatWindow === d ? '#ffb86b' : '#8b949e'};padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit">${d}d</button>`;
      html += `<div class="section-title" style="display:flex;align-items:center;gap:6px">
        🔥 最近投入
        <div style="display:flex;gap:4px;margin-left:4px">${btn(7)}${btn(30)}</div>
        <span style="flex:1"></span>
      </div>`;
      if (heatRootEntries.length === 0) {
        html += `<div style="color:#555;font-size:11px;padding:4px 10px">（最近 ${_dirHeatWindow}d 没有可统计的投入事件 — Work History 无近期 bullet、无归档完成、无新建卡）</div>`;
      } else {
        html += '<div style="display:flex;flex-wrap:wrap;gap:6px;padding:2px 0">';
        const max = heatRootEntries[0].score || 1;
        // Show top 8; if more, show "+N more" hint
        const shown = heatRootEntries.slice(0, 8);
        for (const e of shown) {
          const intensity = Math.min(1, e.score / max);
          const alpha = 0.18 + intensity * 0.45;
          const done = e.closed ? '<span style="color:#3fb950;margin-right:2px">✓</span>' : '';
          html += `<span onclick="openDashboardCard('${escHtml(e.filename)}')" title="近 ${_dirHeatWindow}d 投入：${e.score}${e.closed ? '（本窗口内完成）' : ''}" style="background:rgba(255,140,66,${alpha.toFixed(2)});color:#ffb86b;border:1px solid rgba(255,140,66,0.45);padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;max-width:240px">${done}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(e.title)}</span><span style="color:#fff;font-weight:600;font-family:monospace">${e.score}</span></span>`;
        }
        if (heatRootEntries.length > shown.length) {
          html += `<span style="color:#555;font-size:11px;align-self:center">+${heatRootEntries.length - shown.length} more</span>`;
        }
        html += '</div>';
      }
    }
    html += '</div>';

    html += '<div class="section">';
    html += '<div class="section-title">Goals <button class="refresh-btn" onclick="addGoal()">+ add goal</button> <button class="refresh-btn" onclick="loadDirectionTab()" title="重新拉取 cards">↻</button></div>';
    if (Object.keys(goals).length === 0) {
      html += '<div style="color:#555;font-size:12px">pios.yaml direction.goals 为空 — 点 "+ add goal" 新建</div>';
    } else {
      for (const [gid, g] of Object.entries(goals)) {
        const items = bucket[gid] || [];
        const total = items.length;
        const done = items.filter(p => p.status === 'done').length;
        const blockedN = items.filter(p => !!p.blocked_on || !!(p.frontmatter && p.frontmatter.blocked_on)).length;
        const active = total - done - blockedN;
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;

        html += `<div
          data-goal-dropzone="${escHtml(gid)}"
          ondragover="_dirDragOver(event)"
          ondragleave="_dirDragLeave(event)"
          ondrop="_dirProjDrop(event,'${escHtml(gid)}')"
          style="padding:12px 14px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:8px;margin-bottom:10px;transition:background 0.15s,border-color 0.15s">
          <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:2px">
            <span style="font-size:11px;color:#4a9eff;font-family:monospace">${escHtml(gid)}</span>
            <span style="font-size:14px;color:#fff;flex:1">${escHtml(g.description || '')}</span>
            <span style="font-size:10px;color:#666">${escHtml(g.timeframe || '')}</span>
            <button class="refresh-btn" style="font-size:10px;padding:2px 6px" onclick="editGoal('${escHtml(gid)}')" title="编辑 goal">edit</button>
            <button class="refresh-btn" style="font-size:10px;padding:2px 6px" onclick="createProjectForGoal('${escHtml(gid)}')" title="为本 goal 新建 project">+ project</button>
            <button class="refresh-btn" style="font-size:10px;padding:2px 6px;color:#f85149" onclick="deleteGoal('${escHtml(gid)}')" title="删除 goal">✕</button>
          </div>
          ${g.criteria ? `<div style="font-size:11px;color:#888;margin-bottom:8px">criteria: ${escHtml(g.criteria)}</div>` : ''}
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="flex:1;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:#3fb950"></div>
            </div>
            <span style="font-size:10px;color:#666;font-family:monospace">${done}/${total}${blockedN ? ' · ' + blockedN + ' blocked' : ''}${active ? ' · ' + active + ' active' : ''}</span>
          </div>`;
        if (items.length === 0) {
          html += '<div style="color:#555;font-size:11px;padding:4px 10px">（暂无挂到本 goal 的 project — 点 "+ project" 新建）</div>';
        } else {
          for (const p of items) html += renderProjectRow(p);
        }
        html += '</div>';
      }
    }

    // Unaligned drop zone (always visible so you can drag back to unaligned)
    html += `<div
      data-goal-dropzone="_unaligned"
      ondragover="_dirDragOver(event)"
      ondragleave="_dirDragLeave(event)"
      ondrop="_dirProjDrop(event,'_unaligned')"
      style="padding:10px 14px;background:rgba(255,255,255,0.015);border:1px dashed rgba(255,255,255,0.08);border-radius:8px;transition:background 0.15s,border-color 0.15s">
      <div style="font-size:12px;color:#888;margin-bottom:6px">未对齐到 Goal（${unaligned.length}）— 拖 project 到此处可移除 goal 归属</div>`;
    if (unaligned.length === 0) {
      html += '<div style="color:#555;font-size:11px;padding:4px 10px;font-style:italic">（空）</div>';
    } else {
      for (const p of unaligned) html += renderProjectRow(p);
    }
    html += '</div>';
    html += '</div>';

    // ── Timeline (project-level gantt, grouped by goal) ─────────
    html += '<div class="section">';
    html += '<div class="section-title">Timeline</div>';
    html += '<div id="direction-timeline"></div>';
    html += '</div>';

    container.innerHTML = html;

    // Render timeline after DOM in place (uses same cardsAll-like data)
    renderDirectionTimeline(projectCards, goals);
  } catch (e) {
    container.innerHTML = `<div class="empty-state">Error: ${escHtml(e.message)}</div>`;
  }
}

function _dirToggleTimelineRow(filename) {
  if (_dirExpandedProjects.has(filename)) _dirExpandedProjects.delete(filename);
  else _dirExpandedProjects.add(filename);
  loadDirectionTab();
}

function _dirExpandAllTimeline(expand) {
  if (!expand) { _dirExpandedProjects.clear(); loadDirectionTab(); return; }
  const projs = (window._dirAllCards || []).filter(c => c.type === 'project');
  for (const p of projs) _dirExpandedProjects.add(p.filename);
  loadDirectionTab();
}

// Project-level gantt for the Direction tab — recursive (projects can contain sub-projects).
// Expanding a project reveals its direct children (sub-projects + tasks) one level at a time;
// sub-projects themselves have chevrons for further expansion (unlimited depth).
function renderDirectionTimeline(projectCards, goals) {
  const el = document.getElementById('direction-timeline');
  if (!el) return;

  const items = (projectCards || []).filter(p => p.created);
  if (!items.length) {
    el.innerHTML = '<div style="color:#555;font-size:12px;padding:6px 2px">暂无带 created 日期的 project</div>';
    return;
  }

  const allCards = window._dirAllCards || [];
  const childProjectsOf = window._dirChildProjectsOf || {};
  const directTasksOf = window._dirDirectTasksOf || {};
  const projectByFilename = window._dirProjectByFilename || {};

  // Effective goal walker (same rule as Goals section: inherit from nearest ancestor)
  const effGoal = (p) => {
    let cur = p; const seen = new Set();
    while (cur && !seen.has(cur.filename)) {
      if (cur.goal) return cur.goal;
      seen.add(cur.filename);
      cur = (cur.parent && projectByFilename[cur.parent]) || null;
    }
    return null;
  };

  // Root projects only at top level (sub-projects rendered via recursion when parent expanded)
  const roots = items.filter(p => !(p.parent && projectByFilename[p.parent]));

  // Date range: sweep ALL descendants whose ancestor chain is (transitively) expanded
  const todayStr = new Date().toISOString().slice(0, 10);
  let minDate = todayStr;
  const extendRange = (ds) => { if (ds && ds < minDate) minDate = ds; };
  roots.forEach(p => extendRange(String(p.created).slice(0, 10)));
  const sweepForDateRange = (filename) => {
    if (!_dirExpandedProjects.has(filename)) return;
    for (const t of (directTasksOf[filename] || [])) {
      if (t.created) extendRange(String(t.created).slice(0, 10));
    }
    for (const sub of (childProjectsOf[filename] || [])) {
      if (sub.created) extendRange(String(sub.created).slice(0, 10));
      sweepForDateRange(sub.filename); // only deepens if sub is also expanded
    }
  };
  for (const p of roots) sweepForDateRange(p.filename);

  const dMin = new Date(minDate); dMin.setDate(dMin.getDate() - 1);
  const dMax = new Date(todayStr); dMax.setDate(dMax.getDate() + 2);
  const rangeMs = dMax - dMin;
  const rangeDays = Math.max(1, Math.ceil(rangeMs / 86400000));
  const barWidth = Math.max(500, rangeDays * 10);
  const dateToX = (ds) => ((new Date(ds) - dMin) / rangeMs) * barWidth;

  const palette = ['#4a9eff', '#ff8c42', '#d29922', '#3fb950', '#a371f7', '#f778ba', '#58a6ff'];
  const goalColor = {};
  let ci = 0;
  for (const gid of Object.keys(goals || {})) { goalColor[gid] = palette[ci++ % palette.length]; }
  goalColor._unaligned = '#6e7681';

  // Sort roots by effective-goal order then created asc
  const goalOrder = [...Object.keys(goals || {}), '_unaligned'];
  roots.sort((a, b) => {
    const ga = effGoal(a) && goals[effGoal(a)] ? effGoal(a) : '_unaligned';
    const gb = effGoal(b) && goals[effGoal(b)] ? effGoal(b) : '_unaligned';
    const gi = goalOrder.indexOf(ga) - goalOrder.indexOf(gb);
    if (gi !== 0) return gi;
    return String(a.created || '').localeCompare(String(b.created || ''));
  });

  const step = rangeDays > 60 ? 7 : rangeDays > 20 ? 3 : 1;
  let dateMarks = '';
  const cursor = new Date(dMin); cursor.setDate(cursor.getDate() + 1);
  while (cursor <= dMax) {
    const ds = cursor.toISOString().slice(0, 10);
    const x = dateToX(ds);
    const d = new Date(ds);
    const label = d.getDate() === 1
      ? d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' })
      : String(d.getDate());
    dateMarks += `<div style="position:absolute;left:${x}px;top:0;font-size:9px;color:#484f58;transform:translateX(-50%)">${label}</div>`;
    cursor.setDate(cursor.getDate() + step);
  }
  const todayX = dateToX(todayStr);

  const anyExpanded = _dirExpandedProjects.size > 0;
  const toolbar = `<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
    <button class="board-filter-btn" onclick="_dirExpandAllTimeline(true)">展开全部</button>
    <button class="board-filter-btn${anyExpanded ? '' : ' active'}" onclick="_dirExpandAllTimeline(false)">全部收起</button>
    <span style="color:#555;font-size:10px;margin-left:4px">▸ 展开可看子 project + task；sub-project 也可再展开</span>
  </div>`;

  // Recursive renderer. `depth` drives indent; color follows effective goal of the root.
  function renderProjectRowTl(p, rootColor, rootGid, depth) {
    if (!p.created) return '';
    const createdDate = String(p.created).slice(0, 10);
    const startX = dateToX(createdDate);
    const width = Math.max(6, todayX - startX);
    const daysOpen = Math.round((new Date(todayStr) - new Date(createdDate)) / 86400000);
    const blocked = !!p.blocked_on;
    const done = p.status === 'done';
    const opacity = done ? 0.35 : (depth === 0 ? 1 : 0.82);
    const bg = blocked
      ? `repeating-linear-gradient(45deg,${rootColor},${rootColor} 4px,rgba(0,0,0,0.4) 4px,rgba(0,0,0,0.4) 7px)`
      : rootColor;

    const subs = childProjectsOf[p.filename] || [];
    const tasks = directTasksOf[p.filename] || [];
    const expandable = subs.length > 0 || tasks.length > 0;
    const isExpanded = _dirExpandedProjects.has(p.filename);
    const chevron = expandable
      ? `<span style="color:#8b949e;cursor:pointer;width:14px;display:inline-block;text-align:center;font-size:10px" onclick="event.stopPropagation();_dirToggleTimelineRow('${escHtml(p.filename)}')">${isExpanded ? '▾' : '▸'}</span>`
      : `<span style="width:14px;display:inline-block"></span>`;
    const childCountBadge = expandable
      ? ` <span style="color:#555;font-size:9px">·${subs.length > 0 ? subs.length + 'p' : ''}${subs.length > 0 && tasks.length > 0 ? '+' : ''}${tasks.length > 0 ? tasks.length + 't' : ''}</span>`
      : '';

    const titlePadLeft = 6 + depth * 14;
    const prefix = depth > 0 ? '<span style="color:#555;font-size:9px;margin-right:2px">↳</span>' : '';

    let out = `<div style="display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.04);height:${depth === 0 ? 24 : 22}px${depth > 0 ? ';background:rgba(255,255,255,0.010)' : ''}">
      <div style="width:38px;flex-shrink:0;padding:0 6px;font-size:9px;color:${rootColor};font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(rootGid)}">${depth === 0 ? escHtml(rootGid === '_unaligned' ? '—' : rootGid.split('-')[0]) : ''}</div>
      <div style="width:220px;flex-shrink:0;padding:0 6px 0 ${titlePadLeft}px;font-size:${depth === 0 ? 11 : 10}px;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:2px">
        ${chevron}
        ${prefix}
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;cursor:pointer" onclick="openDashboardCard('${escHtml(p.filename)}')">${escHtml(p.title || p.filename)}${childCountBadge}</span>
      </div>
      <div style="position:relative;width:${barWidth}px;height:${depth === 0 ? 24 : 22}px">
        <div title="${escHtml((p.title || '') + ' · ' + daysOpen + 'd')}" style="position:absolute;top:${depth === 0 ? 7 : 7}px;left:${startX}px;width:${width}px;height:${depth === 0 ? 10 : 8}px;border-radius:3px;background:${bg};opacity:${opacity}"></div>
        <div style="position:absolute;top:0;left:${todayX}px;width:1px;height:${depth === 0 ? 24 : 22}px;background:#4a9eff;opacity:0.6"></div>
      </div>
    </div>`;

    if (!isExpanded || !expandable) return out;

    // Sort sub-projects then tasks, each by created asc
    const subsSorted = [...subs].sort((a, b) => String(a.created || '').localeCompare(String(b.created || '')));
    const tasksSorted = [...tasks].sort((a, b) => String(a.created || '').localeCompare(String(b.created || '')));

    // Sub-projects recurse
    for (const sub of subsSorted) out += renderProjectRowTl(sub, rootColor, rootGid, depth + 1);

    // Direct tasks (leaves)
    const TERMINAL = new Set(['done', 'dismissed', 'archive', 'archived']);
    for (const t of tasksSorted) {
      const tCreated = t.created ? String(t.created).slice(0, 10) : null;
      if (!tCreated) continue;
      const tStart = dateToX(tCreated);
      const tDone = t._folder === 'archive' || TERMINAL.has(t.status);
      const tEnd = tDone && t.mtime
        ? dateToX(new Date(t.mtime * 1000).toISOString().slice(0, 10))
        : todayX;
      const tW = Math.max(4, tEnd - tStart);
      const tBlocked = !!t.blocked_on;
      const tOpacity = tDone ? 0.4 : 0.85;
      const tBg = tBlocked
        ? `repeating-linear-gradient(45deg,${rootColor},${rootColor} 3px,rgba(0,0,0,0.4) 3px,rgba(0,0,0,0.4) 6px)`
        : rootColor;
      const tag = tDone ? 'done' : tBlocked ? 'blocked' : (t._folder || 'active');
      const tPadLeft = 6 + (depth + 1) * 14 + 14; // +14 to sit under the chevron column
      out += `<div style="display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.03);height:20px;background:rgba(255,255,255,0.015)">
        <div style="width:38px;flex-shrink:0"></div>
        <div style="width:220px;flex-shrink:0;padding:0 6px 0 ${tPadLeft}px;font-size:10px;color:#8b949e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="openDashboardCard('${escHtml(t.filename)}')" title="${escHtml(t.title || t.filename)} · ${tag}">↳ ${escHtml(t.title || t.filename)}</div>
        <div style="position:relative;width:${barWidth}px;height:20px">
          <div title="${escHtml((t.title || '') + ' · ' + tag)}" style="position:absolute;top:7px;left:${tStart}px;width:${tW}px;height:6px;border-radius:2px;background:${tBg};opacity:${tOpacity}"></div>
          <div style="position:absolute;top:0;left:${todayX}px;width:1px;height:20px;background:#4a9eff;opacity:0.4"></div>
        </div>
      </div>`;
    }

    return out;
  }

  let rows = '';
  for (const p of roots) {
    const gid = effGoal(p) && goals[effGoal(p)] ? effGoal(p) : '_unaligned';
    const color = goalColor[gid];
    rows += renderProjectRowTl(p, color, gid, 0);
  }

  // Legend (per-goal chips)
  let legend = '<div style="display:flex;gap:10px;flex-wrap:wrap;padding:8px 10px;font-size:10px;color:#8b949e;border-top:1px solid rgba(255,255,255,0.06)">';
  for (const gid of Object.keys(goals || {})) {
    legend += `<span><span style="display:inline-block;width:10px;height:10px;background:${goalColor[gid]};border-radius:2px;vertical-align:middle;margin-right:4px"></span>${escHtml(gid)}</span>`;
  }
  legend += `<span><span style="display:inline-block;width:10px;height:10px;background:${goalColor._unaligned};border-radius:2px;vertical-align:middle;margin-right:4px"></span>unaligned</span>`;
  legend += `<span><span style="display:inline-block;width:10px;height:10px;background:repeating-linear-gradient(45deg,#8b949e,#8b949e 3px,rgba(0,0,0,0.4) 3px,rgba(0,0,0,0.4) 6px);border-radius:2px;vertical-align:middle;margin-right:4px"></span>blocked</span>`;
  legend += `<span><span style="display:inline-block;width:1px;height:10px;background:#4a9eff;vertical-align:middle;margin-right:4px"></span>today</span>`;
  legend += '</div>';

  let out = toolbar;
  out += '<div style="overflow:auto;max-height:420px;border:1px solid rgba(255,255,255,0.06);border-radius:8px">';
  out += `<div style="display:flex;align-items:center;height:20px;border-bottom:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.025);position:sticky;top:0;z-index:1">
    <div style="width:38px;flex-shrink:0;padding:0 6px;font-size:9px;color:#8b949e;text-transform:uppercase">goal</div>
    <div style="width:220px;flex-shrink:0;padding:0 6px;font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px">project / task</div>
    <div style="position:relative;width:${barWidth}px;height:20px">${dateMarks}</div>
  </div>`;
  out += rows;
  out += legend;
  out += '</div>';
  el.innerHTML = out;
}

function clearEditorTransientUI() {

// Opens the editor to collect a 不做了 reason (min 4 chars) then dismisses the card.
// Used from Things Need You strip + Board Review. Refreshes both surfaces on success.
async function promptDismissWithReason(filename) {
  const d = (decisions || []).find(x => x.filename === filename)
    || (ownerQueueAll || []).find(x => x.filename === filename)
    || (MYTODOS_DATA || []).find(x => x.filename === filename)
    || { title: filename };
  const title = d.title || filename;
  const hint = '为什么不做了？（至少 4 个字，Pi 会把原因记到卡片里）';
  openEditor(title + ' — 不做了', hint, null, null);
  const textarea = document.getElementById('editor-textarea');
  if (!textarea) return;
  textarea.value = '';
  textarea.placeholder = hint;
  textarea.focus();
  const saveBtn = document.getElementById('editor-save-btn');
  if (!saveBtn) return;
  saveBtn.textContent = '确认不做';
  saveBtn.onclick = async () => {
    const reason = textarea.value.trim();
    if (reason.length < 4) { piAlert('"不做了"的原因至少写 4 个字'); return; }
    try {
      await runDecisionAction(async () => {
        const r = await api('POST', '/pios/dismiss-card', { filename, reason });
        if (r && r.ok) {
          closeEditor();
          piToast('已标记为不做了', 'info');
          await refreshOwnerQueue();
          delete _cardContentCache[filename];
          if (boardReviewIdx > 0) boardReviewIdx--;
          renderBoardReview();
          advanceDecision(); loadOverview();
          myTodosLoaded = false;
        } else { piAlert('失败: ' + ((r && r.error) || 'unknown')); }
      }, document.getElementById('editor-overlay') || document);
    } catch (e) { piAlert('失败: ' + e.message); }
  };
}


function setDecisionBusyState(isBusy, scope = document) {
  _decisionBusy = isBusy;
  scope.querySelectorAll('button, input, textarea, select').forEach(el => {
    if (el.id === 'editor-save-btn') {
      el.disabled = isBusy;
      el.style.opacity = isBusy ? '0.65' : '';
      return;
    }
    if (el.tagName === 'BUTTON' || el.closest('#owner-action-container') || el.closest('#defer-options')) {
      el.disabled = isBusy;
      if (el.tagName === 'BUTTON') el.style.opacity = isBusy ? '0.65' : '';
    }
  });
}

async function runDecisionAction(task, scope = document) {
  if (_decisionBusy) return;
  setDecisionBusyState(true, scope);
  try {
    await task();
  } finally {
    setDecisionBusyState(false, scope);
  }
}

function collectOutputRefs(card, body = '') {
  const refs = new Map();
  const content = String(body || card?.content || '');
  const push = (id, label) => {
    if (!id || refs.has(id)) return;
    refs.set(id, { id, label: label || id.split('/').pop() || id });
  };

  (outputsAll || []).forEach(o => {
    if (o.project === card?.filename || o.relatedCard === card?.filename || o.track === card?.filename) {
      push(o.id, o.title || o.id);
    }
  });

  const regex = /Pi\/Output\/(intel|content|infra|health)\/([^\s`<]+?\.md)/g;
  let match;
  while ((match = regex.exec(content))) {
    const id = `${match[1]}/${match[2]}`;
    push(id, match[2]);
  }

  return Array.from(refs.values()).slice(0, 6);
}

function renderOutputShortcutHTML(refs, tone = 'blue') {
  if (!refs.length) return '';
  const accent = tone === 'amber' ? '#ffb86b' : '#58a6ff';
  const border = tone === 'amber' ? 'rgba(255,184,107,0.28)' : 'rgba(88,166,255,0.22)';
  const bg = tone === 'amber' ? 'rgba(255,184,107,0.08)' : 'rgba(88,166,255,0.08)';
  return `<div style="margin-top:14px;padding:12px 14px;border-radius:10px;border:1px solid ${border};background:${bg}">
    <div style="font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:${accent};margin-bottom:10px">附带报告 / 产出</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${refs.map(ref => `<button onclick="openOutputInModal('${escHtml(ref.id)}')" style="padding:7px 12px;border-radius:999px;border:1px solid ${border};background:rgba(13,17,23,0.72);color:#e6edf3;cursor:pointer;font-size:12px;font-family:inherit">${escHtml(ref.label)}</button>`).join('')}
    </div>
  </div>`;
}

function openEditor(title, content, filePath, onSave) {
  clearEditorTransientUI();
  document.getElementById('editor-title').textContent = title;
  document.getElementById('editor-textarea').value = content;
  document.getElementById('editor-save-msg').textContent = '';
  editorFilePath = filePath;
  editorCallback = onSave;
  document.getElementById('editor-overlay').classList.add('show');
  setTimeout(() => document.getElementById('editor-textarea').focus(), 100);
}

function closeEditor() {
  // Clean up all editor state
  clearEditorTransientUI();
  const textarea = document.getElementById('editor-textarea');
  if (textarea) { textarea.style.display = ''; textarea.readOnly = false; textarea.style.opacity = ''; }
  const saveBtn = document.getElementById('editor-save-btn');
  if (saveBtn) { saveBtn.textContent = 'Save'; saveBtn.onclick = saveEditor; saveBtn.style.display = ''; }
  document.getElementById('editor-overlay').classList.remove('show');
  editorCallback = null;
  editorFilePath = null;
  _decisionBusy = false;
  // 编辑期间被抑制的 overview 刷新补回来
  if (_pendingOverviewRefresh) {
    _pendingOverviewRefresh = false;
    loadOverview();
  }
}

async function saveEditor() {
  const content = document.getElementById('editor-textarea').value;
  const msgEl = document.getElementById('editor-save-msg');
  try {
    await api('POST', '/pios/manifest/file', { path: editorFilePath, content });
    msgEl.textContent = 'Saved';
    msgEl.style.color = '#4a9eff';
    if (editorCallback) editorCallback();
    setTimeout(closeEditor, 600);
  } catch (e) {
    msgEl.textContent = 'Error: ' + e.message;
    msgEl.style.color = '#ff8c42';
  }
}
