// Header date strip for card detail. Pulls every time-bearing field that lives
// on the card and renders one human line. Drops fields that are empty so the
// strip stays tight; the toolbar still owns the editable chips (deferred_until,
// blocked_on) — this is just the read-only summary above the body.
function renderCardDateStrip(card) {
  const fmt = (v) => {
    if (v === null || v === undefined || v === '') return '';
    const d = (typeof v === 'number') ? new Date(v * 1000) : new Date(v);
    if (isNaN(d.getTime())) return String(v).slice(0, 10);
    return d.toLocaleDateString('sv-SE');
  };
  const parts = [];
  const cFmt = fmt(card.created);
  if (cFmt) parts.push(`📅 创建 ${cFmt}`);
  const mFmt = fmt(card.mtime);
  if (mFmt && mFmt !== cFmt) parts.push(`✏️ 改 ${mFmt}`);
  if (card.deferred_until) parts.push(`⏰ 安排 ${String(card.deferred_until).slice(0, 10)}`);
  const bo = card.blocked_on;
  if (bo && typeof bo === 'string') {
    const m = bo.match(/(verify-after|wait-for-trigger)[\s:]*(\d{4}-\d{2}-\d{2}(?:[ T]\d{1,2}:\d{2})?)/);
    if (m) {
      const label = m[1] === 'verify-after' ? '🔒 等验' : '⏳ 等触发';
      parts.push(`${label} ${m[2]}`);
    }
  }
  if (card.cron) {
    const human = formatSchedule(card.cron);
    if (human) parts.push(`🔁 ${human}`);
  }
  return parts;
}

// ── Shared Card Detail Renderer ──
// Used by both the floating modal (openCardDetail) and the Review sub-tab's middle pane.
// `card` is a normalized card object with frontmatter fields flattened onto it
// (filename, title, content, type, priority, status, blocked_on, parent, deferred_until, created).
// opts:
//   showClose — render ✕ close button in header (for modal use)
//   compact — tighter padding (for Review pane)
function renderCardDetailHTML(card, opts = {}) {
  const filename = card.filename || '';
  const title = card.title || filename;
  const content = card.content || card._content || '';
  const parent = card.parent || null;

  // Subtasks: cards whose parent is this card's filename
  const childTasks = (cardsAll || []).filter(c =>
    c.parent === filename && c.folder !== 'archive' && c.filename !== filename
  ).sort((a, b) => cardPriorityInt(a) - cardPriorityInt(b));

  // Related outputs: outputs linked to this card
  const relatedOutputs = (outputsAll || []).filter(o =>
    o.project === filename || o.relatedCard === filename || o.track === filename
  );

  const pad = opts.compact ? '10px 0 4px' : '14px 20px 10px';
  const bodyPad = opts.compact ? '10px 0 0' : '16px 20px';

  let h = '';

  // Title + parent nav + filename. Metadata pickers (type/priority/status/
  // blocked/deferred) and edit buttons moved to renderCardActionsHTML so the
  // sticky toolbar hosts all card operations in one row.
  const isEditing = opts.showClose && _cardEditingFilename === filename;
  h += `<div style="padding:${pad};${opts.compact?'':'background:#0d1117;border-bottom:1px solid rgba(255,255,255,0.06)'}">`;
  h += `<h2 style="margin:0 0 2px;font-size:18px;color:#f0f6fc;font-weight:600">${escHtml(title)}</h2>`;
  if (parent) {
    h += `<div style="font-size:11px;margin-top:3px"><span onclick="openCardDetail('${escHtml(parent)}')" style="cursor:pointer;color:#58a6ff">← ${escHtml(parent)}</span></div>`;
  }
  const dateText = renderCardDateStrip(card).join(' · ');
  h += `<div style="font-size:10px;color:#484f58;margin-top:4px">${escHtml(filename)}${dateText ? ' · ' + escHtml(dateText) : ''}</div>`;
  h += `</div>`;

  // Things Need You brief 横幅 — 只在从 owner queue 点进来时显示，让 owner 看一眼就懂要干啥。
  // needs_owner_brief 是新规范（card-spec.md），decision_brief 是旧字段兼容。
  if (opts.fromOwnerQueue) {
    const brief = card.needs_owner_brief || card.decision_brief || '';
    if (brief) {
      h += `<div style="margin:12px 20px 0;padding:12px 14px;background:rgba(88,166,255,0.08);border-left:3px solid #4a9eff;border-radius:4px;font-size:13px;color:#e6edf3;line-height:1.55">${escHtml(String(brief))}</div>`;
    }
  }

  // Pi suggestions slot (filled async by openCardDetail)
  h += `<div id="card-pi-suggestions-slot" style="margin:0 20px 0"></div>`;

  // My TODOs ✓完成 / ✕不做了 buttons moved to modal toolbar (renderCardActionsHTML).

  // Body: markdown content (or textarea when editing)
  h += `<div style="padding:${bodyPad}">`;
  if (isEditing) {
    h += `<textarea id="card-edit-textarea" class="pi-dialog-textarea" spellcheck="false"
      style="width:100%;min-height:340px;box-sizing:border-box;background:#0d1117;color:#c9d1d9;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:14px 16px;font-size:13px;font-family:'SF Mono',Menlo,monospace;line-height:1.55;resize:vertical"
      placeholder="Markdown body…">${escHtml(content)}</textarea>
      <div style="display:flex;gap:10px;align-items:center;margin-top:8px;font-size:10px;color:#484f58">
        <kbd style="background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:3px;font-family:'SF Mono',Menlo,monospace">⌘S</kbd> 保存
        <kbd style="background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:3px;font-family:'SF Mono',Menlo,monospace">Esc</kbd> 取消
        <span style="margin-left:auto">正文 = markdown。frontmatter 不在这里改（顶部 pickers）。</span>
      </div>`;
  } else {
    h += `<div class="md-rendered" style="font-size:13px;color:#c9d1d9;line-height:1.65">${renderMd(content)}</div>`;
  }

  // Subtasks section
  if (childTasks.length) {
    h += `<div style="margin-top:18px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)">`;
    h += `<div style="font-size:12px;font-weight:600;color:#238636;margin-bottom:8px">✅ 子任务 (${childTasks.length})</div>`;
    childTasks.forEach(t => {
      const bt = t.blocked_on ? `<span style="color:#d29922;font-size:10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(String(t.blocked_on))}</span>` : '';
      h += `<div onclick="openCardDetail('${escHtml(t.filename)}')" style="padding:4px 8px;cursor:pointer;border-radius:3px;display:flex;align-items:center;gap:6px;margin-bottom:1px;background:rgba(255,255,255,0.02)" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='rgba(255,255,255,0.02)'">`;
      h += cardBadge(t);
      if (t.type === 'project') h += `<span style="font-size:9px;color:#8957e5;border:1px solid #8957e5;padding:0 4px;border-radius:3px">proj</span>`;
      h += `<span style="font-size:12px;color:#c9d1d9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(t.title || t.filename)}</span>`;
      h += bt;
      h += `</div>`;
    });
    h += `</div>`;
  }

  // Related outputs section
  if (relatedOutputs.length) {
    relatedOutputs.sort((a, b) => (b.mtime || 0) - (a.mtime || 0));
    h += `<div style="margin-top:18px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)">`;
    h += `<div style="font-size:12px;font-weight:600;color:#4a9eff;margin-bottom:8px">📄 相关产出 (${relatedOutputs.length})</div>`;
    relatedOutputs.slice(0, 20).forEach(o => {
      const unread = !o.read ? '<span style="color:#1f6feb;font-size:9px">●</span>' : '<span style="color:#484f58;font-size:9px">○</span>';
      h += `<div onclick="openOutputInModal('${escHtml(o.id)}')" style="padding:4px 8px;cursor:pointer;border-radius:3px;display:flex;align-items:center;gap:8px;margin-bottom:1px;background:rgba(255,255,255,0.02)" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='rgba(255,255,255,0.02)'">`;
      h += unread;
      h += `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(74,158,255,0.15);color:#4a9eff">${escHtml(o.category || '')}</span>`;
      h += `<span style="font-size:12px;color:#c9d1d9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(o.title || '')}</span>`;
      h += `</div>`;
    });
    if (relatedOutputs.length > 20) h += `<div style="font-size:10px;color:#484f58;padding:4px 8px">+ ${relatedOutputs.length - 20} more</div>`;
    h += `</div>`;
  }

  // 💬 跟进 button moved to modal toolbar (renderCardActionsHTML).

  h += `</div>`;

  return h;
}

// Metadata cluster (type badge / priority / status / blocked chip / deferred chip).
// Pulled out of renderCardDetailHTML so the card modal's sticky toolbar, the
// Review pane toolbar, and the Overview carousel all share one set of pickers.
function renderCardMetaHTML(card) {
  const filename = card.filename || '';
  const type = card.type || 'task';
  const priority = cardPriorityInt(card);
  const status = card.status || 'active';
  const blocked_on = card.blocked_on;
  const typeColor = type === 'project' ? '#1f6feb' : '#238636';
  const typeLabel = type === 'project' ? '📁 项目' : '✅ 任务';
  let h = '';
  h += `<span style="background:${typeColor};color:#fff;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600">${typeLabel}</span>`;
  h += `<select onchange="cardChangePriority('${escHtml(filename)}', this.value)" style="background:rgba(255,255,255,0.05);color:#c9d1d9;border:1px solid rgba(255,255,255,0.1);border-radius:3px;padding:2px 5px;font-size:11px;cursor:pointer">`;
  for (let p = 1; p <= 5; p++) h += `<option value="${p}" ${priority === p ? 'selected' : ''}>P${p}</option>`;
  h += `</select>`;
  // Status badge (read-only). The dropdown was removed 2026-04-17: done/dismissed
  // have ✓完成/✕不做了 buttons, pending is covered by 📅 改期 (sets deferred_until),
  // active is the default, and in_review/inbox are agent-set edge states not worth
  // exposing as user gestures. See renderCardActionsHTML for the action buttons.
  const statusStyle = (() => {
    switch (status) {
      case 'done':      return 'background:rgba(46,160,67,0.18);color:#3fb950;border:1px solid rgba(46,160,67,0.4)';
      case 'dismissed': return 'background:rgba(255,140,66,0.14);color:#ffb86b;border:1px solid rgba(255,140,66,0.34)';
      case 'pending':   return 'background:rgba(210,153,34,0.14);color:#d29922;border:1px solid rgba(210,153,34,0.42)';
      case 'in_review': return 'background:rgba(74,158,255,0.12);color:#4a9eff;border:1px solid rgba(74,158,255,0.34)';
      case 'inbox':     return 'background:rgba(139,148,158,0.12);color:#8b949e;border:1px solid rgba(139,148,158,0.3)';
      default:          return 'background:rgba(255,255,255,0.04);color:#c9d1d9;border:1px solid rgba(255,255,255,0.1)'; // active
    }
  })();
  h += `<span style="${statusStyle};padding:2px 8px;border-radius:3px;font-size:11px" title="状态">${escHtml(status)}</span>`;
  if (blocked_on) {
    h += `<span onclick="cardEditBlocked('${escHtml(filename)}')" style="background:rgba(210,153,34,0.15);color:#d29922;padding:2px 8px;border-radius:3px;font-size:10px;border:1px solid rgba(210,153,34,0.3);cursor:pointer;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="点击编辑">${escHtml(String(blocked_on))}</span>`;
  } else {
    h += `<button onclick="cardEditBlocked('${escHtml(filename)}')" style="background:none;border:1px dashed rgba(255,255,255,0.15);color:#484f58;padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer">+ blocked</button>`;
  }
  return h;
}

// Unified toolbar for the card modal and Review pane: metadata pickers +
// separator + action verbs (+ edit button when opts.showEditButton). Hosted by
// the sticky toolbar of showCardDetailModal / Review pane so one row covers
// both "what is this card" and "what do I do with it".
function renderCardActionsHTML(card, opts = {}) {
  const filename = card.filename || '';
  const status = card.status || 'active';
  const assignee = card.assignee || '';
  const inMyTodos = _myTodosSet.has(filename) || assignee === 'user';
  const closedLike = (status === 'done' || status === 'dismissed' || status === 'archive');
  let h = renderCardMetaHTML(card);
  h += `<span style="width:1px;height:18px;background:rgba(255,255,255,0.1);margin:0 4px"></span>`;
  if (inMyTodos && !closedLike) {
    h += `<button class="action-btn" style="background:rgba(46,160,67,0.14);color:#3fb950;border:1px solid rgba(46,160,67,0.42)" onclick="todoComplete('${escHtml(filename)}', { closeModal: true })">✓ 完成</button>`;
    h += `<button class="action-btn" style="background:rgba(210,153,34,0.14);color:#d29922;border:1px solid rgba(210,153,34,0.42)" onclick="todoAddOrReschedule('${escHtml(filename)}')">📅 改期</button>`;
    h += `<button class="action-btn" style="background:rgba(255,140,66,0.12);color:#ffb86b;border:1px solid rgba(255,140,66,0.34)" onclick="todoDismiss('${escHtml(filename)}', { closeModal: true })">✕ 不做了</button>`;
  } else if (closedLike) {
    // Status dropdown used to serve as the only "reopen" affordance. Since we
    // dropped it (2026-04-17), surface explicit reactivation via 改期 which
    // already handles closed → active (see todoAddOrReschedule).
    h += `<button class="action-btn" style="background:rgba(74,158,255,0.12);color:#4a9eff;border:1px solid rgba(74,158,255,0.34)" onclick="todoAddOrReschedule('${escHtml(filename)}')">↻ 重新激活</button>`;
  } else if (!inMyTodos) {
    h += `<button class="action-btn" style="background:rgba(74,158,255,0.12);color:#4a9eff;border:1px solid rgba(74,158,255,0.34)" onclick="todoAddOrReschedule('${escHtml(filename)}')">📋 转入待办</button>`;
  }
  h += `<button class="action-btn action-later" onclick="followUpCard('${escHtml(filename)}')">💬 跟进</button>`;
  h += `<button class="action-btn" onclick="copyPathToClipboard('${escHtml(filename)}')" title="复制文件名，粘贴到 Chat">📋 Copy for Chat</button>`;
  if (opts.showEditButton) {
    const isEditing = _cardEditingFilename === filename;
    if (isEditing) {
      h += `<button onclick="saveCardEdit('${escHtml(filename)}')" style="margin-left:auto;background:#238636;border:1px solid #2ea043;color:#fff;padding:3px 12px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit" title="保存 (⌘S)">💾 保存</button>`;
      h += `<button onclick="cancelCardEdit()" style="background:transparent;border:1px solid rgba(255,255,255,0.15);color:#8b949e;padding:3px 12px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit">取消</button>`;
    } else {
      h += `<button onclick="startCardEdit('${escHtml(filename)}')" style="margin-left:auto;background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.3);color:#58a6ff;padding:3px 12px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit" title="编辑卡片正文">✎ 编辑</button>`;
    }
  }
  return h;
}

// ── Card Detail Modal ──
// Back stack: each entry is { type: 'card'|'output', id }. openCardDetail /
// openOutputInModal push onto the stack so the user can drill down (card →
// subtask → parent project → related output) and hit ← Back to unwind.
let _modalStack = [];

// Inline edit state — when set, renderCardDetailHTML swaps the body for a
// textarea. Exit via save (restore-card) or cancel.
let _cardEditingFilename = null;

// Tracks which card filenames are in the current My TODOs list. Populated by
// loadOverview() when /pios/my-todos responds. renderCardDetailHTML uses this
// to decide whether to show the ✓完成/✕不做了 action bar — so cards show the
// bar whenever they're actually in My TODOs, regardless of assignee value.
let _myTodosSet = new Set();

// Caches for non-card modals. Notifications / runs / upcoming tasks have no
// stable cross-session id, so we stash the currently-rendered data here and
// reference it by index when the user clicks a row.
let _overviewNotifCache = [];       // last set of notifications shown on Overview (limit 10)
let _briefingRunsCache = [];        // briefing.recentRuns as rendered in Pi 动态
let _upcomingTasksCache = [];       // upcomingTasks array on Overview
let _activityCache = [];            // same as ACTIVITY_DATA, exposed for opener

function showCardDetailModal(innerHtml, actionsHtml = '') {
  let modal = document.getElementById('card-detail-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'card-detail-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:9998;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto';
    modal.onclick = (e) => { if (e.target === modal) closeCardDetailModal(); };
    document.body.appendChild(modal);
  }
  const backBtn = _modalStack.length > 1
    ? `<button onclick="modalBack()" title="返回上一级 (⌘←)" style="background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.3);color:#58a6ff;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap">← 返回</button>`
    : '';
  const closeBtn = `<button onclick="closeCardDetailModal()" style="background:none;border:none;color:#8b949e;font-size:22px;cursor:pointer;padding:0 8px;line-height:1" title="关闭 (Esc)">×</button>`;
  // Sticky toolbar — hosts back, actions, close. Sits on top of the scrolling
  // body so long content keeps actions visible. Actions from render*ActionsHTML
  // are inserted between back and close.
  const toolbar = `<div style="position:sticky;top:0;z-index:10;background:#161b22;border-bottom:1px solid rgba(255,255,255,0.08);padding:8px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
    ${backBtn}
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:1">${actionsHtml}</div>
    ${closeBtn}
  </div>`;
  modal.innerHTML = `<div onclick="event.stopPropagation()" style="background:#161b22;border:1px solid rgba(255,255,255,0.1);border-radius:10px;max-width:920px;width:100%;max-height:calc(100vh - 80px);overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6)">${toolbar}${innerHtml}</div>`;
  modal.style.display = 'flex';
}

function closeCardDetailModal() {
  const modal = document.getElementById('card-detail-modal');
  if (modal) { modal.style.display = 'none'; modal.innerHTML = ''; }
  _modalStack = [];
}

function normalizeCardFilename(filename) {
  const raw = String(filename || '').trim();
  if (!raw) return '';
  const stem = raw.split('/').pop() || raw;
  return stem.replace(/\.md$/i, '');
}

async function _loadCardForModal(filename) {
  const normalized = normalizeCardFilename(filename);
  if (!normalized) return null;
  const card = await api('GET', '/pios/card?name=' + encodeURIComponent(normalized));
  if (!card) return null;
  // API returns { filename, dir, title, frontmatter, content, fullContent }
  // Flatten frontmatter onto the card so renderCardDetailHTML can read fields directly.
  return { ...(card.frontmatter || {}), filename: card.filename || normalized, title: card.title || normalized, content: card.content || '' };
}

// Internal: render a stack entry without pushing (used by modalBack).
async function _renderStackEntry(entry) {
  if (!entry) return;
  if (entry.type === 'card') {
    const card = await _loadCardForModal(entry.id);
    if (card) showCardDetailModal(renderCardDetailHTML(card, { showClose: true, fromOwnerQueue: !!entry.fromOwnerQueue }), renderCardActionsHTML(card, { showEditButton: true }));
  } else if (entry.type === 'output') {
    try {
      const doc = await api('GET', '/pios/output?id=' + encodeURIComponent(entry.id));
      const meta = (outputsAll || []).find(o => o.id === entry.id) || { id: entry.id };
      if (doc) showCardDetailModal(renderOutputDetailHTML(meta, doc, { showClose: true }), renderOutputActionsHTML(meta));
    } catch {}
  } else if (entry.type === 'notification' && entry.data) {
    showCardDetailModal(renderNotificationDetailHTML(entry.data, { showClose: true }), renderNotificationActionsHTML(entry.data));
  } else if (entry.type === 'run' && entry.data) {
    showCardDetailModal(renderRunDetailHTML(entry.data, { showClose: true }), renderRunActionsHTML(entry.data));
  } else if (entry.type === 'task' && entry.id) {
    try {
      const task = await api('GET', '/pios/task?id=' + encodeURIComponent(entry.id));
      if (task) showCardDetailModal(renderTaskDetailHTML(task, { showClose: true }), renderTaskActionsHTML(task));
    } catch {}
  } else if (entry.type === 'activity' && entry.data) {
    showCardDetailModal(renderActivityDetailHTML(entry.data, { showClose: true }), renderActivityActionsHTML(entry.data));
  } else if (entry.type === 'vault-file' && entry.id) {
    try {
      const doc = await api('GET', '/pios/vault-file?path=' + encodeURIComponent(entry.id));
      if (doc && doc.content != null) showCardDetailModal(renderVaultFileHTML(entry.id, doc.content), '');
    } catch {}
  }
}

// Minimal render for arbitrary vault files (Pi/Agents/.../triage.md 之类)。
// 走和卡片/报告相同的 md 渲染，所以内部的 Pi/ 引用也可继续点。
function renderVaultFileHTML(relPath, content) {
  const basename = relPath.split('/').pop() || relPath;
  let h = '';
  h += `<div style="padding:14px 20px 10px;background:#0d1117;border-bottom:1px solid rgba(255,255,255,0.06)">`;
  h += `<h2 style="margin:0 0 2px;font-size:18px;color:#f0f6fc;font-weight:600">${escHtml(basename)}</h2>`;
  h += `<div style="font-size:10px;color:#484f58;margin-top:4px">${escHtml(relPath)}</div>`;
  h += `</div>`;
  h += `<div style="padding:16px 20px"><div class="md-rendered" style="font-size:13px;color:#c9d1d9;line-height:1.65">${renderMd(content)}</div></div>`;
  return h;
}

async function openVaultFile(relPath) {
  try {
    const doc = await api('GET', '/pios/vault-file?path=' + encodeURIComponent(relPath));
    if (!doc || doc.content == null) { showMissingFileModal(relPath); return; }
    const top = _modalStack[_modalStack.length - 1];
    if (!(top && top.type === 'vault-file' && top.id === relPath)) {
      _modalStack.push({ type: 'vault-file', id: relPath });
    }
    showCardDetailModal(renderVaultFileHTML(relPath, doc.content), '');
  } catch (e) {
    // api() throws on 4xx/5xx. 400 = 路径格式不合法（非 .md 或含 ..），404 = 文件不存在。
    // 两种都是"链接指向了 vault 里不存在的东西"，统一用 missing modal 呈现。
    showMissingFileModal(relPath, e && e.message);
  }
}

// 广播给用户：这个链接指向的文件在 vault 里找不到。用 modal 而不是 toast，
// 因为 AI 写卡经常生成占位路径，owner 需要看清楚哪个路径错了。
function showMissingFileModal(relPath, errMsg) {
  const safePath = escHtml(String(relPath || ''));
  const safeErr = errMsg ? escHtml(String(errMsg)) : '';
  const html = `
    <div style="padding:28px 32px 24px">
      <div style="font-size:15px;color:#f0f6fc;font-weight:600;margin-bottom:8px">⚠️ 文件在 vault 中未找到</div>
      <div style="font-size:12px;color:#8b949e;margin-bottom:14px;line-height:1.6">卡里引用的这条路径，目前在 vault 里不存在：</div>
      <div style="font-family:'SF Mono',Menlo,monospace;font-size:12px;color:#ff8c42;background:rgba(255,140,66,0.08);border:1px solid rgba(255,140,66,0.24);border-radius:6px;padding:10px 12px;margin-bottom:14px;word-break:break-all">${safePath}</div>
      <div style="font-size:12px;color:#8b949e;line-height:1.6">
        常见原因：<br>
        · AI 写卡时硬编了占位路径（文件其实还没产出）<br>
        · 文件被重命名 / 归档 / 删除<br>
        · 路径省略了前缀（比如写了 <code style="background:rgba(255,255,255,0.06);padding:1px 4px;border-radius:3px">infra/x.md</code> 而真实在 <code style="background:rgba(255,255,255,0.06);padding:1px 4px;border-radius:3px">Pi/Output/infra/x.md</code>）
      </div>
      ${safeErr ? `<div style="font-size:10px;color:#6e7681;margin-top:12px;font-family:'SF Mono',Menlo,monospace">${safeErr}</div>` : ''}
    </div>`;
  showCardDetailModal(html, '');
}

async function openCardDetail(filename, opts = {}) {
  try {
    const normalized = normalizeCardFilename(filename);
    const card = await _loadCardForModal(normalized);
    if (!card) { piAlert('卡片不存在: ' + normalized); return; }
    const fromOwnerQueue = !!opts.fromOwnerQueue;
    // Push onto stack (but collapse consecutive duplicates). flag 随 entry 存活，
    // 这样 modalBack 再回到这张卡时仍然显示 brief 横幅。
    const top = _modalStack[_modalStack.length - 1];
    if (!(top && top.type === 'card' && top.id === normalized)) {
      _modalStack.push({ type: 'card', id: normalized, fromOwnerQueue });
    }
    showCardDetailModal(renderCardDetailHTML(card, { showClose: true, fromOwnerQueue }), renderCardActionsHTML(card, { showEditButton: true }));
    _injectCardSuggestions(normalized);
  } catch (e) { piAlert('加载失败: ' + e.message); }
}

async function _refreshCardDetailModal(filename) {
  // Refresh in place without touching the stack. 保留 top entry 的 fromOwnerQueue flag。
  const card = await _loadCardForModal(filename);
  if (!card) return;
  const top = _modalStack[_modalStack.length - 1];
  const fromOwnerQueue = !!(top && top.type === 'card' && top.id === filename && top.fromOwnerQueue);
  showCardDetailModal(renderCardDetailHTML(card, { showClose: true, fromOwnerQueue }), renderCardActionsHTML(card, { showEditButton: true }));
}

// Pop the stack one level and render the now-top entry. Bound to ⌘← and the
// back button in the modal header.
async function modalBack() {
  if (_modalStack.length <= 1) { closeCardDetailModal(); return; }
  _modalStack.pop();
  const prev = _modalStack[_modalStack.length - 1];
  await _renderStackEntry(prev);
}

// ── Inline card body edit ──
async function startCardEdit(filename) {
  _cardEditingFilename = filename;
  // Re-render current modal in edit mode
  const card = await _loadCardForModal(filename);
  if (card) showCardDetailModal(renderCardDetailHTML(card, { showClose: true }), renderCardActionsHTML(card, { showEditButton: true }));
  // Focus + move cursor to end
  setTimeout(() => {
    const ta = document.getElementById('card-edit-textarea');
    if (ta) {
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
    }
  }, 0);
}

function cancelCardEdit() {
  const filename = _cardEditingFilename;
  _cardEditingFilename = null;
  if (filename) _refreshCardDetailModal(filename);
}

async function saveCardEdit(filename) {
  const ta = document.getElementById('card-edit-textarea');
  if (!ta) return;
  const newContent = ta.value;
  // Snapshot for undo (must read original from server BEFORE saving)
  const snap = await snapshotCard(filename);
  if (!snap) { piAlert('无法读取当前卡片状态，保存中止'); return; }
  try {
    // Build the updated snapshot — same frontmatter + dir, new content
    const updated = { ...snap, content: newContent };
    const r = await api('POST', '/pios/restore-card', { filename, snapshot: updated });
    if (!r || !r.ok) { piAlert('保存失败: ' + (r?.error || 'unknown')); return; }
    _cardEditingFilename = null;
    await _refreshCardDetailModal(filename);
    registerUndo(`编辑正文: ${snap.frontmatter?.title || filename}`, async () => {
      await api('POST', '/pios/restore-card', { filename, snapshot: snap });
      await _refreshCardDetailModal(filename);
    });
  } catch (e) { piAlert('保存失败: ' + e.message); }
}

// ── Quick add card (`c` shortcut) ──
function _titleToSlug(title) {
  const ascii = title.toLowerCase()
    .replace(/[^\w\s-]/g, ' ')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/[^\w-]/g, '')
    .replace(/^-+|-+$/g, '')
    .slice(0, 60);
  if (ascii.length >= 2) return ascii;
  const d = new Date().toISOString().slice(0, 10);
  const h = Math.random().toString(36).slice(2, 6);
  return `card-${d}-${h}`;
}

// Two entry points share one dialog. mode = 'pi' → 卡片 (assignee=pi, dir=inbox,
// 让 Pi triage 排期); mode = 'mytodo' → 自己的 TODO (assignee=user, dir=active,
// 多一个日期 picker 写 deferred_until).
async function quickAddPiCard() { return _openQuickAddDialog('pi'); }
async function quickAddMyTodo() { return _openQuickAddDialog('mytodo'); }
async function quickAddCard() { return quickAddPiCard(); }

async function _openQuickAddDialog(mode) {
  const isMyTodo = mode === 'mytodo';
  const heading = isMyTodo ? '新建 TODO' : '新建卡片';
  const placeholder = isMyTodo
    ? '你自己要做的事，可设置日期&#10;&#10;e.g. 周五前给团队发周报&#10;e.g. 这周联系一下王老师&#10;e.g. 整理一下书架'
    : '随意写，Pi 会帮你分析拆解&#10;&#10;e.g. 调研小红书 SEO 关键词策略&#10;e.g. 修复登录 bug，用户报告...&#10;e.g. 帮我整理本周微信里的重要信息';

  const fields = await new Promise(resolve => {
    const ov = document.createElement('div');
    ov.className = 'pi-dialog-overlay';
    const dateCol = isMyTodo ? `
            <div style="flex:1">
              <div style="font-size:11px;color:#8b949e;margin-bottom:4px">日期 <span style="font-size:10px">— 可留空</span></div>
              <input id="_cc-date" type="date" class="pi-dialog-input" style="cursor:pointer">
            </div>` : '';
    ov.innerHTML = `<div class="pi-dialog" style="max-width:560px">
      <div class="pi-dialog-msg" style="font-size:14px;font-weight:600;margin-bottom:12px">${heading}</div>
      <textarea id="_cc-text" class="pi-dialog-input" rows="5" style="resize:vertical;font-size:13px" placeholder="${placeholder}"></textarea>
      <div style="margin-top:10px;display:flex;gap:10px;align-items:flex-end">
        <div style="flex:1">
          <div style="font-size:11px;color:#8b949e;margin-bottom:4px">优先级</div>
          <select id="_cc-priority" class="pi-dialog-input" style="cursor:pointer">
            <option value="1">P1 紧急</option>
            <option value="2">P2 重要</option>
            <option value="3" selected>P3 普通</option>
            <option value="4">P4 待定</option>
          </select>
        </div>${dateCol}
      </div>
      <div style="margin-top:10px">
        <button id="_cc-toggle-opts" style="background:none;border:none;color:#8b949e;font-size:11px;cursor:pointer;padding:0;font-family:inherit">⚙ 更多选项 ▾</button>
        <div id="_cc-opts" style="display:none;margin-top:10px">
          <div style="font-size:11px;color:#8b949e;margin-bottom:4px">文件名 (slug) <span style="color:#8b949e;font-size:10px">— 自动生成，可修改</span></div>
          <input id="_cc-slug" class="pi-dialog-input" placeholder="auto-generated">
        </div>
      </div>
      <div class="pi-dialog-btnrow" style="margin-top:14px">
        <button id="_cc-cancel" class="action-btn">取消</button>
        <button id="_cc-ok" class="action-btn action-do">创建 →</button>
      </div>
    </div>`;
    document.body.appendChild(ov);

    const textEl = ov.querySelector('#_cc-text');
    const slugEl = ov.querySelector('#_cc-slug');
    const optsEl = ov.querySelector('#_cc-opts');
    const toggleBtn = ov.querySelector('#_cc-toggle-opts');
    const dateEl = ov.querySelector('#_cc-date'); // null for pi mode
    let optsVisible = false;
    let slugManuallyEdited = false;

    toggleBtn.onclick = () => {
      optsVisible = !optsVisible;
      optsEl.style.display = optsVisible ? 'block' : 'none';
      toggleBtn.textContent = optsVisible ? '⚙ 更多选项 ▴' : '⚙ 更多选项 ▾';
    };

    textEl.addEventListener('input', () => {
      if (!slugManuallyEdited) {
        const firstLine = textEl.value.split('\n')[0].trim();
        slugEl.value = _titleToSlug(firstLine);
      }
    });
    slugEl.addEventListener('input', () => { slugManuallyEdited = true; });

    const done = (v) => {
      document.removeEventListener('keydown', onKey, true);
      ov.remove();
      resolve(v);
    };
    ov.querySelector('#_cc-ok').onclick = () => {
      const text = textEl.value.trim();
      if (!text) { textEl.focus(); textEl.style.borderColor = '#f85149'; return; }
      const firstLine = text.split('\n')[0].trim();
      const slug = slugEl.value.trim() || _titleToSlug(firstLine);
      done({
        text, title: firstLine, slug,
        priority: parseInt(ov.querySelector('#_cc-priority').value),
        deferred_until: dateEl ? (dateEl.value || null) : null,
      });
    };
    ov.querySelector('#_cc-cancel').onclick = () => done(null);
    ov.onclick = (e) => { if (e.target === ov) done(null); };
    const onKey = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); done(null); }
      // IME 守卫：打中文拼音 Enter 是选候选词
      else if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
        const focused = document.activeElement;
        if (focused && focused.tagName === 'TEXTAREA') return;
        e.preventDefault();
        ov.querySelector('#_cc-ok').click();
      }
    };
    document.addEventListener('keydown', onKey, true);
    setTimeout(() => { try { textEl.focus(); } catch {} }, 0);
  });

  if (!fields) return;

  const today = new Date().toISOString().slice(0, 10);
  const frontmatter = {
    type: 'task',
    priority: fields.priority,
    created: today,
    assignee: isMyTodo ? 'user' : 'pi',
    ...(fields.deferred_until ? { deferred_until: fields.deferred_until } : {}),
  };

  // Card body: title + raw text (Pi/triage will analyze and structure later)
  const bodyText = fields.text.split('\n').slice(1).join('\n').trim();
  let content = `# ${fields.title}\n\n${bodyText ? bodyText + '\n' : ''}`;

  try {
    const r = await api('POST', '/pios/create-card', {
      filename: fields.slug,
      dir: isMyTodo ? 'active' : 'inbox',
      frontmatter,
      content,
    });
    if (!r || !r.ok) {
      piAlert('建卡失败: ' + (r?.error || 'unknown'));
      return;
    }
    markLocalMutation();
    piToast(`✓ 已创建 ${r.filename}`, 'success', 4000);
    if (isMyTodo) myTodosLoaded = false;
    await openCardDetail(r.filename);
  } catch (e) { piAlert('建卡失败: ' + e.message); }
}

// ── Unblock multi-select state (used by Review cards view) ──
const _unblockSelected = new Set();

function toggleUnblockCard(filename) {
  if (_unblockSelected.has(filename)) _unblockSelected.delete(filename);
  else _unblockSelected.add(filename);
}

function unblockSelectAll() {
  cardsAll.filter(c => c.blocked_on && c.folder === 'active').forEach(c => _unblockSelected.add(c.filename));
}

function unblockClearSelection() {
  _unblockSelected.clear();
}

async function batchUnblock() {
  if (!_unblockSelected.size) return;
  const filenames = [..._unblockSelected];
  if (!(await piConfirm(`解锁 ${filenames.length} 张卡片的 blocked_on？\n\n清除它们的 blocked_on 字段。`))) return;
  // Snapshot all selected cards BEFORE mutating so Undo can restore them
  const snaps = await snapshotCards(filenames);
  let ok = 0, fail = 0;
  for (const filename of filenames) {
    try {
      await api('POST', '/pios/update-card', { filename, updates: { blocked_on: null } });
      const idx = cardsAll.findIndex(c => c.filename === filename);
      if (idx >= 0) cardsAll[idx].blocked_on = null;
      ok++;
    } catch { fail++; }
  }
  _unblockSelected.clear();
  await refreshOwnerQueue();
  if (activeTab === 'review' && reviewMode === 'cards') renderReviewCards();
  if (ok > 0 && snaps.length) {
    registerUndo(`解锁 ${ok} 张卡片${fail ? '（' + fail + ' 失败）' : ''}`, async () => {
      for (const snap of snaps) {
        try { await api('POST', '/pios/restore-card', { filename: snap.filename, snapshot: snap }); } catch {}
      }
      await refreshBoard();
    });
  } else if (fail) {
    piToast(`已解锁 ${ok} 张，失败 ${fail}`, 'error');
  }
}

function _renderSenseModeBar() {
  const bar = document.getElementById('sense-mode-bar');
  if (!bar) return;
  const seg = (id, label, sub) => {
    const active = senseState.mode === id;
    return `<button onclick="setSenseMode('${id}')" style="padding:8px 18px;border:none;border-radius:6px;background:${active?'rgba(74,158,255,0.18)':'transparent'};color:${active?'#58a6ff':'#8b949e'};font-size:13px;font-weight:${active?'600':'400'};cursor:pointer;font-family:inherit;transition:all 0.15s">${label}<span style="font-size:11px;margin-left:6px;color:#555">${sub}</span></button>`;
  };
  const data = senseState.data || { pipelines: [], radars: [] };
  bar.innerHTML = `<div style="display:inline-flex;gap:0;padding:3px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.06)">${seg('pipeline','🚰 Pipeline', (data.pipelines||[]).length)}${seg('radar','📡 Radar', (data.radars||[]).length)}</div>`;
}

function _renderSenseContent() {
  const el = document.getElementById('sense-content');
  if (!el || !senseState.data) return;
  const items = senseState.mode === 'pipeline' ? (senseState.data.pipelines || []) : (senseState.data.radars || []);
  if (!items.length) {
    el.innerHTML = '<div class="empty-state">暂无</div>';
    return;
  }
  // Group by category_ui
  const groups = {};
  for (const it of items) {
    const g = it.category_ui || 'general';
    (groups[g] = groups[g] || []).push(it);
  }
  const groupOrder = Object.keys(groups).sort();
  let html = '';
  for (const g of groupOrder) {
    html += `<div style="margin:18px 0 8px;font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:600">${escHtml(g)}</div>`;
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px">';
    for (const it of groups[g]) html += _renderSenseCard(it);
    html += '</div>';
  }
  // 底部"可安装"区
  html += _renderSenseMarketplace(senseState.mode);
  // Radar 模式底部加"新建"按钮
  if (senseState.mode === 'radar') {
    html += `<div style="margin-top:20px;padding:16px;border:1px dashed #30363d;border-radius:8px;text-align:center">
      <button onclick="senseOpenNewRadar()" style="padding:8px 20px;font-size:12px;border:1px solid #4a9eff;background:rgba(74,158,255,0.08);color:#4a9eff;border-radius:6px;cursor:pointer">+ 新建 Radar</button>
      <div style="margin-top:6px;font-size:11px;color:#555">订阅一个开放问题，让 Pi 定期扫外界</div>
    </div>`;
  }
  el.innerHTML = html;
}

function _senseStatusBadge(it) {
  const rt = it.runtime || {};
  if (!it.enabled) return '<span style="font-size:10px;color:#666;padding:1px 6px;border:1px solid #30363d;border-radius:3px">禁用</span>';
  const last = rt.lastRunRecord;
  if (!last) return '<span style="font-size:10px;color:#8b949e;padding:1px 6px;border:1px solid #30363d;border-radius:3px">未运行</span>';
  const s = last.status;
  const color = s === 'success' ? '#4a9eff' : s === 'running' ? '#d29922' : s === 'failed' ? '#ff8c42' : '#8b949e';
  return `<span style="font-size:10px;color:${color};padding:1px 6px;border:1px solid ${color};border-radius:3px">${escHtml(s||'?')}</span>`;
}

function _fmtRelative(iso) {
  if (!iso) return '—';
  const then = new Date(iso).getTime();
  const now = Date.now();
  const diff = Math.abs(now - then);
  const min = Math.round(diff / 60000);
  if (min < 1) return '刚刚';
  if (min < 60) return `${min}m ${now > then ? '前' : '后'}`;
  const h = Math.round(min / 60);
  if (h < 24) return `${h}h ${now > then ? '前' : '后'}`;
  const d = Math.round(h / 24);
  return `${d}d ${now > then ? '前' : '后'}`;
}

function _renderSenseCard(it) {
  const rt = it.runtime || {};
  const isRadar = it.section === 'radars';
  const out = it.output || {};
  const cron = rt.cron || '—';
  const nextRun = rt.nextRun ? _fmtRelative(rt.nextRun) : '—';
  const lastRun = rt.lastRunRecord?.started_at ? _fmtRelative(rt.lastRunRecord.started_at) : '—';
  const taskId = it.task_ref ? it.task_ref.split('/')[1] : '';

  // 头部：icon + 名字 + badges + status
  const projectBadge = it.project ? `<span style="font-size:9px;color:#d29922;padding:1px 5px;border:1px solid #d29922;border-radius:3px">${escHtml(it.project)}</span>` : '';
  const title = `<div style="display:flex;align-items:center;gap:6px">
    <span style="font-size:16px">${escHtml(it.icon || '')}</span>
    <span style="font-size:13px;font-weight:600;color:#e6edf3">${escHtml(it.name)}</span>
    ${projectBadge}
    <span style="flex:1"></span>
    ${_senseStatusBadge(it)}
  </div>`;

  // 源/问题 一行（紧凑）
  let midBlock = '';
  if (isRadar) {
    const q = (it.question || '').replace(/\n/g, ' ').trim() || '(无问题)';
    const qShort = q.length > 80 ? q.slice(0, 78) + '…' : q;
    midBlock = `<div style="margin-top:5px;font-size:11px;color:#aaa;line-height:1.4;overflow:hidden;text-overflow:ellipsis" title="${escHtml(q)}">? ${escHtml(qShort)}</div>`;
  } else {
    const src = it.source || {};
    midBlock = `<div style="margin-top:5px;font-size:11px;color:#aaa">源 · ${escHtml(src.label || src.type || '—')}${src.auth_required ? ' 🔑' : ''}</div>`;
  }

  // 产物 → 下游 一行
  const outputBlock = out.path ? `<div style="margin-top:3px;font-size:10px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="产物: ${escHtml(out.path)} | 下游: ${escHtml((it.downstream||[]).join(', '))}">↳ <code style="color:#888;background:transparent">${escHtml(out.path)}</code>${(it.downstream||[]).length ? ` → <span style="color:#58a6ff">${escHtml(it.downstream.join(' · '))}</span>` : ''}</div>` : '';

  // cron + timing + requires 一行
  const reqBadges = (it.requires||[]).length ? it.requires.map(r=>`<span style="color:#b0803c">${escHtml(r)}</span>`).join(' ') : '';
  const timingBlock = `<div style="margin-top:5px;font-size:10px;color:#666;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <span>⏱ <code style="color:#888;background:transparent">${escHtml(cron)}</code></span>
    <span>${escHtml(lastRun)} / ${escHtml(nextRun)}</span>
    ${reqBadges}
  </div>`;

  // 按钮 icon-only
  const btnBase = 'padding:2px 8px;font-size:11px;border:1px solid #30363d;background:transparent;border-radius:4px;cursor:pointer';
  const taskBtn = taskId ? `<button onclick="senseRun('${escHtml(taskId)}', this)" title="立即手动运行" style="${btnBase};color:#4a9eff">▶</button>` : '';
  const toggleBtn = `<button onclick="senseToggleEnabled('${escHtml(it.section)}','${escHtml(it.id)}', ${!it.enabled})" title="${it.enabled?'点击禁用':'点击启用'}" style="${btnBase};color:${it.enabled?'#4a9eff':'#6e7681'}">${it.enabled?'●':'○'}</button>`;
  const outputBtn = out.path ? `<button onclick="senseViewOutput('${escHtml(it.section)}','${escHtml(it.id)}','${escHtml(out.path)}','${escHtml(out.type||'log')}')" title="查看最新产物" style="${btnBase};color:#8b949e">📄</button>` : '';
  const configBtn = `<button onclick="senseShowConfig('${escHtml(it.section)}','${escHtml(it.id)}')" title="编辑配置" style="${btnBase};color:#8b949e">⚙</button>`;
  const actions = `<div style="margin-top:8px;display:flex;gap:4px">${toggleBtn}${taskBtn}${outputBtn}${configBtn}</div>`;

  const cardBorder = it.enabled ? '#30363d' : '#222';
  return `<div style="padding:10px 12px;border:1px solid ${cardBorder};border-radius:8px;background:rgba(255,255,255,0.02);opacity:${it.enabled?1:0.55}">
    ${title}
    ${midBlock}
    ${outputBlock}
    ${timingBlock}
    ${actions}
  </div>`;
}

async function senseRun(taskId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '运行中…'; }
  try {
    await api('POST', '/pios/task/run', { taskId });
    if (btn) { btn.textContent = '已触发'; setTimeout(() => loadSenseTab(), 600); }
  } catch (e) {
    if (btn) btn.textContent = '失败';
    alert('运行失败：' + e.message);
  }
}

async function senseToggleEnabled(section, id, next) {
  try {
    await api('POST', '/pios/sense/toggle', { section, id, enabled: next });
    await loadSenseTab();
  } catch (e) {
    alert('toggle 失败：' + e.message);
  }
}

async function senseSaveConfig(section, id) {
  const patch = {};
  const name = document.getElementById('senseCfg-name')?.value.trim();
  const icon = document.getElementById('senseCfg-icon')?.value.trim();
  const cron = document.getElementById('senseCfg-cron')?.value.trim();
  const downstream = document.getElementById('senseCfg-downstream')?.value || '';
  if (name) patch.name = name;
  if (icon) patch.icon = icon;
  if (cron) patch.cron = cron;
  patch.downstream = downstream.split(',').map(s => s.trim()).filter(Boolean);
  if (section === 'radars') {
    const q = document.getElementById('senseCfg-question')?.value.trim();
    if (q) patch.question = q;
    const proj = document.getElementById('senseCfg-project')?.value.trim();
    patch.project = proj || null;
  }
  try {
    await api('POST', '/pios/sense/edit', { section, id, patch });
    document.getElementById('sense-modal-overlay')?.remove();
    await loadSenseTab();
  } catch (e) {
    alert('保存失败：' + e.message);
  }
}

async function senseViewOutput(section, id, outputPath, outputType) {
  _senseModalOpen(`产物 · ${escHtml(outputPath)}`, '<div class="empty-state">加载中…</div>');
  try {
    const r = await api('GET', `/pios/sense/output?section=${encodeURIComponent(section)}&id=${encodeURIComponent(id)}&limit=3`);
    let body = '';
    if (r.error) {
      body = `<div style="color:#ff8c42">加载失败：${escHtml(r.error)}</div>`;
    } else if (r.type === 'dashboard') {
      body += `<div style="font-size:11px;color:#666;margin-bottom:8px">dashboard · mtime ${escHtml(r.mtime || '-')}</div>`;
      body += `<div style="padding:12px;background:#0d1117;border-radius:6px">${_scratchMdToHtml(r.content || '(空)')}</div>`;
    } else {
      const files = r.files || [];
      if (!files.length) {
        body = '<div class="empty-state">暂无产物</div>';
      } else {
        for (const f of files) {
          body += `<div style="margin-bottom:14px">`;
          body += `<div style="font-size:11px;color:#888;margin-bottom:4px"><code>${escHtml(f.path)}</code> · <span style="color:#555">${escHtml(f.mtime || '')}</span> · ${f.size}B</div>`;
          body += `<div style="padding:10px 12px;background:#0d1117;border:1px solid #21262d;border-radius:6px;max-height:300px;overflow-y:auto">${_scratchMdToHtml(f.preview || '')}</div>`;
          body += `</div>`;
        }
      }
    }
    // 重新渲染 body
    const overlay = document.getElementById('sense-modal-overlay');
    if (overlay) overlay.querySelector('div > div[style*="overflow-y:auto"]').innerHTML = body;
  } catch (e) {
    const overlay = document.getElementById('sense-modal-overlay');
    if (overlay) overlay.querySelector('div > div[style*="overflow-y:auto"]').innerHTML = `<div style="color:#ff8c42">加载失败：${escHtml(e.message)}</div>`;
  }
}

async function senseInstallNewRadar() {
  const name = document.getElementById('newR-name')?.value.trim();
  const id = document.getElementById('newR-id')?.value.trim();
  const icon = document.getElementById('newR-icon')?.value.trim() || '🔭';

// Mini Markdown 渲染器：标题 / 粗斜体 / 代码 / 图片 / 链接 / 换行 / 列表
function _scratchMdToHtml(src) {
  if (!src) return '<div style="color:#555;font-style:italic">（空）</div>';
  // 代码块 ``` 先摘出来，避免其他规则误伤
  const fences = [];
  src = src.replace(/```([\s\S]*?)```/g, (_, code) => {
    fences.push(code);
    return `\u0000FENCE${fences.length - 1}\u0000`;
  });
  const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // 按行处理
  const lines = src.split('\n');
  let out = '';
  let inUl = false;
  const closeUl = () => { if (inUl) { out += '</ul>'; inUl = false; } };
  for (let ln of lines) {
    const fence = ln.match(/\u0000FENCE(\d+)\u0000/);
    if (fence) {
      closeUl();
      out += `<pre style="background:#161b22;padding:10px;border-radius:6px;overflow-x:auto;font-size:12px"><code>${esc(fences[+fence[1]])}</code></pre>`;
      continue;
    }
    const h = ln.match(/^(#{1,6})\s+(.+)$/);
    if (h) {
      closeUl();
      const lvl = h[1].length;
      const sizes = [20, 17, 15, 14, 13, 13];
      out += `<div style="font-size:${sizes[lvl-1]}px;font-weight:600;margin:10px 0 4px;color:#e6edf3">${esc(h[2])}</div>`;
      continue;
    }
    const li = ln.match(/^\s*[-*]\s+(.+)$/);
    if (li) {
      if (!inUl) { out += '<ul style="margin:4px 0;padding-left:20px">'; inUl = true; }
      out += `<li>${_scratchInline(esc(li[1]))}</li>`;
      continue;
    }
    closeUl();
    if (!ln.trim()) { out += '<div style="height:6px"></div>'; continue; }
    out += `<div>${_scratchInline(esc(ln))}</div>`;
  }
  closeUl();
  return out;
}

function _scratchInline(s) {
  // 图片 ![alt](attachments/xxx.png) → 走本地静态 endpoint
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) => {
    const url = src.startsWith('attachments/')
      ? `/pios/scratch/${src}?t=${Date.now()}`
      : src;
    return `<img src="${url}" alt="${alt}" style="max-width:100%;border-radius:6px;margin:6px 0;background:#161b22">`;
  });
  // 链接 [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#58a6ff">$1</a>');
  // 粗体 **
  s = s.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  // 斜体 *
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<i>$2</i>');
  // 行内代码 `
  s = s.replace(/`([^`]+)`/g, '<code style="background:#161b22;padding:1px 5px;border-radius:3px;font-size:12px">$1</code>');
  return s;
}

function _scratchRenderPreview(content) {
  const p = document.getElementById('scratch-preview');
  if (p) p.innerHTML = _scratchMdToHtml(content);
}

function _scratchOnEdit() {
  if (!scratchState.currentFilename) return;
  const ta = document.getElementById('scratch-textarea');
  if (ta) _scratchRenderPreview(ta.value);
  const indicator = document.getElementById('scratch-save-indicator');
  if (indicator) indicator.textContent = '编辑中…';
  if (scratchState.saveTimer) clearTimeout(scratchState.saveTimer);
  scratchState.saveTimer = setTimeout(_scratchSave, 800);
}

async function _scratchSave() {
  if (!scratchState.currentFilename) return;
  const ta = document.getElementById('scratch-textarea');
  if (!ta) return;
  const indicator = document.getElementById('scratch-save-indicator');
  try {
    await api('POST', '/pios/scratch/update', { filename: scratchState.currentFilename, content: ta.value });
    if (indicator) indicator.textContent = '已保存 ' + new Date().toLocaleTimeString('zh-CN');
    await scratchRefreshList(true);
  } catch (e) {
    if (indicator) indicator.textContent = '保存失败：' + e.message;
  }
}

async function _scratchOnPaste(e) {
  if (!scratchState.currentFilename) return;
  const items = (e.clipboardData || {}).items || [];
  for (const it of items) {
    if (it.type && it.type.startsWith('image/')) {
      e.preventDefault();
      const blob = it.getAsFile();
      if (!blob) continue;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const r = await api('POST', '/pios/scratch/attach', { filename: scratchState.currentFilename, dataUrl: reader.result });
          if (r && r.path) {
            const ta = document.getElementById('scratch-textarea');
            const insert = `\n![](${r.path})\n`;
            const start = ta.selectionStart, end = ta.selectionEnd;
            ta.value = ta.value.slice(0, start) + insert + ta.value.slice(end);
            ta.selectionStart = ta.selectionEnd = start + insert.length;
            _scratchOnEdit();
          }
        } catch (err) { console.error('[scratch] attach failed:', err); }
      };
      reader.readAsDataURL(blob);
      return;
    }
  }
}

async function scratchTogglePiVisible(checked) {

    await api('POST', '/pios/scratch/update', { filename: scratchState.currentFilename, pi_visible: checked });

async function scratchNew() {

async function scratchDelete() {

  try {

function _installScratchHotkeys() {

      scratchNew();
    }
  });
}

function _startOutputsListResize(e) {
  e.preventDefault();
  e.stopPropagation();
  const startX = e.clientX;
  const startW = outputsListWidth;
  const listEl = document.getElementById('outputs-list-pane');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  const onMove = (ev) => {
    const dx = ev.clientX - startX;
    const w = Math.max(200, Math.min(720, startW + dx));
    outputsListWidth = w;
    if (listEl) listEl.style.width = w + 'px';
  };
  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    try { localStorage.setItem('pios-outputs-list-w', String(outputsListWidth)); } catch {}
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

      const tag = (list, folder) => (list || []).map(c => ({

}
