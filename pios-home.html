  const myTodosTotal = (MYTODOS_DATA || []).length;
  let modeBar = '<div style="display:inline-flex;gap:0;margin-bottom:10px;padding:2px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.06)">';
  const seg = (id, label, count) => `<button onclick="setReviewMode('${id}')" style="padding:5px 14px;border:none;border-radius:6px;background:${reviewMode===id?'rgba(74,158,255,0.18)':'transparent'};color:${reviewMode===id?'#58a6ff':'#8b949e'};font-size:12px;font-weight:${reviewMode===id?'600':'400'};cursor:pointer;font-family:inherit;transition:all 0.15s">${label} <span style="opacity:0.65;font-weight:400">${count}</span></button>`;
  modeBar += seg('queue', '📥 Need', queueTotal);
  modeBar += seg('mytodos', '✓ Todo', myTodosTotal);
  modeBar += seg('cards', '📋 Project', cardsTotal);
  modeBar += seg('outputs', '📄 Output', outputsTotal);
  modeBar += seg('notifications', '📬 Notification', notifTotal);
  modeBar += seg('activity', '🕐 Activity', activityTotal);
  modeBar += '</div>';
  container.innerHTML = modeBar + '<div id="review-body"></div>';
  if (reviewMode === 'queue') renderBoardReview();
  else if (reviewMode === 'cards') renderReviewCards();
  else if (reviewMode === 'outputs') renderReviewOutputs();
  else if (reviewMode === 'activity') renderReviewActivity();
  else if (reviewMode === 'mytodos') renderReviewMyTodos();
  else renderReviewNotifications();
}

// Shared scaffolding for cards/outputs two-pane view. Caller provides toolbar
// HTML (mode-specific) + list HTML (tree or flat). Selection + detail pane are
// unified so switching modes keeps the selected item visible when possible.
function _renderReviewPane(container, barHtml, listBodyHtml, itemCount, unreadTag) {
  const paneStyle = 'max-height:calc(100vh - 240px);overflow-y:auto';
  let listHtml = '';
  if (outputsListCollapsed) {
    listHtml = `<div id="outputs-list-pane" style="width:32px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:10px;background:rgba(255,255,255,0.015)">
      <button onclick="toggleOutputsListCollapsed()" title="展开列表" style="background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.3);color:#58a6ff;width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:13px;padding:0;line-height:1">▸</button>
      <div style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;color:#484f58;letter-spacing:1px">${itemCount} items${unreadTag ? ' · ' + unreadTag : ''}</div>
    </div>`;
  } else {
    listHtml = `<div id="outputs-list-pane" style="width:${outputsListWidth}px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.08);padding-right:8px;${paneStyle}">${listBodyHtml}</div>`;
  }
  const dragHandle = outputsListCollapsed ? '' : `<div id="outputs-resize-handle"
    onmousedown="_startOutputsListResize(event)"
    ondblclick="toggleOutputsListCollapsed()"
    title="拖动调整宽度 · 双击折叠"
    style="width:5px;flex-shrink:0;cursor:col-resize;background:transparent;margin:0 2px;border-radius:3px;transition:background 0.15s"
    onmouseover="this.style.background='rgba(74,158,255,0.3)'"
    onmouseout="this.style.background='transparent'"></div>`;
  let detailHtml = `<div id="outputs-detail" style="flex:1;min-width:0;padding:0 16px;${paneStyle}">`;
  detailHtml += outputsSelected
    ? '<div class="empty-state" style="padding:40px;color:#484f58">Loading...</div>'
    : '<div class="empty-state" style="padding:40px;color:#484f58">Select an item to read</div>';
  detailHtml += '</div>';
  container.innerHTML = barHtml + '<div style="display:flex;gap:0;align-items:stretch">' + listHtml + dragHandle + detailHtml + '</div>';
  if (outputsSelected) loadReviewBrowseDetail(outputsSelected);
}

function renderReviewCards() {
  const container = document.getElementById('review-body');
  if (!container) return;

  const nowSec = Math.floor(Date.now() / 1000);
  const h24 = 86400;
  const statusCount = { all: 0, recent: 0, inbox: 0, active: 0, blocked: 0, archive: 0 };
  for (const c of (cardsAll || [])) {
    statusCount.all++;
    const f = c.folder || '';
    if (f === 'inbox') statusCount.inbox++;
    else if (f === 'archive') statusCount.archive++;
    else statusCount.active++;
    if (f === 'active' && c.blocked_on) statusCount.blocked++;
    if (f !== 'archive' && (nowSec - (c.mtime || 0)) < h24) statusCount.recent++;
  }

  const cardItems = (cardsAll || []).filter(c => {
    if (browseCardStatus === 'all') return true;
    const f = c.folder || '';
    if (browseCardStatus === 'recent') return f !== 'archive' && (nowSec - (c.mtime || 0)) < h24;
    if (browseCardStatus === 'inbox') return f === 'inbox';
    if (browseCardStatus === 'archive') return f === 'archive';
    if (browseCardStatus === 'blocked') return f === 'active' && !!c.blocked_on;
    return f !== 'inbox' && f !== 'archive';
  }).map(c => ({
    kind: 'card',
    id: c.filename,
    key: 'card:' + c.filename,
    title: c.title || c.filename,
    mtime: c.mtime || 0,
    _mtimeMs: (c.mtime || 0) * 1000,
    category: c.folder || '',
    read: true,
    parent: c.parent || '',
    priority: c.priority,
    status: c.status,
    type: c.type,
    folder: c.folder,
    _raw: c,
  }));

  const searchQ = outputsSearch.trim().toLowerCase();
  const list = cardItems.filter(it => {
    if (!searchQ) return true;
    const hay = (it.title + ' ' + it.id + ' ' + (it.parent || '')).toLowerCase();
    return hay.includes(searchQ);
  });

  if (list.length && (!outputsSelected || !list.find(it => it.key === outputsSelected))) {
    outputsSelected = list[0].key;
  }

  const statusPill = (val, label) => {
    const active = browseCardStatus === val;
    return `<button class="board-filter-btn${active?' active':''}" onclick="setBrowseCardStatus('${val}')">${escHtml(label)} ${statusCount[val]||0}</button>`;
  };

  let bar = '<div style="display:flex;gap:4px;margin-bottom:10px;align-items:center;flex-wrap:wrap;font-size:11px">';
  bar += `<button class="board-filter-btn" onclick="toggleOutputsListCollapsed()" title="${outputsListCollapsed ? '展开列表' : '折叠列表'}" style="padding:4px 8px">${outputsListCollapsed ? '▸' : '◂'}</button>`;
  bar += statusPill('all', '全部');
  bar += statusPill('recent', 'Recent');
  bar += statusPill('inbox', 'Inbox');
  bar += statusPill('active', 'Active');
  bar += statusPill('blocked', 'Blocked');
  bar += statusPill('archive', 'Archive');
  bar += `<span style="width:1px;height:16px;background:rgba(255,255,255,0.08);margin:0 4px"></span>`;
  if (browseCardStatus === 'blocked') {
    const selN = _unblockSelected.size;
    if (selN > 0) {
      bar += `<button class="action-btn action-do" onclick="batchUnblock()" style="padding:3px 8px;font-size:11px">✓ 解锁 (${selN})</button>`;
      bar += `<button class="board-filter-btn" onclick="unblockClearSelection();renderReviewCards()">清空</button>`;
    } else {
      bar += `<button class="board-filter-btn" onclick="unblockSelectAll();renderReviewCards()">全选</button>`;
    }
  } else {
    const anyExpanded = _browseExpanded.size > 0;
    bar += `<button class="board-filter-btn" onclick="${anyExpanded ? 'browseCollapseAll()' : 'browseExpandAll()'}">${anyExpanded ? '折叠' : '展开'}</button>`;
  }
  bar += `<div style="flex:1"></div>`;
  bar += `<input type="text" placeholder="search…" value="${escHtml(outputsSearch)}" oninput="_searchInput(this, v=>outputsSearch=v, renderReviewCards, 'input[placeholder=&quot;search…&quot;]')" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#c9d1d9;font-size:11px;width:180px;outline:none">`;
  bar += `<button class="board-filter-btn" onclick="refreshReviewTab()" title="刷新">↻</button>`;
  bar += '</div>';

  let body = '';
  if (!list.length) body = '<div class="empty-state" style="padding:20px">No cards</div>';
  else if (browseCardStatus === 'blocked') body = _renderReviewBlockedList(list);
  else if (browseCardStatus === 'recent') {
    const sorted = [...list].sort((a, b) => (b.mtime || 0) - (a.mtime || 0));
    for (const it of sorted) body += _renderBrowseRow(it, 0, { showAgo: true });
  }
  else body = _renderBrowseTree(list, searchQ);

  _renderReviewPane(container, bar, body, list.length, '');
}

function _renderReviewBlockedList(list) {
  const groups = {};
  for (const it of list) {
    const c = it._raw;
    const cat = String(c.blocked_on).replace(/[（(].*/, '').trim() || String(c.blocked_on);
    (groups[cat] = groups[cat] || []).push(it);
  }
  for (const f of [..._unblockSelected]) {
    if (!list.find(it => it.id === f)) _unblockSelected.delete(f);
  }
  const cats = Object.keys(groups).sort((a, b) => groups[b].length - groups[a].length);
  let html = '';
  for (const cat of cats) {
    const groupItems = groups[cat];
    const allSel = groupItems.every(it => _unblockSelected.has(it.id));
    const someSel = !allSel && groupItems.some(it => _unblockSelected.has(it.id));
    html += `<div style="margin-bottom:8px">`;
    html += `<div style="font-size:11px;font-weight:600;color:#d29922;padding:4px 6px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(210,153,34,0.18)">
      <input type="checkbox" ${allSel?'checked':''} ${someSel?'data-indeterminate="1"':''} onchange="toggleReviewBlockedGroup('${escHtml(cat)}')" style="cursor:pointer;accent-color:#4a9eff">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(cat)}</span>
      <span style="font-size:10px;color:#8b949e">${groupItems.length}</span>
    </div>`;
    for (const it of groupItems) {
      const checked = _unblockSelected.has(it.id);
      const active = outputsSelected === it.key;
      const bg = active ? 'rgba(74,158,255,0.1)' : (checked ? 'rgba(74,158,255,0.05)' : 'rgba(255,255,255,0.02)');
      const leftBorder = active ? '2px solid #58a6ff' : '2px solid transparent';
      const c = it._raw;
      const inTodos = _myTodosSet.has(it.id) || c.assignee === 'user';
      const todoIcon = inTodos ? '📅' : '📋';
      const todoTitle = inTodos ? '改期（并解锁）' : '转入待办（并解锁）';
      // Pass unblock:true — from the Blocked view, taking ownership of the
      // card implies it shouldn't sit in the blocked queue anymore.
      html += `<div class="blocked-row" style="padding:4px 6px 4px 10px;background:${bg};border-left:${leftBorder};border-radius:3px;margin-bottom:1px;display:flex;align-items:center;gap:6px" onmouseover="const a=this.querySelector('.row-acts');if(a)a.style.display='flex'" onmouseout="const a=this.querySelector('.row-acts');if(a)a.style.display='none'">
        <input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation()" onchange="toggleUnblockCard('${escHtml(it.id)}');renderReviewCards()" style="cursor:pointer;accent-color:#4a9eff;flex-shrink:0">
        <div onclick="selectReviewItem('card','${escHtml(it.id)}')" style="flex:1;min-width:0;cursor:pointer;display:flex;align-items:center;gap:6px">
          ${cardBadge(c)}
          ${c.type === 'project' ? '<span style="font-size:9px;color:#8957e5;border:1px solid #8957e5;padding:0 3px;border-radius:3px;flex-shrink:0">proj</span>' : ''}
          <span style="font-size:12px;color:${active?'#fff':'#c9d1d9'};flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(c.title || c.filename)}</span>
        </div>
        <span class="row-acts" style="display:none;gap:3px;flex-shrink:0">
          <button onclick="event.stopPropagation();todoAddOrReschedule('${escHtml(it.id)}', {unblock: true})" title="${todoTitle}" style="background:transparent;border:1px solid rgba(255,255,255,0.08);color:#d29922;font-size:11px;padding:1px 5px;border-radius:3px;cursor:pointer;line-height:1">${todoIcon}</button>
        </span>
      </div>`;
    }
    html += `</div>`;
  }
  queueMicrotask(() => {
    const pane = document.getElementById('review-body');
    if (!pane) return;
    for (const cb of pane.querySelectorAll('input[type=checkbox][data-indeterminate]')) cb.indeterminate = true;
  });
  return html;
}

function toggleReviewBlockedGroup(cat) {
  const blocked = (cardsAll || []).filter(c => c.blocked_on && c.folder === 'active');
  const inGroup = blocked.filter(c => String(c.blocked_on).replace(/[（(].*/, '').trim() === cat);
  const allSel = inGroup.every(c => _unblockSelected.has(c.filename));
  inGroup.forEach(c => allSel ? _unblockSelected.delete(c.filename) : _unblockSelected.add(c.filename));
  renderReviewCards();
}

function renderReviewOutputs() {
  const container = document.getElementById('review-body');
  if (!container) return;

  const outputItems = (outputsAll || []).map(o => ({
    kind: 'output',
    id: o.id,
    key: 'output:' + o.id,
    title: o.title || o.filename || o.id,
    mtime: o.mtime || 0,
    _mtimeMs: o.mtime || 0,
    category: o.category || '',
    read: !!o.read,
    bookmarked: !!o.bookmarked,
    parent: o.project || o.relatedCard || '',
    _raw: o,
  }));

  const searchQ = outputsSearch.trim().toLowerCase();
  // Keep the currently-selected output visible even after it becomes read, so
  // clicking an unread item reveals its detail instead of vanishing from the list.
  const list = outputItems.filter(it => {
    const isSelected = it.key === outputsSelected;
    if (outputsCategory && it.category !== outputsCategory) return false;
    if (outputsUnreadOnly && it.read && !isSelected) return false;
    if (outputsBookmarkedOnly && !it.bookmarked && !isSelected) return false;
    if (searchQ) {
      const hay = (it.title + ' ' + it.id + ' ' + (it.parent || '')).toLowerCase();
      if (!hay.includes(searchQ)) return false;
    }
    return true;
  });
  list.sort((a, b) => (b._mtimeMs || 0) - (a._mtimeMs || 0));

  const totalUnread = outputItems.filter(it => !it.read).length;
  const totalBookmarked = outputItems.filter(it => it.bookmarked).length;
  const cats = [...new Set(outputItems.map(o => o.category).filter(Boolean))].sort();
  const catCount = {};
  for (const o of outputItems) catCount[o.category || ''] = (catCount[o.category || ''] || 0) + 1;

  if (list.length && (!outputsSelected || !list.find(it => it.key === outputsSelected))) {
    outputsSelected = list[0].key;
  }

  const catPill = (val, label, count) => {
    const active = outputsCategory === val;
    return `<button class="board-filter-btn${active?' active':''}" onclick="outputsCategory='${escHtml(val)}';renderReviewOutputs()">${escHtml(label)}${count?' '+count:''}</button>`;
  };

  let bar = '<div style="display:flex;gap:4px;margin-bottom:10px;align-items:center;flex-wrap:wrap;font-size:11px">';
  bar += `<button class="board-filter-btn" onclick="toggleOutputsListCollapsed()" title="${outputsListCollapsed ? '展开列表' : '折叠列表'}" style="padding:4px 8px">${outputsListCollapsed ? '▸' : '◂'}</button>`;
  bar += catPill('', '全部', outputItems.length);
  for (const c of cats) bar += catPill(c, c, catCount[c]);
  bar += `<span style="width:1px;height:16px;background:rgba(255,255,255,0.08);margin:0 4px"></span>`;
  // Distinct toggle styling so it doesn't look like a category pill. When on,
  // render as a filled amber chip with ☑; when off, an outlined amber chip.
  const unreadStyle = outputsUnreadOnly
    ? 'background:rgba(255,140,66,0.25);border:1px solid rgba(255,140,66,0.6);color:#ffb487'
    : 'background:transparent;border:1px dashed rgba(255,140,66,0.35);color:#ff8c42';
  bar += `<button onclick="outputsUnreadOnly=!outputsUnreadOnly;renderReviewOutputs()" title="只看未读" style="${unreadStyle};padding:3px 9px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit">${outputsUnreadOnly?'☑':'☐'} 只看未读${totalUnread?' ('+totalUnread+')':''}</button>`;
  const bookmarkedStyle = outputsBookmarkedOnly
    ? 'background:rgba(210,153,34,0.25);border:1px solid rgba(210,153,34,0.6);color:#ffd470'
    : 'background:transparent;border:1px dashed rgba(210,153,34,0.35);color:#d29922';
  bar += `<button onclick="outputsBookmarkedOnly=!outputsBookmarkedOnly;try{localStorage.setItem('pios-outputs-bookmarked',outputsBookmarkedOnly?'1':'0')}catch{};renderReviewOutputs()" title="只看收藏" style="${bookmarkedStyle};padding:3px 9px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit">${outputsBookmarkedOnly?'★':'☆'} 只看收藏${totalBookmarked?' ('+totalBookmarked+')':''}</button>`;
  bar += `<button class="board-filter-btn" onclick="markAllOutputsRead()" title="全部标已读">✓ 全标已读</button>`;
  bar += `<div style="flex:1"></div>`;
  bar += `<input type="text" placeholder="search…" value="${escHtml(outputsSearch)}" oninput="_searchInput(this, v=>outputsSearch=v, renderReviewOutputs, 'input[placeholder=&quot;search…&quot;]')" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#c9d1d9;font-size:11px;width:180px;outline:none">`;
  bar += `<button class="board-filter-btn" onclick="refreshReviewTab()" title="刷新">↻</button>`;
  bar += '</div>';

  let body = '';
  if (!list.length) body = '<div class="empty-state" style="padding:20px">No outputs</div>';
  else for (const it of list) body += _renderBrowseRow(it, 0);

  _renderReviewPane(container, bar, body, list.length, totalUnread ? totalUnread + ' unread' : '');
}

function renderReviewNotifications() {
  const container = document.getElementById('review-body');
  if (!container) return;

  const levelColors = { critical: '#f85149', report: '#ff8c42', reminder: '#4a9eff', info: '#888' };
  const isToday = notifDate === new Date().toLocaleDateString('sv-SE');
  const dow = new Date(notifDate + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short' });

  const levels = [...new Set((NOTIF_DATA || []).map(n => n.level).filter(Boolean))];
  const searchQ = outputsSearch.trim().toLowerCase();
  const visible = (NOTIF_DATA || []).map((n, idx) => ({ n, idx })).filter(({ n }) => {
    if (notifFilterLevel && n.level !== notifFilterLevel) return false;
    if (searchQ) {
      const hay = ((n.text || '') + ' ' + (n.source || '') + ' ' + (n.level || '')).toLowerCase();
      if (!hay.includes(searchQ)) return false;
    }
    return true;
  });

  if (visible.length && (!outputsSelected || !visible.find(x => 'notif:' + x.idx === outputsSelected))) {
    outputsSelected = 'notif:' + visible[0].idx;
  } else if (!visible.length) {
    outputsSelected = null;
  }

  const levelPill = (val, label, count) => {
    const active = notifFilterLevel === val;
    return `<button class="board-filter-btn${active?' active':''}" onclick="notifFilterLevel='${escHtml(val)}';renderReviewTab()">${escHtml(label)}${count?' '+count:''}</button>`;
  };

  let bar = '<div style="display:flex;gap:4px;margin-bottom:10px;align-items:center;flex-wrap:wrap;font-size:11px">';
  bar += `<button class="board-filter-btn" onclick="toggleOutputsListCollapsed()" title="${outputsListCollapsed ? '展开列表' : '折叠列表'}" style="padding:4px 8px">${outputsListCollapsed ? '▸' : '◂'}</button>`;
  bar += `<button class="board-filter-btn" onclick="notifNav(-1)" title="前一天">←</button>`;
  bar += `<span style="font-size:11px;color:#c9d1d9;padding:0 6px">${dow} ${notifDate}${isToday ? ' <span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(74,158,255,0.15);color:#4a9eff;margin-left:3px">TODAY</span>' : ''}</span>`;
  bar += `<button class="board-filter-btn" onclick="notifNav(1)" title="后一天"${isToday ? ' disabled style="opacity:0.4;cursor:not-allowed"' : ''}>→</button>`;
  bar += `<span style="width:1px;height:16px;background:rgba(255,255,255,0.08);margin:0 4px"></span>`;
  bar += levelPill('', '全部', (NOTIF_DATA || []).length);
  for (const lv of levels) {
    const cnt = (NOTIF_DATA || []).filter(n => n.level === lv).length;
    bar += levelPill(lv, lv, cnt);
  }
  bar += `<div style="flex:1"></div>`;
  bar += `<input type="text" placeholder="search…" value="${escHtml(outputsSearch)}" oninput="_searchInput(this, v=>outputsSearch=v, renderReviewNotifications, 'input[placeholder=&quot;search…&quot;]')" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#c9d1d9;font-size:11px;width:180px;outline:none">`;
  bar += `<button class="board-filter-btn" onclick="loadReviewNotifications(true).then(renderReviewTab)" title="刷新">↻</button>`;
  bar += '</div>';

  let body = '';
  if (!visible.length) {
    body = '<div class="empty-state" style="padding:20px">No notifications this day</div>';
  } else {
    for (const { n, idx } of visible) {
      const active = outputsSelected === 'notif:' + idx;
      const t = n.time ? new Date(n.time) : null;
      const timeStr = t ? t.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
      const lv = n.level || '';
      const lc = levelColors[lv] || '#555';
      const activeBg = active ? 'rgba(74,158,255,0.1)' : 'rgba(255,255,255,0.02)';
      const hoverBg = active ? 'rgba(74,158,255,0.12)' : 'rgba(255,255,255,0.06)';
      const leftBorder = active ? '2px solid #58a6ff' : `2px solid ${lc}`;
      body += `<div onclick="selectReviewItem('notif','${idx}')" style="padding:6px 8px;cursor:pointer;border-radius:3px;margin-bottom:1px;background:${activeBg};border-left:${leftBorder};display:flex;flex-direction:column;gap:3px" onmouseover="this.style.background='${hoverBg}'" onmouseout="this.style.background='${activeBg}'">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;color:#6b7280;font-family:'SF Mono',Menlo,monospace;flex-shrink:0">${escHtml(timeStr)}</span>
          ${lv ? `<span style="font-size:9px;padding:1px 5px;border-radius:8px;background:${lc}22;color:${lc};font-weight:600;text-transform:uppercase;flex-shrink:0">${escHtml(lv)}</span>` : ''}
          ${n.source ? `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.06);color:#888;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(n.source)}</span>` : ''}
        </div>
        <div style="font-size:12px;color:${active?'#fff':'#c9d1d9'};line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${escHtml(n.text || '')}</div>
      </div>`;
    }
  }

  _renderReviewPane(container, bar, body, visible.length, '');
}

// Pick the scheduling date for a todo card. Priority:
//   1. due (explicit deadline, rarely present today)
//   2. deferred_until (worker's "come back on date X" signal — what Pi uses for scheduling)
// Returns 'YYYY-MM-DD' or null if unscheduled.
function _todoScheduleDate(t) {
  if (t.due && /^\d{4}-\d{2}-\d{2}/.test(String(t.due))) return String(t.due).slice(0, 10);
  if (t.deferred_until && /^\d{4}-\d{2}-\d{2}/.test(String(t.deferred_until))) return String(t.deferred_until).slice(0, 10);
  return null;
}

function renderReviewMyTodos() {
  const container = document.getElementById('review-body');
  if (!container) return;

  const searchQ = outputsSearch.trim().toLowerCase();
  const now = new Date();
  const todayStr = now.toLocaleDateString('sv-SE');
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
  const tomorrowStr = tomorrow.toLocaleDateString('sv-SE');
  const weekEnd = new Date(now); weekEnd.setDate(now.getDate() + 7);
  const weekEndStr = weekEnd.toLocaleDateString('sv-SE');

  const items = (MYTODOS_DATA || []).map(t => {
    const sched = _todoScheduleDate(t);
    let bucket;
    if (!sched) bucket = 'unscheduled';
    else if (sched < todayStr) bucket = 'overdue';
    else if (sched === todayStr) bucket = 'today';
    else if (sched === tomorrowStr) bucket = 'tomorrow';
    else if (sched <= weekEndStr) bucket = 'week';
    else bucket = 'later';
    return { ...t, _sched: sched, _bucket: bucket };
  });

  const visible = items.filter(t => {
    if (!searchQ) return true;
    const hay = ((t.title || '') + ' ' + (t.filename || '') + ' ' + (t.parent || '') + ' ' + (t._sched || '')).toLowerCase();
    return hay.includes(searchQ);
  });

  const counts = { overdue: 0, today: 0, tomorrow: 0, week: 0, later: 0, unscheduled: 0 };
  for (const t of items) counts[t._bucket]++;

  // First visible across ordered buckets for default selection
  const bucketOrder = ['overdue', 'today', 'tomorrow', 'week', 'later', 'unscheduled'];
  const flat = [];
  for (const b of bucketOrder) {
    const group = visible.filter(t => t._bucket === b);
    group.sort((a, b) => {
      if (a._sched && b._sched && a._sched !== b._sched) return a._sched.localeCompare(b._sched);
      const pa = parseInt(a.priority) || 9, pb = parseInt(b.priority) || 9;
      if (pa !== pb) return pa - pb;
      return String(a.title || '').localeCompare(String(b.title || ''));
    });
    flat.push(...group);
  }

  if (flat.length && (!outputsSelected || !flat.find(t => 'mytodos:' + t.filename === outputsSelected))) {
    outputsSelected = 'mytodos:' + flat[0].filename;
  } else if (!flat.length) {
    outputsSelected = null;
  }

  let bar = '<div style="display:flex;gap:4px;margin-bottom:10px;align-items:center;flex-wrap:wrap;font-size:11px">';
  bar += `<button class="board-filter-btn" onclick="toggleOutputsListCollapsed()" title="${outputsListCollapsed ? '展开列表' : '折叠列表'}" style="padding:4px 8px">${outputsListCollapsed ? '▸' : '◂'}</button>`;
  const listActiveStyle = myTodoView === 'list' ? 'background:rgba(74,158,255,0.18);color:#58a6ff' : '';
  const calActiveStyle = myTodoView === 'calendar' ? 'background:rgba(74,158,255,0.18);color:#58a6ff' : '';
  bar += `<button class="board-filter-btn" onclick="setMyTodoView('list')" title="列表视图" style="${listActiveStyle}">列表</button>`;
  bar += `<button class="board-filter-btn" onclick="setMyTodoView('calendar')" title="月历视图" style="${calActiveStyle}">月历</button>`;
  bar += `<span style="font-size:11px;color:#8b949e">共 ${items.length}`;
  if (counts.overdue) bar += ` · <span style="color:#f85149">过期 ${counts.overdue}</span>`;
  if (counts.today) bar += ` · <span style="color:#ff8c42">今天 ${counts.today}</span>`;
  if (counts.unscheduled) bar += ` · <span style="color:#484f58">未定 ${counts.unscheduled}</span>`;
  bar += `</span>`;
  bar += `<div style="flex:1"></div>`;
  bar += `<input type="text" placeholder="search…" value="${escHtml(outputsSearch)}" oninput="_searchInput(this, v=>outputsSearch=v, renderReviewMyTodos, 'input[placeholder=&quot;search…&quot;]')" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#c9d1d9;font-size:11px;width:180px;outline:none">`;
  bar += `<button class="board-filter-btn" onclick="loadReviewMyTodos(true).then(renderReviewTab)" title="刷新">↻</button>`;
  bar += '</div>';

  const bucketMeta = {
    overdue: { label: '过期', color: '#f85149' },
    today: { label: '今天', color: '#ff8c42' },
    tomorrow: { label: '明天', color: '#d29922' },
    week: { label: '本周', color: '#4a9eff' },
    later: { label: '以后', color: '#8957e5' },
    unscheduled: { label: '未安排', color: '#484f58' },
  };

  const formatSched = (s) => {
    if (!s) return '';
    const d = new Date(s + 'T12:00:00');
    const dow = d.toLocaleDateString('en-US', { weekday: 'short' });
    const md = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `${dow} ${md}`;
  };

  // Calendar-style: always show Overdue (if any) → 7-day strip (today + 6 days
  // ahead) with empty-day placeholders → Later → Unscheduled. Even empty days
  // render so the pane reads as a calendar instead of a filtered list.
  const itemsByDay = {};
  for (const t of visible) {
    if (t._sched) (itemsByDay[t._sched] = itemsByDay[t._sched] || []).push(t);
  }
  const sortInGroup = (arr) => arr.sort((a, b) => {
    const pa = parseInt(a.priority) || 9, pb = parseInt(b.priority) || 9;
    if (pa !== pb) return pa - pb;
    return String(a.title || '').localeCompare(String(b.title || ''));
  });
  Object.values(itemsByDay).forEach(sortInGroup);

  const overdueItems = visible.filter(t => t._bucket === 'overdue');
  const laterItems = visible.filter(t => t._bucket === 'later');
  const unscheduledItems = visible.filter(t => t._bucket === 'unscheduled');
  sortInGroup(overdueItems);
  sortInGroup(laterItems);
  sortInGroup(unscheduledItems);
  // Overdue: sort by date asc (oldest first)
  overdueItems.sort((a, b) => (a._sched || '').localeCompare(b._sched || ''));
  laterItems.sort((a, b) => (a._sched || '').localeCompare(b._sched || ''));

  const dayHeader = (label, color, count) => `<div style="display:flex;align-items:center;gap:6px;padding:8px 4px 4px;margin-top:4px;border-bottom:1px solid rgba(255,255,255,0.06)">
    <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:${color}">${escHtml(label)}</span>
    ${count !== undefined ? `<span style="font-size:10px;color:#484f58">${count}</span>` : ''}
  </div>`;

  let body = '';

  if (myTodoView === 'calendar') {
    body = _renderMyTodoCalendar(itemsByDay, bucketMeta, todayStr);
  } else {
    // Unscheduled at the very top (most urgent to dispatch)
    if (unscheduledItems.length) {
      body += dayHeader('未安排', bucketMeta.unscheduled.color, unscheduledItems.length);
      for (const t of unscheduledItems) body += _renderTodoRow(t, bucketMeta.unscheduled.color, '');
    }

    if (overdueItems.length) {
      body += dayHeader('过期', bucketMeta.overdue.color, overdueItems.length);
      for (const t of overdueItems) {
        const dateLabel = t._sched ? formatSched(t._sched) : '';
        body += _renderTodoRow(t, bucketMeta.overdue.color, dateLabel);
      }
    }

    // Always-on 7-day strip
    for (let i = 0; i < 7; i++) {
      const d = new Date(now);
      d.setDate(now.getDate() + i);
      const dayStr = d.toLocaleDateString('sv-SE');
      const label = i === 0 ? `今天 · ${formatSched(dayStr)}`
        : i === 1 ? `明天 · ${formatSched(dayStr)}`
        : formatSched(dayStr);
      const bucketForColor = i === 0 ? 'today' : i === 1 ? 'tomorrow' : 'week';
      const color = bucketMeta[bucketForColor].color;
      const dayItems = itemsByDay[dayStr] || [];
      body += dayHeader(label, color, dayItems.length || undefined);
      if (!dayItems.length) {
        body += `<div style="font-size:11px;color:#484f58;padding:4px 14px 6px">—</div>`;
      } else {
        for (const t of dayItems) body += _renderTodoRow(t, color, '');
      }
    }

    if (laterItems.length) {
      body += dayHeader('以后', bucketMeta.later.color, laterItems.length);
      for (const t of laterItems) {
        const dateLabel = t._sched ? formatSched(t._sched) : '';
        body += _renderTodoRow(t, bucketMeta.later.color, dateLabel);
      }
    }

    if (!flat.length && !overdueItems.length && !laterItems.length && !unscheduledItems.length) {
      body = '<div class="empty-state" style="padding:16px 8px;color:#484f58">No todos' + (searchQ ? ' matching' : '') + '</div>' + body;
    }
  }

  _renderReviewPane(container, bar, body, flat.length, counts.overdue ? counts.overdue + ' overdue' : '');
}

function _renderMyTodoCalendar(itemsByDay, bucketMeta, todayStr) {
  const { y, m } = myTodoCalendarMonth;
  const monthName = new Date(y, m, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const firstDow = new Date(y, m, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  let html = `<div style="padding:4px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <button class="board-filter-btn" onclick="shiftMyTodoMonth(-1)" title="上个月">◂</button>
      <div style="font-size:13px;font-weight:600;color:#c9d1d9;flex:1;text-align:center">${escHtml(monthName)}</div>
      <button class="board-filter-btn" onclick="resetMyTodoMonth()" title="回到本月">今</button>
      <button class="board-filter-btn" onclick="shiftMyTodoMonth(1)" title="下个月">▸</button>
    </div>`;

  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  const dowLabels = ['日','一','二','三','四','五','六'];
  for (const dl of dowLabels) {
    html += `<div style="font-size:10px;color:#8b949e;text-align:center;padding:3px 0;font-weight:600">${dl}</div>`;
  }

  for (let i = 0; i < firstDow; i++) {
    html += `<div style="min-height:72px;background:rgba(255,255,255,0.01);border-radius:3px"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dayStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayItems = itemsByDay[dayStr] || [];
    const isToday = dayStr === todayStr;
    const isOverdue = dayStr < todayStr;
    const dayColor = isToday ? bucketMeta.today.color : (isOverdue ? bucketMeta.overdue.color : '#c9d1d9');
    const bg = isToday ? 'rgba(255,140,66,0.08)' : 'rgba(255,255,255,0.02)';
    const border = isToday ? `1px solid ${bucketMeta.today.color}` : '1px solid rgba(255,255,255,0.04)';

    let cellHtml = `<div style="min-height:72px;background:${bg};border:${border};border-radius:3px;padding:3px 4px;overflow:hidden">
      <div style="font-size:10px;color:${dayColor};font-weight:${isToday?'700':'500'};margin-bottom:2px">${d}</div>`;

    const maxShow = 3;
    for (let i = 0; i < Math.min(dayItems.length, maxShow); i++) {
      const t = dayItems[i];
      const title = escHtml(t.title || t.filename);
      const accent = isOverdue ? bucketMeta.overdue.color : (isToday ? bucketMeta.today.color : bucketMeta.week.color);
      cellHtml += `<div onclick="event.stopPropagation();selectReviewItem('mytodos','${escHtml(t.filename)}')" title="${title}" style="font-size:10px;color:#c9d1d9;background:rgba(255,255,255,0.04);border-left:2px solid ${accent};padding:1px 4px;margin-bottom:1px;border-radius:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${title}</div>`;
    }
    if (dayItems.length > maxShow) {
      cellHtml += `<div style="font-size:9px;color:#8b949e;padding:1px 4px">+${dayItems.length - maxShow} more</div>`;
    }
    cellHtml += `</div>`;
    html += cellHtml;
  }

  html += '</div></div>';
  return html;
}

function _renderTodoRow(t, accentColor, dateLabel) {
  const active = outputsSelected === 'mytodos:' + t.filename;
  const activeBg = active ? 'rgba(74,158,255,0.1)' : 'rgba(255,255,255,0.02)';
  const hoverBg = active ? 'rgba(74,158,255,0.12)' : 'rgba(255,255,255,0.06)';
  const leftBorder = active ? '2px solid #58a6ff' : `2px solid ${accentColor}`;
  const isProject = t.type === 'project';
  const fn = escHtml(t.filename);
  const actBtn = (icon, title, fn2, color) => `<button class="todo-row-act" onclick="event.stopPropagation();${fn2}" title="${title}" style="background:transparent;border:1px solid rgba(255,255,255,0.08);color:${color};font-size:11px;padding:1px 5px;border-radius:3px;cursor:pointer;line-height:1">${icon}</button>`;
  const acts = `<span class="todo-row-acts" style="display:none;gap:3px;flex-shrink:0">
    ${actBtn('✓', '完成', `completeTodoFromRow('${fn}')`, '#4a9eff')}
    ${actBtn('📅', '改期', `todoAddOrReschedule('${fn}')`, '#d29922')}
    ${actBtn('✕', '不做了', `dismissTodoFromRow('${fn}')`, '#f85149')}
  </span>`;
  return `<div onclick="selectReviewItem('mytodos','${fn}')" style="padding:5px 8px 5px 14px;cursor:pointer;border-radius:3px;margin-bottom:1px;background:${activeBg};border-left:${leftBorder};display:flex;align-items:center;gap:6px" onmouseover="this.style.background='${hoverBg}';const a=this.querySelector('.todo-row-acts');if(a)a.style.display='flex'" onmouseout="this.style.background='${activeBg}';const a=this.querySelector('.todo-row-acts');if(a)a.style.display='none'">
    ${cardBadge(t)}
    ${isProject ? '<span style="font-size:9px;color:#8957e5;border:1px solid #8957e5;padding:0 4px;border-radius:3px;flex-shrink:0">proj</span>' : ''}
    <span style="font-size:12px;color:${active?'#fff':(isProject?'#f0f6fc':'#c9d1d9')};font-weight:${isProject?'600':'400'};flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(t.title || t.filename)}</span>
    ${t.blocked_on ? `<span style="color:#d29922;font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${escHtml(String(t.blocked_on))}</span>` : ''}
    ${dateLabel ? `<span style="font-size:10px;color:${accentColor};flex-shrink:0">${escHtml(dateLabel)}</span>` : ''}
    ${acts}
  </div>`;
}

function _renderBrowseRow(it, depth, opts = {}) {
  const active = outputsSelected === it.key;
  const isOutput = it.kind === 'output';
  const indent = depth * 14;
  const caret = opts.hasKids
    ? `<span onclick="event.stopPropagation();toggleBrowseNode('${escHtml(it.id)}')" style="width:14px;flex-shrink:0;color:#8b949e;font-size:11px;cursor:pointer;text-align:center;user-select:none">${opts.expanded ? '▾' : '▸'}</span>`
    : `<span style="width:14px;flex-shrink:0"></span>`;
  const activeBg = active ? 'rgba(74,158,255,0.1)' : 'rgba(255,255,255,0.02)';
  const hoverBg = active ? 'rgba(74,158,255,0.12)' : 'rgba(255,255,255,0.06)';
  const leftBorder = active ? '2px solid #58a6ff' : '2px solid transparent';

  if (isOutput) {
    const dotColor = it.read ? '#484f58' : '#4a9eff';
    const chipText = it.category || '';
    const ago = it.mtime ? timeAgoMs(it.mtime) : '';
    return `<div onclick="selectReviewItem('output','${escHtml(it.id)}')" style="padding:5px 8px 5px ${8 + indent}px;cursor:pointer;border-radius:3px;margin-bottom:1px;background:${activeBg};border-left:${leftBorder};display:flex;align-items:center;gap:6px" onmouseover="this.style.background='${hoverBg}'" onmouseout="this.style.background='${activeBg}'">
      ${caret}
      <span style="color:${dotColor};font-size:8px;flex-shrink:0">●</span>
      ${chipText ? `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(74,158,255,0.15);color:#4a9eff;flex-shrink:0">${escHtml(chipText)}</span>` : ''}
      <span style="font-size:12px;color:${active?'#fff':'#c9d1d9'};flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(it.title)}</span>
      ${it.bookmarked ? '<span style="font-size:10px;color:#d29922">★</span>' : ''}
      <span style="font-size:10px;color:#484f58;flex-shrink:0">${ago}</span>
    </div>`;
  }

  // Card row — match Cards/Tree style (cardBadge + proj outline + kids count + blocked_on)
  const card = it._raw || it;
  const isProject = card.type === 'project';
  const kidsCount = (opts.hasKids && typeof opts.kidsCount === 'number') ? opts.kidsCount : 0;
  // When showing Recent filter, display last-update ago so owner can tell how fresh each card is.
  let cardAgo = '';
  if (opts.showAgo && card.mtime) {
    const ms = card.mtime * 1000;
    cardAgo = timeAgoMs(ms);
  }
  const inTodos = _myTodosSet.has(it.id) || card.assignee === 'user';
  const todoIcon = inTodos ? '📅' : '📋';
  const todoTitle = inTodos ? '改期' : '转入待办';
  const todoBtn = `<button onclick="event.stopPropagation();todoAddOrReschedule('${escHtml(it.id)}')" title="${todoTitle}" style="background:transparent;border:1px solid rgba(255,255,255,0.08);color:#d29922;font-size:11px;padding:1px 5px;border-radius:3px;cursor:pointer;line-height:1">${todoIcon}</button>`;
  return `<div onclick="selectReviewItem('card','${escHtml(it.id)}')" style="padding:4px 8px 4px ${8 + indent}px;cursor:pointer;border-radius:3px;margin-bottom:1px;background:${activeBg};border-left:${leftBorder};display:flex;align-items:center;gap:6px" onmouseover="this.style.background='${hoverBg}';const a=this.querySelector('.row-acts');if(a)a.style.display='flex'" onmouseout="this.style.background='${activeBg}';const a=this.querySelector('.row-acts');if(a)a.style.display='none'">
    ${caret}
    ${cardBadge(card)}
    ${isProject ? '<span style="font-size:9px;color:#8957e5;border:1px solid #8957e5;padding:0 4px;border-radius:3px;flex-shrink:0">proj</span>' : ''}
    <span style="font-size:12px;color:${active?'#fff':(isProject?'#f0f6fc':'#c9d1d9')};font-weight:${isProject?'600':'400'};flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(it.title)}</span>
    ${kidsCount ? `<span style="font-size:10px;color:#484f58;flex-shrink:0">${kidsCount}</span>` : ''}
    ${card.blocked_on ? `<span style="color:#d29922;font-size:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${escHtml(String(card.blocked_on))}</span>` : ''}
    ${cardAgo ? `<span style="font-size:10px;color:#484f58;flex-shrink:0">${cardAgo}</span>` : ''}
    ${todoBtn ? `<span class="row-acts" style="display:none;gap:3px;flex-shrink:0">${todoBtn}</span>` : ''}
  </div>`;
}

function _renderBrowseTree(visible, searchQ) {
  // Separate cards and outputs from the visible set.
  const cards = visible.filter(it => it.kind === 'card');
  const outputs = visible.filter(it => it.kind === 'output');
  const cardByFilename = {};
  cards.forEach(c => { cardByFilename[c.id] = c; });

  // Index children by parent filename (cards + outputs whose relatedCard/project links back).
  const childCards = {};
  for (const c of cards) {
    const p = c.parent || '';
    (childCards[p] = childCards[p] || []).push(c);
  }
  const childOutputs = {};
  for (const o of outputs) {
    const raw = o._raw || {};
    const link = raw.relatedCard || raw.project || '';
    if (link && cardByFilename[link]) {
      (childOutputs[link] = childOutputs[link] || []).push(o);
    }
  }
  // Sort helpers
  const sortCards = arr => arr.sort((a, b) => {
    const ap = a.type === 'project' ? 0 : 1, bp = b.type === 'project' ? 0 : 1;
    if (ap !== bp) return ap - bp;
    const pa = parseInt(a.priority) || 9, pb = parseInt(b.priority) || 9;
    if (pa !== pb) return pa - pb;
    return String(a.title || '').localeCompare(String(b.title || ''));
  });
  const sortOutputs = arr => arr.sort((a, b) => (b._mtimeMs || 0) - (a._mtimeMs || 0));
  Object.values(childCards).forEach(sortCards);
  Object.values(childOutputs).forEach(sortOutputs);

  // Roots = cards without a parent OR whose parent isn't visible (orphans)
  const visibleCardSet = new Set(cards.map(c => c.id));
  const rootCards = cards.filter(c => !c.parent || !visibleCardSet.has(c.parent));
  sortCards(rootCards);
  // Orphan outputs: in visible outputs but no matching card in tree
  const orphanOutputs = outputs.filter(o => {
    const raw = o._raw || {};
    const link = raw.relatedCard || raw.project || '';
    return !link || !cardByFilename[link];
  });
  sortOutputs(orphanOutputs);

  // Default: everything collapsed on first visit. owner can use 展开 to unfold.
  // When searching, force-expand so matches are visible.
  const forceExpand = !!searchQ;

  let html = '';
  const visitCard = (card, depth) => {
    const kidCards = childCards[card.id] || [];
    const kidOuts = childOutputs[card.id] || [];
    const kidsCount = kidCards.length + kidOuts.length;
    const hasKids = kidsCount > 0;
    const expanded = forceExpand || _browseExpanded.has(card.id);
    html += _renderBrowseRow(card, depth, { hasKids, expanded, kidsCount });
    if (hasKids && expanded) {
      for (const kc of kidCards) visitCard(kc, depth + 1);
      for (const ko of kidOuts) html += _renderBrowseRow(ko, depth + 1);
    }
  };
  for (const r of rootCards) visitCard(r, 0);
  if (orphanOutputs.length) {
    html += `<div style="font-size:10px;text-transform:uppercase;color:#484f58;font-weight:600;padding:10px 4px 3px">📂 未关联卡片</div>`;
    for (const o of orphanOutputs) html += _renderBrowseRow(o, 0);
  }
  return html;
}

async function selectReviewItem(kind, id) {
  outputsSelected = kind + ':' + id;
  if (kind === 'output') {
    const o = (outputsAll || []).find(x => x.id === id);
    if (o && !o.read) {
      o.read = true;
      try { await api('POST', '/pios/output/read', { id, read: true }); } catch {}
    }
  }
  renderReviewTab();
}

async function loadReviewBrowseDetail(key) {
  const el = document.getElementById('outputs-detail');
  if (!el) return;
  const [kind, ...rest] = key.split(':');
  const id = rest.join(':');
  try {
    if (kind === 'output') {
      const doc = await api('GET', '/pios/output?id=' + encodeURIComponent(id));
      if (!doc) { el.innerHTML = '<div class="empty-state">Not found</div>'; return; }
      const o = (outputsAll || []).find(x => x.id === id) || {};
      const toolbar = `<div style="position:sticky;top:0;z-index:5;background:#0d1117;border-bottom:1px solid rgba(255,255,255,0.08);padding:8px 0;margin-bottom:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">${renderOutputActionsHTML(o)}</div>`;
      el.innerHTML = toolbar + renderOutputDetailHTML(o, doc, { showClose: false });
    } else if (kind === 'card' || kind === 'mytodos') {
      const card = (cardsAll || []).find(c => c.filename === id)
        || (MYTODOS_DATA || []).find(c => c.filename === id)
        || { filename: id };
      let full = _cardContentCache[id];
      if (full === undefined) {
        try {
          const fetched = await api('GET', '/pios/card?name=' + encodeURIComponent(id));
          full = (fetched && fetched.content) || card._content || '';
          _cardContentCache[id] = full;
        } catch { full = card._content || ''; _cardContentCache[id] = full; }
      }
      const currentFull = { ...card, content: full };
      const toolbar = `<div style="position:sticky;top:0;z-index:5;background:#0d1117;border-bottom:1px solid rgba(255,255,255,0.08);padding:8px 0;margin-bottom:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">${renderCardActionsHTML(card)}</div>`;
      el.innerHTML = toolbar + renderCardDetailHTML(currentFull, { showClose: false, compact: true });
    } else if (kind === 'notif') {
      const n = (NOTIF_DATA || [])[parseInt(id)];
      if (!n) { el.innerHTML = '<div class="empty-state">Not found</div>'; return; }
      const toolbar = `<div style="position:sticky;top:0;z-index:5;background:#0d1117;border-bottom:1px solid rgba(255,255,255,0.08);padding:8px 0;margin-bottom:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">${renderNotificationActionsHTML(n)}</div>`;
      el.innerHTML = toolbar + renderNotificationDetailHTML(n, { showClose: false });
    } else if (kind === 'activity') {
      const srcIdx = parseInt(id);
      let entry = (_activityCache || []).find(e => e._srcIdx === srcIdx);
      if (!entry) {
        const raw = (ACTIVITY_DATA || [])[srcIdx];
        if (!raw) { el.innerHTML = '<div class="empty-state">Not found</div>'; return; }
        const isDashboard = (raw.header || '').includes('dashboard');
        const isSkip = (raw.header || '').includes('skip');
        const isIdle = (raw.lines || []).some(l => l.includes('无事退出'));
        const tickMatch = (raw.header || '').match(/tick #(\d+)/);
        const timeMatch = (raw.header || '').match(/(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2})/);
        entry = {
          ...raw,
          tickId: tickMatch ? tickMatch[1] : '',
          time: timeMatch ? timeMatch[2] : '',
          type: isDashboard ? 'dashboard' : isSkip ? 'skip' : 'tick',
          idle: isIdle || isSkip,
        };
      }
      const toolbar = `<div style="position:sticky;top:0;z-index:5;background:#0d1117;border-bottom:1px solid rgba(255,255,255,0.08);padding:8px 0;margin-bottom:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">${renderActivityActionsHTML(entry)}</div>`;
      el.innerHTML = toolbar + renderActivityDetailHTML(entry, { showClose: false });
    }
  } catch (e) { el.innerHTML = `<div class="empty-state">Error: ${escHtml(e.message)}</div>`; }
}

function timeAgoMs(ms) {
  const now = Date.now();
  const diff = Math.floor((now - ms) / 1000);
  if (diff < 60) return diff + 's';
  if (diff < 3600) return Math.round(diff/60) + 'm';
  if (diff < 86400) return Math.round(diff/3600) + 'h';
  return Math.round(diff/86400) + 'd';
}

// ── Shared Output Detail Renderer ──
// Used by Outputs tab's right pane and by openOutputInModal.
function renderOutputDetailHTML(meta, doc, opts = {}) {
  const o = meta || {};
  const id = o.id || '';
  const content = (doc && doc.content) || '';
  const tags = Array.isArray(o.tags) ? o.tags : [];
  const title = o.title || o.filename || id;
  // Strip a leading "# <heading>\n" from body — markdown outputs conventionally
  // start with "# Title" but we already render the title as <h2> above, so
  // leaving it in would show the title twice.
  const bodyContent = String(content || '').replace(/^\s*#\s+[^\n]+\n+/, '');

  let html = '';

  // × close + action buttons moved to modal toolbar (showCardDetailModal).
  // Top meta row (category / track / bookmark / modified) moved to
  // renderOutputActionsHTML so the sticky toolbar hosts one unified row.

  const outerPad = opts.showClose ? '14px 20px 16px' : '0';

  html += `<div style="padding:${outerPad}">`;

  // Title
  html += `<h2 style="color:#f0f6fc;font-size:18px;margin:0 0 6px;font-weight:600">${escHtml(title)}</h2>`;
  html += `<div style="font-size:10px;color:#484f58;margin-bottom:10px">${escHtml(id)}</div>`;

  // Ownership row — always shows something so user can tell where a report came from.
  // Priority: Card (relatedCard + project) is the preferred owner. Scheduled task
  // (ownerTask from pios.yaml) is only a last-resort fallback shown when no card
  // can be found — owner prefers card hierarchy over agent/task.
  const relCard = o.relatedCard;
  const relCardType = o.relatedCardType || 'task';   // 'project' | 'task'
  const relCardTitle = o.relatedCardTitle || relCard;
  const relProj = o.project && o.project !== o.relatedCard ? o.project : null;
  const relProjTitle = o.projectTitle || relProj;
  const ownerTask = o.ownerTask;
  const subdirLabel = o.subdirLabel;
  {
    html += `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px">`;
    html += `<span style="font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:0.5px">归属</span>`;
    if (relCard) {
      // Project → 📁 purple, Task → 📌 blue
      const icon = relCardType === 'project' ? '📁' : '📌';
      const bg = relCardType === 'project' ? 'rgba(137,87,229,0.1)' : 'rgba(74,158,255,0.1)';
      const border = relCardType === 'project' ? 'rgba(137,87,229,0.35)' : 'rgba(74,158,255,0.35)';
      const color = relCardType === 'project' ? '#a77dff' : '#58a6ff';
      html += `<button onclick="openCardDetail('${escHtml(relCard)}')" style="background:${bg};border:1px solid ${border};color:${color};padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer" title="${escHtml(relCard)}">${icon} ${escHtml(relCardTitle || relCard)}</button>`;
    }
    if (relProj) {
      html += `<span style="font-size:10px;color:#484f58">↑</span>`;
      html += `<button onclick="openCardDetail('${escHtml(relProj)}')" style="background:rgba(137,87,229,0.1);border:1px solid rgba(137,87,229,0.35);color:#a77dff;padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer" title="${escHtml(relProj)}">📁 ${escHtml(relProjTitle || relProj)}</button>`;
    }
    if (!relCard) {
      // No card match — show breadcrumb, and optionally a muted hint about the scheduled task
      const breadcrumb = subdirLabel ? `${o.category || ''}/${subdirLabel}` : (o.category || '—');
      html += `<span style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#8b949e;padding:3px 10px;border-radius:4px;font-size:11px">📂 ${escHtml(breadcrumb)}</span>`;
      if (ownerTask && ownerTask.taskId) {
        const label = (ownerTask.agent ? ownerTask.agent + '/' : '') + ownerTask.taskId;
        html += `<span onclick="switchTab('tasks', '${escHtml(ownerTask.taskId)}')" style="font-size:10px;color:#555;margin-left:2px;cursor:pointer;border-bottom:1px dotted #3a4150" title="跳转到 Tasks 标签页 · 此报告由 ${escHtml(label)} 任务生成，但未关联卡片">源: ${escHtml(label)}</span>`;
      } else {
        html += `<span style="font-size:10px;color:#484f58;margin-left:2px">未关联卡片</span>`;
      }
    }
    html += `</div>`;
  }

  // Tags row (view + edit)
  html += `<div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06)">`;
  html += `<span style="font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:0.5px;margin-right:2px">Tags</span>`;
  if (tags.length) {
    tags.forEach(t => {
      html += `<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(137,87,229,0.15);color:#a77dff;border:1px solid rgba(137,87,229,0.3)">${escHtml(t)}</span>`;

    html += `<span style="font-size:10px;color:#484f58">—</span>`;
  }
  html += `<button onclick="editOutputTags('${escHtml(id)}')" style="background:none;border:1px dashed rgba(255,255,255,0.15);color:#8b949e;padding:1px 7px;border-radius:10px;font-size:10px;cursor:pointer;margin-left:2px">✎ 编辑</button>`;
  html += `</div>`;

  // Markdown body (leading H1 stripped to avoid duplicate title)
  html += `<div class="md-rendered" style="font-size:13px;color:#c9d1d9;line-height:1.7">${renderMd(bodyContent)}</div>`;

  // Action bar moved to modal toolbar (renderOutputActionsHTML).

  html += `</div>`;
  return html;
}

async function openOutputInModal(outputId) {

async function downloadOutputPdf(id) {
  // Endpoint is served by main.js on the same origin (http://127.0.0.1:17891).
  // Use a blob download so we can toast success/failure — Electron downloads
  // otherwise go silently to ~/Downloads with no UI feedback.
  const url = '/pios/output/pdf?id=' + encodeURIComponent(id);
  const loading = piToast('正在生成 PDF…', 'info', 60000);
  try {
    const resp = await fetch(url);
    if (!resp.ok) {
      loading.remove();
      let body = '';
      try { body = await resp.text(); } catch {}
      piAlert(`PDF 失败 (${resp.status}): ${body.slice(0, 200)}\n\n如是 404，说明 PiBrowser 没加载新 main.js — 需完整重启 PiBrowser（不是 ⌘R）。`);
      return;
    }
    const blob = await resp.blob();
    const blobUrl = URL.createObjectURL(blob);
    let filename = id.split('/').pop().replace(/\.md$/, '') + '.pdf';
    const cd = resp.headers.get('Content-Disposition') || '';
    const m = cd.match(/filename="([^"]+)"/);
    if (m) filename = m[1];
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { a.remove(); URL.revokeObjectURL(blobUrl); }, 500);
    loading.remove();
    piToast(`已下载: ${filename}`, 'success', 4000);
  } catch (e) {
    loading.remove();
    piAlert('PDF 下载出错: ' + e.message);
  }
}

// Generic follow-up: works for card / notification / run / task. Creates a
// new inbox card with assignee=pi so the worker picks it up next tick. Output
// has its own /pios/output/comment endpoint (appends to the report + creates
// the card) — use commentOutput() for that, createFollowUp() for everything
// else.
async function createFollowUp({ kind, source, title }) {
  const label = title || source || kind;
  const text = await piPrompt(`跟进: ${label}`, '', { multiline: true, placeholder: '写一句你想让 Pi 跟进的内容 …' });
  if (!text || !text.trim()) return;
  try {
    const today = new Date().toISOString().slice(0, 10);
    const firstLine = text.split('\n')[0].trim() || `跟进 ${label}`;
    const rest = text.split('\n').slice(1).join('\n').trim();
    // Build a slug that ties back to the source so duplicates are easy to spot.
    const srcTag = kind === 'notification' ? 'notify'
      : kind === 'run' ? 'run'
      : kind === 'task' ? 'task'
      : kind === 'card' ? 'card'
      : 'item';
    const slugSeed = (firstLine || label || 'followup').toLowerCase()
      .replace(/[^\w\s-]/g, ' ').trim().replace(/\s+/g, '-').replace(/[^\w-]/g, '').slice(0, 50) || 'followup';
    const slug = `followup-${today}-${srcTag}-${slugSeed}`;
    const frontmatter = {
      type: 'task',
      status: 'inbox',
      priority: 3,
      created: today,
      assignee: 'pi',
      ...(kind === 'card' && source ? { parent: source } : {}),
    };
    let content = `# 跟进: ${firstLine}\n\n`;
    if (rest) content += rest + '\n\n';
    content += `---\n\n**来源**: ${kind}`;
    if (source) content += ` · \`${source}\``;
    if (title && title !== source) content += ` · ${title}`;
    content += '\n';
    const r = await api('POST', '/pios/create-card', { filename: slug, dir: 'inbox', frontmatter, content });
    if (!r || !r.ok) { piAlert('跟进失败: ' + (r?.error || 'unknown')); return; }
    piToast('✓ 已创建跟进卡，Pi 会接手', 'success', 3000);
    markLocalMutation();
  } catch (e) { piAlert('跟进失败: ' + e.message); }
}

async function followUpCard(filename) {
  const card = (cardsAll || []).find(c => c.filename === filename) || {};
  await createFollowUp({ kind: 'card', source: filename, title: card.title || filename });
}

  if (!entry) {

    if (!raw) return;
    const isDashboard = (raw.header || '').includes('dashboard');
    const isSkip = (raw.header || '').includes('skip');
    const isIdle = (raw.lines || []).some(l => l.includes('无事退出'));
    const tickMatch = (raw.header || '').match(/tick #(\d+)/);
    const timeMatch = (raw.header || '').match(/(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2})/);
    entry = {
      ...raw,
      tickId: tickMatch ? tickMatch[1] : '',
      time: timeMatch ? timeMatch[2] : '',
      type: isDashboard ? 'dashboard' : isSkip ? 'skip' : 'tick',
      idle: isIdle || isSkip,
    };

  _modalStack = [{ type: 'activity', data: entry }];
  showCardDetailModal(
    renderActivityDetailHTML(entry, { showClose: true }),
    renderActivityActionsHTML(entry)
  );

  const container = document.getElementById('toast-container') || (() => {
    const div = document.createElement('div');
    div.id = 'toast-container';
    div.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px;';
    document.body.appendChild(div);

  })();

async function pollNotifications() {
  try {
    const items = await api('GET', '/pios/notifications?limit=5');
    if (!items || !items.length) return;
    if (lastNotifyCount === 0) { lastNotifyCount = items.length; return; } // 首次不弹
    const newCount = items.length - lastNotifyCount;
    if (newCount > 0 && notifySettings.popup) {
      for (let i = 0; i < Math.min(newCount, 3); i++) {
        const n = items[i];
        const isAlert = /异常|失败|error|failed/i.test(n.text || n.body || '');
        showToast(n.text || n.body || n.title || '', isAlert);
      }
    }
    lastNotifyCount = items.length;
  } catch {}
}

function buildCommandItems() {
  const items = [];

  // Top-level tabs
  const tabs = [

    ['tasks', 'Tasks'], ['resources', 'Resources'],

  }

  // Cards (active + inbox, skip archive)
  for (const c of (cardsAll || [])) {
    if (c.folder === 'archive') continue;
    const meta = c.blocked_on ? '⏸' : (c.folder === 'inbox' ? 'inbox' : '');
    const hint = c.type === 'project' ? '📁 proj' : '📌 task';
    items.push({
      kind: 'card',

      label: c.title || c.filename,
      hint,
      meta,

      action: () => openCardDetail(c.filename),
    });

  );

      label: o.title || o.id,
      hint: o.category || 'output',

      action: () => openOutputInModal(o.id),
    });

  items.push({ kind: 'action', search: 'new card create add task pi', label: 'New card (for Pi)', hint: 'Action', action: () => quickAddPiCard() });
  items.push({ kind: 'action', search: 'new todo mytodo create add task self', label: 'New TODO (for me)', hint: 'Action', action: () => quickAddMyTodo() });
  items.push({ kind: 'action', search: 'refresh reload cards', label: 'Reload board', hint: 'Action', action: () => refreshBoard() });
  items.push({ kind: 'action', search: 'mark all outputs read', label: 'Mark all outputs read', hint: 'Action', action: () => markAllOutputsRead() });
  items.push({ kind: 'action', search: 'help keyboard shortcuts', label: 'Keyboard shortcuts help', hint: 'Action', action: () => showKeyboardHelp() });

  return items;
}

function _cmdFuzzyScore(query, haystack) {
  if (!query) return 1;
  const q = query.toLowerCase();
  const h = haystack.toLowerCase();
  // Exact substring is best
  const idx = h.indexOf(q);
  if (idx >= 0) return 10000 - idx - h.length * 0.1;
  // Character-by-character fuzzy
  let i = 0, lastJ = -1, score = 5000;
  for (let j = 0; j < h.length && i < q.length; j++) {
    if (q[i] === h[j]) {
      if (lastJ === j - 1) score += 20; // contiguous bonus
      lastJ = j;
      i++;
    }
  }
  if (i < q.length) return -1;
  return score - h.length * 0.1;
}

function _cmdFilter(query, items) {
  if (!query) return items.slice(0, 80);
  const scored = [];
  for (const it of items) {
    const s = _cmdFuzzyScore(query, it.search || it.label || '');
    if (s > 0) scored.push({ it, s });
  }
  scored.sort((a, b) => b.s - a.s);
  return scored.slice(0, 80).map(x => x.it);
}

  } else if (isSearchMode && displayResults.length === 0) {
    inner += `<div style="padding:24px;text-align:center;color:#484f58;font-size:12px">搜索中…</div>`;
  } else if (!isSearchMode && !displayResults.length) {
    inner += `<div style="padding:32px;text-align:center;color:#484f58;font-size:12px">无匹配</div>`;
  } else {
    displayResults.forEach((r, idx) => {
      const active = idx === _cmdPaletteIdx;
      const icon = kindIcon[r.kind] || '·';
      const iconCol = kindColor[r.kind] || '#666';
      const pChip = r.kind === 'card' && r.priority && r.priority < 9 ? `<span style="font-size:9px;color:#8b949e;background:rgba(255,255,255,0.05);padding:1px 4px;border-radius:3px;font-weight:600">P${r.priority}</span>` : '';
      const snippetHtml = (r.snippets && r.snippets.length > 0 && isSearchMode)
        ? `<div style="font-size:10px;color:#484f58;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml((r.snippets[0].text || '').slice(0, 80))}</div>`
        : '';
      inner += `<div data-idx="${idx}" onmousedown="event.preventDefault();" onclick="_cmdPaletteIdx=${idx};_cmdPaletteExecute()" style="padding:8px 12px;border-radius:6px;cursor:pointer;background:${active ? 'rgba(74,158,255,0.15)' : 'transparent'};border-left:${active ? '2px solid #58a6ff' : '2px solid transparent'}">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:12px;color:${active ? '#58a6ff' : iconCol};flex-shrink:0;width:14px;text-align:center">${icon}</span>
          ${pChip}
          <span style="font-size:13px;color:${active ? '#fff' : '#c9d1d9'};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(r.label || '')}</span>
          ${r.meta ? `<span style="font-size:10px;color:${r.meta.startsWith('●') ? '#4a9eff' : '#888'}">${escHtml(r.meta)}</span>` : ''}
          ${r.hint ? `<span style="font-size:9px;color:#555;background:rgba(255,255,255,0.04);padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:0.3px">${escHtml(r.hint)}</span>` : ''}
        </div>
        ${snippetHtml}
      </div>`;
    });
  }
  inner += `</div>`;
  inner += `<div style="padding:8px 14px;border-top:1px solid rgba(255,255,255,0.06);font-size:10px;color:#555;display:flex;gap:14px;font-family:'SF Mono',Menlo,monospace">
    <span>↑↓ 选择</span>
    <span>↵ 打开</span>
    <span>Esc 关闭</span>
    ${isSearchMode ? '<span style="color:#58a6ff">🔍 全文搜索模式</span>' : ''}
    <span style="margin-left:auto">${displayResults.length} matches</span>
  </div></div>`;

  ov.innerHTML = inner;
  const input = document.getElementById('_pi-cmd-input');
  if (input) {
    setTimeout(() => {
      input.focus();
      const v = input.value;
      input.setSelectionRange(v.length, v.length);
    }, 0);
    input.oninput = (e) => {
      // 打中文拼音时 isComposing=true，此时跳过 render 不要销毁 input 节点
      // （ov.innerHTML 重写会把 input 连带 IME 组合状态一起摧毁，候选词无法选中）
      // compositionend 之后浏览器会再发一次 isComposing=false 的 input 事件，那时再刷
      if (e.isComposing) return;
      _cmdPaletteQuery = e.target.value;
      _cmdPaletteIdx = 0;
      if (_cmdPaletteQuery.startsWith('>')) {
        if (_cmdSearchTimer) clearTimeout(_cmdSearchTimer);
        _cmdSearchResults = [];
        renderCommandPalette();
        const q = _cmdPaletteQuery.slice(1).trim();
        if (q.length >= 2) {
          _cmdSearchTimer = setTimeout(async () => {
            try {
              const results = await api('GET', `/pios/search?q=${encodeURIComponent(q)}&limit=20`);
              _cmdSearchResults = (results || []).map(r => ({
                kind: r.kind || 'search',
                label: r.title || r.filename,
                hint: r.kind === 'card' ? 'card' : 'output',
                search: r.title + ' ' + r.filename,
                snippets: r.snippets || [],
                action: r.kind === 'card'
                  ? () => openCardDetail(r.filename)
                  : () => openOutputInModal(r.path),
              }));
              renderCommandPalette();
            } catch {}
          }, 300);
        }
      } else {
        renderCommandPalette();
      }
    };
    input.onkeydown = (e) => {
      const results = _cmdPaletteQuery.startsWith('>') ? _cmdSearchResults : _cmdPaletteResults;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        _cmdPaletteIdx = Math.min(results.length - 1, _cmdPaletteIdx + 1);
        renderCommandPalette();
        _cmdScrollActiveIntoView();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        _cmdPaletteIdx = Math.max(0, _cmdPaletteIdx - 1);
        renderCommandPalette();
        _cmdScrollActiveIntoView();
      } else if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) {
        e.preventDefault();
        _cmdPaletteExecute();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        closeCommandPalette();
      }
    };
  }
}

function _cmdScrollActiveIntoView() {
  const list = document.getElementById('_pi-cmd-list');
  if (!list) return;
  const active = list.querySelector(`[data-idx="${_cmdPaletteIdx}"]`);
  if (active && active.scrollIntoView) active.scrollIntoView({ block: 'nearest' });
}

function _cmdPaletteExecute() {
  const results = _cmdPaletteQuery.startsWith('>') ? _cmdSearchResults : _cmdPaletteResults;
  const r = results[_cmdPaletteIdx];
  if (!r) return;
  closeCommandPalette();
  try { r.action(); } catch (e) { piAlert('Command failed: ' + e.message); }
}

// ──────────────────────────────────────────────────────────────────────────
// Global keyboard handler — command palette, ESC, Review shortcuts
// ──────────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const target = e.target;
  const tag = (target && target.tagName || '').toLowerCase();
  const inInput = tag === 'input' || tag === 'textarea' || tag === 'select' || (target && target.isContentEditable);

  // ── Esc: cascade close (command palette → pi-dialog → editor-overlay → edit mode → card modal → conv modal → login modal) ──
  if (e.key === 'Escape') {
    if (document.getElementById('pi-cmd-overlay')) { closeCommandPalette(); e.preventDefault(); return; }
    if (document.querySelector('.pi-dialog-overlay')) { return; /* let the dialog's own handler process Esc */ }
    const editorOv = document.getElementById('editor-overlay');
    if (editorOv && editorOv.classList.contains('show')) { closeEditor(); e.preventDefault(); return; }
    // If in card edit mode, Esc cancels the edit instead of closing the modal
    if (_cardEditingFilename) { e.preventDefault(); cancelCardEdit(); return; }
    const cardModal = document.getElementById('card-detail-modal');
    if (cardModal && cardModal.style.display !== 'none') { closeCardDetailModal(); e.preventDefault(); return; }
    const conv = document.getElementById('conv-modal');
    if (conv && conv.innerHTML) {
      conv.innerHTML = '';
      if (_pendingOverviewRefresh) { _pendingOverviewRefresh = false; loadOverview(); }
      return;
    }
    if (document.getElementById('login-progress-modal')) { cancelLoginFlow(); e.preventDefault(); return; }
    return;
  }

  // ── ⌘S: save card edit (only when in edit mode) ──
  if ((e.metaKey || e.ctrlKey) && e.key === 's' && _cardEditingFilename) {
    e.preventDefault();
    saveCardEdit(_cardEditingFilename);
    return;
  }

  // ── ⌘K / Ctrl+K: command palette (always available) ──
  if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
    e.preventDefault();
    openCommandPalette();
    return;
  }

  // ── ⌘Z / Ctrl+Z: trigger last undo (only if one is pending) ──
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey && _lastUndoable && !inInput) {
    e.preventDefault();
    triggerLastUndo();
    return;
  }

  // ── ⌘← Back in modal stack (works even while modal is open) ──
  if ((e.metaKey || e.ctrlKey) && e.key === 'ArrowLeft') {
    const m = document.getElementById('card-detail-modal');
    if (m && m.style.display !== 'none' && _modalStack.length > 1) {
      e.preventDefault();
      modalBack();
      return;
    }
  }

  // From here on, don't intercept if the user is typing
  if (inInput) return;
  // Don't intercept while any modal/dialog is open
  if (document.getElementById('pi-cmd-overlay')) return;
  if (document.querySelector('.pi-dialog-overlay')) return;
  const cardModal = document.getElementById('card-detail-modal');
  if (cardModal && cardModal.style.display !== 'none') return;

  // ── ? keyboard help ──
  if (e.key === '?') { e.preventDefault(); showKeyboardHelp(); return; }

  // ── c: quick-add new card (assignee=pi, dir=inbox) ──
  if (e.key === 'c' && !e.metaKey && !e.ctrlKey && !e.altKey) { e.preventDefault(); quickAddPiCard(); return; }
  // ── t: quick-add MyTODO (assignee=user, dir=active, with date picker) ──
  if (e.key === 't' && !e.metaKey && !e.ctrlKey && !e.altKey) { e.preventDefault(); quickAddMyTodo(); return; }

  // ── ←/→ : navigate Things Need You on Overview ──
  if (activeTab === 'overview' && (decisions || []).length > 1 && !e.metaKey && !e.ctrlKey && !e.altKey) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); decIdx = (decIdx - 1 + decisions.length) % decisions.length; showDecision(); return; }
    if (e.key === 'ArrowRight') { e.preventDefault(); decIdx = (decIdx + 1) % decisions.length; showDecision(); return; }
  }

  // ── / focus search box of current context ──
  if (e.key === '/') {
    const selector = activeTab === 'review' ? '#tab-review input[type=text]' : null;
    if (selector) {
      const input = document.querySelector(selector);
      if (input) { e.preventDefault(); input.focus(); input.select && input.select(); return; }
    }
  }

  // ── Review tab (queue mode): j/k navigation + action keys ──
  if (activeTab === 'review' && reviewMode === 'queue') {
    const queue = buildBoardReviewQueue();
    if (!queue.length) return;
    const cur = queue[boardReviewIdx];
    if (e.key === 'j' || e.key === 'ArrowDown') {
      e.preventDefault();
      boardReviewIdx = Math.min(queue.length - 1, boardReviewIdx + 1);
      renderBoardReview();
      return;
    }
    if (e.key === 'k' || e.key === 'ArrowUp') {
      e.preventDefault();
      boardReviewIdx = Math.max(0, boardReviewIdx - 1);
      renderBoardReview();
      return;
    }
    if (!cur) return;
    if (cur.kind === 'output') {
      if (e.key === 'Enter') { e.preventDefault(); boardOutputReadAndNext(cur.id); return; }
    } else {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (cur.queueType === 'review') boardApproveReview(cur.filename);
        else boardApproveDecision(cur.filename);
        return;
      }
      if (e.key === 'r' && cur.queueType === 'review') { e.preventDefault(); boardReworkReview(cur.filename); return; }
      if (e.key === 'e') { e.preventDefault(); boardDefer(cur.filename); return; }
      if (e.key === 'a') { e.preventDefault(); boardArchive(cur.filename); return; }
    }
    if (e.key === 's') { e.preventDefault(); boardReviewNext(); return; }
  }
});

// ──────────────────────────────────────────────────────────────────────────
// Real-time refresh via SSE — Cards/ and Pi/Output/ file changes push here
// so Home auto-updates when another machine (or Pi itself) edits the vault.
// ──────────────────────────────────────────────────────────────────────────
let _eventSource = null;
let _eventSourceRetryTimer = null;
let _lastLocalMutationAt = 0;

// Frontend-side mutation actions should call this so we can suppress the echo
// (our own write → fs.watch → SSE → we re-render for nothing).
function markLocalMutation() { _lastLocalMutationAt = Date.now(); }

// ──────────────────────────────────────────────────────────────────────────
// Undo system — capture a card's full state before a destructive mutation,
// show the Undo toast for 8s, and restore via /pios/restore-card on click
// (or ⌘Z within the window).
// ──────────────────────────────────────────────────────────────────────────
let _lastUndoable = null;  // { desc, ts, fn } — set by registerUndo, cleared on fire or expire
const UNDO_WINDOW_MS = 8000;

async function snapshotCard(filename) {
  try {
    const c = await api('GET', '/pios/card?name=' + encodeURIComponent(filename));
    if (!c) return null;
    return {
      filename,
      dir: c.dir,
      frontmatter: c.frontmatter || {},
      content: c.content || '',
    };
  } catch { return null; }
}

async function snapshotCards(filenames) {
  const snaps = [];
  for (const f of filenames) {
    const s = await snapshotCard(f);
    if (s) snaps.push(s);
  }
  return snaps;
}

// Register an undoable operation. Shows a success toast with an "↶ Undo" button.
// `undoFn` should be async and perform the reverse operation (usually
// /pios/restore-card then refreshBoard).
function registerUndo(desc, undoFn) {
  const ts = Date.now();
  _lastUndoable = { desc, ts, fn: undoFn };
  piToast('✓ ' + desc, 'success', UNDO_WINDOW_MS, {
    action: {
      label: '↶ Undo',
      fn: () => _fireUndo(ts),
    },
  });
  // Auto-clear after the window
  setTimeout(() => { if (_lastUndoable && _lastUndoable.ts === ts) _lastUndoable = null; }, UNDO_WINDOW_MS + 100);
}

async function _fireUndo(ts) {
  if (!_lastUndoable || _lastUndoable.ts !== ts) return;
  const op = _lastUndoable;
  _lastUndoable = null;
  try {
    await op.fn();
    piToast('已撤销: ' + op.desc, 'info', 2500);
  } catch (e) {
    piAlert('撤销失败: ' + e.message);
  }
}

// Triggered by ⌘Z. No-op if no undo is pending.
function triggerLastUndo() {
  if (_lastUndoable) _fireUndo(_lastUndoable.ts);
}

function initRealtimeEvents() {
  if (_eventSource) { try { _eventSource.close(); } catch {} _eventSource = null; }
  if (_eventSourceRetryTimer) { clearTimeout(_eventSourceRetryTimer); _eventSourceRetryTimer = null; }
  try {
    _eventSource = new EventSource('/pios/events');
    _eventSource.addEventListener('hello', () => {
      // console.log('[realtime] connected');
    });
    _eventSource.addEventListener('change', (e) => {
      try {
        const msg = JSON.parse(e.data);
        handleRealtimeChange(msg);
      } catch {}
    });
    _eventSource.onerror = () => {
      // EventSource auto-reconnects, but if we want a fallback after N failures,
      // we could track here. For now just let it handle itself.
    };
  } catch (e) {
    console.warn('[realtime] SSE init failed:', e.message);
    // Retry once after 5s in case the HTTP server wasn't ready yet
    _eventSourceRetryTimer = setTimeout(initRealtimeEvents, 5000);
  }
}

// Debounced change handler: when multiple events arrive within 600ms, batch.
let _realtimeChangeTimer = null;
let _realtimePending = { cards: new Set(), outputs: new Set(), events: [] };
function handleRealtimeChange(msg) {
  // Suppress echo of our own local mutation (0.8s window).
  const suppressEcho = Date.now() - _lastLocalMutationAt < 800;
  if (!suppressEcho) {
    for (const c of (msg.cards || [])) _realtimePending.cards.add(c);
    for (const o of (msg.outputs || [])) _realtimePending.outputs.add(o);
  }
  if (msg.events) _realtimePending.events.push(...msg.events);
  if (_realtimeChangeTimer) return;
  _realtimeChangeTimer = setTimeout(() => {
    _realtimeChangeTimer = null;
    const pending = _realtimePending;
    _realtimePending = { cards: new Set(), outputs: new Set(), events: [] };
    applyRealtimeChange(pending);
  }, 600);
}

function applyRealtimeChange({ cards, outputs, events }) {
  const cardCount = cards.size;
  const outputCount = outputs.size;
  const streamEvents = Array.isArray(events) ? events : [];
  if (!cardCount && !outputCount && !streamEvents.length) return;

  // Refresh visible data sources. Invisible tabs just invalidate their cache
  // so next tab switch loads fresh.
  if (cardCount) {
    if (activeTab === 'review') {
      // Review tab uses cardsAll for Browse mode + ownerQueueAll for Queue mode.
      // Invalidate cache so next render/mode-switch reloads; don't null out
      // cardsAll in place because Browse mode may still be mid-render.
      reviewLoaded = false;
      refreshReviewTab();
    } else if (activeTab === 'direction') {
      // Heat scores + project status chips both derive from cards — any card
      // change (done/dismissed/new Work History bullet from sense-maker/work)
      // should re-draw the Direction Tab.
      loadDirectionTab();
    } else {
      cardsAll = [];
      if (activeTab === 'overview') loadOverview();
    }
  }
  if (outputCount) {
    if (activeTab === 'review') {
      // Don't full-refresh while user is reading — it resets scroll position.
      // Just invalidate so next tab switch or manual ↻ reloads.
      reviewLoaded = false;
    } else {
      outputsAll = [];
    }
  }

  if (streamEvents.length) {
    streamEvents.forEach(ev => piStreamToast(ev));
    return;
  }

  const parts = [];
  if (cardCount) parts.push(`${cardCount} card${cardCount > 1 ? 's' : ''}`);
  if (outputCount) parts.push(`${outputCount} report${outputCount > 1 ? 's' : ''}`);
  piToast('🔄 ' + parts.join(' · ') + ' 已同步', 'info', 1600);
}

async function _injectCardSuggestions(filename) {
  const slot = document.getElementById('card-pi-suggestions-slot');
  if (!slot) return;
  try {
    const dismissed = JSON.parse(localStorage.getItem('pi-suggestions-dismissed') || '{}');
    const all = await api('GET', '/pios/suggestions').catch(() => []);
    const forCard = (all || []).filter(s => s.targetFilename === filename && !dismissed[s.id]);
    if (!forCard.length) return;
    const items = forCard.map(s => `<div class="pi-suggestion">
      <span style="font-size:12px;flex-shrink:0">💡</span>
      <span class="pi-suggestion-msg">${escHtml(s.message)}</span>
      <button class="pi-suggestion-dismiss" onclick="dismissPiSuggestion('${escHtml(s.id)}',this.closest('.pi-suggestion'))" title="忽略">×</button>
    </div>`).join('');
    slot.innerHTML = `<div style="padding:6px 0 2px">${items}</div>`;
  } catch {}
}

function dismissPiSuggestion(id, el) {
  try {
    const d = JSON.parse(localStorage.getItem('pi-suggestions-dismissed') || '{}');
    d[id] = Date.now();
    localStorage.setItem('pi-suggestions-dismissed', JSON.stringify(d));
  } catch {}
  if (el) el.remove();
}

// ── Prefetch card/output index so ⌘K works from any tab ──
async function prefetchCardIndex() {
  if (cardsAll.length > 0) return;
  try {
    const [inbox, active, archive, outs] = await Promise.all([
      api('GET', '/pios/cards?status=inbox'),
      api('GET', '/pios/cards?status=active'),
      api('GET', '/pios/cards?status=archive'),
      api('GET', '/pios/outputs').catch(() => []),
    ]);
    const tag = (list, folder) => (list || []).map(c => ({
      ...c,
      folder: normalizeBoardFolder(c, folder),
      mtime: c.mtime || (c.created ? Math.floor(new Date(c.created).getTime() / 1000) : 0),
    }));
    if (!cardsAll.length) {
      cardsAll = [...tag(inbox, 'inbox'), ...tag(active, 'active'), ...tag(archive, 'archive')];
      outputsAll = outs || [];
    }
  } catch {}
}
