<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>VRM POC</title>
<style>
  html,body { margin:0; padding:0; background:#f5ecd7; overflow:hidden; width:100%; height:100%; }
  #root { position:fixed; inset:0; }
  #log { position:fixed; left:8px; top:8px; font-family:monospace; font-size:11px; color:#333; background:rgba(255,255,255,0.8); padding:6px 8px; border-radius:6px; max-width:60%; white-space:pre; z-index:10; }
</style>
</head>
<body>
<canvas id="root"></canvas>
<div id="log">booting…</div>
<script type="importmap">
{
  "imports": {
    "three": "../node_modules/three/build/three.module.js",
    "three/addons/": "../node_modules/three/examples/jsm/",
    "@pixiv/three-vrm": "../node_modules/@pixiv/three-vrm/lib/three-vrm.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils, VRMExpressionPresetName } from '@pixiv/three-vrm';

const logEl = document.getElementById('log');
const lines = [];
function log(...args) {
  const line = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
  lines.push(line);
  if (lines.length > 20) lines.shift();
  logEl.textContent = lines.join('\n');
  console.log('[poc]', line);
}

const canvas = document.getElementById('root');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
const resize = () => renderer.setSize(window.innerWidth, window.innerHeight, false);
resize();
window.addEventListener('resize', resize);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
camera.position.set(0, 1.4, 3.0);
camera.lookAt(0, 1.0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(1, 3, 2);
scene.add(dir);

let vrm = null;
let expressionPresets = [];
const loader = new GLTFLoader();
loader.register((parser) => new VRMLoaderPlugin(parser));

log('loading VRM...');
loader.load('../renderer/assets/vrm-avatar.vrm',
  (gltf) => {
    vrm = gltf.userData.vrm;
    if (!vrm) { log('ERR: no vrm in userData'); return; }
    VRMUtils.removeUnnecessaryVertices?.(gltf.scene);
    VRMUtils.combineSkeletons?.(gltf.scene);
    scene.add(vrm.scene);
    // VRM 1.0 默认面朝 -Z，camera 放在 +Z 自然对着脸，不需要再 rotate
    // 诊断：能动的 expression / bone
    const em = vrm.expressionManager;
    if (em) {
      const map = em.expressionMap || {};
      expressionPresets = Object.keys(map);
      log('expressions:', expressionPresets.join(','));
    } else {
      log('WARN: no expressionManager');
    }
    if (vrm.humanoid) {
      const bones = ['head','neck','leftUpperArm','rightUpperArm','leftUpperLeg','rightUpperLeg','leftIndexProximal'];
      const have = bones.filter(b => vrm.humanoid.getNormalizedBoneNode(b));
      log('humanoid bones present:', have.join(','));
    }
    window.__vrm = vrm;  // selftest 探针
    log('VRM loaded ok, triangles=' + renderer.info.render.triangles);
  },
  (p) => { if (p.total) log('load:', Math.round(p.loaded / p.total * 100) + '%'); },
  (e) => { log('LOAD ERR:', String(e && e.message || e)); }
);

const clock = new THREE.Clock();
function tick() {
  const dt = clock.getDelta();
  const t = clock.elapsedTime;
  if (vrm) {
    // 测试嘴巴开合 — 模拟 talking（任何一个 viseme 都试，看哪个真能动）
    const em = vrm.expressionManager;
    if (em) {
      const aa = 0.5 + 0.5 * Math.sin(t * 2 * Math.PI * 3);  // 3Hz
      // 尝试标准 preset 名；不是所有 avatar 都有 'aa'
      if (expressionPresets.includes('aa')) em.setValue('aa', aa);
      else if (expressionPresets.includes('oh')) em.setValue('oh', aa);
      else if (expressionPresets.includes('happy')) em.setValue('happy', aa);
      // 眨眼：每 3 秒闭 0.15s
      const blink = (t % 3) > 2.85 ? 1.0 : 0.0;
      if (expressionPresets.includes('blink')) em.setValue('blink', blink);
    }
    // 手臂挥动
    if (vrm.humanoid) {
      const armL = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
      const armR = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
      const sw = Math.sin(t * 2 * Math.PI * 1.2) * 0.25;
      if (armL) armL.rotation.z = sw;
      if (armR) armR.rotation.z = -sw;
    }
    vrm.update(dt);
  }
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

window.__pocReady = true;
</script>
</body>
</html>
