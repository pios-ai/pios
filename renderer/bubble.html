}

async function initStarletAsync() {
  if (starletCtx) return starletCtx;
  const canvas = document.getElementById('npc-starlet');
  if (!canvas) return null;

  let THREE, GLTFLoader, HDRLoader, PMREMGenerator;
  let RoomEnvironment;
  try { THREE = require('three'); } catch (e) { console.error('[starlet] require three failed', e); return null; }
  try { ({ GLTFLoader } = require('three/examples/jsm/loaders/GLTFLoader.js')); } catch (e) { console.error('[starlet] GLTFLoader failed', e); return null; }
  try { ({ HDRLoader } = require('three/examples/jsm/loaders/HDRLoader.js')); } catch (e) {}
  try { ({ RoomEnvironment } = require('three/examples/jsm/environments/RoomEnvironment.js')); } catch (e) {}

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 10);
  camera.position.set(0, 1.0, 3.2);
  camera.lookAt(0, 0.9, 0);

  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  const _initSize = (() => {
    const r = canvas.getBoundingClientRect();
    const s = Math.round(r.width || 96);
    return s > 0 ? s : 96;
  })();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(_initSize, _initSize, false);
  renderer.setClearColor(0x000000, 0);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.8;

  // HDRI 环境光：优先 studio.hdr，失败则 RoomEnvironment
  const pmrem = new THREE.PMREMGenerator(renderer);
  const _assetDir = __dirname.replace(/app.asar(?!.unpacked)/, 'app.asar.unpacked');
  const hdrPath = 'file://' + require('path').join(_assetDir, 'assets', 'studio.hdr').replace(/\\/g, '/');
  await new Promise((resolve) => {
    if (HDRLoader) {
      new HDRLoader().load(hdrPath, (hdr) => {
        const envMap = pmrem.fromEquirectangular(hdr).texture;
        scene.environment = envMap;
        hdr.dispose();
        pmrem.dispose();
        resolve();
      }, undefined, () => {
        // HDRI 加载失败 → RoomEnvironment fallback
        if (RoomEnvironment) {
          try {
            const envMap = pmrem.fromScene(new RoomEnvironment()).texture;
            scene.environment = envMap;
          } catch (_) {}
          pmrem.dispose();
        }
        resolve();
      });
    } else if (RoomEnvironment) {
      try {
        const envMap = pmrem.fromScene(new RoomEnvironment()).texture;
        scene.environment = envMap;
      } catch (_) {}
      pmrem.dispose();
      resolve();
    } else {
      resolve();
    }
  });

  // 加载 GLB（Draco 解压）
  const glbPath = 'file://' + require('path').join(_assetDir, 'assets', 'starlet-v2.glb').replace(/\\/g, '/');
  let gltf;
  try {
    let DRACOLoader;
    try { ({ DRACOLoader } = require('three/examples/jsm/loaders/DRACOLoader.js')); } catch (e) {}
    const loader = new GLTFLoader();
    if (DRACOLoader) {
      const dracoDir = require('path').join(_assetDir, '..', 'node_modules', 'three', 'examples', 'jsm', 'libs', 'draco', 'gltf');
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath('file://' + dracoDir.replace(/\\/g, '/') + '/');
      loader.setDRACOLoader(dracoLoader);
    }
    gltf = await new Promise((resolve, reject) => {
      loader.load(glbPath, resolve, undefined, reject);
    });
  } catch (e) {
    console.error('[starlet] GLB load failed', e);
    return null;
  }

  // Sheen（毛绒质感）— 直接属性赋值，避免跨 Three.js 实例 .copy() 问题
  try {
    gltf.scene.traverse(o => {
      if (o.isMesh && o.material) {
        const src = o.material;
        const m = new THREE.MeshPhysicalMaterial({
          color: src.color,
          map: src.map || null,
          roughness: 0.8,
          metalness: 0.0,
          normalMap: src.normalMap || null,
          emissive: src.emissive || new THREE.Color(0x000000),
          emissiveMap: src.emissiveMap || null,
          emissiveIntensity: src.emissiveIntensity !== undefined ? src.emissiveIntensity : 1,
          transparent: src.transparent || false,
          opacity: src.opacity !== undefined ? src.opacity : 1,
          side: src.side !== undefined ? src.side : THREE.FrontSide,
          sheen: 0.2,
          sheenColor: new THREE.Color(0xffffff),
          sheenRoughness: 0.8,
        });
        o.material = m;
      }
    });
  } catch (e) { console.warn('[starlet] sheen setup failed', e); }

  // 自适应缩放
  const box = new THREE.Box3().setFromObject(gltf.scene);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  if (maxDim > 0) {
    const scale = 1.8 / maxDim;
    gltf.scene.scale.setScalar(scale);
    gltf.scene.position.sub(center.multiplyScalar(scale));
    gltf.scene.position.y += 0.9;
  }
  scene.add(gltf.scene);

  // 补充环境光填充阴影
  scene.add(new THREE.AmbientLight(0xffffff, 0.3));

  // 缓存四肢骨骼：pose clip 几乎不动 arm/leg（实测 total_delta≈0），
  // 叠加程序性振荡让玩偶"活起来"（tick 2 修复 #2 动作单调）
  const bones = {};
  gltf.scene.traverse(o => {
    if (o.isBone && o.name) bones[o.name] = o;
  });
  // 记录四肢 rest quaternion（mixer 播放 clip 前的 T-pose 值），每帧用这个 baseline
  // 做 additive 避免累积（tick 7 诊断：原先 quaternion.multiply 依赖 mixer 每帧 overwrite，
  // 但对于"几乎无 keyframe 变化的 track"mixer 并不保证精确 reset，导致 rotation 漂移到 ±3 rad）
  const restQuats = {};
  for (const key of ['armL', 'armR', 'legL', 'legR', 'arm.L', 'arm.R', 'leg.L', 'leg.R', 'head', 'neck', 'spine']) {
    if (bones[key]) restQuats[key] = bones[key].quaternion.clone();
  }

  // === Face Overlay POC（tick 15）===
  // 架构：挂一个 PlaneGeometry 到 head bone，CanvasTexture 驱动，JS 2D 每帧绘制当前表情
  // 目标：脱离 Meshy rig 的表情限制，纯代码控制嘴眼表情
  // 现状：starlet-v2 贴图已画嘴眼，overlay 会遮盖它们（用肤色背景覆盖原贴图眼嘴）
  // 未来：Meshy 无脸 prompt 产出后，overlay 直接接管，不需要肤色背景
  const FACE_CFG = (window.__STARLET_FACE_CFG__) || {
    x: 0, y: -0.12, z: 0.42,       // head bone local（tick 15 调：y 从 -0.02 下移到 -0.12 对齐脸部）
    rx: 0, ry: 0, rz: 0,
    width: 0.3, height: 0.38,      // 略缩小避免遮帽檐
    canvasSize: 256,
    skinColor: '#F5E8D2',           // 肤色（略偏黄暖色，和 starlet 贴图更接近）
  };
  let faceOverlay = null;
  let faceCanvasCtx = null;
  let faceTexture = null;
  if (bones.head) {
    try {
      const canvas = document.createElement('canvas');
      canvas.width = FACE_CFG.canvasSize; canvas.height = FACE_CFG.canvasSize;
      faceCanvasCtx = canvas.getContext('2d');
      faceTexture = new THREE.CanvasTexture(canvas);
      faceTexture.colorSpace = THREE.SRGBColorSpace;
      // MeshBasicMaterial 默认不参与 lighting，但仍受 renderer 的 toneMapping 影响
      // toneMapping:NoToneMapping 让 canvas 颜色所见即所得，不被 ACES 压色
      const mat = new THREE.MeshBasicMaterial({
        map: faceTexture, transparent: true,
        depthTest: true, depthWrite: false,
        toneMapped: false,   // 关键：不经过 tonemap，保留原 canvas 色彩
      });
      const geom = new THREE.PlaneGeometry(FACE_CFG.width, FACE_CFG.height);
      faceOverlay = new THREE.Mesh(geom, mat);
      faceOverlay.position.set(FACE_CFG.x, FACE_CFG.y, FACE_CFG.z);
      faceOverlay.rotation.set(FACE_CFG.rx, FACE_CFG.ry, FACE_CFG.rz);
      faceOverlay.renderOrder = 100;
      faceOverlay.visible = false;         // tick 16 rollback：2D plane 方形贴纸，架构错，禁用
    } catch (e) { console.warn('[starlet] face overlay setup failed', e); }
  }

  // === tick 17：3D Face Parts 拼装（owner 参考图架构）===
  // 眼：SphereGeometry + 有光泽黑色 → 跟 starlet 塑料感匹配
  // 嘴：TorusGeometry（圆环截取弧形）或 LatheGeometry → 3D 月牙
  // 挂 head bone，任何角度立体，不纸片
  let facePartsGroup = null;
  let leftEye = null, rightEye = null, mouth = null;
  const FACE_PARTS_CFG = (window.__STARLET_FACE_PARTS__) || {
    eyeX: 0.12, eyeY: -0.02, eyeZ: 0.43,       // 眼距加宽（0.07→0.12 两眼分 0.24 ≈ 头宽 40%）
    eyeRadius: 0.028,
    mouthX: 0, mouthY: -0.11, mouthZ: 0.44,
    mouthRadius: 0.04,
    mouthTube: 0.012,
  };
  if (bones.head) {
    try {
      facePartsGroup = new THREE.Group();
      const eyeMat = new THREE.MeshStandardMaterial({
        color: 0x0a0a10, roughness: 0.15, metalness: 0.0,  // 塑料质感黑色，小 roughness 给高光
      });
      const eyeGeom = new THREE.SphereGeometry(FACE_PARTS_CFG.eyeRadius, 24, 16);
      leftEye = new THREE.Mesh(eyeGeom, eyeMat);
      rightEye = new THREE.Mesh(eyeGeom, eyeMat);
      leftEye.position.set(-FACE_PARTS_CFG.eyeX, FACE_PARTS_CFG.eyeY, FACE_PARTS_CFG.eyeZ);
      rightEye.position.set(FACE_PARTS_CFG.eyeX, FACE_PARTS_CFG.eyeY, FACE_PARTS_CFG.eyeZ);
      facePartsGroup.add(leftEye);
      facePartsGroup.add(rightEye);

      // 嘴：TorusGeometry 截取下半部分模拟微笑弧（arc 参数）
      const mouthMat = new THREE.MeshStandardMaterial({
        color: 0x0a0a10, roughness: 0.2, metalness: 0.0,
      });
      // Torus(radius, tube, radialSegments, tubularSegments, arc)
      const mouthGeom = new THREE.TorusGeometry(
        FACE_PARTS_CFG.mouthRadius, FACE_PARTS_CFG.mouthTube, 8, 24, Math.PI
      );
      mouth = new THREE.Mesh(mouthGeom, mouthMat);
      mouth.position.set(FACE_PARTS_CFG.mouthX, FACE_PARTS_CFG.mouthY, FACE_PARTS_CFG.mouthZ);
      mouth.rotation.z = Math.PI;  // 让圆弧向下凹（笑脸）
      facePartsGroup.add(mouth);

      bones.head.add(facePartsGroup);
    } catch (e) { console.warn('[starlet] face parts setup failed', e); }
  }

  // 表情预设库
  const FACE_PRESETS = {
    neutral: { eye: 'round',  eyeOpen: 1.0, mouth: 'line',  mouthOpen: 0.1 },
    happy:   { eye: 'arc',    eyeOpen: 0.3, mouth: 'smile', mouthOpen: 0.5 },
    shocked: { eye: 'round',  eyeOpen: 1.0, mouth: 'O',     mouthOpen: 1.0 },
    sleepy:  { eye: 'line',   eyeOpen: 0.0, mouth: 'line',  mouthOpen: 0.0 },
    angry:   { eye: 'angry',  eyeOpen: 0.8, mouth: 'frown', mouthOpen: 0.3 },
    sad:     { eye: 'droop',  eyeOpen: 0.6, mouth: 'frown', mouthOpen: 0.1 },
    wink:    { eye: 'round',  eyeOpen: 1.0, rightEye: 0, mouth: 'smile', mouthOpen: 0.3 },
    talking: { eye: 'round',  eyeOpen: 1.0, mouth: 'dyn',   mouthOpen: 0.6 },  // dyn = 每帧 sin 动
  };

  function drawFace(preset, dynMouthOpen) {
    const c = faceCanvasCtx;
    if (!c || !preset) return;
    const W = FACE_CFG.canvasSize;
    c.clearRect(0, 0, W, W);
    // 肤色背景覆盖原贴图嘴眼
    c.fillStyle = FACE_CFG.skinColor;
    c.fillRect(0, 0, W, W);

    const exL = W * 0.33, exR = W * 0.67, eyeY = W * 0.38;
    const mouthX = W * 0.5, mouthY = W * 0.66;

    drawEye(c, exL, eyeY, preset.eye, preset.eyeOpen);
    drawEye(c, exR, eyeY, preset.eye, (preset.rightEye !== undefined ? preset.rightEye : preset.eyeOpen));
    drawMouth(c, mouthX, mouthY, preset.mouth,
              preset.mouth === 'dyn' ? (dynMouthOpen || 0.5) : preset.mouthOpen);

    faceTexture.needsUpdate = true;
  }

  function drawEye(c, x, y, shape, open) {
    c.strokeStyle = '#1a0e14'; c.fillStyle = '#1a0e14';
    c.lineWidth = 4; c.lineCap = 'round';
    const r = 14;
    if (open <= 0 || shape === 'line') {
      c.beginPath(); c.moveTo(x - r, y); c.lineTo(x + r, y); c.stroke();
    } else if (shape === 'arc') {
      // 开心弧眼 ^
      c.beginPath(); c.arc(x, y + 4, r, Math.PI * 1.15, Math.PI * 1.85); c.stroke();
    } else if (shape === 'angry') {
      // 怒眼 >< （两条斜线形成 V）
      c.beginPath(); c.moveTo(x - r, y - r * 0.5); c.lineTo(x + r * 0.3, y + r * 0.4);
      c.moveTo(x + r, y - r * 0.5); c.lineTo(x - r * 0.3, y + r * 0.4); c.stroke();
    } else if (shape === 'droop') {
      // 难过眼（上弧下垂）
      c.beginPath(); c.arc(x, y - 6, r, Math.PI * 0.15, Math.PI * 0.85); c.stroke();
    } else {
      // round（默认圆眼，open 控制高度）
      c.beginPath(); c.ellipse(x, y, r * 0.85, r * open, 0, 0, Math.PI * 2); c.fill();
    }
  }

  function drawMouth(c, x, y, shape, open) {
    c.strokeStyle = '#1a0e14'; c.fillStyle = '#1a0e14';
    c.lineWidth = 5; c.lineCap = 'round';
    const w = 30;
    if (shape === 'smile') {
      c.beginPath(); c.arc(x, y - 10, w, Math.PI * 0.15, Math.PI * 0.85); c.stroke();
    } else if (shape === 'frown') {
      c.beginPath(); c.arc(x, y + 18, w, Math.PI * 1.15, Math.PI * 1.85); c.stroke();
    } else if (shape === 'O' || shape === 'dyn') {
      // 圆形张嘴（open 控制大小）
      const h = 22 * Math.max(0.1, open);
      c.beginPath(); c.ellipse(x, y, 18 * Math.max(0.3, open), h, 0, 0, Math.PI * 2); c.fill();
    } else {
      // line（默认直线嘴）
      c.beginPath(); c.moveTo(x - w, y); c.lineTo(x + w, y); c.stroke();
    }
  }

  // 初始 neutral
  drawFace(FACE_PRESETS.neutral, 0);

  // pose → face preset 映射
  const POSE_TO_FACE = {
    idle: 'neutral', thinking: 'neutral', working: 'neutral',
    sensing: 'neutral', reflecting: 'neutral',
    talking: 'talking', recording: 'neutral', processing: 'neutral',
    alert: 'shocked', tired: 'sleepy',
    watching: 'neutral', curious: 'neutral', remembering: 'neutral',
    delighted: 'happy',
    nod: 'neutral', shake: 'neutral', tilt: 'neutral',
    yawn: 'sleepy', bounce: 'happy',
  };

  // 缓存 morph target：starlet-v2.glb 通过 Blender 脚本 add_facial_morph.py 注入
  // 了 `mouth_open` + `blink` 两个 shape key（tick 5 facial rig 升级）
  let morphMesh = null;
  let mouthMorphIdx = -1;
  let blinkMorphIdx = -1;
  gltf.scene.traverse(o => {
    if (o.isMesh && o.morphTargetInfluences && o.morphTargetDictionary) {
      morphMesh = o;
      const dict = o.morphTargetDictionary;
      mouthMorphIdx = dict['mouth_open'] !== undefined ? dict['mouth_open'] : -1;
      blinkMorphIdx = dict['blink'] !== undefined ? dict['blink'] : -1;
      console.log('[starlet] morph targets:', Object.keys(dict), 'mouth=', mouthMorphIdx, 'blink=', blinkMorphIdx);
    }
  });

  // AnimationMixer + 预索引 clip
  const mixer = new THREE.AnimationMixer(gltf.scene);
  const clips = {};
  for (const clip of (gltf.animations || [])) clips[clip.name] = clip;
  let currentAction = null;
  if (clips['idle']) {
    currentAction = mixer.clipAction(clips['idle']);
    currentAction.play();
  }

  // Bloom（EffectComposer）已禁用：中间 RT 不保留 alpha，会把透明背景渲染为黑色
  // 96×96 canvas 上 0.3 强度 bloom 视觉差异可忽略，透明背景优先
  const composer = null;

  starletCtx = { THREE, scene, camera, renderer, composer, mixer, clips, currentAction, pose: 'idle', bones, restQuats, morphMesh, mouthMorphIdx, blinkMorphIdx, avatarRoot: gltf.scene, restAvatarY: gltf.scene.position.y, faceOverlay, drawFace, FACE_PRESETS, POSE_TO_FACE };
  return starletCtx;
}

function applyStarletPose(pose) {
  const ctx = starletCtx;
  if (!ctx || !ctx.mixer) return;
  const legal = NPC_POSES.includes(pose) ? pose : 'idle';
  if (ctx.pose === legal) return;
  ctx.pose = legal;
  const clip = ctx.clips[legal] || ctx.clips['idle'];
  if (!clip) return;
  const next = ctx.mixer.clipAction(clip);
  if (ctx.currentAction && ctx.currentAction !== next) {
    next.reset().crossFadeFrom(ctx.currentAction, 0.3).play();
  } else {
    next.reset().play();
  }
  ctx.currentAction = next;
}

function starletFrame(nowMs) {
  const ctx = starletCtx;
  const dt = starletLastT ? Math.min(0.1, (nowMs - starletLastT) / 1000) : 0.016;
  starletLastT = nowMs;
  if (ctx) {
    if (ctx.mixer) ctx.mixer.update(dt);
    // 四肢控制（tick 7 方案：copy rest quaternion + multiply axisAngle，无累积）
    if (ctx.bones && ctx.restQuats) {
      const _qTmp = ctx._qTmp || (ctx._qTmp = new ctx.THREE.Quaternion());
      const _zAxis = ctx._zAxis || (ctx._zAxis = new ctx.THREE.Vector3(0, 0, 1));
      const _xAxis = ctx._xAxis || (ctx._xAxis = new ctx.THREE.Vector3(1, 0, 0));
      const _yAxis = ctx._yAxis || (ctx._yAxis = new ctx.THREE.Vector3(0, 1, 0));
      const apply = (key, axis, angle) => {
        const b = ctx.bones[key];
        const rest = ctx.restQuats[key];
        if (!b || !rest) return;
        _qTmp.setFromAxisAngle(axis, angle);
        b.quaternion.copy(rest).multiply(_qTmp);
      };
      // 复合多轴旋转：依次乘上若干 axis-angle（用于 reflecting 等"仰头+右转"复合 pose）
      const applyMulti = (key, pairs) => {
        const b = ctx.bones[key];
        const rest = ctx.restQuats[key];
        if (!b || !rest) return;
        b.quaternion.copy(rest);
        for (const [axis, angle] of pairs) {
          _qTmp.setFromAxisAngle(axis, angle);
          b.quaternion.multiply(_qTmp);
        }
      };
      const armLKey = ctx.bones['armL'] ? 'armL' : 'arm.L';
      const armRKey = ctx.bones['armR'] ? 'armR' : 'arm.R';
      const legLKey = ctx.bones['legL'] ? 'legL' : 'leg.L';
      const legRKey = ctx.bones['legR'] ? 'legR' : 'leg.R';

      // 每帧先恢复 avatar root 位置（bounce/recording 用，其他 pose 保底不漂）
      if (ctx.avatarRoot && typeof ctx.restAvatarY === 'number') {
        ctx.avatarRoot.position.y = ctx.restAvatarY;
      }

      const tSec = nowMs / 1000;

      // === pose matrix（tick 14：19 个 pose 显式驱动 head/spine/root）===
      // 通用 baseline：手臂呼吸、腿静止、head/spine 回 rest（避免遗留上个 pose 状态）
      const armBreath = Math.sin(tSec * 2 * Math.PI * 0.5) * 0.10;
      apply(armLKey, _zAxis, armBreath);
      apply(armRKey, _zAxis, -armBreath);
      apply(legLKey, _xAxis, 0);
      apply(legRKey, _xAxis, 0);
      apply('head', _xAxis, 0);
      apply('spine', _xAxis, 0);

      switch (ctx.pose) {
        case 'idle':
          apply('head', _xAxis, Math.sin(tSec * 2 * Math.PI * 0.2) * 0.05);  // 慢呼吸头点 ±3°
          break;
        case 'thinking':
          apply('head', _zAxis, Math.sin(tSec * 2 * Math.PI * 0.2) * 0.14);  // 慢歪 ±8°
          break;
        case 'working':
          apply('spine', _xAxis, -0.35);                                      // 前倾 -20°（tick 15：从 -10° 加大，矮身 chibi 要更明显）
          apply('head', _xAxis, Math.sin(tSec * 2 * Math.PI * 0.8) * 0.12);   // 点 ±7°
          break;
        case 'sensing':
          apply('head', _yAxis, Math.sin(tSec * 2 * Math.PI * 0.25) * 0.26); // Y 慢扫 ±15°
          break;
        case 'reflecting':
          // 右上：仰头 + 歪向右肩（tick 15：改用 X+Z 复合，比原 X+Y 在正面 camera 下更明显）
          applyMulti('head', [[_xAxis, -0.26], [_zAxis, -0.26]]);            // 仰 15° + 右歪 15°
          break;
        case 'talking':
          apply('head', _xAxis, Math.sin(tSec * 2 * Math.PI * 0.9) * 0.17);  // 点 ±10° @ 说话节奏
          break;
        case 'recording':
          apply('spine', _zAxis, Math.sin(tSec * 2 * Math.PI * 0.5) * 0.14); // 身体左右摆 ±8°
          if (ctx.avatarRoot && typeof ctx.restAvatarY === 'number') {
            ctx.avatarRoot.position.y = ctx.restAvatarY + Math.abs(Math.sin(tSec * 2 * Math.PI * 0.5)) * 0.02;
          }
          break;
        case 'processing':
          apply('head', _xAxis, Math.sin(tSec * 2 * Math.PI * 1.2) * 0.09);  // 小点 ±5°
          apply('spine', _zAxis, Math.sin(tSec * 2 * Math.PI * 0.4) * 0.05); // spine 微摆 ±3°
          break;
        case 'alert':
          applyMulti('head', [[_xAxis, -0.26]]);                              // 后仰 -15°
          apply('spine', _xAxis, 0.09);                                       // spine 前倾 +5°（像被吓到）
          break;
        case 'tired':
          apply('head', _xAxis, 0.35);                                        // 头前垂 +20°
          apply('spine', _xAxis, 0.17);                                       // spine 垂 +10°
          break;
        case 'watching':
          apply('head', _xAxis, -0.26);                                       // 仰头 -15°
          break;
        case 'curious':
          applyMulti('head', [[_zAxis, Math.sin(tSec * 2 * Math.PI * 0.3) * 0.26], [_xAxis, -0.09]]);
          break;
        case 'remembering':
          applyMulti('head', [[_xAxis, -0.17], [_yAxis, Math.sin(tSec * 2 * Math.PI * 0.3) * 0.09]]);
          break;
        case 'delighted':
          if (ctx.avatarRoot && typeof ctx.restAvatarY === 'number') {
            const s = Math.abs(Math.sin(tSec * 2 * Math.PI * 1.2));
            ctx.avatarRoot.position.y = ctx.restAvatarY + Math.pow(s, 0.6) * 0.07;
          }
          break;
        case 'nod':
          apply('head', _xAxis, Math.sin(tSec * 2 * Math.PI * 0.8) * 0.26);
          break;
        case 'shake':
          apply('head', _yAxis, Math.sin(tSec * 2 * Math.PI * 0.9) * 0.35);
          break;
        case 'tilt':
          apply('head', _zAxis, Math.sin(tSec * 2 * Math.PI * 0.25) * 0.26);
          break;
        case 'bounce':
          if (ctx.avatarRoot && typeof ctx.restAvatarY === 'number') {
            const s = Math.abs(Math.sin(tSec * 2 * Math.PI * 1.0));
            ctx.avatarRoot.position.y = ctx.restAvatarY + Math.pow(s, 0.6) * 0.06;
          }
          break;
        // yawn：head 保持 rest，嘴/眼驱动 handle
      }

    }
    // 嘴 + 眼 morph target（tick 5 / tick 6）：Blender add_facial_morph.py 注入
    // tick 6 修正：
    //   - 嘴在所有 pose 呼吸性微动（idle 0.2Hz 幅度 0-0.3），talking 时 1.5Hz 幅度 0-1.0（说话节奏）
    //   - 眨眼 cycle 保留，morph depth 在 GLB 层改到 0.05（这里驱动不变）
    if (ctx.morphMesh) {
      const t = nowMs / 1000;
      if (ctx.mouthMorphIdx >= 0) {
        let open;
        if (ctx.pose === 'yawn') {
          open = 0.5 + 0.5 * Math.sin(t * 2 * Math.PI * 0.25);  // 哈欠：慢张慢合 0.25Hz
        } else if (ctx.pose === 'bounce' || ctx.pose === 'delighted') {
          open = 0.6 + 0.25 * Math.abs(Math.sin(t * 2 * Math.PI * 1.0));   // 开心大笑
        } else if (ctx.pose === 'talking') {
          open = 0.5 + 0.5 * Math.sin(t * 2 * Math.PI * 1.5);   // 说话：大幅 @ 1.5Hz
        } else if (ctx.pose === 'alert') {
          open = 0.7;                                             // 警觉：嘴半张（被吓到）
        } else if (ctx.pose === 'tired') {
          open = 0.1;                                             // 困：嘴几乎闭
        } else {
          open = 0.4 + 0.4 * Math.sin(t * 2 * Math.PI * 0.25);  // 呼吸：0-0.8 @ 0.25Hz
        }
        ctx.morphMesh.morphTargetInfluences[ctx.mouthMorphIdx] = open;
      }
      if (ctx.blinkMorphIdx >= 0) {
        let blink;
        if (ctx.pose === 'yawn') {
          blink = 0.4 + 0.6 * Math.max(0, Math.sin(t * 2 * Math.PI * 0.25));  // 哈欠眯眼
        } else if (ctx.pose === 'bounce' || ctx.pose === 'delighted') {
          blink = 0.3;                                            // 开心：眯成笑眼
        } else if (ctx.pose === 'tired') {
          blink = 0.5 + 0.3 * Math.sin(t * 2 * Math.PI * 0.15);  // 困：眼半闭慢晃
        } else if (ctx.pose === 'alert') {
          blink = 0;                                              // 警觉：睁大不眨
        } else {
          const cycle = t % 3;
          blink = cycle > 2.85 ? 1.0 : 0;
        }
        ctx.morphMesh.morphTargetInfluences[ctx.blinkMorphIdx] = blink;
      }
    }

    // Face Overlay 每帧重绘（tick 15）：pose → preset → canvas draw
    if (ctx.drawFace && ctx.FACE_PRESETS && ctx.POSE_TO_FACE) {
      const presetName = ctx.POSE_TO_FACE[ctx.pose] || 'neutral';
      const preset = ctx.FACE_PRESETS[presetName];
      if (preset) {
        // talking 动态嘴：用 sin 节奏
        let dynOpen = 0;
        if (preset.mouth === 'dyn') {
          dynOpen = 0.3 + 0.3 * Math.abs(Math.sin(nowMs / 1000 * 2 * Math.PI * 1.5));
        }
        ctx.drawFace(preset, dynOpen);
      }
    }

    if (ctx.composer) ctx.composer.render();
    else ctx.renderer.render(ctx.scene, ctx.camera);
  }
  starletRaf = requestAnimationFrame(starletFrame);
}

function startStarlet() {
  if (!starletInitPromise) {
    starletInitPromise = initStarletAsync().catch(e => { console.error('[starlet] init error', e); return null; });
  }
  starletInitPromise.then(() => {
    const el = document.getElementById('npc-starlet');
    if (el && !starletObserver) {
      starletObserver = new MutationObserver(() => {
        const cls = (el.className || '').split(/\s+/);
        const pose = cls.find(c => NPC_POSES.includes(c)) || 'idle';
        applyStarletPose(pose);
      });
      starletObserver.observe(el, { attributes: true, attributeFilter: ['class'] });
    }
    if (!starletSizeObserver) {
      starletSizeObserver = new MutationObserver(() => resizeStarletRenderer());
      starletSizeObserver.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    }
    resizeStarletRenderer();
    if (el) {
      const cls = (el.className || '').split(/\s+/);
      applyStarletPose(cls.find(c => NPC_POSES.includes(c)) || 'idle');
    }
    if (!starletRaf) {
      starletLastT = 0;
      starletRaf = requestAnimationFrame(starletFrame);
    }
  });
}

function stopStarlet() {
  if (starletRaf) { cancelAnimationFrame(starletRaf); starletRaf = null; }
  if (starletObserver) { starletObserver.disconnect(); starletObserver = null; }
  if (starletSizeObserver) { starletSizeObserver.disconnect(); starletSizeObserver = null; }
}
// ── NPC END ──
</script>
