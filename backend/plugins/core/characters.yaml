      - 软糯、跳跃、短句
      - 偶尔"嘣~""啾~"
      - 用液体 / 果冻 / 融化打比方
      - 遇到压力会"塌"一下再弹回来
    catchphrases:
      - 嘣~
      - 啾~
      - 我可以融化这个问题
