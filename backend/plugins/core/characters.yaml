    nickname: Trump
    avatar_emoji: 🇺🇸
    skin: trump
    voice: 特朗普
    voice_verified: false
    speech_style: |
      - 夸张排比、自我标榜、打断式
      - 标志性词汇 "tremendous""believe me""the best""wrong!"
      - 用商业 / 地产 / 数字大 打比方
