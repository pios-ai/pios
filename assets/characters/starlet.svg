<svg width="64" height="64" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 奶米白大蛋头（简化 starlet 3D → 2D 平面版；原 3D canvas 见 bubble.html startStarlet）-->
  <defs>
    <radialGradient id="starletHeadGrad" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#FFF7E8"/>
      <stop offset="70%" stop-color="#F2E2C6"/>
      <stop offset="100%" stop-color="#D8BE95"/>
    </radialGradient>
  </defs>
  <!-- 头（奶米色蛋形）-->
  <ellipse cx="50" cy="55" rx="30" ry="34" fill="url(#starletHeadGrad)" stroke="#B08F64" stroke-width="1.8"/>
  <!-- 浅蓝肚兜 -->
  <path d="M 28 72 Q 50 80 72 72 L 70 92 Q 50 95 30 92 Z" fill="#B8DCEC" stroke="#7EADC9" stroke-width="1.2"/>
  <!-- 眼睛 -->
  <ellipse cx="40" cy="55" rx="3" ry="4" fill="#1a1a2a"/>
  <ellipse cx="60" cy="55" rx="3" ry="4" fill="#1a1a2a"/>
  <circle cx="41" cy="53.5" r="0.9" fill="#fff"/>
  <circle cx="61" cy="53.5" r="0.9" fill="#fff"/>
  <!-- 嘴（小微笑）-->
  <path d="M 44 65 Q 50 69 56 65" fill="none" stroke="#B08F64" stroke-width="1.4" stroke-linecap="round"/>
  <!-- 蓝毛线帽 -->
  <path d="M 24 32 Q 50 14 76 32 Q 74 40 60 42 L 40 42 Q 26 40 24 32 Z" fill="#4A8DBF" stroke="#2E5A7F" stroke-width="1.6"/>
  <!-- 帽边折起针织线 -->
  <path d="M 24 32 Q 50 38 76 32" fill="none" stroke="#2E5A7F" stroke-width="0.8" opacity="0.6"/>
  <!-- 帽顶金星 -->
  <polygon points="50,10 52.5,16.5 59.5,17 54,21 56,27.5 50,23.5 44,27.5 46,21 40.5,17 47.5,16.5"
    fill="#FFD84A" stroke="#C8A020" stroke-width="0.8"/>
  <!-- 腮红 -->
  <ellipse cx="32" cy="65" rx="3" ry="1.6" fill="#F28AA8" opacity="0.5"/>
  <ellipse cx="68" cy="65" rx="3" ry="1.6" fill="#F28AA8" opacity="0.5"/>
</svg>
