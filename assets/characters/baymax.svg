<svg width="64" height="64" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- 身体（棉花糖胶囊形 · 单个圆角矩形覆盖整个角色） -->
      <rect class="body-shape" x="18" y="10" width="64" height="78" rx="32" ry="32"
        fill="#F5F5F5" stroke="#B0B0B0" stroke-width="2"/>
      <!-- 左脚（身体底部凸起） -->
      <ellipse class="foot-l" cx="38" cy="92" rx="9" ry="5"
        fill="#F5F5F5" stroke="#B0B0B0" stroke-width="1.5"/>
      <!-- 右脚 -->
      <ellipse class="foot-r" cx="62" cy="92" rx="9" ry="5"
        fill="#F5F5F5" stroke="#B0B0B0" stroke-width="1.5"/>
      <!-- 眼连接线（大白经典"一横脸"） -->
      <line class="face-line" x1="40" y1="34" x2="60" y2="34"
        stroke="#0A0A0A" stroke-width="1.8" stroke-linecap="round"/>
      <!-- 左眼（黑点，瞳孔即眼本身） -->
      <g class="eye-l">
        <circle class="iris-l" cx="40" cy="34" r="3.5" fill="#0A0A0A"/>
      </g>
      <!-- 右眼 -->
      <g class="eye-r">
        <circle class="iris-r" cx="60" cy="34" r="3.5" fill="#0A0A0A"/>
      </g>
      <!-- 胸口红心（医疗 AI 心脏 · recording 时跳动）-->
      <g class="bell">
        <circle cx="50" cy="58" r="4"
          fill="#E53030" stroke="#8A1818" stroke-width="0.7"/>
        <circle cx="49" cy="57" r="1.3" fill="#FFFFFF"/>
      </g>
      <!-- 嘴占位（大白无嘴，保留 class 供 CSS 兼容） -->
      <circle class="mouth" cx="50" cy="45" r="0.1" fill="transparent"/>
      <!-- 左手（白色手盘） -->
      <circle class="hand-l" cx="22" cy="68" r="7"
        fill="#F5F5F5" stroke="#B0B0B0" stroke-width="1.6"/>
      <!-- 右手 -->
      <circle class="hand-r" cx="78" cy="68" r="7"
        fill="#F5F5F5" stroke="#B0B0B0" stroke-width="1.6"/>
      <!-- 处理光点（胸口红心附近 processing 时闪烁） -->
      <circle class="spark" cx="52" cy="56" r="1.4" fill="#FFE659"/>
      <!-- 冷汗（alert 时右太阳穴滴） -->
      <ellipse class="sweat" cx="70" cy="16" rx="1.6" ry="2.4"
        fill="#5EB8EC" stroke="#2A7FB8" stroke-width="0.5"/>
    </svg>