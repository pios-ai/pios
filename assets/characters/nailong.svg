<svg width="64" height="64" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- 小尾巴（身后探出，先画让身体盖住根部） -->
      <path class="tail" d="M 80 78 Q 94 74 90 90 Q 86 84 80 82 Z"
        fill="#FFD84A" stroke="#C89020" stroke-width="1.6"/>
      <!-- 主体圆胖黄身 -->
      <ellipse class="body-shape" cx="50" cy="54" rx="34" ry="34"
        fill="#FFD84A" stroke="#C89020" stroke-width="2"/>
      <!-- 白色肚腩椭圆 -->
      <ellipse class="belly" cx="50" cy="66" rx="20" ry="18"
        fill="#FFF5C8" stroke="#C89020" stroke-width="1"/>
      <!-- 头顶一撮呆毛（奶龙招牌） -->
      <path class="ahoge" d="M 50 22 Q 48 8 52 2 Q 54 10 53 18 Z"
        fill="#FFD84A" stroke="#C89020" stroke-width="1.2"/>
      <!-- 粉色腮红 -->
      <ellipse class="cheek-l" cx="28" cy="54" rx="5" ry="3" fill="#FFB4C8" opacity="0.75"/>
      <ellipse class="cheek-r" cx="72" cy="54" rx="5" ry="3" fill="#FFB4C8" opacity="0.75"/>
      <!-- 大圆眼 -->
      <g class="eye-l">
        <ellipse cx="39" cy="44" rx="5" ry="6.5" fill="#FFFFFF" stroke="#2A2A30" stroke-width="1"/>
        <ellipse class="iris-l" cx="39" cy="45" rx="3" ry="4.5" fill="#0A0A0A"/>
        <circle cx="40.5" cy="43" r="1.3" fill="#FFFFFF"/>
      </g>
      <g class="eye-r">
        <ellipse cx="61" cy="44" rx="5" ry="6.5" fill="#FFFFFF" stroke="#2A2A30" stroke-width="1"/>
        <ellipse class="iris-r" cx="61" cy="45" rx="3" ry="4.5" fill="#0A0A0A"/>
        <circle cx="62.5" cy="43" r="1.3" fill="#FFFFFF"/>
      </g>
      <!-- 鼻孔（两个小黑点） -->
      <circle cx="47" cy="55" r="0.8" fill="#4A3810"/>
      <circle cx="53" cy="55" r="0.8" fill="#4A3810"/>
      <!-- 张开的小嘴 + 舌头 -->
      <path class="mouth" d="M 43 60 Q 50 68 57 60 Q 50 64 43 60 Z"
        fill="#D85878" stroke="#8A2038" stroke-width="1.2" stroke-linejoin="round"/>
      <!-- 胸前金爪印（bell 等效） -->
      <g class="bell">
        <circle cx="50" cy="72" r="2.6" fill="#F0D020" stroke="#8A6E10" stroke-width="0.5"/>
        <circle cx="46.5" cy="69" r="0.9" fill="#F0D020" stroke="#8A6E10" stroke-width="0.4"/>
        <circle cx="53.5" cy="69" r="0.9" fill="#F0D020" stroke="#8A6E10" stroke-width="0.4"/>
        <circle cx="47" cy="75" r="0.9" fill="#F0D020" stroke="#8A6E10" stroke-width="0.4"/>
        <circle cx="53" cy="75" r="0.9" fill="#F0D020" stroke="#8A6E10" stroke-width="0.4"/>
      </g>
      <!-- 短手（小圆爪） -->
      <circle class="hand-l" cx="20" cy="66" r="7" fill="#FFD84A" stroke="#C89020" stroke-width="1.6"/>
      <circle class="hand-r" cx="80" cy="66" r="7" fill="#FFD84A" stroke="#C89020" stroke-width="1.6"/>
      <!-- 短脚 -->
      <ellipse class="foot-l" cx="36" cy="90" rx="10" ry="5" fill="#E8AE30" stroke="#8A6E10" stroke-width="1.4"/>
      <ellipse class="foot-r" cx="64" cy="90" rx="10" ry="5" fill="#E8AE30" stroke="#8A6E10" stroke-width="1.4"/>
      <!-- spark 思考 -->
      <circle class="spark" cx="55" cy="20" r="1.6" fill="#FFE659"/>
      <!-- sweat -->
      <ellipse class="sweat" cx="74" cy="22" rx="1.6" ry="2.4" fill="#5EB8EC" stroke="#2A7FB8" stroke-width="0.5"/>
    </svg>